<html lang="en">
<head>

<title>iStackyyy — Host Console</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS ============ */
  :root {
    --court-green: #1B4D3E;
    --court-green-dark: #123329;
    --kitchen-gold: #E8B84B;
    --line-paint: #F7F5EF;
    --ink: #15201C;
    --winner-green: #3FA66B;
    --loser-coral: #E0654F;
    --resting-slate: #8E9B97;
    --waiting-blue: #4E7FB5;
    --font-display: 'Archivo Black', 'Arial Black', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow-card: 0 2px 14px rgba(21, 32, 28, 0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--line-paint); color: var(--ink); font-family: var(--font-body); overflow-x: hidden; }
  h1, h2, h3, .display { font-family: var(--font-display); letter-spacing: -0.01em; text-transform: uppercase; }
  a { color: inherit; }
  button { font-family: var(--font-body); cursor: pointer; touch-action: manipulation; }
  ::selection { background: var(--kitchen-gold); color: var(--ink); }
  :focus-visible { outline: 3px solid var(--kitchen-gold); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
  .mono { font-family: var(--font-mono); }

  /* MOBILE-SAFE INPUT DEFAULTS — 16px minimum prevents iOS Safari
     auto-zoom on focus; 44px minimum height meets Apple/Google touch
     target guidelines. Every input/select/textarea/button inherits this
     unless explicitly overridden below. */
  input, select, textarea {
    font-size: 16px;
    min-height: 44px;
  }
  button, .player-check, .type-option, .win-select-btn, .assign-btn, .remove-btn {
    min-height: 44px;
    touch-action: manipulation;
  }
  @media (max-width: 600px) {
    /* on small screens, compact UI chrome (badges, pills) can stay smaller
       than 44px since they aren't primary tap targets, but anything that
       triggers an action must not shrink below this */
    .status-pill, .lane-pos, .round-pill, .format-pill { min-height: 0; }
  }

  /* ============ PAGE STYLES ============ */
  body { padding-bottom: 60px; }

  .topbar { background: var(--ink); color: var(--line-paint); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-paddle { width: 18px; height: 24px; color: var(--kitchen-gold); flex-shrink: 0; }
  .brand .display { font-size: 20px; }
  .brand .dot { color: var(--kitchen-gold); }
  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .topbar-right button { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--line-paint); padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  .auth-box { max-width: 380px; margin: 80px auto; background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 32px; }
  .auth-box h1 { font-size: 22px; margin: 0 0 4px; }
  .auth-box p.sub { color: var(--resting-slate); font-size: 13px; margin: 0 0 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .field input, .field select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: var(--radius-sm); font-size: 16px; }
  .btn-primary { width: 100%; background: var(--court-green); color: white; border: none; padding: 12px; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; margin-top: 6px; }
  .btn-secondary { width: 100%; background: transparent; color: var(--court-green); border: 1.5px solid var(--court-green); padding: 10px; border-radius: var(--radius-sm); font-weight: 700; font-size: 13px; margin-top: 8px; }
  .auth-error { color: var(--loser-coral); font-size: 12px; margin-top: 8px; }

  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin: 0 0 14px; }
  .session-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
  .session-row:last-child { border-bottom: none; }
  .session-row .meta { font-size: 12px; color: var(--resting-slate); }
  .ref-code-pill { background: var(--court-green); color: white; font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 5px; letter-spacing: 0.03em; }
  .ref-code-display { display: flex; align-items: center; gap: 8px; background: var(--kitchen-gold); padding: 8px 14px; border-radius: var(--radius-sm); }
  .ref-code-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--ink); opacity: 0.7; }
  .ref-code-big { font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: 0.04em; }
  .session-row button { background: var(--court-green); color: white; border: none; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  .session-type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .type-option { border: 2px solid #ddd; border-radius: var(--radius-sm); padding: 14px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
  .type-option strong { font-size: 14px; }
  .type-option span { font-size: 11px; color: var(--resting-slate); }
  .type-option.selected { border-color: var(--court-green); background: rgba(27,77,62,0.05); }
  .type-option.selected strong { color: var(--court-green); }

  .console-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .console-header h1 { font-size: 22px; margin: 0; }
  .share-link { background: white; border-radius: var(--radius-sm); padding: 8px 12px; font-family: var(--font-mono); font-size: 12px; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-card); flex-wrap: wrap; justify-content: flex-end; }
  .share-link button { background: var(--kitchen-gold); border: none; padding: 5px 10px; border-radius: 4px; font-weight: 700; font-size: 11px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 2px solid #e5e0d5; }
  .tab-btn { background: none; border: none; padding: 10px 16px; font-weight: 700; font-size: 13px; color: var(--resting-slate); border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab-btn.active { color: var(--court-green); border-bottom-color: var(--court-green); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .add-player-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .add-player-row input { flex: 1; min-width: 140px; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: var(--radius-sm); }
  .add-player-row select { padding: 10px; border: 1.5px solid #ddd; border-radius: var(--radius-sm); }
  .add-player-row button { background: var(--court-green); color: white; border: none; padding: 10px 18px; border-radius: var(--radius-sm); font-weight: 700; }

  .roster-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .roster-table th { text-align: left; padding: 8px; color: var(--resting-slate); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
  .roster-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
  .status-pill { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; color: white; }
  .status-waiting { background: var(--waiting-blue); }
  .status-playing { background: var(--court-green); }
  .status-winners_queue { background: var(--winner-green); }
  .status-losers_queue { background: var(--loser-coral); }
  .status-resting { background: var(--resting-slate); }
  .roster-table button.remove-btn { background: none; border: none; color: var(--loser-coral); font-size: 11px; font-weight: 700; }

  .player-checklist { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .player-check { border: 1.5px solid #ddd; padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; user-select: none; }
  .player-check.selected { background: var(--court-green); color: white; border-color: var(--court-green); }

  .courts-host-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .court-host-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
  .court-host-label { background: var(--court-green); color: white; padding: 10px 14px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; }
  .court-host-body { padding: 14px; }
  .matchup-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; font-weight: 600; }

  .matchup-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .matchup-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; flex-wrap: wrap; gap: 8px; }
  .matchup-card.pending { background: #f7f5ef; border: 1px solid #e5e0d5; }
  .matchup-card.in-progress { background: rgba(232,184,75,0.12); border: 1px solid var(--kitchen-gold); }
  .matchup-card.completed { background: rgba(63,166,107,0.08); border: 1px solid var(--winner-green); opacity: 0.8; }
  .matchup-card select { padding: 6px 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 12px; }
  .matchup-vs { color: var(--resting-slate); font-size: 11px; }
  .win-select-btn { background: var(--winner-green); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .ongoing-pill { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; color: var(--kitchen-gold); background: rgba(232,184,75,0.15); padding: 3px 10px; border-radius: 999px; }

  /* result confirm + review modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(21,32,28,0.55); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal-box { background: white; border-radius: var(--radius); max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  .modal-box h2 { font-size: 16px; margin: 0 0 6px; }
  .modal-sub { font-size: 13px; color: var(--resting-slate); margin: 0 0 18px; }
  .confirm-actions { display: flex; gap: 10px; margin-top: 18px; }
  .confirm-actions button { flex: 1; padding: 11px; border-radius: var(--radius-sm); font-weight: 700; font-size: 13px; border: none; }
  .btn-yes { background: var(--winner-green); color: white; }
  .btn-no { background: #eee; color: var(--ink); }
  .winner-pick-row { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
  .winner-pick-option { border: 2px solid #ddd; border-radius: var(--radius-sm); padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; text-align: center; }
  .winner-pick-option:hover { border-color: var(--court-green); }

  .regroup-lanes { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
  .regroup-lane { border-radius: var(--radius-sm); padding: 12px; min-height: 100px; }
  .regroup-lane.winners-lane { background: rgba(63,166,107,0.1); border: 2px solid var(--winner-green); }
  .regroup-lane.losers-lane { background: rgba(224,101,79,0.1); border: 2px solid var(--loser-coral); }
  .regroup-lane h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  .regroup-lane.winners-lane h4 { color: var(--winner-green); }
  .regroup-lane.losers-lane h4 { color: var(--loser-coral); }
  .regroup-chip {
    background: white; border: 1px solid #ddd; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 600;
    margin: 0 4px 6px 0; display: inline-block; cursor: pointer;
  }
  .regroup-hint { font-size: 11px; color: var(--resting-slate); margin: -8px 0 14px; }
  .court-empty-msg { color: var(--resting-slate); font-size: 13px; text-align: center; padding: 12px 0; }
  .assign-btn { width: 100%; background: var(--kitchen-gold); color: var(--ink); border: none; padding: 9px; border-radius: var(--radius-sm); font-weight: 700; font-size: 12px; margin-top: 8px; }

  .inbox-item { padding: 12px; border-radius: var(--radius-sm); background: #fafaf7; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .inbox-item .who { font-weight: 700; font-size: 13px; }
  .inbox-item .what { font-size: 13px; color: var(--ink); }
  .inbox-item .when { font-size: 11px; color: var(--resting-slate); }
  .inbox-actions button { font-size: 11px; font-weight: 700; border: none; padding: 6px 10px; border-radius: 6px; margin-left: 6px; }
  .btn-dismiss { background: #eee; color: var(--ink); }
  .empty-inbox { color: var(--resting-slate); font-size: 13px; text-align: center; padding: 20px; }

  /* ============================================================
     MOBILE BREAKPOINT — tablet and below
     ============================================================ */
  @media (max-width: 768px) {
    .container { padding: 16px 14px; }
    .topbar { padding: 12px 16px; }
    .session-type-toggle { grid-template-columns: 1fr; }
    .regroup-lanes { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }

    /* tab bar: horizontal scroll instead of squeeze/wrap, since 3-4 tabs
       at full tap-target width don't fit 375px without scrolling */
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: 10px 14px; }

    .console-header { flex-direction: column; align-items: stretch; }
    .console-header > div:last-child { align-items: stretch; }
    .share-link { font-size: 11px; }
    .share-link span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }

    .courts-host-grid { grid-template-columns: 1fr; }

    /* tables: wrap in horizontal scroll rather than crush columns —
       see .table-scroll wrapper added in markup */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -2px; }
    .roster-table { min-width: 480px; }

    /* modals: edge-to-edge with safe margin, no awkward floating box */
    .modal-backdrop { padding: 12px; align-items: flex-end; }
    .modal-box { max-width: 100%; max-height: 85vh; padding: 18px; border-radius: var(--radius) var(--radius) 0 0; }
    .confirm-actions { flex-direction: column-reverse; }
    .confirm-actions button { width: 100%; }

    /* player checklists: bigger tap targets, more breathing room between chips */
    .player-checklist { gap: 10px; }
    .player-check { padding: 10px 14px; font-size: 13px; }

    .add-player-row { flex-direction: column; }
    .add-player-row input, .add-player-row select, .add-player-row button { width: 100%; }

    .matchup-card { flex-direction: column; align-items: stretch; text-align: left; }
    .matchup-card .win-select-btn { width: 100%; }
    .matchup-card select { width: 100%; }

    h1 { font-size: 18px; }
    .card h2 { font-size: 14px; }
  }

  @media (max-width: 420px) {
    .auth-box { margin: 40px auto; padding: 24px 20px; }
    .winner-pick-option { font-size: 12px; padding: 14px 10px; }
  }
</style>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://srkmbofgyajdairkjwti.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNya21ib2ZneWFqZGFpcmtqd3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Nzk3NDQsImV4cCI6MjA5NzQ1NTc0NH0.GxSJ2RH2txJLM2VjJ0t-Q0Yqd_6M2TrO6BS7Cq17QuY';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STACKING ENGINE
// ============================================================
const TIER_RANK = { beginner: 0, intermediate: 1, advanced: 2, open: -1 };

function tiersCompatible(teamATier, teamBTier, skillMatchMode) {
  if (skillMatchMode === 'open') return true;
  if (teamATier === 'open' || teamBTier === 'open') return true;
  const rankA = TIER_RANK[teamATier];
  const rankB = TIER_RANK[teamBTier];
  if (skillMatchMode === 'strict') return rankA === rankB;
  if (skillMatchMode === 'adjacent') return Math.abs(rankA - rankB) <= 1;
  return true;
}

function getTeamTier(team, playersById) {
  const tiers = team.player_ids.map(pid => playersById[pid]?.skill_tier).filter(Boolean);
  if (tiers.length === 0) return 'open';
  if (tiers.includes('open')) {
    const nonOpen = tiers.filter(t => t !== 'open');
    if (nonOpen.length === 0) return 'open';
    tiers.length = 0;
    tiers.push(...nonOpen);
  }
  const ranks = tiers.map(t => TIER_RANK[t]);
  const minRank = Math.min(...ranks);
  return Object.keys(TIER_RANK).find(k => TIER_RANK[k] === minRank);
}

/**
 * Strict FIFO pop: always takes the front of the queue, no skipping for
 * skill matching or any other reason. Skill-tier filtering, if the host
 * wants it, should narrow WHICH queue gets used upstream, not reorder
 * within a queue.
 */
function popFront(queueTeams) {
  if (!queueTeams || queueTeams.length === 0) return null;
  return queueTeams[0];
}

/**
 * Decide the next match for a freed court.
 *
 * Default behavior (win_loss_queue mode): strict FIFO within each lane.
 * - Try to fill the court with 2 teams from the SAME lane (winner vs
 *   winner, or loser vs loser), always taking the longest-waiting team(s)
 *   in that lane — never skipping ahead for any reason.
 * - If a lane alone doesn't have 2 teams waiting, and `allowCrossLaneFill`
 *   is true (host-customizable, default true), fall back to pairing the
 *   front of winners queue against the front of losers queue so the court
 *   doesn't sit empty. If `allowCrossLaneFill` is false, the court just
 *   waits until a lane fills naturally.
 */
function decideNextMatch({ stackingMode, winnersQueue, losersQueue, waitingQueue, allowCrossLaneFill = true, preferredLane = null }) {
  if (stackingMode === 'fifo') {
    if (waitingQueue.length < 2) return null;
    return { teamA: waitingQueue[0], teamB: waitingQueue[1], lane: 'waiting' };
  }

  const lanesToTry = preferredLane === 'losers' ? ['losers', 'winners'] : ['winners', 'losers'];

  // 1. Same-lane FIFO match (winner vs winner, or loser vs loser)
  for (const lane of lanesToTry) {
    const queue = lane === 'winners' ? winnersQueue : losersQueue;
    if (queue.length >= 2) {
      return { teamA: queue[0], teamB: queue[1], lane };
    }
  }

  if (!allowCrossLaneFill) return null;

  // 2. Cross-lane fallback: front of winners vs front of losers, so an
  // uneven head count (not divisible by 4 for doubles) doesn't stall a court.
  const winnerFront = popFront(winnersQueue);
  const loserFront = popFront(losersQueue);
  if (winnerFront && loserFront) {
    return { teamA: winnerFront, teamB: loserFront, lane: 'mixed' };
  }

  // 3. Last resort: pull from the general waiting queue if nothing in
  // winners/losers can fill the court (e.g. very start of session).
  if (waitingQueue.length >= 2) {
    return { teamA: waitingQueue[0], teamB: waitingQueue[1], lane: 'waiting' };
  }

  return null;
}

function calculateReturnPosition(queueTeams, restPriorityEnabled) {
  if (queueTeams.length === 0) return 1;
  if (restPriorityEnabled) {
    const minPos = Math.min(...queueTeams.map(t => t.queue_position ?? 0));
    return minPos - 1;
  }
  const maxPos = Math.max(...queueTeams.map(t => t.queue_position ?? 0));
  return maxPos + 1;
}

function calculateBackOfQueuePosition(queueTeams) {
  if (queueTeams.length === 0) return 1;
  const maxPos = Math.max(...queueTeams.map(t => t.queue_position ?? 0));
  return maxPos + 1;
}

window.StackingEngine = { tiersCompatible, getTeamTier, popFront, decideNextMatch, calculateReturnPosition, calculateBackOfQueuePosition, TIER_RANK };

// ============================================================
// TOURNAMENT ENGINE
// Round Robin (circle method) + Swiss pairing, pure functions.
// ============================================================
function generateRoundRobinSchedule(teamIds) {
  const teams = [...teamIds];
  const hasBye = teams.length % 2 !== 0;
  if (hasBye) teams.push(null);

  const n = teams.length;
  const rounds = [];
  const fixed = teams[0];
  let rotating = teams.slice(1);

  for (let r = 0; r < n - 1; r++) {
    const roundTeams = [fixed, ...rotating];
    const pairs = [];
    let bye = null;

    for (let i = 0; i < n / 2; i++) {
      const a = roundTeams[i];
      const b = roundTeams[n - 1 - i];
      if (a === null || b === null) {
        bye = a === null ? b : a;
      } else {
        pairs.push([a, b]);
      }
    }

    rounds.push({ round: r + 1, pairs, bye });
    rotating = [rotating[rotating.length - 1], ...rotating.slice(0, rotating.length - 1)];
  }

  return rounds;
}

function totalRoundRobinRounds(teamCount) {
  return teamCount % 2 === 0 ? teamCount - 1 : teamCount;
}

function generateSwissRound(teams) {
  const sorted = [...teams].sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    const diffA = a.points_for - a.points_against;
    const diffB = b.points_for - b.points_against;
    return diffB - diffA;
  });

  const pool = [...sorted];
  const pairs = [];
  let bye = null;

  if (pool.length % 2 !== 0) {
    const byeTeam = pool.pop();
    bye = byeTeam.id;
  }

  while (pool.length > 0) {
    const teamA = pool.shift();
    const alreadyFaced = new Set(teamA.opponent_history || []);
    let opponentIndex = pool.findIndex(t => !alreadyFaced.has(t.id));
    if (opponentIndex === -1) opponentIndex = 0;
    const teamB = pool.splice(opponentIndex, 1)[0];
    pairs.push([teamA.id, teamB.id]);
  }

  return { pairs, bye };
}

function computeStandings(teams) {
  return [...teams].sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    const diffA = a.points_for - a.points_against;
    const diffB = b.points_for - b.points_against;
    if (diffB !== diffA) return diffB - diffA;
    return b.points_for - a.points_for;
  });
}

window.TournamentEngine = { generateRoundRobinSchedule, totalRoundRobinRounds, generateSwissRound, computeStandings };

// ============================================================
// PASSWORD UTILITY (SHA-256 via Web Crypto API — no library needed)
// ============================================================
async function hashPassword(plainText) {
  const data = new TextEncoder().encode(plainText);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// REFERENCE CODE — short human-readable session ID, e.g. STACK-A3F9
// ============================================================
function generateReferenceCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I to avoid ambiguity when read aloud
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return `STACK-${code}`;
}

// ============================================================
// SESSION API
// (No auth layer for now — testing mode. Revisit before real launch.)
// ============================================================
const SessionAPI = (() => {
  async function createSession({ name, format, courtCount, stackingMode, pairingDefault, skillMatchMode, restPriorityEnabled, password, parentSessionId, sessionType, tournamentFormat, division, roundsTotal, scoringMode, pointsToWin, allowCrossLaneFill }) {
    if (!password || password.length < 4) {
      throw new Error('Session password must be at least 4 characters.');
    }
    const passwordHash = await hashPassword(password);

    let session, error;
    for (let attempt = 0; attempt < 5; attempt++) {
      const referenceCode = generateReferenceCode();
      const result = await supabaseClient
        .from('sessions')
        .insert({
          name, format, court_count: courtCount,
          stacking_mode: stackingMode || 'win_loss_queue',
          pairing_default: pairingDefault || 'fixed',
          skill_match_mode: skillMatchMode || 'open',
          rest_priority_enabled: restPriorityEnabled !== false,
          allow_cross_lane_fill: allowCrossLaneFill !== false,
          password_hash: passwordHash,
          parent_session_id: parentSessionId || null,
          session_type: sessionType || 'open_play',
          tournament_format: tournamentFormat || null,
          division: sessionType === 'tournament' ? (division || 'open') : null,
          rounds_total: roundsTotal || null,
          scoring_mode: scoringMode || 'win_loss',
          points_to_win: pointsToWin || 11,
          reference_code: referenceCode,
        })
        .select().single();
      session = result.data;
      error = result.error;
      if (!error) break;
      if (error.code !== '23505') break; // not a uniqueness collision, stop retrying
    }
    if (error) throw error;
    const courtRows = Array.from({ length: courtCount }, (_, i) => ({ session_id: session.id, court_number: i + 1, status: 'open' }));
    const { error: courtError } = await supabaseClient.from('courts').insert(courtRows);
    if (courtError) throw courtError;
    return session;
  }
  async function getSessionByReferenceCode(code) {
    const normalized = code.trim().toUpperCase();
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('reference_code', normalized).single();
    if (error) throw error;
    return data;
  }
  async function getMySessions() {
    const { data, error } = await supabaseClient.from('sessions').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    return data;
  }
  async function getSession(sessionId) {
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('id', sessionId).single();
    if (error) throw error;
    return data;
  }
  async function verifySessionPassword(sessionId, password) {
    const session = await getSession(sessionId);
    if (!session.password_hash) return true; // legacy sessions with no password set
    const hash = await hashPassword(password);
    return hash === session.password_hash;
  }
  async function finishSession(sessionId) {
    const { error } = await supabaseClient.from('sessions').update({ status: 'completed', ended_at: new Date().toISOString() }).eq('id', sessionId);
    if (error) throw error;
  }
  // ============================================================
  // TOURNAMENT FUNCTIONS
  // ============================================================

  /**
   * Create tournament teams from a list of player-id groups (already paired
   * by the host) and kick off the schedule (round robin generates fully,
   * swiss generates round 1 only).
   */
  async function startTournament(sessionId, teamPlayerGroups, format) {
    const createdTeams = [];
    for (const group of teamPlayerGroups) {
      const { data, error } = await supabaseClient
        .from('teams')
        .insert({ session_id: sessionId, player_ids: group, pairing_mode: 'fixed', queue_lane: 'waiting' })
        .select().single();
      if (error) throw error;
      createdTeams.push(data);
    }

    const teamIds = createdTeams.map(t => t.id);

    if (format === 'round_robin') {
      const schedule = window.TournamentEngine.generateRoundRobinSchedule(teamIds);
      const rows = [];
      schedule.forEach(round => {
        round.pairs.forEach(([a, b]) => {
          rows.push({ session_id: sessionId, round_number: round.round, team_a_id: a, team_b_id: b, status: 'pending' });
        });
      });
      const { error } = await supabaseClient.from('tournament_matchups').insert(rows);
      if (error) throw error;
      await supabaseClient.from('sessions').update({ rounds_total: window.TournamentEngine.totalRoundRobinRounds(teamIds.length), current_round: 1 }).eq('id', sessionId);
    } else if (format === 'swiss') {
      const teamsForPairing = createdTeams.map(t => ({ id: t.id, wins: 0, losses: 0, points_for: 0, points_against: 0, opponent_history: [] }));
      const { pairs } = window.TournamentEngine.generateSwissRound(teamsForPairing);
      const rows = pairs.map(([a, b]) => ({ session_id: sessionId, round_number: 1, team_a_id: a, team_b_id: b, status: 'pending' }));
      const { error } = await supabaseClient.from('tournament_matchups').insert(rows);
      if (error) throw error;
      await supabaseClient.from('sessions').update({ current_round: 1 }).eq('id', sessionId);
    }

    return createdTeams;
  }

  async function getMatchups(sessionId, roundNumber = null) {
    let query = supabaseClient.from('tournament_matchups').select('*, team_a:team_a_id(*), team_b:team_b_id(*)').eq('session_id', sessionId);
    if (roundNumber !== null) query = query.eq('round_number', roundNumber);
    const { data, error } = await query.order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }

  async function getTournamentTeams(sessionId) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('is_active', true);
    if (error) throw error;
    return data;
  }

  async function assignMatchupToCourt(matchupId, courtId) {
    const { data: matchup, error: mErr } = await supabaseClient.from('tournament_matchups').select('*').eq('id', matchupId).single();
    if (mErr) throw mErr;
    await assignCourt(courtId, matchup.team_a_id, matchup.team_b_id);
    await supabaseClient.from('tournament_matchups').update({ court_id: courtId, status: 'in_progress' }).eq('id', matchupId);
  }

  /**
   * Record a scored result for a tournament matchup: updates the matchup,
   * logs the match with scores, updates both teams' win/loss/points stats
   * and opponent history (for swiss rematch avoidance), then frees the court.
   */
  async function recordTournamentResult(matchupId, courtId, teamAScore, teamBScore) {
    const { data: matchup, error: mErr } = await supabaseClient.from('tournament_matchups').select('*').eq('id', matchupId).single();
    if (mErr) throw mErr;
    const { data: court } = await supabaseClient.from('courts').select('*').eq('id', courtId).single();

    const winnerTeamId = teamAScore > teamBScore ? matchup.team_a_id : matchup.team_b_id;

    const { data: matchRow, error: matchErr } = await supabaseClient.from('matches').insert({
      session_id: matchup.session_id, court_id: courtId, team_a_id: matchup.team_a_id, team_b_id: matchup.team_b_id,
      winner_team_id: winnerTeamId, team_a_score: teamAScore, team_b_score: teamBScore, round_number: matchup.round_number,
      started_at: court?.game_started_at || null, ended_at: new Date().toISOString(),
      duration_seconds: court?.game_started_at ? Math.round((Date.now() - new Date(court.game_started_at).getTime()) / 1000) : null,
    }).select().single();
    if (matchErr) throw matchErr;

    await supabaseClient.from('tournament_matchups').update({ status: 'completed', match_id: matchRow.id }).eq('id', matchupId);

    // update team stats
    const { data: teamA } = await supabaseClient.from('teams').select('*').eq('id', matchup.team_a_id).single();
    const { data: teamB } = await supabaseClient.from('teams').select('*').eq('id', matchup.team_b_id).single();

    await supabaseClient.from('teams').update({
      wins: teamA.wins + (winnerTeamId === teamA.id ? 1 : 0),
      losses: teamA.losses + (winnerTeamId === teamA.id ? 0 : 1),
      points_for: teamA.points_for + teamAScore,
      points_against: teamA.points_against + teamBScore,
      opponent_history: [...(teamA.opponent_history || []), matchup.team_b_id],
    }).eq('id', teamA.id);

    await supabaseClient.from('teams').update({
      wins: teamB.wins + (winnerTeamId === teamB.id ? 1 : 0),
      losses: teamB.losses + (winnerTeamId === teamB.id ? 0 : 1),
      points_for: teamB.points_for + teamBScore,
      points_against: teamB.points_against + teamAScore,
      opponent_history: [...(teamB.opponent_history || []), matchup.team_a_id],
    }).eq('id', teamB.id);

    if (courtId) {
      await supabaseClient.from('courts').update({ status: 'open', team_a_id: null, team_b_id: null, game_started_at: null }).eq('id', courtId);
    }
  }

  async function isRoundComplete(sessionId, roundNumber) {
    const matchups = await getMatchups(sessionId, roundNumber);
    return matchups.length > 0 && matchups.every(m => m.status === 'completed');
  }

  /**
   * Advance to the next round. Round robin: just reveals the next
   * pre-generated round. Swiss: generates a fresh pairing based on
   * updated standings + opponent history.
   */
  async function advanceToNextRound(sessionId) {
    const session = await getSession(sessionId);
    const nextRound = session.current_round + 1;

    if (session.tournament_format === 'swiss') {
      const teams = await getTournamentTeams(sessionId);
      const { pairs, bye } = window.TournamentEngine.generateSwissRound(teams);
      const rows = pairs.map(([a, b]) => ({ session_id: sessionId, round_number: nextRound, team_a_id: a, team_b_id: b, status: 'pending' }));
      if (rows.length > 0) {
        const { error } = await supabaseClient.from('tournament_matchups').insert(rows);
        if (error) throw error;
      }
    }
    // round_robin: matchups for nextRound already exist from startTournament

    await supabaseClient.from('sessions').update({ current_round: nextRound }).eq('id', sessionId);
    return nextRound;
  }

  async function carryPlayersToNewSession(newSessionId, playerRows) {
    // playerRows: array of { name, skill_tier } from the finished session
    const inserted = [];
    for (const p of playerRows) {
      const { data, error } = await supabaseClient
        .from('players')
        .insert({ session_id: newSessionId, name: p.name, skill_tier: p.skill_tier || 'open', status: 'waiting' })
        .select().single();
      if (error) throw error;
      inserted.push(data);
    }
    return inserted;
  }
  /**
   * Find players who are marked 'waiting' on their player row but are NOT
   * yet inside any active team (i.e. truly unpaired, sitting idle). This
   * is the actual signal for "needs a partner" — player.status alone is
   * not enough, since it doesn't track team membership.
   */
  async function getUnpairedWaitingPlayers(sessionId) {
    const [players, activeTeams] = await Promise.all([
      getPlayers(sessionId),
      getTeams(sessionId),
    ]);
    const pairedPlayerIds = new Set(activeTeams.flatMap(t => t.player_ids));
    return players
      .filter(p => p.status === 'waiting' && !pairedPlayerIds.has(p.id))
      .sort((a, b) => new Date(a.joined_at) - new Date(b.joined_at));
  }

  async function addPlayer(sessionId, name, skillTier = 'open') {
    const { data, error } = await supabaseClient.from('players').insert({ session_id: sessionId, name, skill_tier: skillTier, status: 'waiting' }).select().single();
    if (error) throw error;

    // Auto-pair into the waiting queue immediately so round-1 auto-fill
    // actually has real team rows to pull from.
    const session = await getSession(sessionId);
    const teamSize = session.format === 'doubles' ? 2 : 1;

    if (teamSize === 1) {
      // singles: every player is their own team, queued immediately
      await createTeam(sessionId, [data.id], session.pairing_default, 'waiting');
    } else {
      // doubles: pair with the longest-waiting OTHER unpaired player, FIFO
      const unpaired = await getUnpairedWaitingPlayers(sessionId);
      const partner = unpaired.find(p => p.id !== data.id);
      if (partner) {
        await createTeam(sessionId, [partner.id, data.id], session.pairing_default, 'waiting');
      }
      // if no partner yet, this player just sits unpaired until the next one joins
    }

    return data;
  }
  async function getPlayers(sessionId) {
    const { data, error } = await supabaseClient.from('players').select('*').eq('session_id', sessionId).neq('status', 'left').order('joined_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function removePlayer(playerId) {
    const { error } = await supabaseClient.from('players').update({ status: 'left' }).eq('id', playerId);
    if (error) throw error;

    // If this player was already paired into a waiting team, that team is
    // no longer valid — deactivate it so the auto-fill engine doesn't try
    // to send a now-departed player onto a court. Their now-unpaired
    // partner (if any) goes back to waiting for a new partner.
    const { data: sessionId } = await supabaseClient.from('players').select('session_id').eq('id', playerId).single();
    if (sessionId) {
      const activeTeams = await getTeams(sessionId.session_id);
      const affectedTeam = activeTeams.find(t => t.player_ids.includes(playerId) && t.queue_lane === 'waiting');
      if (affectedTeam) {
        await supabaseClient.from('teams').update({ is_active: false }).eq('id', affectedTeam.id);
      }
    }
  }
  async function createTeam(sessionId, playerIds, pairingMode = 'fixed', queueLane = 'waiting') {
    const { data: existing } = await supabaseClient.from('teams').select('queue_position').eq('session_id', sessionId).eq('queue_lane', queueLane);
    const position = window.StackingEngine.calculateBackOfQueuePosition(existing || []);
    const { data, error } = await supabaseClient.from('teams').insert({ session_id: sessionId, player_ids: playerIds, pairing_mode: pairingMode, queue_lane: queueLane, queue_position: position }).select().single();
    if (error) throw error;
    return data;
  }
  async function getTeams(sessionId) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('is_active', true);
    if (error) throw error;
    return data;
  }
  /**
   * Deactivate any currently-active team that contains one or more of the
   * given player IDs. Used before manually assigning players to a court,
   * so an auto-paired "waiting" team row doesn't linger as a stale duplicate
   * once those same players get placed by hand instead.
   */
  async function deactivateTeamsContainingPlayers(sessionId, playerIds) {
    const activeTeams = await getTeams(sessionId);
    const staleTeamIds = activeTeams
      .filter(t => t.player_ids.some(pid => playerIds.includes(pid)))
      .map(t => t.id);
    if (staleTeamIds.length > 0) {
      await supabaseClient.from('teams').update({ is_active: false }).in('id', staleTeamIds);
    }
  }
  async function getQueueLane(sessionId, lane) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('queue_lane', lane).eq('is_active', true).order('queue_position', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getCourts(sessionId) {
    const { data, error } = await supabaseClient.from('courts').select('*, team_a:team_a_id(*), team_b:team_b_id(*)').eq('session_id', sessionId).order('court_number', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function assignCourt(courtId, teamAId, teamBId) {
    const { error } = await supabaseClient.from('courts').update({ status: 'in_progress', team_a_id: teamAId, team_b_id: teamBId, game_started_at: new Date().toISOString() }).eq('id', courtId);
    if (error) throw error;
    await supabaseClient.from('teams').update({ queue_lane: 'playing', queue_position: null }).in('id', [teamAId, teamBId]);
  }
  async function logMatchResult(courtId, winnerTeamId, scoreData = null) {
    const { data: court, error: courtErr } = await supabaseClient.from('courts').select('*').eq('id', courtId).single();
    if (courtErr) throw courtErr;
    const insertRow = {
      session_id: court.session_id, court_id: courtId, team_a_id: court.team_a_id, team_b_id: court.team_b_id,
      winner_team_id: winnerTeamId, started_at: court.game_started_at, ended_at: new Date().toISOString(),
      duration_seconds: court.game_started_at ? Math.round((Date.now() - new Date(court.game_started_at).getTime()) / 1000) : null,
      score_visible: scoreData ? true : false,
    };
    if (scoreData) {
      insertRow.team_a_score = scoreData.teamAScore;
      insertRow.team_b_score = scoreData.teamBScore;
    }
    await supabaseClient.from('matches').insert(insertRow);
    return court;
  }

  /**
   * Apply the host's final decision on how the 4 players from a finished
   * match regroup into the winners/losers queues. Unlike a rigid "winning
   * pair stays together" rule, this lets the host freely re-pair players
   * across the original teams (e.g. one winner + one loser can team up
   * in the winners queue together) before they're queued.
   *
   * winnersGroup / losersGroup: arrays of player_id, each either length 0
   * (skip that lane) or length matching the session's team size.
   */
  async function applyQueuePlacement(courtId, sessionId, pairingMode, winnersGroup, losersGroup) {
    const [winnersQ, losersQ] = await Promise.all([getQueueLane(sessionId, 'winners_queue'), getQueueLane(sessionId, 'losers_queue')]);

    if (winnersGroup && winnersGroup.length > 0) {
      await createTeam(sessionId, winnersGroup, pairingMode, 'winners_queue');
    }
    if (losersGroup && losersGroup.length > 0) {
      await createTeam(sessionId, losersGroup, pairingMode, 'losers_queue');
    }

    // deactivate the two original teams that just finished playing — they've
    // been replaced by the freshly-arranged groups above
    const { data: court } = await supabaseClient.from('courts').select('team_a_id, team_b_id').eq('id', courtId).single();
    if (court) {
      await supabaseClient.from('teams').update({ is_active: false }).in('id', [court.team_a_id, court.team_b_id]);
    }

    await supabaseClient.from('courts').update({ status: 'open', team_a_id: null, team_b_id: null, game_started_at: null }).eq('id', courtId);
    await tryRefillCourt(courtId);
  }

  async function recordResult(courtId, winnerTeamId) {
    // Legacy simple path (default split, no manual reassignment) — kept for
    // the "Auto-Fill" quick path elsewhere if ever needed.
    const court = await logMatchResult(courtId, winnerTeamId);
    const loserTeamId = court.team_a_id === winnerTeamId ? court.team_b_id : court.team_a_id;
    const [winnersQ, losersQ] = await Promise.all([getQueueLane(court.session_id, 'winners_queue'), getQueueLane(court.session_id, 'losers_queue')]);
    await supabaseClient.from('teams').update({ queue_lane: 'winners_queue', queue_position: window.StackingEngine.calculateBackOfQueuePosition(winnersQ) }).eq('id', winnerTeamId);
    await supabaseClient.from('teams').update({ queue_lane: 'losers_queue', queue_position: window.StackingEngine.calculateBackOfQueuePosition(losersQ) }).eq('id', loserTeamId);
    await supabaseClient.from('courts').update({ status: 'open', team_a_id: null, team_b_id: null, game_started_at: null }).eq('id', courtId);
    await tryRefillCourt(courtId);
  }
  async function tryRefillCourt(courtId) {
    const { data: court } = await supabaseClient.from('courts').select('*').eq('id', courtId).single();
    if (!court || court.status === 'in_progress') return null;
    const session = await getSession(court.session_id);
    const [winnersQueue, losersQueue, waitingQueue] = await Promise.all([
      getQueueLane(court.session_id, 'winners_queue'), getQueueLane(court.session_id, 'losers_queue'),
      getQueueLane(court.session_id, 'waiting'),
    ]);
    const decision = window.StackingEngine.decideNextMatch({
      stackingMode: session.stacking_mode, winnersQueue, losersQueue, waitingQueue,
      allowCrossLaneFill: session.allow_cross_lane_fill !== false,
    });
    if (!decision) return null;
    await assignCourt(courtId, decision.teamA.id, decision.teamB.id);
    return decision;
  }
  async function getPendingRestRequests(sessionId) {
    const { data, error } = await supabaseClient.from('rest_requests').select('*, player:player_id(*)').eq('session_id', sessionId).eq('status', 'pending');
    if (error) throw error;
    return data;
  }
  async function getMessages(sessionId, statusFilter = null) {
    let query = supabaseClient.from('messages').select('*').eq('session_id', sessionId).order('created_at', { ascending: false });
    if (statusFilter) query = query.eq('status', statusFilter);
    const { data, error } = await query;
    if (error) throw error;
    return data;
  }
  async function markMessageStatus(messageId, status) {
    const { error } = await supabaseClient.from('messages').update({ status }).eq('id', messageId);
    if (error) throw error;
  }
  return {
    createSession, getMySessions, getSession, getSessionByReferenceCode, verifySessionPassword, finishSession, carryPlayersToNewSession,
    startTournament, getMatchups, getTournamentTeams, assignMatchupToCourt, recordTournamentResult, isRoundComplete, advanceToNextRound,
    addPlayer, getPlayers, removePlayer, createTeam, getTeams, getQueueLane, getUnpairedWaitingPlayers, deactivateTeamsContainingPlayers,
    getCourts, assignCourt, recordResult, logMatchResult, applyQueuePlacement, tryRefillCourt,
    getPendingRestRequests, getMessages, markMessageStatus,
  };
})();
window.SessionAPI = SessionAPI;

// HOST APP
// ============================================================
let activeSession = null;
let activeTab = 'roster';
let realtimeChannel = null;

init();

async function init() {
  document.getElementById('topbarRight').innerHTML = '';

}

          <button onclick="promptOpenSession('${s.id}')">Open</button>

      <h2>Recently Finished</h2>
      ${completedOnes.map(s => `

            <div class="meta"><span class="ref-code-pill mono">${s.reference_code || '—'}</span> · ${s.format} · finished ${s.ended_at ? new Date(s.ended_at).toLocaleDateString() : ''}</div>
          </div>
          <button onclick="startHostAgainFlow('${s.id}')" style="background:var(--kitchen-gold); color:var(--ink);">Host Again</button>

    </div>
    ` : ''}

    <div class="card">
      <h2>Start New Session</h2>

      <div class="session-type-toggle">
        <div class="type-option selected" id="typeOpenPlay" onclick="selectSessionType('open_play')">
          <strong>Open Play</strong>
          <span>Continuous winners/losers queue — no fixed end</span>
        </div>
        <div class="type-option" id="typeTournament" onclick="selectSessionType('tournament')">
          <strong>Tournament</strong>
          <span>Round Robin or Swiss — fixed rounds, real standings</span>
        </div>
      </div>

      <div class="form-grid">
        <div class="field"><label>Session Name</label><input type="text" id="newName" placeholder="Saturday Open Play" value="Open Play"></div>
        <div class="field"><label>Format</label><select id="newFormat"><option value="doubles">Doubles</option><option value="singles">Singles</option></select></div>
        <div class="field"><label>Number of Courts</label><input type="number" id="newCourtCount" value="2" min="1" max="20"></div>
        <div class="field open-play-only" id="stackingModeField"><label>Stacking Mode</label><select id="newStackingMode"><option value="win_loss_queue">Winners/Losers Queue (recommended)</option><option value="fifo">Straight Queue (FIFO)</option></select></div>
        <div class="field open-play-only" id="pairingDefaultField"><label>Doubles Pairing</label><select id="newPairingDefault"><option value="fixed">Fixed Teams (stay paired)</option><option value="mixed">Mixed (re-pair each round)</option></select></div>
        <div class="field open-play-only" id="crossLaneFillField"><label>Uneven Numbers Fallback</label><select id="newAllowCrossLaneFill"><option value="true">Winner vs Loser is OK if queues are uneven (recommended)</option><option value="false">Court waits until a full winner-vs-winner or loser-vs-loser match is ready</option></select></div>

        <div class="field tournament-only" id="divisionField" style="display:none;">

            <option value="open">Open / Any</option>

            <option value="mens_doubles">Men's Doubles</option>
            <option value="womens_doubles">Women's Doubles</option>

            <option value="womens_singles">Women's Singles</option>
          </select>
        </div>
        <div class="field tournament-only" id="swissRoundsField" style="display:none;">
          <label>Number of Rounds</label>
          <input type="number" id="newRoundsTotal" value="4" min="1" max="20">
        </div>
        <div class="field tournament-only" id="pointsToWinField" style="display:none;">
          <label>Points to Win (per game)</label>

let selectedSessionType = 'open_play';

function selectSessionType(type) {
  selectedSessionType = type;
  document.getElementById('typeOpenPlay').classList.toggle('selected', type === 'open_play');
  document.getElementById('typeTournament').classList.toggle('selected', type === 'tournament');

  document.querySelectorAll('.open-play-only').forEach(el => { el.style.display = type === 'open_play' ? '' : 'none'; });
  document.querySelectorAll('.tournament-only').forEach(el => { el.style.display = type === 'tournament' ? '' : 'none'; });
  if (type === 'tournament') toggleSwissRoundsField();
}

function toggleSwissRoundsField() {
  const fmt = document.getElementById('newTournamentFormat').value;
  document.getElementById('swissRoundsField').style.display = fmt === 'swiss' ? '' : 'none';
}

const DIVISION_LABELS = {
  mixed_doubles: 'Mixed Doubles', mens_doubles: "Men's Doubles", womens_doubles: "Women's Doubles",
  mens_singles: "Men's Singles", womens_singles: "Women's Singles", open: 'Open / Any',
};

function sessionTypeBadge(s) {
  if (s.session_type === 'tournament') {
    const fmt = s.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin';
    const divisionLabel = s.division && DIVISION_LABELS[s.division] ? ` · ${DIVISION_LABELS[s.division]}` : '';
    return `<span style="font-size:10px; background:var(--kitchen-gold); color:var(--ink); padding:2px 7px; border-radius:999px; font-weight:700; margin-left:6px;">${fmt}${divisionLabel}</span>`;
  }
  return `<span style="font-size:10px; background:var(--waiting-blue); color:white; padding:2px 7px; border-radius:999px; font-weight:700; margin-left:6px;">Open Play</span>`;
}

async function handleCreateSession() {
  const name = document.getElementById('newName').value.trim() || 'Open Play';
  const format = document.getElementById('newFormat').value;
  const courtCount = parseInt(document.getElementById('newCourtCount').value, 10) || 1;
  const stackingMode = document.getElementById('newStackingMode').value;
  const pairingDefault = document.getElementById('newPairingDefault').value;
  const allowCrossLaneFill = document.getElementById('newAllowCrossLaneFill').value === 'true';
  const password = document.getElementById('newPassword').value;
  const passwordConfirm = document.getElementById('newPasswordConfirm').value;
  const errorEl = document.getElementById('createSessionError');
  errorEl.textContent = '';

  if (password !== passwordConfirm) {
    errorEl.textContent = 'Passwords do not match.';
    return;
  }

  const sessionType = selectedSessionType;
  const tournamentFormat = sessionType === 'tournament' ? document.getElementById('newTournamentFormat').value : null;
  const division = sessionType === 'tournament' ? document.getElementById('newDivision').value : null;
  const roundsTotal = (sessionType === 'tournament' && tournamentFormat === 'swiss') ? parseInt(document.getElementById('newRoundsTotal').value, 10) : null;
  const pointsToWin = sessionType === 'tournament' ? parseInt(document.getElementById('newPointsToWin').value, 10) || 11 : 11;
  const scoringMode = sessionType === 'tournament' ? 'point_diff' : 'win_loss';
  // Tournament partners are always fixed for the whole event — no re-pairing mode applies there.
  const effectivePairingDefault = sessionType === 'tournament' ? 'fixed' : pairingDefault;

  try {
    const session = await SessionAPI.createSession({
      name, format, courtCount, stackingMode, pairingDefault: effectivePairingDefault, allowCrossLaneFill, restPriorityEnabled: true, password,
      sessionType, tournamentFormat, division, roundsTotal, scoringMode, pointsToWin,
    });
    rememberSessionPassword(session.id, password);
    await openSession(session.id);
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

// ----------------------------
// PASSWORD GATE
// ----------------------------
function sessionPasswordKey(sessionId) { return `istackyyy_pw_ok_${sessionId}`; }
function rememberSessionPassword(sessionId, password) {
  sessionStorage.setItem(sessionPasswordKey(sessionId), 'unlocked');
}
function isSessionUnlocked(sessionId) {
  return sessionStorage.getItem(sessionPasswordKey(sessionId)) === 'unlocked';
}

async function promptOpenSession(sessionId) {
  if (isSessionUnlocked(sessionId)) {
    await openSession(sessionId);
    return;
  }
  const session = await SessionAPI.getSession(sessionId);
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="pwModal">
      <div class="modal-box">
        <h2>Enter Password</h2>
        <p class="modal-sub">"${escapeHtml(session.name)}" is password-protected.</p>
        <div class="field"><input type="password" id="sessionPwInput" placeholder="Session password" autocomplete="off" onkeydown="if(event.key==='Enter') confirmSessionPassword('${sessionId}')"></div>
        <div class="auth-error" id="pwModalError"></div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('pwModal').remove()">Cancel</button>
          <button class="btn-yes" onclick="confirmSessionPassword('${sessionId}')">Unlock</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('sessionPwInput').focus();
}

async function confirmSessionPassword(sessionId) {
  const input = document.getElementById('sessionPwInput').value;
  const ok = await SessionAPI.verifySessionPassword(sessionId, input);
  if (!ok) {
    document.getElementById('pwModalError').textContent = 'Incorrect password.';
    return;
  }
  rememberSessionPassword(sessionId, input);
  document.getElementById('pwModal').remove();
  await openSession(sessionId);
}

async function openSession(sessionId) {
  activeSession = await SessionAPI.getSession(sessionId);
  activeTab = 'roster';
  renderConsole();
  subscribeRealtime();
}

function backToSessionList() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  activeSession = null;
  renderSessionList();
}

async function renderConsole() {
  const shareUrl = `${window.location.origin}/?session=${activeSession.id}`;
  document.getElementById('appRoot').innerHTML = `
    <div class="console-header">
      <div>
        <button class="btn-secondary" style="width:auto; padding:6px 12px; font-size:12px; margin-bottom:8px;" onclick="backToSessionList()">← All Sessions</button>
        <h1>${escapeHtml(activeSession.name)} ${sessionTypeBadge(activeSession)}</h1>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
        <div class="ref-code-display">
          <span class="ref-code-label">Session Code</span>
          <span class="ref-code-big mono">${activeSession.reference_code || '—'}</span>
        </div>
        <div class="share-link">
          <span id="shareUrlText">${shareUrl}</span>
          <button onclick="copyShareLink('${shareUrl}')">Copy Link</button>
          <button onclick="copyShareMessage('${shareUrl}', '${activeSession.reference_code || ''}')" style="background:var(--court-green); color:white;">Copy for Chat</button>
        </div>
        <button onclick="confirmFinishSession()" style="background:var(--loser-coral); color:white; border:none; padding:7px 14px; border-radius:var(--radius-sm); font-size:12px; font-weight:700;">Finish Session</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${activeTab === 'roster' ? 'active' : ''}" onclick="switchTab('roster')">Roster</button>
      ${activeSession.session_type === 'tournament' ? `<button class="tab-btn ${activeTab === 'bracket' ? 'active' : ''}" onclick="switchTab('bracket')">Bracket</button>` : ''}
      <button class="tab-btn ${activeTab === 'courts' ? 'active' : ''}" onclick="switchTab('courts')">Courts</button>
      <button class="tab-btn ${activeTab === 'inbox' ? 'active' : ''}" onclick="switchTab('inbox')">Inbox</button>
    </div>
    <div class="tab-panel active" id="tabPanel"></div>
  `;
