let _paddleGripCounter = 0;
function paddleSvg() {
  // Unique pattern id per call — inline SVG <defs> ids share the document's
  // global namespace, so a fixed id would collide across multiple paddles.
  const gid = `grip${_paddleGripCounter++}`;
  return `<svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <pattern id="${gid}" width="3.2" height="3.2" patternUnits="userSpaceOnUse" patternTransform="rotate(52)">
        <rect width="3.2" height="3.2" fill="currentColor"/>
        <line x1="0" y1="0" x2="0" y2="3.2" stroke="#000" stroke-opacity="0.22" stroke-width="1.1"/>
      </pattern>
    </defs>
    <rect x="18.5" y="45" width="11" height="19" rx="3.5" fill="url(#${gid})"/>
    <rect x="18.5" y="45" width="11" height="19" rx="3.5" fill="none" stroke="#000" stroke-opacity="0.18" stroke-width="0.6"/>
  </svg>`;
}

// ============================================================
// PHOTO / AVATAR HELPERS (shared)
// ============================================================
// Deterministic color from a name — same name → same color, always.
function colorFromName(name) {
  const s = String(name || '?');
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360;
  // Pleasant, saturated but not neon; consistent lightness for contrast with white text.
  return `hsl(${h}, 52%, 42%)`;
}
function initialsFromName(name) {
  const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
// Face for a paddle: photo if present, else initials on name-color circle.
function paddleFaceHtml(name, photoUrl) {
  if (photoUrl) return `<div class="paddle-face"><img src="${photoUrl}" alt=""></div>`;
  return `<div class="paddle-face" style="background:${colorFromName(name)}"><span class="initials">${initialsFromName(name)}</span></div>`;
}
// Paddle chip with photo-face + name OUTSIDE below it. Accepts a player object.
function paddleChipHost(player) {
  const name = typeof player === 'string' ? player : (player?.name || '—');
  const photo = typeof player === 'string' ? null : (player?.photo_url || null);
  return `<div class="court-host-paddle">
    <div class="court-host-paddle-shape">${paddleSvg()}${paddleFaceHtml(name, photo)}</div>
    <span class="paddle-name-out">${escapeHtml(name)}</span>
  </div>`;
}

// Compress an image File to a small square JPEG data URL (~256px, quality 0.7).
// Keeps base64 payloads well under ~80KB so they fit comfortably in a text column.
function compressImageFile(file, size = 256, quality = 0.7) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) { reject(new Error('Please choose an image file.')); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Cover-crop to square (center).
        const scale = Math.max(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('Could not read that image.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Could not read that file.'));
    reader.readAsDataURL(file);
  });
}
// Wire an avatar-upload element: compress + preview + stash into a hidden field.
async function handleAvatarPick(inputEl, targetId, previewEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  try {
    const dataUrl = await compressImageFile(file);
    document.getElementById(targetId).value = dataUrl;
    // previewEl is the inner preview SPAN only — the file/hidden inputs
    // live as siblings outside it, so this never destroys them.
    previewEl.innerHTML = `<img src="${dataUrl}" alt="">`;
  } catch (err) { alert(err.message || 'Could not process image.'); }
}
// Reusable avatar-upload widget markup.
// CRITICAL: the preview (photo/initials) lives in its own inner <span id="preview_...">
// so handleAvatarPick can safely replace ONLY that span's innerHTML without ever
// touching the sibling <input type="file"> or <input type="hidden"> that hold the data.
function avatarUploadWidget(targetId, currentUrl, name) {
  const inner = currentUrl
    ? `<img src="${currentUrl}" alt="">`
    : (name
        ? `<span class="init-fill" style="background:${colorFromName(name)};width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${initialsFromName(name)}</span>`
        : `<span class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>PHOTO</span>`);
  return `<label class="avatar-upload" id="wrap_${targetId}">
    <span id="preview_${targetId}" style="display:contents">${inner}</span>
    <input type="file" accept="image/*" onchange="handleAvatarPick(this,'${targetId}',document.getElementById('preview_${targetId}'))">
    <input type="hidden" id="${targetId}" value="${currentUrl || ''}">
  </label>`;
}

function renderCourtDiagramCard(court, players) {
  const isActive = court.status === 'in_progress';
  const sideA = isActive ? playersForTeam(court.team_a, players).map(paddleChipHost).join('') : '';
  const sideB = isActive ? playersForTeam(court.team_b, players).map(paddleChipHost).join('') : '';

  const prev = _prevHostCourtStates[court.id];
  const justStarted = isActive && (!prev || prev.status !== 'in_progress' || prev.team_a_id !== court.team_a_id);
  const justFreed   = !isActive && prev && prev.status === 'in_progress';
  const motionClass = justStarted ? 'serve-in' : (justFreed ? 'pulse-update' : '');
  _prevHostCourtStates[court.id] = { status: court.status, team_a_id: court.team_a_id };

  const footer = isActive ? 'Tap to mark finished' : 'OPEN — waiting for players';
  const footerClass = isActive ? 'ongoing' : '';

  return `
    <div class="court-host-card ${motionClass}${isActive ? ' court-active' : ''}" onclick="${isActive ? `handleMarkFinished('${court.id}')` : ''}">
      <div class="court-host-label">
        <span class="num">Court ${court.court_number}</span>
        <span class="court-host-timer ${isActive ? '' : 'idle'}" data-start="${court.game_started_at || ''}" id="hostTimer-${court.id}">${isActive ? '00:00' : 'OPEN'}</span>
      </div>
      <div class="court-host-diagram">
        <div class="court-host-side">${sideA}</div>
        <div class="court-host-kitchen-top"></div>
        <div class="court-host-centerline-top"></div>
        <div class="court-host-net"></div>
        <div class="court-host-kitchen-bottom"></div>
        <div class="court-host-centerline-bottom"></div>
        <div class="court-host-side">${sideB}</div>
        ${!isActive ? '<div class="court-host-empty-msg">OPEN</div>' : ''}
      </div>
      <div class="court-host-footer ${footerClass}">${footer}</div>
    </div>
  `;
}

// ============================================================
// MATCH RESULT FLOW
// ============================================================
let resultFlowCourt = null;
let resultFlowWinnerTeamId = null;
// Prevents any DB writes from firing more than once per result submission,
// even if the host taps "Save" rapidly multiple times.
let _resultInFlight = false;

async function handleMarkFinished(courtId) {
  // Guard: if a modal is already open, don't stack a second one.
  if (document.getElementById('resultModal')) return;

  const courts = await SessionAPI.getCourts(activeSession.id);
  resultFlowCourt = courts.find(c => c.id === courtId);
  if (!resultFlowCourt || resultFlowCourt.status !== 'in_progress') return;

  // Go straight to Who Won — skip the redundant "Match Finished?" confirm.
  await showPickWinnerModal();
}

async function showPickWinnerModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const namesA = playerNamesForTeam(resultFlowCourt.team_a, players).join(' & ');
  const namesB = playerNamesForTeam(resultFlowCourt.team_b, players).join(' & ');

  // Reuse existing modal if we're navigating back from the score step,
  // otherwise create and inject a fresh one.
  let modal = document.getElementById('resultModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.id = 'resultModal';
    document.body.appendChild(modal);
  }

  modal.innerHTML = `
    <div class="modal-box">
      <h2>Who Won?</h2>
      <p class="modal-sub">Court ${resultFlowCourt.court_number} — tap the winning side.</p>
      <div class="winner-pick-row">
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_a_id}')">${escapeHtml(namesA)}</div>
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_b_id}')">${escapeHtml(namesB)}</div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn-secondary" style="width:auto;padding:8px 16px;" onclick="closeResultModal()">Cancel</button>
      </div>
    </div>
  `;
}

async function selectWinner(winnerTeamId) {
  resultFlowWinnerTeamId = winnerTeamId;
  await showLoserScoreModal();
}

async function showLoserScoreModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const winnerTeam = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_a : resultFlowCourt.team_b;
  const loserTeam  = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_b : resultFlowCourt.team_a;
  const winnerNames = playerNamesForTeam(winnerTeam, players).join(' & ');
  const loserNames  = playerNamesForTeam(loserTeam,  players).join(' & ');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Enter Score</h2>
      <p class="modal-sub">Court ${resultFlowCourt.court_number} — enter the losing team's score. Winner is auto-calculated.</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0;">
        <div style="text-align:center;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--winner-green);margin-bottom:6px;">🏆 Winner</div>
          <div style="font-size:13px;font-weight:700;margin-bottom:10px;min-height:36px;">${escapeHtml(winnerNames)}</div>
          <div id="winnerScoreDisplay" style="font-family:var(--font-mono);font-size:40px;font-weight:800;color:var(--winner-green);line-height:1;">11</div>
          <div style="font-size:10px;color:var(--accent);font-weight:700;margin-top:4px;min-height:14px;" id="deuceNote"></div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--loser-coral);margin-bottom:6px;">Loser's score</div>
          <div style="font-size:13px;font-weight:700;margin-bottom:10px;min-height:36px;">${escapeHtml(loserNames)}</div>
          <input type="number" id="loserScoreInput" min="0" value="0"
            style="font-size:40px;font-weight:800;font-family:var(--font-mono);width:100%;text-align:center;border:2px solid var(--border-soft);border-radius:var(--radius-sm);background:var(--surface-raised);color:var(--ink);padding:6px 0;min-height:0;"
            oninput="updateWinnerDisplay()" onchange="updateWinnerDisplay()">
          <div style="font-size:10px;color:var(--resting-slate);margin-top:4px;" id="scoreLimitNote">0 – 9 normal · 10+ deuce</div>
        </div>
      </div>

      <div class="auth-error" id="scoreEntryError"></div>
      <div class="confirm-actions" style="margin-top:8px;">
        <button class="btn-no" onclick="showPickWinnerModal()">← Back</button>
        <button class="btn-yes" onclick="confirmLoserScore()">Save &amp; Continue</button>
      </div>
    </div>
  `;
  document.getElementById('loserScoreInput').focus();
}

function updateWinnerDisplay() {
  const deuceOn = activeSession?.deuce_enabled !== false;
  const raw = parseInt(document.getElementById('loserScoreInput').value, 10);
  let loserScore = isNaN(raw) || raw < 0 ? 0 : raw;
  // Deuce OFF: loser can never reach 11 — clamp to 10.
  if (!deuceOn && loserScore > 10) {
    loserScore = 10;
    document.getElementById('loserScoreInput').value = 10;
  }
  const isDeuce = deuceOn && loserScore >= 10;
  const winnerScore = isDeuce ? loserScore + 2 : 11;
  document.getElementById('winnerScoreDisplay').textContent = winnerScore;
  const noteEl = document.getElementById('deuceNote');
  noteEl.textContent = isDeuce ? `Deuce — ${winnerScore}–${loserScore}` : '';
  const limitEl = document.getElementById('scoreLimitNote');
  if (limitEl) limitEl.textContent = deuceOn ? '0 – 9 normal · 10+ deuce' : '0 – 10 · winner always 11 (no deuce)';
}

async function confirmLoserScore() {
  if (_resultInFlight) return;

  const raw = parseInt(document.getElementById('loserScoreInput').value, 10);
  const deuceOn = activeSession?.deuce_enabled !== false;
  if (isNaN(raw) || raw < 0) {
    document.getElementById('scoreEntryError').textContent = 'Enter a valid score (0 or higher).';
    return;
  }
  if (!deuceOn && raw > 10) {
    document.getElementById('scoreEntryError').textContent = 'Deuce is off — losing score must be 10 or below.';
    return;
  }

  _resultInFlight = true;
  const btn = document.querySelector('#resultModal .btn-yes');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    await finalizeResult(raw);
  } catch (err) {
    _resultInFlight = false;
    const errEl = document.getElementById('scoreEntryError');
    if (errEl) errEl.textContent = err.message || 'Something went wrong — please try again.';
    if (btn) { btn.disabled = false; btn.textContent = 'Save & Continue'; }
  }
}

async function finalizeResult(loserScore) {
  // Save the match result first (stats written, match row inserted).
  await SessionAPI.logMatchResult(resultFlowCourt.id, resultFlowWinnerTeamId, loserScore, activeSession?.deuce_enabled !== false);

  // Now show the per-player disposition step.
  // Court stays in_progress until the host confirms everyone's fate —
  // this prevents the next match from auto-filling before decisions are made.
  _resultInFlight = false; // release the score-entry guard; disposition has its own
  await showPlayerDispositionModal(loserScore);
}

// Per-player outcomes: keyed by player ID.
// Populated by the disposition modal, submitted by confirmDispositions().
let _dispositions = {};

/**
 * Show the disposition modal — one card per player, each with
 * Queue / Rest / Leave toggle. Default is Queue.
 * Players pre-flagged as 'left' (mid-match leave) start locked on Leave.
 */
async function showPlayerDispositionModal(loserScore) {
  if (document.getElementById('dispositionModal')) return;

  const winnerTeam = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_a : resultFlowCourt.team_b;
  const loserTeam  = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_b : resultFlowCourt.team_a;

  const allPlayers = await SessionAPI.getPlayers(activeSession.id);
  // Also fetch left players so we can show pre-flagged ones.
  const allIncLeft = await SessionAPI.getAllPlayersIncludingLeft(activeSession.id);
  const playerById = Object.fromEntries(allIncLeft.map(p => [p.id, p]));

  // Build full player list: winners first, then losers.
  const winnerIds = winnerTeam?.player_ids || [];
  const loserIds  = loserTeam?.player_ids  || [];

  // Initialise decisions: Queue by default, Left if pre-flagged.
  _dispositions = {};
  [...winnerIds, ...loserIds].forEach(pid => {
    const p = playerById[pid];
    _dispositions[pid] = p?.status === 'left' ? 'left' : 'queue';
  });

  function playerCard(pid, isWinner) {
    const p = playerById[pid];
    const name = p?.name || '—';
    const preLeft = p?.status === 'left';
    const roleLabel = isWinner
      ? `<span style="font-size:10px;font-weight:800;color:var(--winner-green);letter-spacing:0.05em;text-transform:uppercase;">Won</span>`
      : `<span style="font-size:10px;font-weight:800;color:var(--loser-coral);letter-spacing:0.05em;text-transform:uppercase;">Lost</span>`;

    if (preLeft) {
      // Already marked left mid-match — locked, can't change here.
      return `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface-hover);border:1px solid var(--border-card);margin-bottom:8px;gap:10px;">
          <div>
            ${roleLabel}
            <div style="font-weight:700;font-size:14px;margin-top:2px;">${escapeHtml(name)}</div>
          </div>
          <span style="font-size:11px;font-weight:700;color:var(--bench-slate);background:var(--surface-raised);padding:5px 12px;border-radius:999px;border:1px solid var(--border-soft);">Left (flagged)</span>
        </div>`;
    }

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface-hover);border:1px solid var(--border-card);margin-bottom:8px;gap:10px;flex-wrap:wrap;">
        <div style="flex-shrink:0;">
          ${roleLabel}
          <div style="font-weight:700;font-size:14px;margin-top:2px;">${escapeHtml(name)}</div>
        </div>
        <div style="display:flex;gap:6px;" id="disp-btns-${pid}">
          ${['queue','rest','left'].map(opt => {
            const labels = { queue: '↩ Queue', rest: '☕ Rest', left: '🚪 Leave' };
            const colors = { queue: 'var(--waiting-blue)', rest: 'var(--bench-slate)', left: 'var(--fault-coral)' };
            const isActive = _dispositions[pid] === opt;
            return `<button
              id="disp-${pid}-${opt}"
              onclick="setDisposition('${pid}','${opt}')"
              style="
                font-size:12px;font-weight:700;padding:7px 12px;border-radius:var(--radius-sm);
                border:2px solid ${isActive ? colors[opt] : 'var(--border-soft)'};
                background:${isActive ? colors[opt] : 'transparent'};
                color:${isActive ? 'white' : 'var(--ink-muted)'};
                min-height:0;cursor:pointer;transition:all 0.15s;
              ">${labels[opt]}</button>`;
          }).join('')}
        </div>
      </div>`;
  }

  const winnerCards = winnerIds.map(pid => playerCard(pid, true)).join('');
  const loserCards  = loserIds.map(pid  => playerCard(pid, false)).join('');

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="dispositionModal">
      <div class="modal-box" style="max-width:520px;">
        <h2>What's next for each player?</h2>
        <p class="modal-sub">Court ${resultFlowCourt.court_number} — choose Queue, Rest, or Leave for each player. They don't all have to do the same thing.</p>
        ${winnerCards}
        ${loserCards}
        <div class="auth-error" id="dispositionError"></div>
        <div class="confirm-actions" style="margin-top:4px;">
          <button class="btn-yes" id="dispositionConfirmBtn" onclick="confirmDispositions()">Confirm &amp; Free Court</button>
        </div>
      </div>
    </div>
  `);
}

function setDisposition(playerId, outcome) {
  _dispositions[playerId] = outcome;

  const colors = { queue: 'var(--waiting-blue)', rest: 'var(--bench-slate)', left: 'var(--fault-coral)' };
  const container = document.getElementById(`disp-btns-${playerId}`);
  if (!container) return;

  container.querySelectorAll('button').forEach(btn => {
    const btnOutcome = btn.id.split('-').pop(); // disp-{pid}-{outcome}
    const active = btnOutcome === outcome;
    btn.style.background    = active ? colors[btnOutcome] : 'transparent';
    btn.style.borderColor   = active ? colors[btnOutcome] : 'var(--border-soft)';
    btn.style.color         = active ? 'white' : 'var(--ink-muted)';
  });
}

async function confirmDispositions() {
  const btn   = document.getElementById('dispositionConfirmBtn');
  const errEl = document.getElementById('dispositionError');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  const winnerTeam = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_a : resultFlowCourt.team_b;
  const loserTeam  = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_b : resultFlowCourt.team_a;
  const winnerIds = winnerTeam?.player_ids || [];
  const loserIds  = loserTeam?.player_ids  || [];

  const decisions = [
    ...winnerIds.map(pid => ({ playerId: pid, outcome: _dispositions[pid] || 'queue', wasWinner: true  })),
    ...loserIds.map( pid => ({ playerId: pid, outcome: _dispositions[pid] || 'queue', wasWinner: false })),
  ];

  try {
    await SessionAPI.applyQueuePlacement(resultFlowCourt.id, activeSession.id, decisions);
    document.getElementById('dispositionModal').remove();
    closeResultModal();
    _dispositions = {};
    if (activeTab === 'courts') {
      const panel = document.getElementById('tabPanel');
      if (panel) await renderCourtsTab(panel);
    }
  } catch (err) {
    if (errEl) errEl.textContent = err.message || 'Something went wrong — please try again.';
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Free Court'; }
  }
}

function closeResultModal() {
  const modal = document.getElementById('resultModal');
  if (modal) modal.remove();
  const dispModal = document.getElementById('dispositionModal');
  if (dispModal) dispModal.remove();
  resultFlowCourt = null;
  resultFlowWinnerTeamId = null;
  _resultInFlight = false;
  _dispositions = {};
}

// ============================================================
// BRACKETS TAB — Full Tournament System
// Flow: Teams → Players → Brackets → Draw → Results
// Supports: Single Elim + Winners/Losers bracket, Round Robin
// Per-round Best Of selection, score entry, result reversal
// ============================================================

// ── State ──
let _bracketView = 'teams';   // 'teams' | 'brackets' | 'draw'
let _activeBracketId = null;
let _editingTeamId = null;

// ── Utilities ──
function nextPowerOf2(n) {
  if (n <= 2) return 2;
  let p = 2; while (p < n) p *= 2; return p;
}
function roundLabel(round, totalRounds) {
  const left = totalRounds - round + 1;
  if (left === 1) return 'Final';
  if (left === 2) return 'Semifinal';
  if (left === 3) return 'Quarterfinal';
  return `Round ${round}`;
}

// ── BracketAPI ──
const BracketAPI = (() => {

  // --- Teams (session-level) ---
  async function getTeams(sessionId) {
    const { data, error } = await supabaseClient.from('bracket_entries')
      .select('*').eq('session_id', sessionId).is('bracket_id', null)
      .order('created_at', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function createTeam(sessionId, teamName) {
    const { data, error } = await supabaseClient.from('bracket_entries')
      .insert({ session_id: sessionId, team_name: teamName, is_bye: false })
      .select().single();
    if (error) throw error;
    return data;
  }

  async function updateTeam(teamId, updates) {
    const { error } = await supabaseClient.from('bracket_entries')
      .update(updates).eq('id', teamId);
    if (error) throw error;
  }

  async function deleteTeam(teamId) {
    await supabaseClient.from('bracket_entries').delete().eq('id', teamId);
  }

  // --- Brackets ---
  async function getBrackets(sessionId) {
    const { data, error } = await supabaseClient.from('brackets')
      .select('*').eq('session_id', sessionId).order('created_at', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function createBracket({ sessionId, name, bracketType, totalSlots }) {
    const { data, error } = await supabaseClient.from('brackets')
      .insert({ session_id: sessionId, name, bracket_type: bracketType, total_slots: totalSlots, best_of: 1, status: 'setup' })
      .select().single();
    if (error) throw error;
    return data;
  }

  async function updateBracket(bracketId, updates) {
    const { error } = await supabaseClient.from('brackets').update(updates).eq('id', bracketId);
    if (error) throw error;
  }

  async function deleteBracket(bracketId) {
    await supabaseClient.from('bracket_matches').delete().eq('bracket_id', bracketId);
    // Clear bracket_id from seeded entries (don't delete the teams themselves)
    await supabaseClient.from('bracket_entries').update({ bracket_id: null, slot: null })
      .eq('bracket_id', bracketId).is('is_bye', false);
    await supabaseClient.from('bracket_entries').delete().eq('bracket_id', bracketId).eq('is_bye', true);
    const { error } = await supabaseClient.from('brackets').delete().eq('id', bracketId);
    if (error) throw error;
  }

  // --- Seeding teams into a bracket ---
  async function getSeededEntries(bracketId) {
    const { data, error } = await supabaseClient.from('bracket_entries')
      .select('*').eq('bracket_id', bracketId).order('slot', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function seedTeamToBracket(teamId, bracketId, slot) {
    const { error } = await supabaseClient.from('bracket_entries')
      .update({ bracket_id: bracketId, slot }).eq('id', teamId);
    if (error) throw error;
  }

  async function unseedTeam(teamId) {
    const { error } = await supabaseClient.from('bracket_entries')
      .update({ bracket_id: null, slot: null }).eq('id', teamId);
    if (error) throw error;
  }

  // --- Matches ---
  async function getMatches(bracketId) {
    const { data, error } = await supabaseClient.from('bracket_matches')
      .select('*').eq('bracket_id', bracketId)
      .order('round', { ascending: true }).order('position', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function generateDraw(bracketId, entries, totalSlots, bracketType) {
    // Wipe existing matches
    await supabaseClient.from('bracket_matches').delete().eq('bracket_id', bracketId);

    const rows = [];
    if (bracketType === 'round_robin') {
      const real = entries.filter(e => !e.is_bye);
      let pos = 1;
      for (let i = 0; i < real.length; i++) {
        for (let j = i + 1; j < real.length; j++) {
          rows.push({ bracket_id: bracketId, round: 1, position: pos++,
            entry_a_id: real[i].id, entry_b_id: real[j].id,
            best_of: 1, status: 'pending', match_type: 'pool' });
        }
      }
    } else {
      // Single elim — winners bracket rounds
      const totalRounds = Math.log2(totalSlots);
      const entBySlot = Object.fromEntries(entries.map(e => [e.slot, e]));

      for (let r = 1; r <= totalRounds; r++) {
        const matchesInRound = totalSlots / Math.pow(2, r);
        for (let p = 1; p <= matchesInRound; p++) {
          const row = { bracket_id: bracketId, round: r, position: p,
            best_of: 1, status: 'pending', match_type: 'winners' };
          if (r === 1) {
            const slotA = 2 * p - 1, slotB = 2 * p;
            const eA = entBySlot[slotA], eB = entBySlot[slotB];
            row.entry_a_id = eA?.id || null;
            row.entry_b_id = eB?.id || null;
            if (eA?.is_bye && eB && !eB.is_bye) { row.winner_id = eB.id; row.status = 'completed'; }
            else if (eB?.is_bye && eA && !eA.is_bye) { row.winner_id = eA.id; row.status = 'completed'; }
          }
          rows.push(row);
        }
      }

      // Losers bracket (only if > 2 teams)
      if (totalSlots >= 4) {
        // Losers R1: losers from winners R1
        const lR1count = totalSlots / 4;
        for (let p = 1; p <= lR1count; p++) {
          rows.push({ bracket_id: bracketId, round: 1, position: p,
            best_of: 1, status: 'pending', match_type: 'losers' });
        }
        // Losers R2 onwards
        let lCount = lR1count / 2;
        let lRound = 2;
        while (lCount >= 1) {
          for (let p = 1; p <= lCount; p++) {
            rows.push({ bracket_id: bracketId, round: lRound, position: p,
              best_of: 1, status: 'pending', match_type: 'losers' });
          }
          lCount /= 2; lRound++;
        }
        // Grand Final
        rows.push({ bracket_id: bracketId, round: 99, position: 1,
          best_of: 1, status: 'pending', match_type: 'grand_final' });
        // 3rd Place
        rows.push({ bracket_id: bracketId, round: 99, position: 2,
          best_of: 1, status: 'pending', match_type: 'third_place' });
      }
    }

    const { error } = await supabaseClient.from('bracket_matches').insert(rows);
    if (error) throw error;
    await propagate(bracketId);
  }

  async function recordResult(matchId, scoreA, scoreB, winnerId, bracketId) {
    const loserId = (await supabaseClient.from('bracket_matches').select('entry_a_id,entry_b_id').eq('id', matchId).single())
      .data;
    const loser_id = winnerId === loserId?.entry_a_id ? loserId?.entry_b_id : loserId?.entry_a_id;

    await supabaseClient.from('bracket_matches').update({
      score_a: scoreA, score_b: scoreB, winner_id: winnerId, loser_id,
      status: 'completed', ended_at: new Date().toISOString(),
    }).eq('id', matchId);
    await propagate(bracketId);
  }

  async function reverseResult(matchId, bracketId) {
    const { data: m } = await supabaseClient.from('bracket_matches').select('*').eq('id', matchId).single();
    if (!m) return;
    // Clear this match
    await supabaseClient.from('bracket_matches').update({
      score_a: null, score_b: null, winner_id: null, loser_id: null,
      status: 'pending', ended_at: null,
    }).eq('id', matchId);
    // Clear downstream matches that received this match's winner or loser
    const { data: downstream } = await supabaseClient.from('bracket_matches')
      .select('id, entry_a_id, entry_b_id')
      .eq('bracket_id', bracketId)
      .gt('round', m.round === 99 ? 98 : m.round);
    for (const d of downstream || []) {
      if (d.entry_a_id === m.winner_id || d.entry_b_id === m.winner_id ||
          d.entry_a_id === m.loser_id  || d.entry_b_id === m.loser_id) {
        await supabaseClient.from('bracket_matches').update({
          entry_a_id: d.entry_a_id === m.winner_id || d.entry_a_id === m.loser_id ? null : d.entry_a_id,
          entry_b_id: d.entry_b_id === m.winner_id || d.entry_b_id === m.loser_id ? null : d.entry_b_id,
          winner_id: null, loser_id: null, status: 'pending',
          score_a: null, score_b: null, ended_at: null,
        }).eq('id', d.id);
      }
    }
  }

  async function updateMatchBestOf(matchId, bestOf) {
    await supabaseClient.from('bracket_matches').update({ best_of: bestOf }).eq('id', matchId);
  }

  async function propagate(bracketId) {
    const { data: matches } = await supabaseClient.from('bracket_matches')
      .select('*').eq('bracket_id', bracketId)
      .order('round').order('position');
    if (!matches) return;

    const completed = matches.filter(m => m.status === 'completed' && m.winner_id);
    const wMatches  = matches.filter(m => m.match_type === 'winners');
    const lMatches  = matches.filter(m => m.match_type === 'losers');

    for (const m of completed) {
      if (m.match_type === 'winners') {
        // Winner advances in winners bracket
        const nextR = m.round + 1;
        const nextP = Math.ceil(m.position / 2);
        const nextW = wMatches.find(x => x.round === nextR && x.position === nextP);
        if (nextW && m.winner_id) {
          const field = m.position % 2 === 1 ? 'entry_a_id' : 'entry_b_id';
          if (nextW[field] !== m.winner_id)
            await supabaseClient.from('bracket_matches').update({ [field]: m.winner_id }).eq('id', nextW.id);
        }
        // Loser drops to losers bracket R1
        if (m.round === 1 && m.loser_id) {
          // Loser from winners R1 position p → losers R1 position Math.ceil(p/2)
          const lP = Math.ceil(m.position / 2);
          const lM = lMatches.find(x => x.round === 1 && x.position === lP);
          if (lM && m.loser_id) {
            const field = m.position % 2 === 1 ? 'entry_a_id' : 'entry_b_id';
            if (lM[field] !== m.loser_id)
              await supabaseClient.from('bracket_matches').update({ [field]: m.loser_id }).eq('id', lM.id);
          }
        }
      }

      if (m.match_type === 'losers' && m.winner_id) {
        const lR = m.round + 1;
        const lP = Math.ceil(m.position / 2);
        const nextL = lMatches.find(x => x.round === lR && x.position === lP);
        if (nextL) {
          const field = m.position % 2 === 1 ? 'entry_a_id' : 'entry_b_id';
          if (nextL[field] !== m.winner_id)
            await supabaseClient.from('bracket_matches').update({ [field]: m.winner_id }).eq('id', nextL.id);
        }
      }
    }

    // Grand Final: winners bracket champion vs losers bracket champion
    const gf = matches.find(m => m.match_type === 'grand_final');
    if (gf) {
      const wFinal = wMatches.reduce((a,b) => (a?.round||0) > (b?.round||0) ? a : b, null);
      const lFinal = lMatches.reduce((a,b) => (a?.round||0) > (b?.round||0) ? a : b, null);
      const updates = {};
      if (wFinal?.winner_id && gf.entry_a_id !== wFinal.winner_id) updates.entry_a_id = wFinal.winner_id;
      if (lFinal?.winner_id && gf.entry_b_id !== lFinal.winner_id) updates.entry_b_id = lFinal.winner_id;
      if (Object.keys(updates).length)
        await supabaseClient.from('bracket_matches').update(updates).eq('id', gf.id);
    }

    // 3rd Place: losers of the two semi-finalists
    const tf = matches.find(m => m.match_type === 'third_place');
    if (tf) {
      const wSemis = wMatches.filter(m => m.round === (wMatches.reduce((a,b)=>Math.max(a,b.round),0) - 1));
      const updates = {};
      if (wSemis[0]?.loser_id && tf.entry_a_id !== wSemis[0].loser_id) updates.entry_a_id = wSemis[0].loser_id;
      if (wSemis[1]?.loser_id && tf.entry_b_id !== wSemis[1].loser_id) updates.entry_b_id = wSemis[1].loser_id;
      if (Object.keys(updates).length)
        await supabaseClient.from('bracket_matches').update(updates).eq('id', tf.id);
    }
  }

  return {
    getTeams, createTeam, updateTeam, deleteTeam,
    getBrackets, createBracket, updateBracket, deleteBracket,
    getSeededEntries, seedTeamToBracket, unseedTeam,
    getMatches, generateDraw, recordResult, reverseResult,
    updateMatchBestOf,
  };
})();

async function bracketsTabHtml() {
  const session = activeSession;
  if (!session || session.session_type !== 'tournament') {
    return `<div class="card"><p style="color:var(--bench-slate);">Brackets are only available for Tournament sessions.</p></div>`;
  }

  if (_bracketView === 'teams' || _bracketView === 'brackets') return await teamsAndBracketsView();
  if (_bracketView === 'draw' && _activeBracketId) return await drawView(_activeBracketId);
  return await teamsAndBracketsView();
}

// ── Team modals ──
function showAddTeamModal() {
  if (document.getElementById('teamModal')) return;
  const isDoubles = activeSession.format === 'doubles';
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="teamModal">
      <div class="modal-box" style="max-width:400px;">
        <h2>Add Team</h2>
        <div class="field"><label>Team Name</label><input type="text" id="tmName" placeholder="e.g. Team Alpha"></div>
        <div class="field"><label>Player 1</label><input type="text" id="tmP1" placeholder="Player name"></div>
        ${isDoubles ? `<div class="field"><label>Player 2</label><input type="text" id="tmP2" placeholder="Player name"></div>` : ''}
        <div class="auth-error" id="tmError"></div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('teamModal').remove()">Cancel</button>
          <button class="btn-yes" onclick="handleAddTeam()">Add Team</button>
        </div>
      </div>
    </div>`);
  document.getElementById('tmName')?.focus();
}

async function handleAddTeam() {
  const name = document.getElementById('tmName')?.value?.trim();
  const p1   = document.getElementById('tmP1')?.value?.trim();
  const p2   = document.getElementById('tmP2')?.value?.trim();
  if (!name) { document.getElementById('tmError').textContent = 'Team name required.'; return; }
  try {
    const t = await BracketAPI.createTeam(activeSession.id, name);
    if (p1 || p2) await BracketAPI.updateTeam(t.id, { player1_name: p1||null, player2_name: p2||null });
    document.getElementById('teamModal').remove();
    document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
  } catch(e) { document.getElementById('tmError').textContent = e.message; }
}

function showEditTeamModal(id, name, p1, p2, isDoubles) {
  if (document.getElementById('teamEditModal')) return;
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="teamEditModal">
      <div class="modal-box" style="max-width:400px;">
        <h2>Edit Team</h2>
        <div class="field"><label>Team Name</label><input type="text" id="etName" value="${escapeHtml(name)}"></div>
        <div class="field"><label>Player 1</label><input type="text" id="etP1" value="${escapeHtml(p1)}"></div>
        ${isDoubles ? `<div class="field"><label>Player 2</label><input type="text" id="etP2" value="${escapeHtml(p2)}"></div>` : ''}
        <div class="auth-error" id="etError"></div>
        <div class="confirm-actions">
          <button class="btn-no" style="background:rgba(255,122,92,0.12);color:var(--fault-coral);" onclick="handleDeleteTeam('${id}')">Delete Team</button>
          <button class="btn-yes" onclick="handleSaveTeam('${id}',${isDoubles})">Save</button>
        </div>
        <button class="btn-secondary" style="margin-top:8px;" onclick="document.getElementById('teamEditModal').remove()">Cancel</button>
      </div>
    </div>`);
}

async function handleSaveTeam(id, isDoubles) {
  const name = document.getElementById('etName')?.value?.trim();
  const p1   = document.getElementById('etP1')?.value?.trim();
  const p2   = isDoubles ? document.getElementById('etP2')?.value?.trim() : null;
  if (!name) { document.getElementById('etError').textContent = 'Team name required.'; return; }
  await BracketAPI.updateTeam(id, { team_name: name, player1_name: p1||null, player2_name: p2||null });
  document.getElementById('teamEditModal').remove();
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function handleDeleteTeam(id) {
  if (!confirm('Remove this team from the tournament?')) return;
  await BracketAPI.deleteTeam(id);
  document.getElementById('teamEditModal').remove();
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

// ── Bracket creation ──
function showCreateBracketModal(teamCount) {
  if (document.getElementById('cbModal')) return;
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="cbModal">
      <div class="modal-box" style="max-width:460px;">
        <h2>New Bracket</h2>
        <div class="field"><label>Bracket Name</label><input type="text" id="cbName" placeholder="e.g. Bracket A"></div>
        <div class="form-grid">
          <div class="field"><label>Type</label>
            <select id="cbType">
              <option value="single_elim">Single Elim + Losers</option>
              <option value="round_robin">Round Robin</option>
            </select>
          </div>
          <div class="field"><label>Number of Slots</label>
            <input type="number" id="cbSlots" value="${nextPowerOf2(Math.ceil(teamCount/2)||4)}" min="2" max="64"
              oninput="updateCbPreview()" onchange="updateCbPreview()">
          </div>
        </div>
        <p id="cbPreview" style="font-size:11px;color:var(--bench-slate);margin:0 0 10px;"></p>
        <div class="auth-error" id="cbError"></div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('cbModal').remove()">Cancel</button>
          <button class="btn-yes" id="cbBtn" onclick="handleCreateBracket()">Create</button>
        </div>
      </div>
    </div>`);
  updateCbPreview();
  document.getElementById('cbName')?.focus();
}

function updateCbPreview() {
  const n = parseInt(document.getElementById('cbSlots')?.value||0);
  const t = document.getElementById('cbType')?.value;
  const p = document.getElementById('cbPreview');
  if (!p) return;
  if (t === 'round_robin') p.textContent = `${n} teams · ${n*(n-1)/2} matches total`;
  else {
    const slots = nextPowerOf2(n);
    const byes = slots - n;
    p.textContent = `${slots}-team bracket · ${byes} bye${byes!==1?'s':''} · Winners + Losers bracket included`;
  }
}

async function handleCreateBracket() {
  const name  = document.getElementById('cbName')?.value?.trim();
  const type  = document.getElementById('cbType')?.value;
  const slots = parseInt(document.getElementById('cbSlots')?.value||0);
  const errEl = document.getElementById('cbError');
  const btn   = document.getElementById('cbBtn');
  if (!name) { errEl.textContent = 'Name required.'; return; }
  if (slots < 2) { errEl.textContent = 'Need at least 2 slots.'; return; }
  const total = type === 'round_robin' ? slots : nextPowerOf2(slots);
  if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }
  try {
    const b = await BracketAPI.createBracket({ sessionId: activeSession.id, name, bracketType: type, totalSlots: total });
    document.getElementById('cbModal').remove();
    _activeBracketId = b.id;
    _bracketView = 'draw';
    document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
  } catch(e) {
    errEl.textContent = e.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Create'; }
  }
}

async function confirmDeleteBracket(id, name) {
  if (!confirm(`Delete bracket "${name}"? Match results will be cleared.`)) return;
  await BracketAPI.deleteBracket(id);
  _activeBracketId = null; _bracketView = 'teams';
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

// ── Draw view ──
async function openDraw(bracketId) {
  _activeBracketId = bracketId;
  _bracketView = 'draw';
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function drawView(bracketId) {
  const [bracket, entries, matches, allTeams] = await Promise.all([
    BracketAPI.getBrackets(activeSession.id).then(bs => bs.find(b => b.id === bracketId)),
    BracketAPI.getSeededEntries(bracketId),
    BracketAPI.getMatches(bracketId),
    BracketAPI.getTeams(activeSession.id),
  ]);
  if (!bracket) return `<div class="card"><p>Bracket not found.</p></div>`;

  const entMap = Object.fromEntries([...entries, ...allTeams].map(e => [e.id, e]));
  const isStarted = matches.length > 0;
  const isRR = bracket.bracket_type === 'round_robin';

  const wMatches = matches.filter(m => m.match_type === 'winners');
  const lMatches = matches.filter(m => m.match_type === 'losers');
  const gfMatch  = matches.find(m => m.match_type === 'grand_final');
  const tfMatch  = matches.find(m => m.match_type === 'third_place');
  const rrMatches = matches.filter(m => m.match_type === 'pool');

  const maxWRound = wMatches.reduce((a,b) => Math.max(a,b.round), 0);
  const maxLRound = lMatches.reduce((a,b) => Math.max(a,b.round), 0);

  // Unseeded teams (available to drag into this bracket)
  const seededIds = new Set(entries.map(e => e.id));
  const available = allTeams.filter(t => !t.bracket_id);

  return `
    <div class="card" style="overflow:visible;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <button onclick="_bracketView='teams';_activeBracketId=null;document.getElementById('tabPanel').innerHTML=bracketsTabHtml();"
          style="background:none;border:none;color:var(--bench-slate);font-size:13px;font-weight:700;padding:0;cursor:pointer;min-height:0;">← All Brackets</button>
        <span style="color:var(--border-soft);">|</span>
        <h2 style="margin:0;font-size:15px;">${escapeHtml(bracket.name)}</h2>
        <span style="font-size:10px;font-weight:700;color:var(--bench-slate);text-transform:uppercase;">${isRR?'Round Robin':'Single Elim + Losers'} · ${bracket.total_slots} slots</span>
      </div>

      ${!isStarted ? `
        <!-- Seeding panel -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
          <div>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--bench-slate);letter-spacing:0.06em;margin-bottom:8px;">Available Teams</div>
            ${available.length === 0 ? `<p style="font-size:12px;color:var(--bench-slate);">All teams seeded.</p>` :
              available.map(t => `
                <div style="border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;background:var(--surface-raised);">
                  <div>
                    <div style="font-weight:700;font-size:13px;">${escapeHtml(t.team_name)}</div>
                    ${t.player1_name?`<div style="font-size:11px;color:var(--bench-slate);">${escapeHtml(t.player1_name)}${t.player2_name?' & '+escapeHtml(t.player2_name):''}</div>`:''}
                  </div>
                  <button onclick="seedTeam('${t.id}','${bracketId}')" style="background:var(--court-paint);color:white;border:none;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;min-height:0;">Add →</button>
                </div>`).join('')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--bench-slate);letter-spacing:0.06em;margin-bottom:8px;">Seeded in ${escapeHtml(bracket.name)} (${entries.filter(e=>!e.is_bye).length}/${bracket.total_slots})</div>
            ${entries.filter(e=>!e.is_bye).map((e,i) => `
              <div style="border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;background:var(--surface-raised);">
                <div><span style="font-size:10px;color:var(--bench-slate);margin-right:6px;">#${i+1}</span><span style="font-weight:700;font-size:13px;">${escapeHtml(e.team_name)}</span></div>
                <button onclick="unseedTeam('${e.id}','${bracketId}')" style="background:none;border:1px solid var(--fault-coral);color:var(--fault-coral);padding:3px 8px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;min-height:0;">✕</button>
              </div>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="handleGenerateDraw('${bracketId}',${bracket.total_slots},'${bracket.bracket_type}')"
            style="background:var(--optic-yellow);color:var(--optic-yellow-ink);border:none;padding:10px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;min-height:44px;">
            Generate Draw →
          </button>
        </div>
      ` : isRR ? renderRRDraw(rrMatches, entries, entMap, bracketId) : renderElimDraw(wMatches, lMatches, gfMatch, tfMatch, entMap, maxWRound, maxLRound, bracketId)}
    </div>
  `;
}

function renderElimDraw(wMatches, lMatches, gfMatch, tfMatch, entMap, maxWRound, maxLRound, bracketId) {
  function matchCard(m, label) {
    if (!m) return '';
    const eA = m.entry_a_id ? entMap[m.entry_a_id] : null;
    const eB = m.entry_b_id ? entMap[m.entry_b_id] : null;
    const done = m.status === 'completed';
    const wIsA = done && m.winner_id === m.entry_a_id;
    const wIsB = done && m.winner_id === m.entry_b_id;

    const row = (e, score, isW, isTBD) => `
      <div style="padding:7px 10px;display:flex;justify-content:space-between;align-items:center;${isW?'background:rgba(78,203,126,0.1);':''}border-radius:3px;min-height:32px;">
        <span style="font-size:12px;font-weight:${isW?'800':'600'};color:${isW?'var(--winner-green)':isTBD?'var(--bench-slate)':'var(--ink)'};">
          ${e ? escapeHtml(e.team_name) : isTBD ? 'TBD' : '—'}
          ${e?.is_bye ? ' <span style="font-size:9px;color:var(--bench-slate);">(BYE)</span>' : ''}
        </span>
        <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:${isW?'var(--winner-green)':'var(--bench-slate)'};">${score!=null?score:''}</span>
      </div>`;

    const canPlay = eA && eB && !eA.is_bye && !eB.is_bye && !done;
    return `
      <div style="border:1px solid ${done?'rgba(78,203,126,0.3)':'var(--border-soft)'};border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden;background:var(--surface-raised);${canPlay?'cursor:pointer;':''}"
        ${canPlay?`onclick="showMatchModal('${m.id}','${bracketId}','${escapeHtml(eA?.team_name||'')}','${escapeHtml(eB?.team_name||'')}','${m.entry_a_id}','${m.entry_b_id}',${m.best_of})"`:''}>
        ${label?`<div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--bench-slate);padding:3px 10px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;">
          <span>${label} · Best of
            <select onchange="event.stopPropagation();updateBestOf('${m.id}',this.value)" style="background:transparent;border:none;color:var(--bench-slate);font-size:9px;font-weight:700;padding:0;min-height:0;cursor:pointer;"
              onclick="event.stopPropagation()">
              ${[1,3,5,7].map(n=>`<option value="${n}" ${m.best_of===n?'selected':''}>${n}</option>`).join('')}
            </select>
          </span>
          ${done?`<span style="cursor:pointer;color:var(--fault-coral);" onclick="event.stopPropagation();confirmReverseResult('${m.id}','${bracketId}')">✕ Reverse</span>`:''}
        </div>`:''}
        ${row(eA, m.score_a, wIsA, !eA)}
        <div style="height:1px;background:var(--border-soft);"></div>
        ${row(eB, m.score_b, wIsB, !eB)}
      </div>`;
  }

  const rounds = Array.from({length: maxWRound}, (_,i) => i+1);

  return `
    <div style="overflow-x:auto;padding-bottom:8px;">
      <!-- Winners Bracket -->
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--winner-green);letter-spacing:0.08em;margin-bottom:8px;">🏆 Winners Bracket</div>
      <div style="display:flex;gap:8px;min-width:${rounds.length*200}px;margin-bottom:20px;align-items:flex-start;">
        ${rounds.map(r => {
          const rMatches = wMatches.filter(m => m.round === r).sort((a,b)=>a.position-b.position);
          const totalR = maxWRound;
          return `
            <div style="flex:1;min-width:188px;">
              <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--bench-slate);text-align:center;padding:5px 0;border-bottom:1px solid var(--border-soft);margin-bottom:8px;letter-spacing:0.05em;">
                ${roundLabel(r, totalR)}
              </div>
              ${rMatches.map(m => matchCard(m, roundLabel(r,totalR))).join('')}
            </div>`;
        }).join('')}
      </div>

      <!-- Losers Bracket -->
      ${lMatches.length > 0 ? `
        <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--fault-coral);letter-spacing:0.08em;margin-bottom:8px;">📉 Losers Bracket</div>
        <div style="display:flex;gap:8px;min-width:${maxLRound*200}px;margin-bottom:20px;align-items:flex-start;">
          ${Array.from({length:maxLRound},(_,i)=>i+1).map(r => {
            const rM = lMatches.filter(m => m.round === r).sort((a,b)=>a.position-b.position);
            return `
              <div style="flex:1;min-width:188px;">
                <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--bench-slate);text-align:center;padding:5px 0;border-bottom:1px solid var(--border-soft);margin-bottom:8px;letter-spacing:0.05em;">
                  Losers R${r}
                </div>
                ${rM.map(m => matchCard(m, `Losers R${r}`)).join('')}
              </div>`;
          }).join('')}
        </div>` : ''}

      <!-- Grand Final + 3rd Place -->
      ${gfMatch || tfMatch ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;">
          ${gfMatch ? `
            <div>
              <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--optic-yellow);letter-spacing:0.08em;margin-bottom:6px;">🥇 Grand Final</div>
              ${matchCard(gfMatch, 'Grand Final')}
            </div>` : ''}
          ${tfMatch ? `
            <div>
              <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--bench-slate);letter-spacing:0.08em;margin-bottom:6px;">🥉 3rd Place</div>
              ${matchCard(tfMatch, '3rd Place')}
            </div>` : ''}
        </div>` : ''}
    </div>
    <div style="margin-top:12px;">
      <button onclick="handleResetDraw('${bracketId}')"
        style="background:transparent;border:1px solid var(--bench-slate);color:var(--bench-slate);padding:7px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;min-height:36px;">
        ↺ Reset Draw
      </button>
    </div>`;
}

function renderRRDraw(rrMatches, entries, entMap, bracketId) {
  const real = entries.filter(e => !e.is_bye);
  const scoreMap = {};
  for (const m of rrMatches) {
    if (m.entry_a_id && m.entry_b_id) scoreMap[`${m.entry_a_id}_${m.entry_b_id}`] = m;
  }
  const standings = real.map(e => {
    let w=0,l=0,pf=0,pa=0;
    for (const m of rrMatches.filter(x=>x.status==='completed')) {
      const isA = m.entry_a_id===e.id, isB = m.entry_b_id===e.id;
      if (!isA && !isB) continue;
      if (m.winner_id===e.id) w++; else l++;
      pf += isA?(m.score_a||0):(m.score_b||0);
      pa += isA?(m.score_b||0):(m.score_a||0);
    }
    return {...e, w, l, pf, pa};
  }).sort((a,b)=>b.w-a.w||(b.pf-b.pa)-(a.pf-a.pa));

  return `
    <div class="table-scroll" style="margin-bottom:14px;">
      <table class="roster-table">
        <thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>PF</th><th>PA</th><th>Diff</th></tr></thead>
        <tbody>
          ${standings.map((e,i)=>`
            <tr class="${i===0?'lb-highlight':''}">
              <td style="font-family:var(--font-mono);">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
              <td style="font-weight:700;">${escapeHtml(e.team_name)}</td>
              <td style="color:var(--winner-green);font-weight:700;font-family:var(--font-mono);">${e.w}</td>
              <td style="color:var(--fault-coral);font-family:var(--font-mono);">${e.l}</td>
              <td style="font-family:var(--font-mono);">${e.pf}</td>
              <td style="font-family:var(--font-mono);">${e.pa}</td>
              <td style="font-family:var(--font-mono);font-weight:700;color:${e.pf-e.pa>=0?'var(--winner-green)':'var(--fault-coral)'};">${e.pf-e.pa>=0?'+':''}${e.pf-e.pa}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--bench-slate);letter-spacing:0.06em;margin-bottom:8px;">Match Grid — tap to enter score</div>
    <div class="table-scroll">
      <table style="border-collapse:collapse;font-size:12px;width:100%;">
        <thead><tr>
          <th style="padding:7px 10px;text-align:left;border-bottom:1.5px solid var(--border-soft);color:var(--bench-slate);font-size:10px;text-transform:uppercase;min-width:110px;">Team</th>
          ${real.map(e=>`<th style="padding:7px 8px;text-align:center;border-bottom:1.5px solid var(--border-soft);color:var(--bench-slate);font-size:10px;white-space:nowrap;max-width:90px;">${escapeHtml(e.team_name)}</th>`).join('')}
          <th style="padding:7px 10px;text-align:center;border-bottom:1.5px solid var(--border-soft);color:var(--bench-slate);font-size:10px;text-transform:uppercase;">Pts</th>
        </tr></thead>
        <tbody>
          ${real.map(row => {
            const st = standings.find(s=>s.id===row.id);
            return `<tr>
              <td style="padding:7px 10px;font-weight:700;border-bottom:1px solid var(--border-soft);white-space:nowrap;">${escapeHtml(row.team_name)}</td>
              ${real.map(col => {
                if (row.id===col.id) return `<td style="padding:7px 8px;text-align:center;border-bottom:1px solid var(--border-soft);background:var(--surface-hover);">✕</td>`;
                const m = scoreMap[`${row.id}_${col.id}`] || scoreMap[`${col.id}_${row.id}`];
                const isA = m && m.entry_a_id===row.id;
                const rs = m ? (isA?m.score_a:m.score_b) : null;
                const cs = m ? (isA?m.score_b:m.score_a) : null;
                const won = m?.winner_id===row.id;
                return `<td style="padding:6px 8px;text-align:center;border-bottom:1px solid var(--border-soft);cursor:pointer;"
                  onclick="showMatchModal('${m?.id||''}','${bracketId}','${escapeHtml(row.team_name)}','${escapeHtml(col.team_name)}','${row.id}','${col.id}',${m?.best_of||1},'${m?.id||''}')">
                  ${m&&rs!=null?`<span style="font-family:var(--font-mono);font-weight:700;color:${won?'var(--winner-green)':'var(--fault-coral)'};">${rs}–${cs}</span>`:`<span style="color:var(--bench-slate);">–</span>`}
                </td>`;
              }).join('')}
              <td style="padding:7px 10px;text-align:center;border-bottom:1px solid var(--border-soft);font-family:var(--font-mono);font-weight:700;">${st?.pf||0}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px;">
      <button onclick="handleResetDraw('${bracketId}')"
        style="background:transparent;border:1px solid var(--bench-slate);color:var(--bench-slate);padding:7px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;min-height:36px;">
        ↺ Reset All Scores
      </button>
    </div>`;
}

// ── Seeding actions ──
async function seedTeam(teamId, bracketId) {
  const seeded = await BracketAPI.getSeededEntries(bracketId);
  const bracket = (await BracketAPI.getBrackets(activeSession.id)).find(b=>b.id===bracketId);
  if (seeded.filter(e=>!e.is_bye).length >= bracket.total_slots) {
    alert(`Bracket is full (${bracket.total_slots} slots). Remove a team first or increase slots.`);
    return;
  }
  const nextSlot = (seeded.filter(e=>!e.is_bye).reduce((a,e)=>Math.max(a,e.slot||0),0)) + 1;
  await BracketAPI.seedTeamToBracket(teamId, bracketId, nextSlot);
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function unseedTeam(teamId, bracketId) {
  await BracketAPI.unseedTeam(teamId);
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

// ── Generate draw ──
async function handleGenerateDraw(bracketId, totalSlots, bracketType) {
  const entries = await BracketAPI.getSeededEntries(bracketId);
  const real = entries.filter(e=>!e.is_bye);
  if (real.length < 2) { alert('Need at least 2 seeded teams to generate the draw.'); return; }

  // Add byes to fill remaining slots (single elim only)
  if (bracketType !== 'round_robin') {
    const slotsFilled = real.map(e=>e.slot);
    for (let s=1;s<=totalSlots;s++) {
      if (!slotsFilled.includes(s)) {
        await supabaseClient.from('bracket_entries')
          .insert({ bracket_id: bracketId, session_id: activeSession.id, team_name:'BYE', is_bye:true, slot:s });
      }
    }
  }

  const allEntries = await BracketAPI.getSeededEntries(bracketId);
  await BracketAPI.generateDraw(bracketId, allEntries, totalSlots, bracketType);
  await BracketAPI.updateBracket(bracketId, { status:'active' });
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

  const entries = await BracketAPI.getSeededEntries(bracketId);

  await BracketAPI.generateDraw(bracketId, entries, bracket.total_slots, bracket.bracket_type);
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function handleMatchResult(matchId, bracketId, entryAId, entryBId, existingId) {
  const sA = parseInt(document.getElementById('mmScoreA').value,10);
  const sB = parseInt(document.getElementById('mmScoreB').value,10);
  const errEl = document.getElementById('mmError');
  if (isNaN(sA)||isNaN(sB)) { errEl.textContent='Enter valid scores.'; return; }
  if (sA===sB) { errEl.textContent='Cannot be tied — there must be a winner.'; return; }
  const winnerId = sA>sB ? entryAId : entryBId;
  const mid = existingId || matchId;
  try {
    if (mid) {
      await BracketAPI.recordResult(mid, sA, sB, winnerId, bracketId);
    } else {
      // RR: find the match between these two
      const { data:m } = await supabaseClient.from('bracket_matches').select('id')
        .eq('bracket_id', bracketId)
        .or(`and(entry_a_id.eq.${entryAId},entry_b_id.eq.${entryBId}),and(entry_a_id.eq.${entryBId},entry_b_id.eq.${entryAId})`)
        .single();
      if (m) await BracketAPI.recordResult(m.id, sA, sB, winnerId, bracketId);
    }
    document.getElementById('matchModal').remove();
    document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
  } catch(e) { errEl.textContent=e.message||'Could not save.'; }
}

/**

 *  • Shows all 4 players in two clear columns (Winner / Loser).
 *  • A single "Loser's score" input drives both the score and the
 *    winner's auto-calculated score (deuce rule applied live).
 *  • A "Swap winner" checkbox flips which team is labelled Winner/Loser,
 *    which also flips what the score input means.
 *  • A live "Result preview" line shows exactly what will be saved.
 *  • Apply Correction submits winner + score in one atomic write.
 */

    .from('matches')
    .select('*, team_a:team_a_id(*), team_b:team_b_id(*)')

    .single();

  const playerById = Object.fromEntries(players.map(p => [p.id, p]));

  // Derive winner/loser from the DB record.
  const origWinnerTeam = match.winner_team_id === match.team_a_id ? match.team_a : match.team_b;

  const origLoserTeamId = match.winner_team_id === match.team_a_id ? match.team_b_id : match.team_a_id;

  const origWinnerScore = match.winner_team_id === match.team_a_id ? match.team_a_score : match.team_b_score;
  const origLoserScore  = match.winner_team_id === match.team_a_id ? match.team_b_score : match.team_a_score;

    return (team?.player_ids || []).map(pid => playerById[pid]?.name || '—').join(' & ');

      .map(pid => `<div style="font-size:13px;font-weight:700;padding:2px 0;">${escapeHtml(playerById[pid]?.name || '—')}</div>`)
      .join('');
  }

  const origWinnerNames = nameList(origWinnerTeam);
  const origLoserNames  = nameList(origLoserTeam);

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="matchEditModal"
      data-orig-winner="${escapeHtml(origWinnerNames)}"
      data-orig-loser="${escapeHtml(origLoserNames)}">
      <div class="modal-box" style="max-width:500px;">
        <h2 style="margin:0 0 4px;">Edit Match Result</h2>

        <div style="display:grid;grid-template-columns:1fr 56px 1fr;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:18px;">
          <div style="padding:10px 12px;background:rgba(78,203,126,0.07);">
            <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--winner-green);letter-spacing:0.06em;margin-bottom:5px;">🏆 Won</div>
            ${playerRows(origWinnerTeam)}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;background:var(--surface-hover);font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--ink);text-align:center;line-height:1.2;">${origWinnerScore}<br>–<br>${origLoserScore}</div>
          <div style="padding:10px 12px;background:rgba(255,122,92,0.07);border-left:1px solid var(--border-soft);">
            <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--loser-coral);letter-spacing:0.06em;margin-bottom:5px;">Lost</div>
            ${playerRows(origLoserTeam)}
          </div>
        </div>

        <!-- ── Swap winner ── -->
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-muted);letter-spacing:0.04em;margin-bottom:6px;">Correct the winner?</div>
        <label id="swapRow" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:18px;user-select:none;">
          <input type="checkbox" id="swapWinnerCheckbox"
            style="width:18px;height:18px;min-height:0;cursor:pointer;flex-shrink:0;"

            Apply Correction

  `);

  // Render the initial preview.
  refreshMatchEditPreview();

/**
 * Recomputes the live preview and score display whenever the swap
 * checkbox or the loser score input changes.
 */
function refreshMatchEditPreview() {
  const modal = document.getElementById('matchEditModal');
  if (!modal) return;

  // Names stored as data attributes when the modal was built.
  const origWinnerNames = modal.dataset.origWinner || '';
  const origLoserNames  = modal.dataset.origLoser  || '';

  const raw        = parseInt(document.getElementById('editLoserScore')?.value, 10);
  const loserScore = (isNaN(raw) || raw < 0) ? 0 : raw;
  const isDeuce    = loserScore >= 10;
  const winnerScore = isDeuce ? loserScore + 2 : 11;

  const swapped = document.getElementById('swapWinnerCheckbox')?.checked;

  // After swap: original loser becomes winner, original winner becomes loser.
  const currentWinnerNames = swapped ? origLoserNames  : origWinnerNames;
  const currentLoserNames  = swapped ? origWinnerNames : origLoserNames;

  // Update swap label.
  const swapTargetEl = document.getElementById('swapTargetLabel');
  if (swapTargetEl) {
    swapTargetEl.textContent = swapped ? origWinnerNames : origLoserNames;
    swapTargetEl.style.color = swapped ? 'var(--loser-coral)' : 'var(--winner-green)';
  }

  // Update score panel labels.
  const wLabelEl = document.getElementById('scoreWinnerLabel');
  const lLabelEl = document.getElementById('scoreLoserLabel');
  if (wLabelEl) wLabelEl.textContent = currentWinnerNames;
  if (lLabelEl) lLabelEl.textContent = currentLoserNames;

  // Update live winner score number.
  const winNumEl = document.getElementById('scoreWinnerNum');
  const deuceEl  = document.getElementById('scoreDeuceTag');
  if (winNumEl) winNumEl.textContent = winnerScore;
  if (deuceEl)  deuceEl.textContent  = isDeuce ? 'Deuce +2 rule' : '';

  // Build the plain-English preview.
  const previewEl = document.getElementById('matchEditPreview');
  if (previewEl) {
    previewEl.innerHTML =
      `<span style="color:var(--resting-slate);">Will save as:</span> ` +
      `<strong style="color:var(--winner-green);">${escapeHtml(currentWinnerNames)}</strong> wins ` +
      `<strong style="font-family:var(--font-mono);">${winnerScore}–${loserScore}</strong> ` +
      `vs <strong style="color:var(--loser-coral);">${escapeHtml(currentLoserNames)}</strong>` +
      (isDeuce ? ` <span style="color:var(--accent);font-size:11px;font-weight:700;">· deuce</span>` : '');
  }
}

async function confirmMatchEdit(matchId, originalWinnerTeamId, originalLoserTeamId, origLoserScore) {
  const btn   = document.getElementById('matchEditConfirmBtn');
  const errEl = document.getElementById('matchEditError');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  const raw = parseInt(document.getElementById('editLoserScore').value, 10);
  if (isNaN(raw) || raw < 0) {
    if (errEl) errEl.textContent = 'Enter a valid score (0 or higher).';
    if (btn) { btn.disabled = false; btn.textContent = 'Apply Correction'; }
    return;
  }

  const swapped         = document.getElementById('swapWinnerCheckbox')?.checked;
  const newWinnerTeamId = swapped ? originalLoserTeamId : null; // null = keep same winner
  // Only pass newLoserScore if it actually changed, to avoid false "no change" errors.
  const scoreChanged    = raw !== parseInt(origLoserScore, 10);
  const newLoserScore   = scoreChanged ? raw : null;

  try {
    await SessionAPI.correctMatchResult(matchId, newWinnerTeamId, newLoserScore);
    document.getElementById('matchEditModal').remove();
    document.getElementById('tabPanel').innerHTML = await leaderboardTabHtml();
  } catch (err) {
    if (errEl) errEl.textContent = err.message || 'Could not apply correction.';
    if (btn) { btn.disabled = false; btn.textContent = 'Apply Correction'; }
  }
}

// ============================================================
// INBOX TAB
// ============================================================
async function inboxTabHtml() {
  const [messages, restRequests] = await Promise.all([
    SessionAPI.getMessages(activeSession.id, 'pending'),
    SessionAPI.getPendingRestRequests(activeSession.id),
  ]);
  return `
    <div class="card">
      <h2>Rest Requests</h2>
      ${restRequests.length ? restRequests.map(r => `
        <div class="inbox-item">
          <div>
            <div class="who">${escapeHtml(r.player?.name || 'Unknown')}</div>
            <div class="what">Asked to sit out</div>
            <div class="when">${new Date(r.requested_at).toLocaleTimeString()}</div>
          </div>
          <div class="inbox-actions">
            <button class="btn-dismiss" onclick="handleDeclineRest('${r.id}')">Decline</button>
            <button class="btn-confirm-rest" onclick="handleConfirmRest('${r.id}','${r.player_id}')">Confirm Rest</button>
          </div>
        </div>
      `).join('') : '<div class="empty-inbox">No rest requests</div>'}
    </div>
    <div class="card">
      <h2>Player Messages</h2>
      ${messages.length ? messages.map(m => `
        <div class="inbox-item">
          <div>
            <div class="who">${escapeHtml(m.player_name)}</div>
            <div class="what">${escapeHtml(m.message)}</div>
            <div class="when">${new Date(m.created_at).toLocaleTimeString()}</div>
          </div>
          <div class="inbox-actions">
            <button class="btn-dismiss" onclick="handleDismissMessage('${m.id}')">Dismiss</button>
          </div>
        </div>
      `).join('') : '<div class="empty-inbox">No messages</div>'}
    </div>
  `;
}

async function handleConfirmRest(requestId, playerId) {
  try {
    const result = await SessionAPI.confirmRestRequest(requestId, playerId);
    if (result?.deferred) alert('Player is mid-match — mark them resting from the Roster tab once their game ends.');
  } catch (err) { alert(err.message || 'Could not confirm rest request.'); }
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}
async function handleDeclineRest(requestId) {
  try { await SessionAPI.declineRestRequest(requestId); }
  catch (err) { alert(err.message || 'Could not decline rest request.'); }
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}
async function handleDismissMessage(messageId) {
  await SessionAPI.markMessageStatus(messageId, 'seen');
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}

// ============================================================
// REALTIME
// ============================================================
function subscribeRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`host-${activeSession.id}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages',      filter: `session_id=eq.${activeSession.id}` }, () => { updateInboxBadge(); if (activeTab === 'inbox') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rest_requests', filter: `session_id=eq.${activeSession.id}` }, () => { updateInboxBadge(); if (activeTab === 'inbox') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'courts',        filter: `session_id=eq.${activeSession.id}` }, () => { if (activeTab === 'courts') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players',       filter: `session_id=eq.${activeSession.id}` }, () => {
      if (activeTab === 'roster') renderActiveTab();
      if (activeTab === 'leaderboard') renderActiveTab();
    })
    .subscribe();
  updateInboxBadge();
}

async function updateInboxBadge() {
  if (!activeSession) return;
  const badge = document.getElementById('inboxBadge');
  if (!badge) return;
  try {
    const [messages, restRequests] = await Promise.all([
      SessionAPI.getMessages(activeSession.id, 'pending'),
      SessionAPI.getPendingRestRequests(activeSession.id),
    ]);
    const total = messages.length + restRequests.length;
    if (total > 0) { badge.textContent = total > 9 ? '9+' : String(total); badge.style.display = 'inline-flex'; }
    else badge.style.display = 'none';
  } catch (_) {}
}

function startHostTimerLoop() {
  if (hostTimerInterval) clearInterval(hostTimerInterval);
  hostTimerInterval = setInterval(() => {
    document.querySelectorAll('.court-host-timer[data-start]').forEach(el => {
      const start = el.getAttribute('data-start');
      if (!start) return;
      const elapsed = Math.max(0, Math.floor((Date.now() - new Date(start).getTime()) / 1000));
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mins}:${secs}`;
    });
  }, 1000);
}

// ============================================================
// HELPERS
// ============================================================
function playerNamesForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid)?.name || '—');
}
// Returns full player objects (with photo_url) for the paddle/photo views.
function playersForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid) || { name: '—', photo_url: null });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
