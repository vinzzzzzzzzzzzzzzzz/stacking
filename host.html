let resultFlowCourt = null;
let resultFlowWinnerTeamId = null;
// Prevents any DB writes from firing more than once per result submission,
// even if the host taps "Save" rapidly multiple times.
let _resultInFlight = false;

async function handleMarkFinished(courtId) {
  // Guard: if a modal is already open, don't stack a second one.
  if (document.getElementById('resultModal')) return;

  const courts = await SessionAPI.getCourts(activeSession.id);
  resultFlowCourt = courts.find(c => c.id === courtId);
  if (!resultFlowCourt || resultFlowCourt.status !== 'in_progress') return;

  // Go straight to Who Won — skip the redundant "Match Finished?" confirm.
  await showPickWinnerModal();
}

async function showPickWinnerModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const namesA = playerNamesForTeam(resultFlowCourt.team_a, players).join(' & ');
  const namesB = playerNamesForTeam(resultFlowCourt.team_b, players).join(' & ');

  // Reuse existing modal if we're navigating back from the score step,
  // otherwise create and inject a fresh one.
  let modal = document.getElementById('resultModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.id = 'resultModal';
    document.body.appendChild(modal);
  }

  modal.innerHTML = `
    <div class="modal-box">
      <h2>Who Won?</h2>
      <p class="modal-sub">Court ${resultFlowCourt.court_number} — tap the winning side.</p>
      <div class="winner-pick-row">
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_a_id}')">${escapeHtml(namesA)}</div>
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_b_id}')">${escapeHtml(namesB)}</div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn-secondary" style="width:auto;padding:8px 16px;" onclick="closeResultModal()">Cancel</button>
      </div>
    </div>
  `;
}

async function selectWinner(winnerTeamId) {
  resultFlowWinnerTeamId = winnerTeamId;
  await showLoserScoreModal();
}

async function showLoserScoreModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const winnerTeam = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_a : resultFlowCourt.team_b;
  const loserTeam  = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_b : resultFlowCourt.team_a;
  const winnerNames = playerNamesForTeam(winnerTeam, players).join(' & ');
  const loserNames  = playerNamesForTeam(loserTeam,  players).join(' & ');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Enter Score</h2>
      <p class="modal-sub">Court ${resultFlowCourt.court_number} — enter the losing team's score. Winner is auto-calculated.</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0;">
        <div style="text-align:center;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--winner-green);margin-bottom:6px;">🏆 Winner</div>
          <div style="font-size:13px;font-weight:700;margin-bottom:10px;min-height:36px;">${escapeHtml(winnerNames)}</div>
          <div id="winnerScoreDisplay" style="font-family:var(--font-mono);font-size:40px;font-weight:800;color:var(--winner-green);line-height:1;">11</div>
          <div style="font-size:10px;color:var(--accent);font-weight:700;margin-top:4px;min-height:14px;" id="deuceNote"></div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--loser-coral);margin-bottom:6px;">Loser's score</div>
          <div style="font-size:13px;font-weight:700;margin-bottom:10px;min-height:36px;">${escapeHtml(loserNames)}</div>
          <input type="number" id="loserScoreInput" min="0" value="0"
            style="font-size:40px;font-weight:800;font-family:var(--font-mono);width:100%;text-align:center;border:2px solid var(--border-soft);border-radius:var(--radius-sm);background:var(--surface-raised);color:var(--ink);padding:6px 0;min-height:0;"
            oninput="updateWinnerDisplay()" onchange="updateWinnerDisplay()">
          <div style="font-size:10px;color:var(--resting-slate);margin-top:4px;" id="scoreLimitNote">0 – 9 normal · 10+ deuce</div>
        </div>
      </div>

      <div class="auth-error" id="scoreEntryError"></div>
      <div class="confirm-actions" style="margin-top:8px;">
        <button class="btn-no" onclick="showPickWinnerModal()">← Back</button>
        <button class="btn-yes" onclick="confirmLoserScore()">Save &amp; Continue</button>
      </div>
    </div>
  `;
  document.getElementById('loserScoreInput').focus();
}

function updateWinnerDisplay() {
  const raw = parseInt(document.getElementById('loserScoreInput').value, 10);
  // Any non-negative integer is valid — no upper cap during deuce.
  const loserScore = isNaN(raw) || raw < 0 ? 0 : raw;
  const isDeuce = loserScore >= 10;
  // Standard pickleball: win by 2. Normal game ends at 11.
  // Deuce: if loser reached 10, winner needs loserScore + 2.
  // e.g. loser=10 → winner=12, loser=11 → winner=13, loser=16 → winner=18
  const winnerScore = isDeuce ? loserScore + 2 : 11;
  document.getElementById('winnerScoreDisplay').textContent = winnerScore;
  const noteEl = document.getElementById('deuceNote');
  noteEl.textContent = isDeuce ? `Deuce — ${winnerScore}–${loserScore}` : '';
}

async function confirmLoserScore() {
  if (_resultInFlight) return;

  const raw = parseInt(document.getElementById('loserScoreInput').value, 10);
  // Only guard: must be a non-negative integer. No upper limit — deuce games
  // can go to any score as long as winner leads by exactly 2.
  if (isNaN(raw) || raw < 0) {
    document.getElementById('scoreEntryError').textContent = 'Enter a valid score (0 or higher).';
    return;
  }

  _resultInFlight = true;
  const btn = document.querySelector('#resultModal .btn-yes');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    await finalizeResult(raw);
  } catch (err) {
    _resultInFlight = false;
    const errEl = document.getElementById('scoreEntryError');
    if (errEl) errEl.textContent = err.message || 'Something went wrong — please try again.';
    if (btn) { btn.disabled = false; btn.textContent = 'Save & Continue'; }
  }
}

async function finalizeResult(loserScore) {
  // Save the match result first (stats written, match row inserted).
  await SessionAPI.logMatchResult(resultFlowCourt.id, resultFlowWinnerTeamId, loserScore);

  // Now show the per-player disposition step.
  // Court stays in_progress until the host confirms everyone's fate —
  // this prevents the next match from auto-filling before decisions are made.
  _resultInFlight = false; // release the score-entry guard; disposition has its own
  await showPlayerDispositionModal(loserScore);
}

// Per-player outcomes: keyed by player ID.
// Populated by the disposition modal, submitted by confirmDispositions().
let _dispositions = {};

/**
 * Show the disposition modal — one card per player, each with
 * Queue / Rest / Leave toggle. Default is Queue.
 * Players pre-flagged as 'left' (mid-match leave) start locked on Leave.
 */
async function showPlayerDispositionModal(loserScore) {
  if (document.getElementById('dispositionModal')) return;

  const winnerTeam = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_a : resultFlowCourt.team_b;
  const loserTeam  = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_b : resultFlowCourt.team_a;

  const allPlayers = await SessionAPI.getPlayers(activeSession.id);
  // Also fetch left players so we can show pre-flagged ones.
  const allIncLeft = await SessionAPI.getAllPlayersIncludingLeft(activeSession.id);
  const playerById = Object.fromEntries(allIncLeft.map(p => [p.id, p]));

  // Build full player list: winners first, then losers.
  const winnerIds = winnerTeam?.player_ids || [];
  const loserIds  = loserTeam?.player_ids  || [];

  // Initialise decisions: Queue by default, Left if pre-flagged.
  _dispositions = {};
  [...winnerIds, ...loserIds].forEach(pid => {
    const p = playerById[pid];
    _dispositions[pid] = p?.status === 'left' ? 'left' : 'queue';
  });

  function playerCard(pid, isWinner) {
    const p = playerById[pid];
    const name = p?.name || '—';
    const preLeft = p?.status === 'left';
    const roleLabel = isWinner
      ? `<span style="font-size:10px;font-weight:800;color:var(--winner-green);letter-spacing:0.05em;text-transform:uppercase;">Won</span>`
      : `<span style="font-size:10px;font-weight:800;color:var(--loser-coral);letter-spacing:0.05em;text-transform:uppercase;">Lost</span>`;

    if (preLeft) {
      // Already marked left mid-match — locked, can't change here.
      return `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface-hover);border:1px solid var(--border-card);margin-bottom:8px;gap:10px;">
          <div>
            ${roleLabel}
            <div style="font-weight:700;font-size:14px;margin-top:2px;">${escapeHtml(name)}</div>
          </div>
          <span style="font-size:11px;font-weight:700;color:var(--bench-slate);background:var(--surface-raised);padding:5px 12px;border-radius:999px;border:1px solid var(--border-soft);">Left (flagged)</span>
        </div>`;
    }

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface-hover);border:1px solid var(--border-card);margin-bottom:8px;gap:10px;flex-wrap:wrap;">
        <div style="flex-shrink:0;">
          ${roleLabel}
          <div style="font-weight:700;font-size:14px;margin-top:2px;">${escapeHtml(name)}</div>
        </div>
        <div style="display:flex;gap:6px;" id="disp-btns-${pid}">
          ${['queue','rest','left'].map(opt => {
            const labels = { queue: '↩ Queue', rest: '☕ Rest', left: '🚪 Leave' };
            const colors = { queue: 'var(--waiting-blue)', rest: 'var(--bench-slate)', left: 'var(--fault-coral)' };
            const isActive = _dispositions[pid] === opt;
            return `<button
              id="disp-${pid}-${opt}"
              onclick="setDisposition('${pid}','${opt}')"
              style="
                font-size:12px;font-weight:700;padding:7px 12px;border-radius:var(--radius-sm);
                border:2px solid ${isActive ? colors[opt] : 'var(--border-soft)'};
                background:${isActive ? colors[opt] : 'transparent'};
                color:${isActive ? 'white' : 'var(--ink-muted)'};
                min-height:0;cursor:pointer;transition:all 0.15s;
              ">${labels[opt]}</button>`;
          }).join('')}
        </div>
      </div>`;
  }

  const winnerCards = winnerIds.map(pid => playerCard(pid, true)).join('');
  const loserCards  = loserIds.map(pid  => playerCard(pid, false)).join('');

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="dispositionModal">
      <div class="modal-box" style="max-width:520px;">
        <h2>What's next for each player?</h2>
        <p class="modal-sub">Court ${resultFlowCourt.court_number} — choose Queue, Rest, or Leave for each player. They don't all have to do the same thing.</p>
        ${winnerCards}
        ${loserCards}
        <div class="auth-error" id="dispositionError"></div>
        <div class="confirm-actions" style="margin-top:4px;">
          <button class="btn-yes" id="dispositionConfirmBtn" onclick="confirmDispositions()">Confirm &amp; Free Court</button>
        </div>
      </div>
    </div>
  `);
}

function setDisposition(playerId, outcome) {
  _dispositions[playerId] = outcome;

  const colors = { queue: 'var(--waiting-blue)', rest: 'var(--bench-slate)', left: 'var(--fault-coral)' };
  const container = document.getElementById(`disp-btns-${playerId}`);
  if (!container) return;

  container.querySelectorAll('button').forEach(btn => {
    const btnOutcome = btn.id.split('-').pop(); // disp-{pid}-{outcome}
    const active = btnOutcome === outcome;
    btn.style.background    = active ? colors[btnOutcome] : 'transparent';
    btn.style.borderColor   = active ? colors[btnOutcome] : 'var(--border-soft)';
    btn.style.color         = active ? 'white' : 'var(--ink-muted)';
  });
}

async function confirmDispositions() {
  const btn   = document.getElementById('dispositionConfirmBtn');
  const errEl = document.getElementById('dispositionError');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  const winnerTeam = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_a : resultFlowCourt.team_b;
  const loserTeam  = resultFlowCourt.team_a_id === resultFlowWinnerTeamId
    ? resultFlowCourt.team_b : resultFlowCourt.team_a;
  const winnerIds = winnerTeam?.player_ids || [];
  const loserIds  = loserTeam?.player_ids  || [];

  const decisions = [
    ...winnerIds.map(pid => ({ playerId: pid, outcome: _dispositions[pid] || 'queue', wasWinner: true  })),
    ...loserIds.map( pid => ({ playerId: pid, outcome: _dispositions[pid] || 'queue', wasWinner: false })),
  ];

  try {
    await SessionAPI.applyQueuePlacement(resultFlowCourt.id, activeSession.id, decisions);
    document.getElementById('dispositionModal').remove();
    closeResultModal();
    _dispositions = {};
    if (activeTab === 'courts') {
      const panel = document.getElementById('tabPanel');
      if (panel) await renderCourtsTab(panel);
    }
  } catch (err) {
    if (errEl) errEl.textContent = err.message || 'Something went wrong — please try again.';
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Free Court'; }
  }
}

function closeResultModal() {
  const modal = document.getElementById('resultModal');
  if (modal) modal.remove();
  const dispModal = document.getElementById('dispositionModal');
  if (dispModal) dispModal.remove();
  resultFlowCourt = null;
  resultFlowWinnerTeamId = null;
  _resultInFlight = false;
  _dispositions = {};
}

// ── Utility: smallest power of 2 >= n ──
function nextPowerOf2(n) {
  if (n <= 2) return 2;
  let p = 2;
  while (p < n) p *= 2;
  return p;
}

// ── Utility: number of rounds in a single-elim bracket ──
function bracketRounds(slots) {
  return Math.log2(slots);
}

// ── Utility: friendly round name ──
function roundName(round, totalRounds) {
  const remaining = totalRounds - round + 1;
  if (remaining === 1) return 'Final';
  if (remaining === 2) return 'Semifinal';
  if (remaining === 3) return 'Quarterfinal';
  return `Round ${round}`;
}

// ── Seeding: place entries into bracket slots (top-down seeding) ──
function seedSlots(entries, totalSlots) {
  // Standard single-elimination seeding pattern
  // Seed 1 vs lowest seed, Seed 2 vs 2nd lowest, etc.
  const slots = new Array(totalSlots).fill(null);
  const n = entries.length;
  // Place byes first at the bottom half
  const seeded = [...entries];
  for (let i = seeded.length; i < totalSlots; i++) {
    seeded.push({ id: `bye_${i}`, team_name: 'BYE', is_bye: true });
  }
  // Standard bracket placement
  const positions = [];
  function buildPositions(lo, hi) {
    if (lo === hi) { positions.push(lo); return; }
    const mid = Math.floor((lo + hi) / 2);
    buildPositions(lo, mid);
    buildPositions(mid + 1, hi);
  }
  // Simple sequential for now — more complex seeding can be added
  return seeded;
}

// ── Generate all match stubs for a bracket ──
function generateMatchStubs(bracketId, totalSlots, bestOf) {
  const totalRounds = Math.log2(totalSlots);
  const stubs = [];
  for (let round = 1; round <= totalRounds; round++) {
    const matchesInRound = totalSlots / Math.pow(2, round);
    for (let pos = 1; pos <= matchesInRound; pos++) {
      stubs.push({
        bracket_id: bracketId,
        round,
        position: pos,
        status: 'pending',
        best_of: bestOf || 1,
      });
    }
  }
  return stubs;
}

// ── API: brackets ──
const BracketAPI = (() => {
  async function getBrackets(sessionId) {
    const { data, error } = await supabaseClient.from('brackets')
      .select('*').eq('session_id', sessionId).order('created_at', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function createBracket({ sessionId, name, category, division, bracketType, bestOf, totalSlots }) {
    const { data, error } = await supabaseClient.from('brackets')
      .insert({ session_id: sessionId, name, category, division, bracket_type: bracketType, best_of: bestOf, total_slots: totalSlots })
      .select().single();
    if (error) throw error;
    return data;
  }

  async function updateBracket(bracketId, updates) {
    const { error } = await supabaseClient.from('brackets').update(updates).eq('id', bracketId);
    if (error) throw error;
  }

  async function deleteBracket(bracketId) {
    await supabaseClient.from('bracket_matches').delete().eq('bracket_id', bracketId);
    await supabaseClient.from('bracket_entries').delete().eq('bracket_id', bracketId);
    const { error } = await supabaseClient.from('brackets').delete().eq('id', bracketId);
    if (error) throw error;
  }

  async function getEntries(bracketId) {
    const { data, error } = await supabaseClient.from('bracket_entries')
      .select('*').eq('bracket_id', bracketId).order('slot', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function upsertEntry(bracketId, slot, teamName, player1, player2) {
    // Check if entry exists for this slot
    const { data: existing } = await supabaseClient.from('bracket_entries')
      .select('id').eq('bracket_id', bracketId).eq('slot', slot).single();
    if (existing) {
      const { error } = await supabaseClient.from('bracket_entries')
        .update({ team_name: teamName, player1_name: player1 || null, player2_name: player2 || null, is_bye: false })
        .eq('id', existing.id);
      if (error) throw error;
      return existing.id;
    } else {
      const { data, error } = await supabaseClient.from('bracket_entries')
        .insert({ bracket_id: bracketId, team_name: teamName, player1_name: player1 || null, player2_name: player2 || null, slot, is_bye: false, seed: slot })
        .select('id').single();
      if (error) throw error;
      return data.id;
    }
  }

  async function deleteEntry(entryId) {
    // Clear from any matches referencing this entry
    await supabaseClient.from('bracket_matches')
      .update({ entry_a_id: null, winner_id: null }).eq('entry_a_id', entryId);
    await supabaseClient.from('bracket_matches')
      .update({ entry_b_id: null, winner_id: null }).eq('entry_b_id', entryId);
    await supabaseClient.from('bracket_entries').delete().eq('id', entryId);
  }

  async function getMatches(bracketId) {
    const { data, error } = await supabaseClient.from('bracket_matches')
      .select('*').eq('bracket_id', bracketId)
      .order('round', { ascending: true }).order('position', { ascending: true });
    if (error) throw error;
    return data || [];
  }

  async function initializeMatches(bracketId, totalSlots, bestOf, entries) {
    // Delete existing matches first
    await supabaseClient.from('bracket_matches').delete().eq('bracket_id', bracketId);

    const stubs = generateMatchStubs(bracketId, totalSlots, bestOf);

    // Assign entries to first-round matches
    // Round 1 match position p gets: entry at slot (2p-1) vs entry at slot (2p)
    const firstRoundMatches = stubs.filter(m => m.round === 1);
    const entryBySlot = Object.fromEntries((entries || []).map(e => [e.slot, e]));

    for (const match of firstRoundMatches) {
      const slotA = 2 * match.position - 1;
      const slotB = 2 * match.position;
      const entA = entryBySlot[slotA];
      const entB = entryBySlot[slotB];
      match.entry_a_id = entA?.id || null;
      match.entry_b_id = entB?.id || null;

      // Auto-advance byes
      if (entA?.is_bye && entB && !entB.is_bye) {
        match.winner_id = entB.id;
        match.status = 'completed';
      } else if (entB?.is_bye && entA && !entA.is_bye) {
        match.winner_id = entA.id;
        match.status = 'completed';
      }
    }

    const { error } = await supabaseClient.from('bracket_matches').insert(stubs.map(s => ({
      bracket_id: s.bracket_id, round: s.round, position: s.position,
      best_of: s.best_of, status: s.status || 'pending',
      entry_a_id: s.entry_a_id || null, entry_b_id: s.entry_b_id || null,
      winner_id: s.winner_id || null,
    })));
    if (error) throw error;

    // Propagate existing bye winners forward
    await propagateWinners(bracketId);
  }

  async function recordMatchResult(matchId, scoreA, scoreB, winnerId, bracketId) {
    const { error } = await supabaseClient.from('bracket_matches').update({
      score_a: scoreA, score_b: scoreB, winner_id: winnerId,
      status: 'completed', ended_at: new Date().toISOString(),
    }).eq('id', matchId);
    if (error) throw error;
    await propagateWinners(bracketId);
  }

  async function reverseMatchResult(matchId, bracketId) {
    // Clear result and all downstream results in the same bracket
    const { data: match } = await supabaseClient.from('bracket_matches')
      .select('*').eq('id', matchId).single();
    if (!match) return;

    // Clear this match
    await supabaseClient.from('bracket_matches').update({
      score_a: null, score_b: null, winner_id: null, status: 'pending', ended_at: null,
    }).eq('id', matchId);

    // Clear all subsequent rounds' matches that may have been seeded from this result
    const { data: allMatches } = await supabaseClient.from('bracket_matches')
      .select('*').eq('bracket_id', bracketId).gt('round', match.round);
    // Any match in a later round that had this match's winner as an entry is now invalid
    if (allMatches) {
      const clearIds = allMatches
        .filter(m => m.entry_a_id === match.winner_id || m.entry_b_id === match.winner_id)
        .map(m => m.id);
      for (const id of clearIds) {
        await supabaseClient.from('bracket_matches').update({
          entry_a_id: null, entry_b_id: null, winner_id: null, status: 'pending',
          score_a: null, score_b: null,
        }).eq('id', id);
      }
    }
  }

  async function propagateWinners(bracketId) {
    const matches = await getMatches(bracketId);
    const byRoundPos = {};
    for (const m of matches) byRoundPos[`${m.round}_${m.position}`] = m;

    // For each completed match, place winner into next round
    for (const m of matches) {
      if (m.status !== 'completed' || !m.winner_id) continue;
      const nextRound = m.round + 1;
      const nextPos = Math.ceil(m.position / 2);
      const nextMatch = byRoundPos[`${nextRound}_${nextPos}`];
      if (!nextMatch) continue;

      // Winner from even positions goes to entry_b, odd to entry_a
      const isOdd = m.position % 2 === 1;
      const updateField = isOdd ? 'entry_a_id' : 'entry_b_id';
      if (nextMatch[updateField] === m.winner_id) continue; // already set

      await supabaseClient.from('bracket_matches')
        .update({ [updateField]: m.winner_id }).eq('id', nextMatch.id);
    }
  }

  // Round-robin scoreboard
  async function getRoundRobinScores(bracketId) {
    const [entries, matches] = await Promise.all([
      getEntries(bracketId),
      getMatches(bracketId),
    ]);
    const completedMatches = matches.filter(m => m.status === 'completed' && m.score_a !== null);
    return { entries, matches: completedMatches };
  }

  return {
    getBrackets, createBracket, updateBracket, deleteBracket,
    getEntries, upsertEntry, deleteEntry,
    getMatches, initializeMatches, recordMatchResult, reverseMatchResult,
    propagateWinners, getRoundRobinScores,
  };
})();

async function bracketsTabHtml() {
  const brackets = await BracketAPI.getBrackets(activeSession.id);

  if (brackets.length === 0 || _bracketView === 'list') {

  const bracket = brackets.find(b => b.id === _activeBracketId) || brackets[0];
  _activeBracketId = bracket.id;
  if (bracket.bracket_type === 'round_robin') {
    return await roundRobinView(bracket);
  }
  return await singleElimView(bracket);
}

function updateSlotPreview() {
  const n = parseInt(document.getElementById('cbEntries')?.value, 10) || 0;
  const type = document.getElementById('cbType')?.value;
  const preview = document.getElementById('slotPreview');
  if (!preview) return;
  if (type === 'round_robin') {
    preview.textContent = `${n} teams, ${n*(n-1)/2} total matches`;
  } else {
    const slots = nextPowerOf2(n);
    const byes = slots - n;
    preview.textContent = `${slots}-slot bracket${byes > 0 ? ` · ${byes} bye${byes>1?'s':''}` : ' · no byes'}`;
  }
}

async function handleCreateBracket() {
  const name    = document.getElementById('cbName')?.value?.trim();
  const type    = document.getElementById('cbType')?.value;
  const bestOf  = parseInt(document.getElementById('cbBestOf')?.value, 10) || 1;
  const entries = parseInt(document.getElementById('cbEntries')?.value, 10) || 0;
  const errEl   = document.getElementById('cbError');
  const btn     = document.getElementById('cbCreateBtn');

  if (!name) { errEl.textContent = 'Give this bracket a name.'; return; }
  if (entries < 2) { errEl.textContent = 'Need at least 2 teams.'; return; }

  const totalSlots = type === 'round_robin' ? entries : nextPowerOf2(entries);
  if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }

  try {
    const bracket = await BracketAPI.createBracket({
      sessionId: activeSession.id,
      name, category: activeSession.category, division: activeSession.division,
      bracketType: type, bestOf, totalSlots,
    });
    document.getElementById('createBracketModal').remove();
    _activeBracketId = bracket.id;
    _bracketView = 'draw';
    document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
  } catch (err) {
    errEl.textContent = err.message || 'Could not create bracket.';
    if (btn) { btn.disabled = false; btn.textContent = 'Create Bracket'; }
  }
}

async function openBracket(bracketId) {
  _activeBracketId = bracketId;
  _bracketView = 'draw';
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function confirmDeleteBracket(bracketId, name) {
  if (!confirm(`Delete bracket "${name}"? This will remove all entries and match results.`)) return;
  await BracketAPI.deleteBracket(bracketId);
  _activeBracketId = null;
  _bracketView = 'list';
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

    BracketAPI.getEntries(bracket.id),
    BracketAPI.getMatches(bracket.id),
  ]);
  const totalRounds = Math.log2(bracket.total_slots);
  const entryMap = Object.fromEntries(entries.map(e => [e.id, e]));

  const bracketStarted = matches.length > 0;

  return `
    <div class="card" style="overflow:visible;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <button onclick="_bracketView='list';document.getElementById('tabPanel').innerHTML=bracketsTabHtml();"
          style="background:none;border:none;color:var(--bench-slate);font-size:13px;font-weight:700;padding:0;cursor:pointer;">← All Brackets</button>
        <span style="color:var(--border-soft);">|</span>
        <h2 style="margin:0;font-size:15px;">${escapeHtml(bracket.name)}</h2>
        <span style="font-size:10px;font-weight:700;color:var(--bench-slate);text-transform:uppercase;letter-spacing:0.05em;">
          Single Elim · Best of ${bracket.best_of} · ${bracket.total_slots} slots
        </span>
      </div>

      <!-- Entry setup (before bracket starts) -->
      ${!bracketStarted ? `
        <div style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--bench-slate);">
              Teams / Entries (${entries.filter(e=>!e.is_bye).length} / ${bracket.total_slots})
            </div>
            <button onclick="handleStartBracket('${bracket.id}',${bracket.total_slots},${bracket.best_of})"
              style="background:var(--optic-yellow);color:var(--optic-yellow-ink);border:none;padding:8px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;min-height:36px;">
              Generate Draw →
            </button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
            ${Array.from({length: bracket.total_slots}, (_,i) => {
              const slot = i + 1;
              const entry = entries.find(e => e.slot === slot && !e.is_bye);
              return `
                <div style="border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:10px 12px;background:var(--surface-raised);cursor:pointer;"
                  onclick="editEntrySlot('${bracket.id}',${slot},'${escapeHtml(entry?.team_name||'')}','${escapeHtml(entry?.player1_name||'')}','${escapeHtml(entry?.player2_name||'')}','${entry?.id||''}',${bracket.format==='singles'||false})">
                  <div style="font-size:10px;font-weight:700;color:var(--bench-slate);text-transform:uppercase;margin-bottom:4px;">Seed ${slot}</div>
                  ${entry ? `
                    <div style="font-weight:700;font-size:13px;">${escapeHtml(entry.team_name)}</div>
                    ${entry.player1_name ? `<div style="font-size:11px;color:var(--bench-slate);">${escapeHtml(entry.player1_name)}${entry.player2_name ? ' & ' + escapeHtml(entry.player2_name) : ''}</div>` : ''}
                  ` : `<div style="font-size:12px;color:var(--bench-slate);font-style:italic;">Click to add team</div>`}
                </div>`;
            }).join('')}

        </div>
      ` : `

        <div style="overflow-x:auto;padding-bottom:8px;">
          <div style="display:flex;gap:0;min-width:${totalRounds * 200}px;align-items:stretch;">
            ${Array.from({length:totalRounds}, (_,ri) => {
              const round = ri + 1;
              const matchesInRound = bracket.total_slots / Math.pow(2, round);
              const roundMatches = matches.filter(m => m.round === round);
              return `

function bracketMatchCard(match, entryMap, bracket) {
  const entA = match.entry_a_id ? entryMap[match.entry_a_id] : null;
  const entB = match.entry_b_id ? entryMap[match.entry_b_id] : null;
  const isComplete = match.status === 'completed';
  const winnerIsA = isComplete && match.winner_id === match.entry_a_id;
  const winnerIsB = isComplete && match.winner_id === match.entry_b_id;

  const entryRow = (entry, score, isWinner, isBye) => {
    if (isBye) return `<div style="padding:7px 10px;font-size:12px;color:var(--bench-slate);font-style:italic;">BYE</div>`;
    if (!entry) return `<div style="padding:7px 10px;font-size:12px;color:var(--bench-slate);font-style:italic;">TBD</div>`;
    return `<div style="padding:7px 10px;display:flex;justify-content:space-between;align-items:center;${isWinner?'background:rgba(78,203,126,0.1);':''};border-radius:4px;">
      <span style="font-size:12px;font-weight:${isWinner?'800':'600'};color:${isWinner?'var(--winner-green)':'var(--ink)'};">${escapeHtml(entry.team_name)}</span>
      <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:${isWinner?'var(--winner-green)':'var(--bench-slate)'};">${score !== null && score !== undefined ? score : ''}</span>
    </div>`;
  };

  return `
    <div style="border:1px solid ${isComplete ? 'var(--border-card)' : 'var(--border-soft)'};border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;background:var(--surface-raised);cursor:${entA&&entB&&!isComplete?'pointer':'default'};"
      onclick="${entA&&entB&&!isComplete ? `showMatchScoreModal('${match.id}','${bracket.id}','${escapeHtml(entA?.team_name||'')}','${escapeHtml(entB?.team_name||'')}',${match.best_of},'${match.entry_a_id}','${match.entry_b_id}')` : ''}">
      ${entryRow(entA, match.score_a, winnerIsA, entA?.is_bye)}
      <div style="height:1px;background:var(--border-soft);"></div>
      ${entryRow(entB, match.score_b, winnerIsB, entB?.is_bye)}

        </div>
      ` : ''}
    </div>
  `;
}

// ── Round Robin View ──
async function roundRobinView(bracket) {
  const { entries, matches } = await BracketAPI.getRoundRobinScores(bracket.id);
  const allMatches = await BracketAPI.getMatches(bracket.id);
  const started = allMatches.length > 0;

  // Build standings table
  const standings = entries.filter(e => !e.is_bye).map(e => {
    let wins = 0, losses = 0, pts = 0, against = 0, gp = 0;
    for (const m of matches) {
      const isA = m.entry_a_id === e.id;
      const isB = m.entry_b_id === e.id;
      if (!isA && !isB) continue;
      gp++;
      if (m.winner_id === e.id) wins++;
      else losses++;
      pts     += isA ? (m.score_a || 0) : (m.score_b || 0);
      against += isA ? (m.score_b || 0) : (m.score_a || 0);
    }
    return { ...e, wins, losses, pts, against, gp };
  }).sort((a,b) => b.wins - a.wins || (b.pts-b.against) - (a.pts-a.against));

  // Score matrix
  const scoreMap = {};
  for (const m of matches) {
    if (m.entry_a_id && m.entry_b_id) {
      scoreMap[`${m.entry_a_id}_${m.entry_b_id}`] = { a: m.score_a, b: m.score_b, winner: m.winner_id, id: m.id };
    }
  }

  return `
    <div class="card" style="overflow:visible;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <button onclick="_bracketView='list';document.getElementById('tabPanel').innerHTML=bracketsTabHtml();"
          style="background:none;border:none;color:var(--bench-slate);font-size:13px;font-weight:700;padding:0;cursor:pointer;">← All Brackets</button>
        <span style="color:var(--border-soft);">|</span>
        <h2 style="margin:0;font-size:15px;">${escapeHtml(bracket.name)}</h2>
        <span style="font-size:10px;font-weight:700;color:var(--bench-slate);text-transform:uppercase;letter-spacing:0.05em;">Round Robin · Best of ${bracket.best_of}</span>
      </div>

      ${!started ? `
        <!-- Entry setup -->
        <div style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--bench-slate);">Teams (${entries.filter(e=>!e.is_bye).length} / ${bracket.total_slots})</div>
            <button onclick="handleStartRR('${bracket.id}',${bracket.total_slots},${bracket.best_of})"
              style="background:var(--optic-yellow);color:var(--optic-yellow-ink);border:none;padding:8px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;min-height:36px;">
              Generate Matches →
            </button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
            ${Array.from({length: bracket.total_slots}, (_,i) => {
              const slot = i + 1;
              const entry = entries.find(e => e.slot === slot && !e.is_bye);
              return `
                <div style="border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:10px 12px;background:var(--surface-raised);cursor:pointer;"
                  onclick="editEntrySlot('${bracket.id}',${slot},'${escapeHtml(entry?.team_name||'')}','${escapeHtml(entry?.player1_name||'')}','${escapeHtml(entry?.player2_name||'')}','${entry?.id||''}',false)">
                  <div style="font-size:10px;font-weight:700;color:var(--bench-slate);text-transform:uppercase;margin-bottom:4px;">Team ${slot}</div>
                  ${entry ? `<div style="font-weight:700;font-size:13px;">${escapeHtml(entry.team_name)}</div>` : `<div style="font-size:12px;color:var(--bench-slate);font-style:italic;">Click to add team</div>`}
                </div>`;
            }).join('')}
          </div>
        </div>
      ` : `
        <!-- Standings -->
        <div style="margin-bottom:18px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--bench-slate);margin-bottom:8px;">Standings</div>
          <div class="table-scroll">
            <table class="roster-table">
              <thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>GP</th><th>Pts For</th><th>Pts Ag.</th><th>Diff</th></tr></thead>
              <tbody>
                ${standings.map((e,i) => `
                  <tr class="${i===0?'lb-highlight':''}">
                    <td style="font-family:var(--font-mono);font-weight:700;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
                    <td style="font-weight:700;">${escapeHtml(e.team_name)}</td>
                    <td style="color:var(--winner-green);font-weight:700;font-family:var(--font-mono);">${e.wins}</td>
                    <td style="color:var(--fault-coral);font-family:var(--font-mono);">${e.losses}</td>
                    <td style="font-family:var(--font-mono);">${e.gp}</td>
                    <td style="font-family:var(--font-mono);">${e.pts}</td>
                    <td style="font-family:var(--font-mono);">${e.against}</td>
                    <td style="font-family:var(--font-mono);font-weight:700;color:${e.pts-e.against>=0?'var(--winner-green)':'var(--fault-coral)'};">${e.pts-e.against>=0?'+':''}${e.pts-e.against}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Score matrix -->
        <div style="margin-bottom:14px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--bench-slate);margin-bottom:8px;">Score Matrix — tap a cell to enter / edit score</div>
          <div class="table-scroll">
            <table style="border-collapse:collapse;font-size:12px;width:100%;">
              <thead>
                <tr>
                  <th style="padding:8px 10px;text-align:left;border-bottom:1.5px solid var(--border-soft);color:var(--bench-slate);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;min-width:120px;">Team</th>
                  ${entries.filter(e=>!e.is_bye).map(e => `
                    <th style="padding:8px 6px;text-align:center;border-bottom:1.5px solid var(--border-soft);color:var(--bench-slate);font-size:10px;white-space:nowrap;max-width:90px;">${escapeHtml(e.team_name)}</th>
                  `).join('')}
                  <th style="padding:8px 10px;text-align:center;border-bottom:1.5px solid var(--border-soft);color:var(--bench-slate);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;">Total Pts</th>
                </tr>
              </thead>
              <tbody>
                ${entries.filter(e=>!e.is_bye).map(rowEntry => {
                  const rowStanding = standings.find(s=>s.id===rowEntry.id);
                  return `
                    <tr>
                      <td style="padding:8px 10px;font-weight:700;border-bottom:1px solid var(--border-soft);white-space:nowrap;">${escapeHtml(rowEntry.team_name)}</td>
                      ${entries.filter(e=>!e.is_bye).map(colEntry => {
                        if (rowEntry.id === colEntry.id) {
                          return `<td style="padding:8px 6px;text-align:center;border-bottom:1px solid var(--border-soft);background:var(--surface-hover);color:var(--bench-slate);">✕</td>`;
                        }
                        const key = `${rowEntry.id}_${colEntry.id}`;
                        const revKey = `${colEntry.id}_${rowEntry.id}`;
                        const cell = scoreMap[key] || scoreMap[revKey];
                        const isRowA = !!scoreMap[key];
                        const rowScore = cell ? (isRowA ? cell.a : cell.b) : null;
                        const colScore = cell ? (isRowA ? cell.b : cell.a) : null;
                        const rowWon = cell?.winner === rowEntry.id;
                        return `
                          <td style="padding:6px;text-align:center;border-bottom:1px solid var(--border-soft);cursor:pointer;"
                            onclick="showRRMatchModal('${bracket.id}','${rowEntry.id}','${escapeHtml(rowEntry.team_name)}','${colEntry.id}','${escapeHtml(colEntry.team_name)}','${cell?.id||''}')">
                            ${cell ? `
                              <span style="font-family:var(--font-mono);font-weight:700;color:${rowWon?'var(--winner-green)':'var(--fault-coral)'};">${rowScore}</span>
                              <span style="font-family:var(--font-mono);color:var(--bench-slate);">–${colScore}</span>
                            ` : `<span style="color:var(--bench-slate);font-size:11px;">–</span>`}
                          </td>`;
                      }).join('')}
                      <td style="padding:8px 10px;text-align:center;border-bottom:1px solid var(--border-soft);font-family:var(--font-mono);font-weight:700;color:var(--ink);">${rowStanding?.pts || 0}</td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <button onclick="handleResetRR('${bracket.id}')"
          style="background:transparent;border:1px solid var(--bench-slate);color:var(--bench-slate);padding:7px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;min-height:36px;">
          ↺ Reset All Matches
        </button>
      `}
    </div>
  `;
}

// ── Start bracket / generate draw ──
async function handleStartBracket(bracketId, totalSlots, bestOf) {
  const entries = await BracketAPI.getEntries(bracketId);
  const real = entries.filter(e => !e.is_bye);
  if (real.length < 2) { alert('Add at least 2 teams before generating the draw.'); return; }

  // Fill remaining slots with byes
  const byes = [];
  for (let slot = 1; slot <= totalSlots; slot++) {
    if (!entries.find(e => e.slot === slot)) {
      byes.push({ bracket_id: bracketId, team_name: 'BYE', is_bye: true, slot, seed: slot });
    }
  }
  if (byes.length > 0) {
    await supabaseClient.from('bracket_entries').insert(byes);
  }
  const allEntries = await BracketAPI.getEntries(bracketId);
  await BracketAPI.initializeMatches(bracketId, totalSlots, bestOf, allEntries);
  await BracketAPI.updateBracket(bracketId, { status: 'active' });
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function handleResetBracket(bracketId, totalSlots, bestOf) {
  if (!confirm('Reset the bracket? All match results will be cleared but team entries are kept.')) return;
  const entries = await BracketAPI.getEntries(bracketId);
  await BracketAPI.initializeMatches(bracketId, totalSlots, bestOf, entries);
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function handleStartRR(bracketId, totalSlots, bestOf) {
  const entries = await BracketAPI.getEntries(bracketId);
  const real = entries.filter(e => !e.is_bye);
  if (real.length < 2) { alert('Add at least 2 teams.'); return; }

  // Generate all round-robin matchups
  await supabaseClient.from('bracket_matches').delete().eq('bracket_id', bracketId);
  const matchRows = [];
  let pos = 1;
  for (let i = 0; i < real.length; i++) {
    for (let j = i + 1; j < real.length; j++) {
      matchRows.push({
        bracket_id: bracketId, round: 1, position: pos++,
        entry_a_id: real[i].id, entry_b_id: real[j].id,
        best_of: bestOf, status: 'pending',
      });
    }
  }
  await supabaseClient.from('bracket_matches').insert(matchRows);
  await BracketAPI.updateBracket(bracketId, { status: 'active' });
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function handleResetRR(bracketId) {
  if (!confirm('Clear all match results?')) return;
  await supabaseClient.from('bracket_matches')
    .update({ score_a: null, score_b: null, winner_id: null, status: 'pending' })
    .eq('bracket_id', bracketId);
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

async function handleRRScore(bracketId, entryAId, entryBId, existingMatchId) {
  const scoreA = parseInt(document.getElementById('rrScoreA').value, 10);
  const scoreB = parseInt(document.getElementById('rrScoreB').value, 10);
  const errEl  = document.getElementById('rrError');
  if (isNaN(scoreA) || isNaN(scoreB)) { errEl.textContent = 'Enter valid scores.'; return; }
  if (scoreA === scoreB) { errEl.textContent = 'Scores cannot be tied.'; return; }
  const winnerId = scoreA > scoreB ? entryAId : entryBId;

  if (existingMatchId) {
    await BracketAPI.recordMatchResult(existingMatchId, scoreA, scoreB, winnerId, bracketId);
  } else {
    // Find the pending match between these two
    const { data: m } = await supabaseClient.from('bracket_matches').select('id')
      .eq('bracket_id', bracketId)
      .or(`and(entry_a_id.eq.${entryAId},entry_b_id.eq.${entryBId}),and(entry_a_id.eq.${entryBId},entry_b_id.eq.${entryAId})`)
      .single();
    if (m) await BracketAPI.recordMatchResult(m.id, scoreA, scoreB, winnerId, bracketId);
  }
  document.getElementById('rrMatchModal').remove();
  document.getElementById('tabPanel').innerHTML = await bracketsTabHtml();
}

// ── bracketsTabHtml needs to be async too ──
async function bracketsTabHtml() {
  const brackets = await BracketAPI.getBrackets(activeSession.id);
  if (!_activeBracketId || _bracketView === 'list') {
    _bracketView = 'list';
    return await bracketListView(brackets);
  }
  const bracket = brackets.find(b => b.id === _activeBracketId);
  if (!bracket) { _bracketView = 'list'; return await bracketListView(brackets); }
  if (bracket.bracket_type === 'round_robin') return await roundRobinView(bracket);
  return await singleElimView(bracket);
}

// ============================================================
// LEADERBOARD TAB
// ============================================================
async function leaderboardTabHtml() {
  const [players, session, recentMatches] = await Promise.all([
    SessionAPI.getPlayers(activeSession.id),
    SessionAPI.getSession(activeSession.id),
    SessionAPI.getRecentMatches(activeSession.id),
  ]);
  activeSession = session;

  const ranked = [...players]
    .filter(p => (p.total_games_played || 0) > 0)
    .sort((a, b) => {
      const wA = a.wins || 0, wB = b.wins || 0;
      if (wB !== wA) return wB - wA;
      const pA = a.total_points || 0, pB = b.total_points || 0;
      if (pB !== pA) return pB - pA;
      return (a.losses || 0) - (b.losses || 0);
    });

  const isPublic = !!session.leaderboard_public;
  const totalMatches = recentMatches.length; // authoritative count from matches table

  // Build a player lookup for rendering match history.
  const playerById = Object.fromEntries(players.map(p => [p.id, p]));

  function teamLabel(team) {
    if (!team?.player_ids) return '—';
    return team.player_ids.map(pid => playerById[pid]?.name || '—').join(' & ');
  }

  function scoreLabel(match, teamId) {
    if (match.team_a_id === teamId) return match.team_a_score ?? '—';
    return match.team_b_score ?? '—';
  }

  return `
    <div class="card">
      <div class="leaderboard-controls">
        <h2 style="margin:0;">Player Rankings</h2>
        <button class="toggle-visibility-btn ${isPublic ? '' : 'hidden-state'}"
          onclick="handleToggleLeaderboard(${isPublic})">
          ${isPublic ? '👁 Visible to Players' : '🙈 Hidden from Players'}
        </button>
      </div>
      <p style="font-size:12px;color:var(--resting-slate);margin:-8px 0 14px;">
        ${isPublic ? 'Players can see this on the live board.' : 'Tap to share with players.'}
        Individual records since this session started.
      </p>

      <div class="stat-banner">
        <div class="stat-chip"><span>${ranked.length}</span>Players ranked</div>
        <div class="stat-chip"><span>${totalMatches}</span>Matches played</div>
        <div class="stat-chip"><span>${players.filter(p=>p.status==='waiting'||p.status==='playing').length}</span>Active now</div>
      </div>

      ${ranked.length ? `
      <div class="table-scroll">
        <table class="roster-table">
          <thead>
            <tr>
              <th>#</th><th>Player</th><th>Tier</th>
              <th style="text-align:center;">W</th>
              <th style="text-align:center;">L</th>
              <th style="text-align:center;">GP</th>
              <th style="text-align:center;">Pts</th>
              <th style="text-align:center;">Win%</th>
            </tr>
          </thead>
          <tbody>
            ${ranked.map((p, i) => {
              const gp  = p.total_games_played || 0;
              const w   = p.wins || 0;
              const l   = p.losses || 0;
              const pts = p.total_points || 0;
              const pct = gp > 0 ? Math.round((w / gp) * 100) : 0;
              return `
                <tr class="${i === 0 ? 'lb-highlight' : ''}">
                  <td class="lb-rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</td>
                  <td class="lb-name">${escapeHtml(p.name)}</td>
                  <td style="font-size:11px;color:var(--resting-slate);">${p.skill_tier !== 'open' ? p.skill_tier : '—'}</td>
                  <td class="lb-stat lb-won">${w}</td>
                  <td class="lb-stat lb-lost">${l}</td>
                  <td class="lb-stat">${gp}</td>
                  <td class="lb-stat lb-pts">${pts}</td>
                  <td class="lb-stat">${pct}%</td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      ` : `<p style="color:var(--resting-slate);font-size:13px;text-align:center;padding:20px 0;">No matches played yet.</p>`}
    </div>

    ${recentMatches.length ? `
    <div class="card">
      <h2 style="margin:0 0 4px;">Match History</h2>
      <p style="font-size:12px;color:var(--resting-slate);margin:0 0 16px;">
        If the wrong team was recorded as the winner, tap <strong>Edit Result</strong> on that match.
        All stats update automatically for all four players.
      </p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${recentMatches.map((m, idx) => {
          const winnerTeam = m.winner_team_id === m.team_a_id ? m.team_a : m.team_b;
          const loserTeam  = m.winner_team_id === m.team_a_id ? m.team_b : m.team_a;
          const loserTeamId = m.winner_team_id === m.team_a_id ? m.team_b_id : m.team_a_id;
          const wScore = m.winner_team_id === m.team_a_id ? m.team_a_score : m.team_b_score;
          const lScore = m.winner_team_id === m.team_a_id ? m.team_b_score : m.team_a_score;
          const timeStr = m.ended_at
            ? new Date(m.ended_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            : '—';
          const durStr = m.duration_seconds
            ? `${Math.floor(m.duration_seconds/60)}m ${m.duration_seconds%60}s`
            : '';
          const wNames = teamLabel(winnerTeam);
          const lNames = teamLabel(loserTeam);
          const wPlayerIds = winnerTeam?.player_ids || [];
          const lPlayerIds = loserTeam?.player_ids || [];
          return `
          <div style="border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface-hover);font-size:11px;color:var(--resting-slate);">
              <span>Match ${recentMatches.length - idx} · ${timeStr}${durStr ? ' · ' + durStr : ''}</span>
              <span style="font-family:var(--font-mono);font-weight:700;color:var(--ink);">${wScore}–${lScore}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0;">
              <div style="padding:12px;">
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--winner-green);letter-spacing:0.05em;margin-bottom:6px;">Won</div>
                ${(winnerTeam?.player_ids || []).map(pid => `
                  <div style="font-size:13px;font-weight:700;padding:2px 0;">${escapeHtml(playerById[pid]?.name || '—')}</div>
                `).join('')}
              </div>
              <div style="font-size:18px;font-weight:800;color:var(--border-soft);padding:0 8px;user-select:none;">vs</div>
              <div style="padding:12px;border-left:1px solid var(--border-soft);">
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--loser-coral);letter-spacing:0.05em;margin-bottom:6px;">Lost</div>
                ${(loserTeam?.player_ids || []).map(pid => `
                  <div style="font-size:13px;font-weight:700;padding:2px 0;">${escapeHtml(playerById[pid]?.name || '—')}</div>
                `).join('')}
              </div>
            </div>
            <div style="padding:8px 12px;border-top:1px solid var(--border-soft);text-align:right;">
              <button
                onclick="openMatchEditor('${m.id}')"
                style="background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:5px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;min-height:0;">
                Edit Result
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ` : ''}
  `;
}

async function handleToggleLeaderboard(currentlyPublic) {
  try {
    await SessionAPI.setLeaderboardVisible(activeSession.id, !currentlyPublic);
    activeSession = await SessionAPI.getSession(activeSession.id);
    document.getElementById('tabPanel').innerHTML = await leaderboardTabHtml();
  } catch (err) { alert(err.message || 'Could not update visibility.'); }
}

/**
 * Full match editor — correct winner, loser score, or both.
 *
 * Design:
 *  • Shows all 4 players in two clear columns (Winner / Loser).
 *  • A single "Loser's score" input drives both the score and the
 *    winner's auto-calculated score (deuce rule applied live).
 *  • A "Swap winner" checkbox flips which team is labelled Winner/Loser,
 *    which also flips what the score input means.
 *  • A live "Result preview" line shows exactly what will be saved.
 *  • Apply Correction submits winner + score in one atomic write.
 */
async function openMatchEditor(matchId) {
  if (document.getElementById('matchEditModal')) return;

  const { data: match, error } = await supabaseClient
    .from('matches')
    .select('*, team_a:team_a_id(*), team_b:team_b_id(*)')
    .eq('id', matchId)
    .single();
  if (error || !match) { alert('Could not load match data.'); return; }

  const players    = await SessionAPI.getPlayers(activeSession.id);
  const playerById = Object.fromEntries(players.map(p => [p.id, p]));

  // Derive winner/loser from the DB record.
  const origWinnerTeam = match.winner_team_id === match.team_a_id ? match.team_a : match.team_b;
  const origLoserTeam  = match.winner_team_id === match.team_a_id ? match.team_b : match.team_a;
  const origLoserTeamId = match.winner_team_id === match.team_a_id ? match.team_b_id : match.team_a_id;

  const origWinnerScore = match.winner_team_id === match.team_a_id ? match.team_a_score : match.team_b_score;
  const origLoserScore  = match.winner_team_id === match.team_a_id ? match.team_b_score : match.team_a_score;

  function nameList(team) {
    return (team?.player_ids || []).map(pid => playerById[pid]?.name || '—').join(' & ');
  }
  function playerRows(team) {
    return (team?.player_ids || [])
      .map(pid => `<div style="font-size:13px;font-weight:700;padding:2px 0;">${escapeHtml(playerById[pid]?.name || '—')}</div>`)
      .join('');
  }

  const origWinnerNames = nameList(origWinnerTeam);
  const origLoserNames  = nameList(origLoserTeam);

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="matchEditModal"
      data-orig-winner="${escapeHtml(origWinnerNames)}"
      data-orig-loser="${escapeHtml(origLoserNames)}">
      <div class="modal-box" style="max-width:500px;">
        <h2 style="margin:0 0 4px;">Edit Match Result</h2>
        <p class="modal-sub">Change the winner, the score, or both. Every affected stat updates automatically.</p>

        <!-- ── Current recorded result ── -->
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-muted);letter-spacing:0.04em;margin-bottom:6px;">Recorded result</div>
        <div style="display:grid;grid-template-columns:1fr 56px 1fr;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:18px;">
          <div style="padding:10px 12px;background:rgba(78,203,126,0.07);">
            <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--winner-green);letter-spacing:0.06em;margin-bottom:5px;">🏆 Won</div>
            ${playerRows(origWinnerTeam)}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;background:var(--surface-hover);font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--ink);text-align:center;line-height:1.2;">${origWinnerScore}<br>–<br>${origLoserScore}</div>
          <div style="padding:10px 12px;background:rgba(255,122,92,0.07);border-left:1px solid var(--border-soft);">
            <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--loser-coral);letter-spacing:0.06em;margin-bottom:5px;">Lost</div>
            ${playerRows(origLoserTeam)}
          </div>
        </div>

        <!-- ── Swap winner ── -->
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-muted);letter-spacing:0.04em;margin-bottom:6px;">Correct the winner?</div>
        <label id="swapRow" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:18px;user-select:none;">
          <input type="checkbox" id="swapWinnerCheckbox"
            style="width:18px;height:18px;min-height:0;cursor:pointer;flex-shrink:0;"
            onchange="refreshMatchEditPreview()">
          <span style="font-size:13px;font-weight:600;line-height:1.4;">
            Swap — make <span id="swapTargetLabel" style="color:var(--winner-green);font-weight:800;">${escapeHtml(origLoserNames)}</span> the winner
          </span>
        </label>

        <!-- ── Score correction ── -->
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-muted);letter-spacing:0.04em;margin-bottom:6px;">Correct the loser's score?</div>
        <div style="display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:18px;">
          <div style="padding:10px 12px;text-align:center;">
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:4px;color:var(--winner-green);" id="scoreWinnerLabel">${escapeHtml(origWinnerNames)}</div>
            <div id="scoreWinnerNum" style="font-family:var(--font-mono);font-size:30px;font-weight:800;color:var(--winner-green);line-height:1;">${origWinnerScore}</div>
            <div id="scoreDeuceTag" style="font-size:9px;color:var(--accent);font-weight:700;margin-top:2px;min-height:12px;"></div>
          </div>
          <div style="background:var(--surface-hover);text-align:center;padding:8px 4px;font-weight:800;color:var(--ink-muted);font-size:13px;align-self:stretch;display:flex;align-items:center;justify-content:center;">vs</div>
          <div style="padding:10px 12px;text-align:center;border-left:1px solid var(--border-soft);">
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:4px;color:var(--loser-coral);" id="scoreLoserLabel">${escapeHtml(origLoserNames)}</div>
            <input type="number" id="editLoserScore" min="0" value="${origLoserScore}"
              style="font-family:var(--font-mono);font-size:30px;font-weight:800;width:100%;text-align:center;border:2px solid var(--border-soft);border-radius:6px;background:var(--surface-raised);color:var(--ink);padding:4px 0;min-height:0;"
              oninput="refreshMatchEditPreview()" onchange="refreshMatchEditPreview()">
            <div style="font-size:9px;color:var(--resting-slate);margin-top:3px;">type new score · 10+ = deuce</div>
          </div>
        </div>

        <!-- ── Live preview ── -->
        <div id="matchEditPreview"
          style="background:var(--surface-hover);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--ink);margin-bottom:14px;line-height:1.6;">
        </div>

        <div id="matchEditError" class="auth-error" style="margin-bottom:8px;"></div>
        <div class="confirm-actions" style="margin-top:0;">
          <button class="btn-no" onclick="document.getElementById('matchEditModal').remove()">Cancel</button>
          <button class="btn-yes" id="matchEditConfirmBtn"
            onclick="confirmMatchEdit('${matchId}','${match.winner_team_id}','${origLoserTeamId}','${origLoserScore}')">
            Apply Correction
          </button>
        </div>
      </div>
    </div>
  `);

  // Render the initial preview.
  refreshMatchEditPreview();
}

/**
 * Recomputes the live preview and score display whenever the swap
 * checkbox or the loser score input changes.
 */
function refreshMatchEditPreview() {
  const modal = document.getElementById('matchEditModal');
  if (!modal) return;

  // Names stored as data attributes when the modal was built.
  const origWinnerNames = modal.dataset.origWinner || '';
  const origLoserNames  = modal.dataset.origLoser  || '';

  const raw        = parseInt(document.getElementById('editLoserScore')?.value, 10);
  const loserScore = (isNaN(raw) || raw < 0) ? 0 : raw;
  const isDeuce    = loserScore >= 10;
  const winnerScore = isDeuce ? loserScore + 2 : 11;

  const swapped = document.getElementById('swapWinnerCheckbox')?.checked;

  // After swap: original loser becomes winner, original winner becomes loser.
  const currentWinnerNames = swapped ? origLoserNames  : origWinnerNames;
  const currentLoserNames  = swapped ? origWinnerNames : origLoserNames;

  // Update swap label.
  const swapTargetEl = document.getElementById('swapTargetLabel');
  if (swapTargetEl) {
    swapTargetEl.textContent = swapped ? origWinnerNames : origLoserNames;
    swapTargetEl.style.color = swapped ? 'var(--loser-coral)' : 'var(--winner-green)';
  }

  // Update score panel labels.
  const wLabelEl = document.getElementById('scoreWinnerLabel');
  const lLabelEl = document.getElementById('scoreLoserLabel');
  if (wLabelEl) wLabelEl.textContent = currentWinnerNames;
  if (lLabelEl) lLabelEl.textContent = currentLoserNames;

  // Update live winner score number.
  const winNumEl = document.getElementById('scoreWinnerNum');
  const deuceEl  = document.getElementById('scoreDeuceTag');
  if (winNumEl) winNumEl.textContent = winnerScore;
  if (deuceEl)  deuceEl.textContent  = isDeuce ? 'Deuce +2 rule' : '';

  // Build the plain-English preview.
  const previewEl = document.getElementById('matchEditPreview');
  if (previewEl) {
    previewEl.innerHTML =
      `<span style="color:var(--resting-slate);">Will save as:</span> ` +
      `<strong style="color:var(--winner-green);">${escapeHtml(currentWinnerNames)}</strong> wins ` +
      `<strong style="font-family:var(--font-mono);">${winnerScore}–${loserScore}</strong> ` +
      `vs <strong style="color:var(--loser-coral);">${escapeHtml(currentLoserNames)}</strong>` +
      (isDeuce ? ` <span style="color:var(--accent);font-size:11px;font-weight:700;">· deuce</span>` : '');
  }
}

async function confirmMatchEdit(matchId, originalWinnerTeamId, originalLoserTeamId, origLoserScore) {
  const btn   = document.getElementById('matchEditConfirmBtn');
  const errEl = document.getElementById('matchEditError');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  const raw = parseInt(document.getElementById('editLoserScore').value, 10);
  if (isNaN(raw) || raw < 0) {
    if (errEl) errEl.textContent = 'Enter a valid score (0 or higher).';
    if (btn) { btn.disabled = false; btn.textContent = 'Apply Correction'; }
    return;
  }

  const swapped         = document.getElementById('swapWinnerCheckbox')?.checked;
  const newWinnerTeamId = swapped ? originalLoserTeamId : null; // null = keep same winner
  // Only pass newLoserScore if it actually changed, to avoid false "no change" errors.
  const scoreChanged    = raw !== parseInt(origLoserScore, 10);
  const newLoserScore   = scoreChanged ? raw : null;

  try {
    await SessionAPI.correctMatchResult(matchId, newWinnerTeamId, newLoserScore);
    document.getElementById('matchEditModal').remove();
    document.getElementById('tabPanel').innerHTML = await leaderboardTabHtml();
  } catch (err) {
    if (errEl) errEl.textContent = err.message || 'Could not apply correction.';
    if (btn) { btn.disabled = false; btn.textContent = 'Apply Correction'; }
  }
}

// ============================================================
// INBOX TAB
// ============================================================
async function inboxTabHtml() {
  const [messages, restRequests] = await Promise.all([
    SessionAPI.getMessages(activeSession.id, 'pending'),
    SessionAPI.getPendingRestRequests(activeSession.id),
  ]);
  return `
    <div class="card">
      <h2>Rest Requests</h2>
      ${restRequests.length ? restRequests.map(r => `
        <div class="inbox-item">
          <div>
            <div class="who">${escapeHtml(r.player?.name || 'Unknown')}</div>
            <div class="what">Asked to sit out</div>
            <div class="when">${new Date(r.requested_at).toLocaleTimeString()}</div>
          </div>
          <div class="inbox-actions">
            <button class="btn-dismiss" onclick="handleDeclineRest('${r.id}')">Decline</button>
            <button class="btn-confirm-rest" onclick="handleConfirmRest('${r.id}','${r.player_id}')">Confirm Rest</button>
          </div>
        </div>
      `).join('') : '<div class="empty-inbox">No rest requests</div>'}
    </div>
    <div class="card">
      <h2>Player Messages</h2>
      ${messages.length ? messages.map(m => `
        <div class="inbox-item">
          <div>
            <div class="who">${escapeHtml(m.player_name)}</div>
            <div class="what">${escapeHtml(m.message)}</div>
            <div class="when">${new Date(m.created_at).toLocaleTimeString()}</div>
          </div>
          <div class="inbox-actions">
            <button class="btn-dismiss" onclick="handleDismissMessage('${m.id}')">Dismiss</button>
          </div>
        </div>
      `).join('') : '<div class="empty-inbox">No messages</div>'}
    </div>
  `;
}

async function handleConfirmRest(requestId, playerId) {
  try {
    const result = await SessionAPI.confirmRestRequest(requestId, playerId);
    if (result?.deferred) alert('Player is mid-match — mark them resting from the Roster tab once their game ends.');
  } catch (err) { alert(err.message || 'Could not confirm rest request.'); }
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}
async function handleDeclineRest(requestId) {
  try { await SessionAPI.declineRestRequest(requestId); }
  catch (err) { alert(err.message || 'Could not decline rest request.'); }
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}
async function handleDismissMessage(messageId) {
  await SessionAPI.markMessageStatus(messageId, 'seen');
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}

// ============================================================
// REALTIME
// ============================================================
function subscribeRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`host-${activeSession.id}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages',      filter: `session_id=eq.${activeSession.id}` }, () => { updateInboxBadge(); if (activeTab === 'inbox') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rest_requests', filter: `session_id=eq.${activeSession.id}` }, () => { updateInboxBadge(); if (activeTab === 'inbox') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'courts',        filter: `session_id=eq.${activeSession.id}` }, () => { if (activeTab === 'courts') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players',       filter: `session_id=eq.${activeSession.id}` }, () => {
      if (activeTab === 'roster') renderActiveTab();
      if (activeTab === 'leaderboard') renderActiveTab();
    })
    .subscribe();
  updateInboxBadge();
}

async function updateInboxBadge() {
  if (!activeSession) return;
  const badge = document.getElementById('inboxBadge');
  if (!badge) return;
  try {
    const [messages, restRequests] = await Promise.all([
      SessionAPI.getMessages(activeSession.id, 'pending'),
      SessionAPI.getPendingRestRequests(activeSession.id),
    ]);
    const total = messages.length + restRequests.length;
    if (total > 0) { badge.textContent = total > 9 ? '9+' : String(total); badge.style.display = 'inline-flex'; }
    else badge.style.display = 'none';
  } catch (_) {}
}

function startHostTimerLoop() {
  if (hostTimerInterval) clearInterval(hostTimerInterval);
  hostTimerInterval = setInterval(() => {
    document.querySelectorAll('.court-host-timer[data-start]').forEach(el => {
      const start = el.getAttribute('data-start');
      if (!start) return;
      const elapsed = Math.max(0, Math.floor((Date.now() - new Date(start).getTime()) / 1000));
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mins}:${secs}`;
    });
  }, 1000);
}

// ============================================================
// HELPERS
// ============================================================
function playerNamesForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid)?.name || '—');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
