  await renderSessionList();
}

async function startHostAgainFlow(oldSessionId) {
  if (!isSessionUnlocked(oldSessionId)) {
    // require the password of the old session before letting someone clone its roster
    const password = prompt('Enter the password for this finished session to host it again:');
    if (password === null) return;
    const ok = await SessionAPI.verifySessionPassword(oldSessionId, password);
    if (!ok) { alert('Incorrect password.'); return; }
    rememberSessionPassword(oldSessionId, password);
  }

  const oldSession = await SessionAPI.getSession(oldSessionId);
  const oldPlayers = await SessionAPI.getPlayers(oldSessionId);

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="hostAgainModal">
      <div class="modal-box">
        <h2>Host Again</h2>
        <p class="modal-sub">Start a new session based on "${escapeHtml(oldSession.name)}". Select players to carry over.</p>
        <div class="field"><label>New Session Name</label><input type="text" id="hostAgainName" value="${escapeHtml(oldSession.name)} (2)"></div>
        <div class="field"><label>Number of Courts</label><input type="number" id="hostAgainCourts" value="${oldSession.court_count}" min="1" max="20"></div>
        <div class="field"><label>New Session Password</label><input type="password" id="hostAgainPassword" placeholder="At least 4 characters"></div>
        <p style="font-size:12px; font-weight:700; margin:14px 0 8px;">Players to carry over:</p>
        <div class="player-checklist" id="hostAgainChecklist">
          ${oldPlayers.map(p => `<div class="player-check selected" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-tier="${p.skill_tier}" onclick="this.classList.toggle('selected')">${escapeHtml(p.name)}</div>`).join('') || '<p style="font-size:12px;color:var(--resting-slate);">No players in that session.</p>'}
        </div>
        <div class="auth-error" id="hostAgainError"></div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('hostAgainModal').remove()">Cancel</button>
          <button class="btn-yes" onclick="confirmHostAgain('${oldSessionId}')">Create & Open</button>
        </div>
      </div>
    </div>
  `);
}

async function confirmHostAgain(oldSessionId) {
  const name = document.getElementById('hostAgainName').value.trim() || 'Open Play';
  const courtCount = parseInt(document.getElementById('hostAgainCourts').value, 10) || 1;
  const password = document.getElementById('hostAgainPassword').value;
  const errorEl = document.getElementById('hostAgainError');
  const oldSession = await SessionAPI.getSession(oldSessionId);

  const selectedChips = [...document.querySelectorAll('#hostAgainChecklist .player-check.selected')];
  const carryPlayers = selectedChips.map(el => ({ name: el.dataset.name, skill_tier: el.dataset.tier }));

  try {
    // Carry over EVERY session setting, not just a subset — a Tournament's
    // division/category/format must survive "Host Again," not silently
    // fall back to a default Open Play session with that data dropped.
    const newSession = await SessionAPI.createSession({
      name, format: oldSession.format, courtCount,
      stackingMode: oldSession.stacking_mode, pairingDefault: oldSession.pairing_default,
      skillMatchMode: oldSession.skill_match_mode, restPriorityEnabled: oldSession.rest_priority_enabled,
      allowCrossLaneFill: oldSession.allow_cross_lane_fill,
      sessionType: oldSession.session_type, openPlayMode: oldSession.open_play_mode,
      tournamentFormat: oldSession.tournament_format, division: oldSession.division, category: oldSession.category,
      roundsTotal: null, // a fresh tournament needs a fresh round count, not the old one's CURRENT round
      scoringMode: oldSession.scoring_mode, pointsToWin: oldSession.points_to_win,
      password, parentSessionId: oldSessionId,
    });
    rememberSessionPassword(newSession.id, password);
    if (carryPlayers.length > 0) {
      await SessionAPI.carryPlayersToNewSession(newSession.id, carryPlayers);
    }
    document.getElementById('hostAgainModal').remove();
    await openSession(newSession.id);
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  // Use closest('.tab-btn') instead of assuming event.target IS the button —
  // the Inbox tab now has a badge span as a child, so a click landing on
  // the badge itself would otherwise make event.target the span, not the
  // button, leaving the tab visually un-highlighted.
  const btn = event.target.closest('.tab-btn');
  if (btn) btn.classList.add('active');
  renderActiveTab();
  if (tab === 'inbox') updateInboxBadge();
}

async function renderActiveTab() {
  const panel = document.getElementById('tabPanel');
  if (activeTab === 'roster') panel.innerHTML = await rosterTabHtml();
  if (activeTab === 'bracket') panel.innerHTML = await bracketTabHtml();
  if (activeTab === 'courts') panel.innerHTML = await courtsTabHtml();
  if (activeTab === 'inbox') panel.innerHTML = await inboxTabHtml();
}

function copyShareLink(url) {
  navigator.clipboard.writeText(url);
  event.target.textContent = 'Copied!';
  setTimeout(() => { event.target.textContent = 'Copy Link'; }, 1500);
}

function copyShareMessage(url, referenceCode) {
  const combined = referenceCode
    ? `Session Code: ${referenceCode}\n${url}`
    : url;
  navigator.clipboard.writeText(combined);
  event.target.textContent = 'Copied!';
  setTimeout(() => { event.target.textContent = 'Copy for Chat'; }, 1500);
}

async function rosterTabHtml() {
  // Use the include-left version here specifically — the Roster tab is
  // the one place the host needs to actually SEE departed/resting
  // players in order to bring them back. Every other part of the app
  // still correctly uses the filtered getPlayers().
  const players = await SessionAPI.getAllPlayersIncludingLeft(activeSession.id);
  return `
    <div class="card">
      <h2>Add Player</h2>
      <div class="add-player-row">
        <input type="text" id="newPlayerName" placeholder="Player name">
        <select id="newPlayerTier"><option value="open">No tier</option><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
        <button onclick="handleAddPlayer()">Add</button>
      </div>
    </div>
    <div class="card">
      <h2>Roster (${players.filter(p => p.status !== 'left').length})</h2>
      ${players.length ? `
        <div class="table-scroll">
        <table class="roster-table">
          <thead><tr><th>Name</th><th>Tier</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${players.map(p => `
              <tr style="${p.status === 'left' ? 'opacity:0.45;' : ''}">
                <td>${escapeHtml(p.name)}</td>
                <td>${p.skill_tier !== 'open' ? p.skill_tier : '—'}</td>
                <td><span class="status-pill status-${p.status}">${p.status.replace('_', ' ')}</span></td>
                <td class="roster-actions">
                  ${rosterActionButtons(p)}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      ` : '<p style="color:var(--resting-slate); font-size:13px;">No players yet — add some above.</p>'}
    </div>
  `;
}

/**
 * Action buttons per player status:
 *  - playing: Leave only (can't manually rest someone mid-match —
 *    pulling them off a live court would disrupt the game in progress)
 *  - waiting / winners_queue / losers_queue (active, not on court):
 *    Rest + Leave
 *  - resting: Bring Back + Leave
 *  - left: Bring Back only (already gone, nothing to "leave" further)
 */
function rosterActionButtons(player) {
  const restBtn = `<button onclick="handleRestManually('${player.id}')" class="roster-action-btn roster-action-rest">Rest</button>`;
  const bringBackBtn = `<button onclick="handleReturnToWaiting('${player.id}')" class="roster-action-btn roster-action-bring-back">Bring Back</button>`;
  const leaveBtn = `<button onclick="handleRemovePlayer('${player.id}')" class="roster-action-btn roster-action-leave">Leave</button>`;

  if (player.status === 'left') return bringBackBtn;
  if (player.status === 'resting') return `${bringBackBtn}${leaveBtn}`;
  if (player.status === 'playing') return leaveBtn;
  return `${restBtn}${leaveBtn}`; // waiting / winners_queue / losers_queue
}

async function handleAddPlayer() {
  const name = document.getElementById('newPlayerName').value.trim();
  const tier = document.getElementById('newPlayerTier').value;
  if (!name) return;
  try {
    await SessionAPI.addPlayer(activeSession.id, name, tier);
    document.getElementById('newPlayerName').value = '';
  } catch (err) {
    alert(err.message || 'Could not add this player. Please try again.');
  }
  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

async function handleRemovePlayer(playerId) {
  try {
    await SessionAPI.removePlayer(playerId);
  } catch (err) {
    alert(err.message || 'Could not remove this player. Please try again.');
  }
  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

/**
 * Brings a player back into 'waiting' status, regardless of whether they
 * were previously resting OR had left — same re-pairing logic either way.
 * Used by both "Bring Back" (resting -> waiting) and "Bring Back" (left ->
 * waiting), since the actual mechanics are identical.
 */
async function handleReturnToWaiting(playerId) {
  await supabaseClient.from('players').update({ status: 'waiting' }).eq('id', playerId);

  // Manual mode: same rule as addPlayer — no auto-pairing, the host forms
  // teams explicitly via the court picker. Without this check, a player
  // returning would get silently auto-paired, contradicting Manual
  // mode's entire premise.
  if (activeSession.open_play_mode === 'manual') {
    document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
    return;
  }

  // Automated / Hybrid: re-pair into the waiting queue, same logic as a
  // brand-new player joining — otherwise they'd show "waiting" in the
  // roster but have no team, so the auto-fill engine could never actually
  // queue them back up.
  const session = activeSession;
  const teamSize = session.format === 'doubles' ? 2 : 1;
  if (teamSize === 1) {
    await SessionAPI.createTeam(activeSession.id, [playerId], session.pairing_default, 'waiting');
  } else {
    const unpaired = await SessionAPI.getUnpairedWaitingPlayers(activeSession.id);
    const partner = unpaired.find(p => p.id !== playerId);
    if (partner) {
      await SessionAPI.createTeam(activeSession.id, [partner.id, playerId], session.pairing_default, 'waiting');
    }
    // if no partner is available yet, they sit unpaired until the next one returns/joins
  }

  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

async function handleRestManually(playerId) {
  try {
    await SessionAPI.restPlayerManually(playerId);
  } catch (err) {
    alert(err.message || 'Could not rest this player.');
  }
  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

// ----------------------------
// BRACKET TAB (Tournament Mode)
// ----------------------------
let bracketSetupSelectedPlayers = [];
let bracketSetupTeams = [];

async function bracketTabHtml() {
  const teams = await SessionAPI.getTournamentTeams(activeSession.id);

  if (teams.length === 0) {
    return await bracketSetupHtml();
  }
  return await bracketLiveHtml(teams);
}

async function bracketSetupHtml() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;

  // Players already locked into a formed team can't be picked again —
  // this is the core double-stacking prevention.
  const assignedPlayerIds = new Set(bracketSetupTeams.flatMap(t => t.playerIds));
  const availablePlayers = players.filter(p => !assignedPlayerIds.has(p.id));

  return `
    <div class="card">
      <h2>Set Up ${activeSession.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin'} Tournament</h2>
      <p style="font-size:13px; color:var(--resting-slate);">
        ${teamSize === 2 ? 'Pick 2 players at a time to form each team.' : 'Each player competes individually.'}
        Once all teams are formed, generate the schedule.
        <strong style="color:var(--court-green);">${availablePlayers.length} unassigned</strong> of ${players.length} total.
      </p>

      <div class="player-checklist" id="bracketPlayerChecklist">
        ${availablePlayers.length ? availablePlayers.map(p => `<div class="player-check" data-id="${p.id}" data-name="${escapeHtml(p.name)}" onclick="toggleBracketPlayerSelect('${p.id}')">${escapeHtml(p.name)}</div>`).join('') : '<p style="font-size:12px;color:var(--resting-slate);">No more unassigned players.</p>'}
      </div>
      ${teamSize === 2 ? `<button class="assign-btn" style="width:auto; padding:8px 16px;" onclick="formBracketTeam()">Form Team from Selected</button>` : `<button class="assign-btn" style="width:auto; padding:8px 16px;" onclick="formAllSinglesTeams()">Add All as Individual Entries</button>`}

      <div style="margin-top:18px;">
        <h3 style="font-size:13px; margin-bottom:8px;">Teams Formed (${bracketSetupTeams.length})</h3>
        ${bracketSetupTeams.length ? bracketSetupTeams.map((t, i) => `
          <div class="session-row"><span>${t.names.join(' & ')}</span><button class="remove-btn" onclick="removeBracketTeam(${i})">Remove</button></div>
        `).join('') : '<p style="font-size:12px;color:var(--resting-slate);">No teams formed yet.</p>'}
      </div>

      <button class="btn-primary" style="width:auto; padding:10px 24px; margin-top:16px;" onclick="handleGenerateSchedule()">Generate Schedule & Start Tournament</button>
      <div class="auth-error" id="bracketSetupError"></div>
    </div>
  `;
}

function toggleBracketPlayerSelect(playerId) {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const idx = bracketSetupSelectedPlayers.indexOf(playerId);
  if (idx >= 0) {
    bracketSetupSelectedPlayers.splice(idx, 1);
  } else {
    if (bracketSetupSelectedPlayers.length >= teamSize) return;
    bracketSetupSelectedPlayers.push(playerId);
  }
  document.querySelectorAll('#bracketPlayerChecklist .player-check').forEach(el => {
    el.classList.toggle('selected', bracketSetupSelectedPlayers.includes(el.dataset.id));
  });
}

async function formBracketTeam() {
  const teamSize = 2;
  if (bracketSetupSelectedPlayers.length !== teamSize) {
    alert(`Select exactly ${teamSize} players to form a team.`);
    return;
  }
  const checklistEls = [...document.querySelectorAll('#bracketPlayerChecklist .player-check.selected')];
  const names = checklistEls.map(el => el.dataset.name);
  bracketSetupTeams.push({ playerIds: [...bracketSetupSelectedPlayers], names });
  bracketSetupSelectedPlayers = [];
  document.getElementById('tabPanel').innerHTML = await bracketSetupHtml();
}

async function formAllSinglesTeams() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const assignedPlayerIds = new Set(bracketSetupTeams.flatMap(t => t.playerIds));
  const newEntries = players
    .filter(p => !assignedPlayerIds.has(p.id))
    .map(p => ({ playerIds: [p.id], names: [p.name] }));
  bracketSetupTeams = [...bracketSetupTeams, ...newEntries];
  document.getElementById('tabPanel').innerHTML = await bracketSetupHtml();
}

async function removeBracketTeam(index) {
  bracketSetupTeams.splice(index, 1);
  document.getElementById('tabPanel').innerHTML = await bracketSetupHtml();
}

async function handleGenerateSchedule() {
  const errorEl = document.getElementById('bracketSetupError');
  const minTeams = activeSession.tournament_format === 'swiss' ? 4 : 3;
  if (bracketSetupTeams.length < minTeams) {
    errorEl.textContent = `Need at least ${minTeams} teams for ${activeSession.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin'} format.`;
    return;
  }
  try {
    const teamPlayerGroups = bracketSetupTeams.map(t => t.playerIds);
    await SessionAPI.startTournament(activeSession.id, teamPlayerGroups, activeSession.tournament_format);
    bracketSetupTeams = [];
    bracketSetupSelectedPlayers = [];
    document.getElementById('tabPanel').innerHTML = await bracketTabHtml();
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

async function bracketLiveHtml(teams) {
  const session = await SessionAPI.getSession(activeSession.id); // refresh for current_round
  activeSession = session;
  const currentRound = session.current_round;
  const matchups = await SessionAPI.getMatchups(activeSession.id, currentRound);
  const players = await SessionAPI.getPlayers(activeSession.id);
  const courts = await SessionAPI.getCourts(activeSession.id);
  const standings = window.TournamentEngine.computeStandings(teams);

  const roundLabel = session.tournament_format === 'round_robin'
    ? `Round ${currentRound} of ${session.rounds_total || '?'}`
    : `Round ${currentRound} of ${session.rounds_total || '?'} (Swiss)`;

  const roundComplete = await SessionAPI.isRoundComplete(activeSession.id, currentRound);
  const isFinalRound = session.rounds_total && currentRound >= session.rounds_total;

  return `
    <div class="card">
      <h2>${roundLabel}</h2>
      <div class="matchup-list">
        ${matchups.map(m => bracketMatchupRow(m, players, courts)).join('')}
      </div>
      ${roundComplete && !isFinalRound ? `<button class="btn-primary" style="width:auto; padding:10px 20px; margin-top:14px;" onclick="handleAdvanceRound()">Advance to Round ${currentRound + 1}</button>` : ''}
      ${roundComplete && isFinalRound ? `<p style="margin-top:14px; font-weight:700; color:var(--winner-green);">🏆 Final round complete! Check standings below for the winner.</p>` : ''}
    </div>

    <div class="card">
      <h2>Standings</h2>
      <div class="table-scroll">
      <table class="roster-table">
        <thead><tr><th>#</th><th>Team</th><th>W-L</th><th>Pts For</th><th>Pts Against</th><th>Diff</th></tr></thead>
        <tbody>
          ${standings.map((t, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${escapeHtml(playerNamesForTeam(t, players).join(' & '))}</td>
              <td>${t.wins}-${t.losses}</td>
              <td>${t.points_for}</td>
              <td>${t.points_against}</td>
              <td>${t.points_for - t.points_against >= 0 ? '+' : ''}${t.points_for - t.points_against}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function bracketMatchupRow(m, players, courts) {
  const namesA = playerNamesForTeam(m.team_a, players).join(' & ');
  const namesB = playerNamesForTeam(m.team_b, players).join(' & ');
  const openCourts = courts.filter(c => c.status === 'open');

  if (m.status === 'completed') {
    return `<div class="matchup-card completed"><span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span><span class="status-pill status-playing">Done</span></div>`;
  }
  if (m.status === 'in_progress') {
    return `
      <div class="matchup-card in-progress">
        <span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span>
        <button class="win-select-btn" onclick="openScoreEntry('${m.id}', '${m.court_id}', '${escapeHtml(namesA)}', '${escapeHtml(namesB)}')">Enter Score</button>
      </div>
    `;
  }
  return `
    <div class="matchup-card pending">
      <span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span>
      ${openCourts.length ? `
        <select onchange="if(this.value) handleAssignMatchup('${m.id}', this.value)">
          <option value="">Assign court...</option>
          ${openCourts.map(c => `<option value="${c.id}">Court ${c.court_number}</option>`).join('')}
        </select>
      ` : '<span style="font-size:11px;color:var(--resting-slate);">No open courts</span>'}
    </div>
  `;
}

function paddleSvg() {
  return `<svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="20" y="46" width="8" height="16" rx="3" fill="currentColor" opacity="0.85"/><ellipse cx="24" cy="26" rx="20" ry="24" fill="currentColor"/></svg>`;
}

function paddleChipHost(name) {
  return `<div class="court-host-paddle"><div class="court-host-paddle-shape">${paddleSvg()}<span class="court-host-paddle-name">${escapeHtml(name)}</span></div></div>`;
}

/**
 * Shared visual court card — used by both Automated and Manual mode.
 * Clicking the card opens the matchup picker for that court (works the
 * same whether the court is open or already playing: if it's playing,
 * the picker sets up that court's NEXT matchup instead).
 */
function renderCourtDiagramCard(court, players, queuedNote) {
  const isActive = court.status === 'in_progress';
  const sideA = isActive ? playerNamesForTeam(court.team_a, players).map(paddleChipHost).join('') : '';
  const sideB = isActive ? playerNamesForTeam(court.team_b, players).map(paddleChipHost).join('') : '';

  // Presentation-only: detect a genuine state transition since the last
  // render so serve-in / pulse only fire on real changes, never on every
  // refresh (which would look like constant flicker, not "alive").
  const prev = _prevHostCourtStates[court.id];
  const justStarted = isActive && (!prev || prev.status !== 'in_progress' || prev.team_a_id !== court.team_a_id);
  const justFreed = !isActive && prev && prev.status === 'in_progress';
  const motionClass = justStarted ? 'serve-in' : (justFreed ? 'pulse-update' : '');
  _prevHostCourtStates[court.id] = { status: court.status, team_a_id: court.team_a_id };

  let footer = '<span style="color:var(--resting-slate);">Tap to set matchup</span>';
  let footerClass = '';
  if (isActive) {
    footer = 'Tap to mark finished or queue next';
    footerClass = 'ongoing';
  } else if (queuedNote) {
    footer = queuedNote;
    footerClass = 'queued';
  }

  return `
    <div class="court-host-card ${motionClass}" onclick="handleCourtCardClick('${court.id}')">
      <div class="court-host-label">
        <span class="num">Court ${court.court_number}</span>
        <span class="court-host-timer ${isActive ? '' : 'idle'}" data-start="${court.game_started_at || ''}" id="hostTimer-${court.id}">${isActive ? '00:00' : 'OPEN'}</span>
      </div>
      <div class="court-host-diagram">
        <div class="court-host-side">${sideA}</div>
        <div class="court-host-kitchen-top"></div>
        <div class="court-host-centerline-top"></div>
        <div class="court-host-net"></div>
        <div class="court-host-kitchen-bottom"></div>
        <div class="court-host-centerline-bottom"></div>
        <div class="court-host-side">${sideB}</div>
        ${!isActive ? '<div class="court-host-empty-msg">OPEN</div>' : ''}
      </div>
      <div class="court-host-footer ${footerClass}">${footer}</div>
    </div>
  `;
}

/**
 * Single entry point for clicking ANY court card, in any mode.
 * - Court is OPEN -> pick a matchup to start immediately
 * - Court is PLAYING -> pick (or view/edit) the NEXT matchup queued for
 *   when this court frees up, rather than disturbing the live match
 */
async function handleCourtCardClick(courtId) {
  const courts = await SessionAPI.getCourts(activeSession.id);
  const court = courts.find(c => c.id === courtId);
  if (!court) return;

  if (court.status === 'in_progress') {
    await openCourtPicker(courtId, true); // true = queuing the NEXT match
  } else {
    await openCourtPicker(courtId, false); // false = starting NOW
  }
}

let courtPickerCourtId = null;
let courtPickerIsQueueNext = false;
let courtPickerSelectedPlayerIds = []; // step 1: 4 individuals
let courtPickerTeamAPlayerIds = [];     // step 2: split assignment
let courtPickerTeamBPlayerIds = [];
let courtPickerStep = 1;

async function openCourtPicker(courtId, isQueueNext) {
  courtPickerCourtId = courtId;
  courtPickerIsQueueNext = isQueueNext;
  courtPickerSelectedPlayerIds = [];
  courtPickerTeamAPlayerIds = [];
  courtPickerTeamBPlayerIds = [];
  courtPickerStep = 1;

  const courts = await SessionAPI.getCourts(activeSession.id);
  const court = courts.find(c => c.id === courtId);

  await renderCourtPickerModal(court);
}

async function renderCourtPickerModal(court) {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const playersNeeded = teamSize * 2;

  const [allPlayers, { eligiblePlayerIds, minPlayCount }] = await Promise.all([
    SessionAPI.getPlayers(activeSession.id),
    SessionAPI.getPlayerWaveEligibility(activeSession.id),
  ]);

  // Only players who are actually free to play (not mid-match, not resting)
  // and not already in some other team right now show up here at all.
  const activeTeams = await SessionAPI.getTeams(activeSession.id);
  const alreadyOnATeam = new Set(activeTeams.flatMap(t => t.player_ids));
  const freePlayers = allPlayers.filter(p => p.status === 'waiting' && !alreadyOnATeam.has(p.id));

  const eligible = freePlayers.filter(p => eligiblePlayerIds.has(p.id));
  const ineligible = freePlayers.filter(p => !eligiblePlayerIds.has(p.id));

  const headerNote = courtPickerIsQueueNext
    ? `<p class="modal-sub">This court is currently playing. Set up what plays here next, or end the current match now.</p>
       <button class="assign-btn" style="background:var(--loser-coral); color:white; margin-bottom:14px;" onclick="closeCourtPickerModal(); handleMarkFinished('${court.id}');">Current Match Is Finished Now</button>`
    : `<p class="modal-sub">Step 1: select ${playersNeeded} players who will play this match.</p>`;

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="courtPickerModal">
      <div class="modal-box">
        <h2>Court ${court.court_number}${courtPickerIsQueueNext ? ' — Queue Next Match' : ''}</h2>
        ${headerNote}

        <p style="font-size:11px; font-weight:700; color:var(--court-green); margin:10px 0 6px;">Eligible this wave (played ${minPlayCount}x or fewer)</p>
        <div class="player-checklist" id="courtPickerChecklist">
          ${eligible.length ? eligible.map((p) => `<div class="player-check" data-id="${p.id}" data-name="${escapeHtml(p.name)}" onclick="toggleCourtPickerPlayer('${p.id}')">${escapeHtml(p.name)}</div>`).join('') : '<p style="font-size:12px;color:var(--resting-slate);">No eligible players free right now.</p>'}
        </div>

        ${ineligible.length ? `
          <p style="font-size:11px; font-weight:700; color:var(--resting-slate); margin:14px 0 6px;">Already played this wave — must wait</p>
          <div class="player-checklist">
            ${ineligible.map(p => `<div class="player-check" style="opacity:0.35; cursor:not-allowed; text-decoration:line-through;" title="Already played this wave">${escapeHtml(p.name)}</div>`).join('')}
          </div>
        ` : ''}

        <p style="font-size:12px; font-weight:700; margin:14px 0 0;" id="courtPickerSelectedCount">Selected: ${courtPickerSelectedPlayerIds.length} / ${playersNeeded}</p>

        <div class="confirm-actions" style="margin-top:16px;">
          <button class="btn-no" onclick="closeCourtPickerModal()">Cancel</button>
          <button class="btn-yes" onclick="proceedToTeamSplit()">Next: Form Teams</button>
        </div>
        <div class="auth-error" id="courtPickerError"></div>
      </div>
    </div>
  `);
}

function toggleCourtPickerPlayer(playerId) {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const playersNeeded = teamSize * 2;
  const idx = courtPickerSelectedPlayerIds.indexOf(playerId);
  if (idx >= 0) {
    courtPickerSelectedPlayerIds.splice(idx, 1);
  } else {
    if (courtPickerSelectedPlayerIds.length >= playersNeeded) return;
    courtPickerSelectedPlayerIds.push(playerId);
  }
  document.querySelectorAll('#courtPickerChecklist .player-check').forEach(el => {
    el.classList.toggle('selected', courtPickerSelectedPlayerIds.includes(el.dataset.id));
  });
  document.getElementById('courtPickerSelectedCount').textContent = `Selected: ${courtPickerSelectedPlayerIds.length} / ${playersNeeded}`;
}

async function proceedToTeamSplit() {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const playersNeeded = teamSize * 2;
  const errorEl = document.getElementById('courtPickerError');

  if (courtPickerSelectedPlayerIds.length !== playersNeeded) {
    errorEl.textContent = `Select exactly ${playersNeeded} players first.`;
    return;
  }

  if (teamSize === 1) {
    // Singles: no split step needed, the 2 selected players ARE the 2 teams.
    courtPickerTeamAPlayerIds = [courtPickerSelectedPlayerIds[0]];
    courtPickerTeamBPlayerIds = [courtPickerSelectedPlayerIds[1]];
    await finalizeCourtPickerTeams();
    return;
  }

  courtPickerStep = 2;
  courtPickerTeamAPlayerIds = [];
  courtPickerTeamBPlayerIds = [];
  renderTeamSplitModal();
}

function renderTeamSplitModal() {
  const checklistEls = [...document.querySelectorAll('#courtPickerChecklist .player-check.selected')];
  const selectedNames = courtPickerSelectedPlayerIds.map(id => {
    const el = checklistEls.find(e => e.dataset.id === id);
    return { id, name: el ? el.dataset.name : '—' };
  });

  document.getElementById('courtPickerModal').querySelector('.modal-box').innerHTML = `
    <h2>Form the Teams</h2>
    <p class="modal-sub">Step 2: tap names to assign each player to Team A or Team B.</p>

    <div class="regroup-lanes">
      <div class="regroup-lane winners-lane">
        <h4>Team A</h4>
        <div id="teamAChips">
          ${courtPickerTeamAPlayerIds.map(pid => {
            const p = selectedNames.find(n => n.id === pid);
            return `<span class="regroup-chip" onclick="moveToUnassigned('${pid}')">${escapeHtml(p.name)}</span>`;
          }).join('') || '<span style="font-size:11px;color:var(--resting-slate);">— tap a name below —</span>'}
        </div>
      </div>
      <div class="regroup-lane losers-lane">
        <h4>Team B</h4>
        <div id="teamBChips">
          ${courtPickerTeamBPlayerIds.map(pid => {
            const p = selectedNames.find(n => n.id === pid);
            return `<span class="regroup-chip" onclick="moveToUnassigned('${pid}')">${escapeHtml(p.name)}</span>`;
          }).join('') || '<span style="font-size:11px;color:var(--resting-slate);">— tap a name below —</span>'}
        </div>
      </div>
    </div>

    <p style="font-size:11px; font-weight:700; margin:14px 0 6px;">Unassigned — tap to add to a team</p>
    <div class="player-checklist" id="unassignedChecklist">
      ${selectedNames.filter(p => !courtPickerTeamAPlayerIds.includes(p.id) && !courtPickerTeamBPlayerIds.includes(p.id))
        .map(p => `<div class="player-check" onclick="assignToTeam('${p.id}')">${escapeHtml(p.name)}</div>`).join('') || '<p style="font-size:12px;color:var(--resting-slate);">All assigned.</p>'}
    </div>

    <div class="confirm-actions" style="margin-top:16px;">
      <button class="btn-no" onclick="closeCourtPickerModal()">Cancel</button>
      <button class="btn-yes" onclick="finalizeCourtPickerTeams()">${courtPickerIsQueueNext ? 'Queue This Matchup' : 'Start Match'}</button>
    </div>
    <div class="auth-error" id="courtPickerError"></div>
  `;
}

function assignToTeam(playerId) {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  if (courtPickerTeamAPlayerIds.length < teamSize) {
    courtPickerTeamAPlayerIds.push(playerId);
  } else if (courtPickerTeamBPlayerIds.length < teamSize) {
    courtPickerTeamBPlayerIds.push(playerId);
  }
  renderTeamSplitModal();
}

function moveToUnassigned(playerId) {
  courtPickerTeamAPlayerIds = courtPickerTeamAPlayerIds.filter(id => id !== playerId);
  courtPickerTeamBPlayerIds = courtPickerTeamBPlayerIds.filter(id => id !== playerId);
  renderTeamSplitModal();
}

async function finalizeCourtPickerTeams() {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const errorEl = document.getElementById('courtPickerError');
  if (courtPickerTeamAPlayerIds.length !== teamSize || courtPickerTeamBPlayerIds.length !== teamSize) {
    if (errorEl) errorEl.textContent = `Each team needs exactly ${teamSize} player${teamSize > 1 ? 's' : ''}.`;
    return;
  }

  // Create both teams directly in the 'playing' lane, not 'waiting' — these
  // were just hand-picked by the host for THIS specific match, they must
  // never be visible to the automated engine's queue scan in the brief
  // window before assignCourt() runs (a real, if narrow, race condition:
  // a realtime-triggered re-render of another court could otherwise pull
  // one of these teams into a different match before it's actually assigned).
  const teamA = await SessionAPI.createTeam(activeSession.id, courtPickerTeamAPlayerIds, activeSession.pairing_default, 'playing');
  const teamB = await SessionAPI.createTeam(activeSession.id, courtPickerTeamBPlayerIds, activeSession.pairing_default, 'playing');

  if (courtPickerIsQueueNext) {
    // Manual queue entries reference the team rows directly by ID, so
    // 'playing' lane is harmless here too — manual_queue doesn't scan the
    // teams table by queue_lane, it stores explicit team_a_id/team_b_id.
    // NOTE: this team is technically QUEUED, not actually playing yet —
    // 'playing' is used here only to keep it out of the automated engine's
    // waiting-queue scan, not as a literal status claim. The schema's
    // queue_lane CHECK constraint doesn't include a "queued" value, so
    // this is the safest existing option without a migration.
    await SessionAPI.addManualQueueEntry(activeSession.id, courtPickerCourtId, teamA.id, teamB.id);
  } else {
    try {
      await SessionAPI.assignCourt(courtPickerCourtId, teamA.id, teamB.id);
    } catch (err) {
      // Court got taken by something else between opening this modal and
      // confirming. Clean up the two teams we just created so they don't
      // sit as orphaned rows, then surface the error clearly.
      await supabaseClient.from('teams').update({ is_active: false }).in('id', [teamA.id, teamB.id]);
      const errorEl = document.getElementById('courtPickerError');
      if (errorEl) errorEl.textContent = err.message || 'This court was just taken. Close and try a different court.';
      return;
    }
  }

  closeCourtPickerModal();
  document.getElementById('tabPanel').innerHTML = await courtsTabHtml();
}

function closeCourtPickerModal() {
  const modal = document.getElementById('courtPickerModal');
  if (modal) modal.remove();
  courtPickerCourtId = null;
  courtPickerIsQueueNext = false;
  courtPickerSelectedPlayerIds = [];
  courtPickerTeamAPlayerIds = [];
  courtPickerTeamBPlayerIds = [];
  courtPickerStep = 1;
}

async function automatedModeCourtsHtml() {
  const [courts, players, unpaired] = await Promise.all([
    SessionAPI.getCourts(activeSession.id),
    SessionAPI.getPlayers(activeSession.id),
    SessionAPI.getUnpairedWaitingPlayers(activeSession.id),
  ]);

  // Automated / Hybrid: the moment a court is open, immediately try to
  // auto-fill it from the queue (Hybrid checks the manual_queue first,
  // then falls back to the automated engine — see tryRefillCourt).
  for (const court of courts) {
    if (court.status === 'open') {
      try {
        await SessionAPI.tryRefillCourt(court.id);
      } catch (err) {
        // One court's race-condition failure must not prevent the OTHER
        // courts in this loop from getting their own refill attempt.
        console.error(`Refill failed for court ${court.court_number}:`, err.message);
      }
    }
  }
  const freshCourts = courts.some(c => c.status === 'open') ? await SessionAPI.getCourts(activeSession.id) : courts;
  const manualQueue = activeSession.open_play_mode === 'hybrid' ? await SessionAPI.getManualQueue(activeSession.id) : [];

  const courtCards = freshCourts.map(court => {
    const queuedCount = manualQueue.filter(m => m.court_id === court.id && m.status === 'planned').length;
    const queuedNote = queuedCount > 0 ? `${queuedCount} match${queuedCount > 1 ? 'es' : ''} queued next` : null;
    return renderCourtDiagramCard(court, players, queuedNote);
  }).join('');

  const hybridHint = activeSession.open_play_mode === 'hybrid'
    ? `<div class="card" style="background:color-mix(in srgb, var(--waiting-blue) 15%, var(--surface));"><p style="font-size:12px;margin:0;">💡 Hybrid mode — matches auto-pair by default. Tap any court (playing or open) to set or override its matchup.</p></div>`
    : '';

  return `
    ${hybridHint}
    ${unpaired.length > 0 ? `<div class="card" style="background:color-mix(in srgb, var(--accent) 15%, var(--surface));"><p style="font-size:12px;margin:0;">⏳ <strong>${unpaired.map(p => escapeHtml(p.name)).join(', ')}</strong> still waiting for a partner to be added.</p></div>` : ''}
    <div class="courts-host-grid">${courtCards}</div>
  `;
}

async function manualModeCourtsHtml() {
  const [courts, players, unpaired] = await Promise.all([
    SessionAPI.getCourts(activeSession.id),
    SessionAPI.getPlayers(activeSession.id),
    SessionAPI.getUnpairedWaitingPlayers(activeSession.id),
  ]);

  // Manual mode still auto-PULLS from the host's pre-built schedule the
  // instant a court frees up — what's manual is deciding the schedule
  // itself, via tapping each court card.
  for (const court of courts) {
    if (court.status === 'open') {
      try {
        await SessionAPI.tryRefillCourt(court.id);
      } catch (err) {
        console.error(`Refill failed for court ${court.court_number}:`, err.message);
      }
    }
  }
  const freshCourts = courts.some(c => c.status === 'open') ? await SessionAPI.getCourts(activeSession.id) : courts;
  const manualQueue = await SessionAPI.getManualQueue(activeSession.id);

  const courtCards = freshCourts.map(court => {
    const queuedCount = manualQueue.filter(m => m.court_id === court.id && m.status === 'planned').length;
    const queuedNote = queuedCount > 0 ? `${queuedCount} match${queuedCount > 1 ? 'es' : ''} queued next` : null;
    return renderCourtDiagramCard(court, players, queuedNote);
  }).join('');

  return `
    ${unpaired.length > 0 ? `<div class="card" style="background:color-mix(in srgb, var(--accent) 15%, var(--surface));"><p style="font-size:12px;margin:0;">⏳ <strong>${unpaired.map(p => escapeHtml(p.name)).join(', ')}</strong> still waiting for a partner to be added.</p></div>` : ''}
    <p style="font-size:12px;color:var(--resting-slate);margin:0 0 10px;">Tap an open court to start a match, or tap a playing court to queue what plays there next.</p>
    <div class="courts-host-grid">${courtCards}</div>
  `;
}

// ============================================================
// MATCH RESULT FLOW: Mark Finished -> Confirm -> Pick Winner -> Done (automatic)
// ============================================================
let resultFlowCourt = null; // holds court object mid-flow
let resultFlowWinnerTeamId = null;

async function handleMarkFinished(courtId) {
  const courts = await SessionAPI.getCourts(activeSession.id);
  const court = courts.find(c => c.id === courtId);
  if (!court) return;
  resultFlowCourt = court;
  showConfirmFinishedModal();
}

function showConfirmFinishedModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-backdrop';
  modal.id = 'resultModal';
  modal.innerHTML = `
    <div class="modal-box">
      <h2>Match Finished?</h2>
      <p class="modal-sub">Confirm Court ${resultFlowCourt.court_number}'s match has ended.</p>
      <div class="confirm-actions">
        <button class="btn-no" onclick="closeResultModal()">No, still playing</button>
        <button class="btn-yes" onclick="showPickWinnerModal()">Yes, finished</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

async function showPickWinnerModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const namesA = playerNamesForTeam(resultFlowCourt.team_a, players).join(' & ');
  const namesB = playerNamesForTeam(resultFlowCourt.team_b, players).join(' & ');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Who Won?</h2>
      <p class="modal-sub">Court ${resultFlowCourt.court_number} — select the winning side.</p>
      <div class="winner-pick-row">
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_a_id}')">${escapeHtml(namesA)}</div>
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_b_id}')">${escapeHtml(namesB)}</div>
      </div>
      <button class="btn-secondary" style="width:auto;padding:8px 16px;" onclick="closeResultModal()">Cancel</button>
    </div>
  `;
}

let resultFlowScoreData = null;

async function selectWinner(winnerTeamId) {
  resultFlowWinnerTeamId = winnerTeamId;
  resultFlowScoreData = null;
  await showScoreConsentModal();
}

async function showScoreConsentModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const teamA = resultFlowCourt.team_a;
  const teamB = resultFlowCourt.team_b;
  const namesA = playerNamesForTeam(teamA, players).join(' & ');
  const namesB = playerNamesForTeam(teamB, players).join(' & ');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Record the Score?</h2>
      <p class="modal-sub">Optional — only show it if all 4 players agree. Match duration is tracked either way.</p>
      <label style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; margin:14px 0; cursor:pointer;">
        <input type="checkbox" id="scoreConsentCheckbox" style="width:18px; height:18px; min-height:0;" onchange="toggleScoreFields()">
        All 4 players agreed to show this score
      </label>
      <div id="scoreFieldsArea" style="display:none;">
        <div class="form-grid">
          <div class="field"><label>${escapeHtml(namesA)}</label><input type="number" id="consentScoreA" min="0" max="99" value="0"></div>
          <div class="field"><label>${escapeHtml(namesB)}</label><input type="number" id="consentScoreB" min="0" max="99" value="0"></div>
        </div>
      </div>
      <div class="confirm-actions">
        <button class="btn-no" onclick="skipScoreAndContinue()">Skip Score</button>
        <button class="btn-yes" onclick="confirmScoreAndContinue()">Continue</button>
      </div>
      <div class="auth-error" id="scoreConsentError"></div>
    </div>
  `;
}

function toggleScoreFields() {
  const checked = document.getElementById('scoreConsentCheckbox').checked;
  document.getElementById('scoreFieldsArea').style.display = checked ? '' : 'none';
}

async function skipScoreAndContinue() {
  resultFlowScoreData = null;
  await SessionAPI.logMatchResult(resultFlowCourt.id, resultFlowWinnerTeamId, null);
  await finalizeAutomaticPlacement();
}

async function confirmScoreAndContinue() {
  const consented = document.getElementById('scoreConsentCheckbox').checked;
  if (!consented) {
    await skipScoreAndContinue();
    return;
  }
  const scoreA = parseInt(document.getElementById('consentScoreA').value, 10);
  const scoreB = parseInt(document.getElementById('consentScoreB').value, 10);
  const errorEl = document.getElementById('scoreConsentError');
  if (isNaN(scoreA) || isNaN(scoreB) || scoreA === scoreB) {
    errorEl.textContent = 'Scores must be valid numbers and cannot be tied.';
    return;
  }
  resultFlowScoreData = { teamAScore: scoreA, teamBScore: scoreB };
  await SessionAPI.logMatchResult(resultFlowCourt.id, resultFlowWinnerTeamId, resultFlowScoreData);
  await finalizeAutomaticPlacement();
}

/**
 * Open Play is fully automatic — no host editing of who goes where.
 * Winning pair goes straight to the back of the winners queue, losing
 * pair to the back of the losers queue, exactly as recorded. This is
 * what keeps the FIFO/win-loss sequence provably correct: there's no
 * manual step where a host click could break the queue order.
 */
async function finalizeAutomaticPlacement() {
  const teamA = resultFlowCourt.team_a;
  const teamB = resultFlowCourt.team_b;
  const winningTeam = teamA.id === resultFlowWinnerTeamId ? teamA : teamB;
  const losingTeam = teamA.id === resultFlowWinnerTeamId ? teamB : teamA;

  await SessionAPI.applyQueuePlacement(resultFlowCourt.id, activeSession.id, activeSession.pairing_default, winningTeam.player_ids, losingTeam.player_ids);
  closeResultModal();
  document.getElementById('tabPanel').innerHTML = await courtsTabHtml();
}

function closeResultModal() {
  const modal = document.getElementById('resultModal');
  if (modal) modal.remove();
  resultFlowCourt = null;
  resultFlowWinnerTeamId = null;
  resultFlowScoreData = null;
}

function playerNamesForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid)?.name || '—');
}

async function inboxTabHtml() {
  const [messages, restRequests] = await Promise.all([
    SessionAPI.getMessages(activeSession.id, 'pending'),
    SessionAPI.getPendingRestRequests(activeSession.id),
  ]);
  return `
    <div class="card">
      <h2>Rest Requests</h2>
      ${restRequests.length ? restRequests.map(r => `
        <div class="inbox-item">
          <div><div class="who">${escapeHtml(r.player?.name || 'Unknown player')}</div><div class="what">Asked to sit out</div><div class="when">${new Date(r.requested_at).toLocaleTimeString()}</div></div>
          <div class="inbox-actions">
            <button class="btn-dismiss" onclick="handleDeclineRest('${r.id}')">Decline</button>
            <button class="btn-confirm-rest" onclick="handleConfirmRest('${r.id}', '${r.player_id}')">Confirm Rest</button>
          </div>
        </div>
      `).join('') : '<div class="empty-inbox">No rest requests</div>'}
    </div>
    <div class="card">
      <h2>Player Messages</h2>
      ${messages.length ? messages.map(m => `
        <div class="inbox-item">
          <div><div class="who">${escapeHtml(m.player_name)}</div><div class="what">${escapeHtml(m.message)}</div><div class="when">${new Date(m.created_at).toLocaleTimeString()}</div></div>
          <div class="inbox-actions"><button class="btn-dismiss" onclick="handleDismissMessage('${m.id}')">Dismiss</button></div>
        </div>
      `).join('') : '<div class="empty-inbox">No messages</div>'}
    </div>
  `;
}

async function handleConfirmRest(requestId, playerId) {
  try {
    const result = await SessionAPI.confirmRestRequest(requestId, playerId);
    if (result?.deferred) {
      alert('This player is still mid-match — they\'ll need to be marked "resting" from the Roster tab once their current game ends.');
    }
  } catch (err) {
    alert(err.message || 'Could not confirm this rest request.');
  }
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}

async function handleDeclineRest(requestId) {
  try {
    await SessionAPI.declineRestRequest(requestId);
  } catch (err) {
    alert(err.message || 'Could not decline this rest request.');
  }
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}

async function handleDismissMessage(messageId) {
  await SessionAPI.markMessageStatus(messageId, 'seen');
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
  updateInboxBadge();
}

function subscribeRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`host-${activeSession.id}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `session_id=eq.${activeSession.id}` }, () => {
      updateInboxBadge();
      if (activeTab === 'inbox') renderActiveTab();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rest_requests', filter: `session_id=eq.${activeSession.id}` }, () => {
      updateInboxBadge();
      if (activeTab === 'inbox') renderActiveTab();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_matchups', filter: `session_id=eq.${activeSession.id}` }, () => { if (activeTab === 'bracket') renderActiveTab(); })
    .subscribe();
  updateInboxBadge();
}

/**
 * Updates the red pulsing count on the Inbox tab — this runs on EVERY
 * realtime event for messages/rest_requests regardless of which tab the
 * host currently has open. Without this, a rest request arriving while
 * the host is on the Courts tab (the most likely place for them to be)
 * was previously invisible until they happened to click into Inbox —
 * not a real notification, just a tab that updates if you're already
 * looking at it.
 */
async function updateInboxBadge() {
  if (!activeSession) return;
  const badge = document.getElementById('inboxBadge');
  if (!badge) return;
  try {
    const [messages, restRequests] = await Promise.all([
      SessionAPI.getMessages(activeSession.id, 'pending'),
      SessionAPI.getPendingRestRequests(activeSession.id),
    ]);
    const total = messages.length + restRequests.length;
    if (total > 0) {
      badge.textContent = total > 9 ? '9+' : String(total);
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  } catch (err) {
    // badge is a non-critical nicety — fail silently rather than disrupt anything else
  }
}

let hostTimerInterval = null;
function startHostTimerLoop() {
  if (hostTimerInterval) clearInterval(hostTimerInterval);
  hostTimerInterval = setInterval(() => {
    document.querySelectorAll('.court-host-timer[data-start]').forEach(el => {
      const start = el.getAttribute('data-start');
      if (!start) return;
      const elapsed = Math.max(0, Math.floor((Date.now() - new Date(start).getTime()) / 1000));
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mins}:${secs}`;
    });
  }, 1000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
