<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStackyyy — Host Console</title>
<script>
  // Runs immediately, before CSS/body paint, to avoid a flash of the
  // wrong theme on load. Same theme key as index.html so the host's
  // preference is shared across both pages on the same device.
  (function() {
    var stored = localStorage.getItem('istackyyy_theme');
    var theme = stored === 'light' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — dual theme (dark default, light available)
     Theme switches via [data-theme="light"] on <html>, persisted
     to localStorage. Same system as index.html for consistency
     between the public board and the host console.
     ============================================================ */
  :root,
  html[data-theme="dark"] {
    --bg: #0F1413;
    --surface: #181F1D;
    --surface-raised: #202927;
    --surface-hover: #263330;
    --ink: #F2F4F0;
    --ink-muted: #8FA39B;
    --border-soft: rgba(242, 244, 240, 0.08);
    --court-green: #1B4D3E;
    --court-green-dark: #0E2820;
    --accent: #D7F23D;
    --accent-ink: #0F1413;
    --accent-glow: rgba(215, 242, 61, 0.35);
    --winner-green: #4ECB7E;
    --loser-coral: #FF7A5C;
    --resting-slate: #6B7872;
    --waiting-blue: #6FA8E0;
    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
    --shadow-raised: 0 8px 32px rgba(0, 0, 0, 0.45);
  }
  html[data-theme="light"] {
    --bg: #F7F5EF;
    --surface: #FFFFFF;
    --surface-raised: #FFFFFF;
    --surface-hover: #F0EEE6;
    --ink: #15201C;
    --ink-muted: #6B7872;
    --border-soft: rgba(21, 32, 28, 0.08);
    --court-green: #1B4D3E;
    --court-green-dark: #123329;
    --accent: #7A9A0E;
    --accent-ink: #FFFFFF;
    --accent-glow: rgba(122, 154, 14, 0.22);
    --winner-green: #2F9A5C;
    --loser-coral: #D9523A;
    --resting-slate: #8E9B97;
    --waiting-blue: #4E7FB5;
    --shadow-card: 0 2px 14px rgba(21, 32, 28, 0.12);
    --shadow-raised: 0 8px 28px rgba(21, 32, 28, 0.16);
  }
  :root {
    --font-display: 'Archivo Black', 'Arial Black', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius: 14px;
    --radius-sm: 8px;

    /* Backward-compatible aliases — same reasoning as index.html: the
       rest of this file's CSS references the original token names, so
       these resolve through the new theme-aware tokens instead of
       requiring every reference to be rewritten by hand. */
    --kitchen-gold: var(--accent);
    --line-paint: #F7F5EF;

    --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-serve: cubic-bezier(0.22, 0.68, 0.36, 1);
    --ease-settle: cubic-bezier(0.16, 1, 0.3, 1);
    --dur-fast: 220ms;
    --dur-base: 380ms;
    --dur-shuffle: 450ms;
    --dur-pulse: 900ms;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { color-scheme: dark; }
  html[data-theme="light"] { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); overflow-x: hidden; transition: background var(--dur-base) var(--ease-settle), color var(--dur-base) var(--ease-settle); }
  h1, h2, h3, .display { font-family: var(--font-display); letter-spacing: -0.01em; text-transform: uppercase; }
  a { color: inherit; }
  button { font-family: var(--font-body); cursor: pointer; touch-action: manipulation; }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  :focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
  .mono { font-family: var(--font-mono); }

  /* ---------- Court-line motif, realtime pulse, drop-in entrance,
     stagger, serve-in — identical system to index.html ---------- */
  .court-line-divider {
    height: 2px; margin: 20px 0;
    background-image: repeating-linear-gradient(90deg, var(--border-soft) 0 10px, transparent 10px 18px);
  }
  @keyframes realtime-pulse {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    35% { box-shadow: 0 0 0 6px var(--accent-glow); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }
  .pulse-update { animation: realtime-pulse var(--dur-pulse) var(--ease-settle); }
  @keyframes drop-settle {
    0% { opacity: 0; transform: translateY(-14px) scale(0.97); }
    60% { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .drop-in { animation: drop-settle var(--dur-base) var(--ease-bounce) both; }
  .stagger-item { animation: drop-settle var(--dur-base) var(--ease-bounce) both; }
  .stagger-item:nth-child(1) { animation-delay: 0ms; }
  .stagger-item:nth-child(2) { animation-delay: 40ms; }
  .stagger-item:nth-child(3) { animation-delay: 80ms; }
  .stagger-item:nth-child(4) { animation-delay: 120ms; }
  .stagger-item:nth-child(5) { animation-delay: 160ms; }
  .stagger-item:nth-child(6) { animation-delay: 200ms; }
  .stagger-item:nth-child(7) { animation-delay: 240ms; }
  .stagger-item:nth-child(8) { animation-delay: 280ms; }
  @keyframes serve-in {
    0% { opacity: 0; transform: translate(-10px, 8px) rotate(-1.2deg); }
    100% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
  }
  .serve-in { animation: serve-in var(--dur-fast) var(--ease-serve) both; }

  .theme-toggle {
    background: var(--surface-hover); border: 1px solid var(--border-soft); border-radius: 999px;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    transition: transform var(--dur-fast) var(--ease-bounce), background var(--dur-fast) var(--ease-settle);
    flex-shrink: 0;
  }
  .theme-toggle:hover { transform: scale(1.08) rotate(-8deg); }
  .theme-toggle:active { transform: scale(0.94); }
  .theme-toggle svg { width: 18px; height: 18px; color: var(--accent); }

  /* MOBILE-SAFE INPUT DEFAULTS — 16px minimum prevents iOS Safari
     auto-zoom on focus; 44px minimum height meets Apple/Google touch
     target guidelines. Every input/select/textarea/button inherits this
     unless explicitly overridden below. */
  input, select, textarea {
    font-size: 16px;
    min-height: 44px;
  }
  button, .player-check, .type-option, .win-select-btn, .assign-btn, .remove-btn {
    min-height: 44px;
    touch-action: manipulation;
  }
  @media (max-width: 600px) {
    /* on small screens, compact UI chrome (badges, pills) can stay smaller
       than 44px since they aren't primary tap targets, but anything that
       triggers an action must not shrink below this */
    .status-pill, .lane-pos, .round-pill, .format-pill { min-height: 0; }
  }

  /* ============ PAGE STYLES ============ */
  body { padding-bottom: 60px; }

  .topbar { background: var(--ink); color: var(--line-paint); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-paddle { width: 18px; height: 24px; color: var(--kitchen-gold); flex-shrink: 0; }
  .brand .display { font-size: 20px; }
  .brand .dot { color: var(--kitchen-gold); }
  .topbar-right-wrap { display: flex; align-items: center; gap: 12px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .topbar-right button { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--line-paint); padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  .auth-box { max-width: 380px; margin: 80px auto; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 32px; }
  .auth-box h1 { font-size: 22px; margin: 0 0 4px; }
  .auth-box p.sub { color: var(--resting-slate); font-size: 13px; margin: 0 0 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .field input, .field select { width: 100%; padding: 12px; border: 1.5px solid var(--border-soft); border-radius: var(--radius-sm); font-size: 16px; }
  .btn-primary { width: 100%; background: var(--court-green); color: white; border: none; padding: 12px; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; margin-top: 6px; }
  .btn-secondary { width: 100%; background: transparent; color: var(--court-green); border: 1.5px solid var(--court-green); padding: 10px; border-radius: var(--radius-sm); font-weight: 700; font-size: 13px; margin-top: 8px; }
  .auth-error { color: var(--loser-coral); font-size: 12px; margin-top: 8px; }

  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin: 0 0 14px; }
  .session-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-soft); }
  .session-row:last-child { border-bottom: none; }
  .session-row .meta { font-size: 12px; color: var(--resting-slate); }
  .finish-session-btn { background: var(--loser-coral); color: white; border: none; padding: 9px 16px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; }
  .ref-code-pill { background: var(--court-green); color: white; font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 5px; letter-spacing: 0.03em; }

  .share-card {
    background: linear-gradient(135deg, var(--court-green) 0%, var(--court-green-dark) 100%);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 18px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px; box-shadow: var(--shadow-card);
  }
  .share-card-code { display: flex; flex-direction: column; gap: 2px; }
  .ref-code-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.65); letter-spacing: 0.04em; }
  .ref-code-big { font-size: 22px; font-weight: 800; color: var(--kitchen-gold); letter-spacing: 0.05em; }
  .share-card-link { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 180px; }
  .share-card-link-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.65); letter-spacing: 0.04em; }
  .share-card-url { font-size: 12px; color: rgba(255,255,255,0.9); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
  .share-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .share-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 9px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; white-space: nowrap; }
  .share-btn-primary { background: var(--kitchen-gold); color: var(--ink); border-color: var(--kitchen-gold); }

  .session-row button { background: var(--court-green); color: white; border: none; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  .session-type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .type-option { border: 2px solid var(--border-soft); border-radius: var(--radius-sm); padding: 14px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
  .type-option strong { font-size: 14px; }
  .type-option span { font-size: 11px; color: var(--resting-slate); }
  .type-option.selected { border-color: var(--court-green); background: rgba(27,77,62,0.05); }
  .type-option.selected strong { color: var(--court-green); }

  .stacking-mode-toggle { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .mode-option { border: 2px solid var(--border-soft); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; }
  .mode-option strong { font-size: 13px; }
  .mode-option span { font-size: 10px; color: var(--resting-slate); line-height: 1.3; }
  .mode-option.selected { border-color: var(--kitchen-gold); background: rgba(232,184,75,0.1); }
  .mode-option.selected strong { color: var(--ink); }
  .mode-explainer { font-size: 11px; color: var(--resting-slate); margin: 4px 0 0; line-height: 1.4; }

  .password-field-wrap { position: relative; }
  .password-field-wrap input { width: 100%; padding-right: 42px; }
  .password-toggle-btn {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: none; border: none; font-size: 16px; padding: 6px 8px; min-height: 0; cursor: pointer; opacity: 0.6;
  }
  .password-toggle-btn:hover { opacity: 1; }

  .console-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .console-header h1 { font-size: 22px; margin: 0; }

  .tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 2px solid var(--border-soft); }
  .tab-btn { background: none; border: none; padding: 10px 16px; font-weight: 700; font-size: 13px; color: var(--ink-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color var(--dur-fast) var(--ease-settle), border-color var(--dur-fast) var(--ease-bounce); }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--accent); }
  .inbox-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px; margin-left: 4px;
    background: var(--loser-coral); color: white; font-size: 11px; font-weight: 800;
    border-radius: 999px; vertical-align: middle;
    animation: badge-pulse 1.6s ease-in-out infinite;
  }
  @keyframes badge-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) {
    .inbox-badge { animation: none; }
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .add-player-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .add-player-row input { flex: 1; min-width: 140px; padding: 10px 12px; border: 1.5px solid var(--border-soft); border-radius: var(--radius-sm); }
  .add-player-row select { padding: 10px; border: 1.5px solid var(--border-soft); border-radius: var(--radius-sm); }
  .add-player-row button { background: var(--court-green); color: white; border: none; padding: 10px 18px; border-radius: var(--radius-sm); font-weight: 700; }

  .roster-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .roster-table th { text-align: left; padding: 8px; color: var(--resting-slate); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--border-soft); }
  .roster-table td { padding: 8px; border-bottom: 1px solid var(--border-soft); }
  .status-pill { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; color: white; }
  .status-waiting { background: var(--waiting-blue); }
  .status-playing { background: var(--court-green); }
  .status-winners_queue { background: var(--winner-green); }
  .status-losers_queue { background: var(--loser-coral); }
  .status-resting { background: var(--resting-slate); }
  .status-left { background: var(--resting-slate); opacity: 0.7; }
  .roster-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .roster-action-btn { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 5px; border: none; min-height: 0; white-space: nowrap; }
  .roster-action-rest { background: var(--resting-slate); color: white; }
  .roster-action-bring-back { background: var(--winner-green); color: white; }
  .roster-action-leave { background: none; color: var(--loser-coral); padding-left: 4px; padding-right: 4px; }
  .remove-btn { background: none; border: none; color: var(--loser-coral); font-size: 11px; font-weight: 700; }

  .player-checklist { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .player-check { border: 1.5px solid var(--border-soft); padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; user-select: none; }
  .player-check.selected { background: var(--court-green); color: white; border-color: var(--court-green); }

  .courts-host-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }

  .planned-courts-list { margin-top: 18px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .planned-court-row { background: var(--surface-hover); border-radius: var(--radius-sm); padding: 12px; }
  .planned-court-row h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; color: var(--resting-slate); }
  .planned-matchup { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
  .planned-matchup:last-child { border-bottom: none; }
  #planCourtSelect { padding: 9px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-soft); font-size: 14px; }
  .court-host-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; cursor: pointer; transition: transform var(--dur-fast) var(--ease-bounce), box-shadow var(--dur-fast) var(--ease-settle); }
  .court-host-card:hover { transform: translateY(-3px) scale(1.012); box-shadow: var(--shadow-raised); }
  .court-host-label { background: var(--court-green-dark); color: white; padding: 10px 14px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .court-host-label .num { font-family: var(--font-display); font-size: 13px; letter-spacing: 0.04em; }
  .court-host-timer { font-family: var(--font-mono); font-weight: 700; color: var(--kitchen-gold); }
  .court-host-timer.idle { color: rgba(255,255,255,0.5); }

  /* Visual court diagram — same geometry as index.html's public board.
     flex-direction: column stacks the two sides top/bottom with a
     HORIZONTAL net between them (this is the correct orientation — a
     pickleball court viewed from above has players at each baseline,
     not side by side). */
  .court-host-diagram {
    background: linear-gradient(160deg, var(--court-green) 0%, var(--court-green-dark) 100%);
    aspect-ratio: 4 / 5; position: relative; display: flex; flex-direction: column; padding: 12px;
  }
  .court-host-diagram::before { content: ''; position: absolute; inset: 12px; border: 2px solid var(--line-paint); opacity: 0.85; }
  .court-host-net { position: absolute; left: 12px; right: 12px; top: 50%; height: 3px; background: var(--line-paint); transform: translateY(-50%); opacity: 0.9; z-index: 1; }
  .court-host-net::after { content: ''; position: absolute; left: 0; right: 0; top: -3px; bottom: -3px; background: repeating-linear-gradient(90deg, var(--ink) 0 4px, transparent 4px 9px); opacity: 0.5; }
  .court-host-kitchen-top, .court-host-kitchen-bottom { position: absolute; left: 12px; right: 12px; height: 2px; background: var(--line-paint); opacity: 0.55; z-index: 1; }
  .court-host-kitchen-top { top: 32%; }
  .court-host-kitchen-bottom { bottom: 32%; }
  .court-host-centerline-top, .court-host-centerline-bottom {
    position: absolute; left: 50%; width: 2px; background: var(--line-paint); opacity: 0.55; transform: translateX(-50%); z-index: 1;
  }
  .court-host-centerline-top { top: 12px; height: calc(32% - 12px); }
  .court-host-centerline-bottom { bottom: 12px; height: calc(32% - 12px); }
  .court-host-side { flex: 1; display: flex; align-items: center; justify-content: space-evenly; position: relative; z-index: 2; }
  .court-host-empty-msg { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--line-paint); opacity: 0.7; font-size: 13px; font-weight: 700; z-index: 2; }
  .court-host-paddle { display: flex; flex-direction: column; align-items: center; width: 64px; }
  .court-host-paddle-shape { width: 100%; aspect-ratio: 48/64; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); position: relative; }
  .court-host-paddle-shape svg { width: 100%; height: 100%; color: var(--line-paint); }
  .court-host-paddle-name { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%); width: 72%; font-size: 11px; font-weight: 800; color: var(--ink); text-align: center; line-height: 1.1; }
  .court-host-footer { padding: 10px 14px; text-align: center; font-size: 11px; font-weight: 700; color: var(--resting-slate); }
  .court-host-footer.ongoing { color: var(--kitchen-gold); }
  .court-host-footer.queued { color: var(--winner-green); }

  .planned-matchup { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
  .planned-matchup:last-child { border-bottom: none; }
  #planCourtSelect { padding: 9px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-soft); font-size: 14px; }
  .matchup-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; font-weight: 600; }

  .matchup-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .matchup-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; flex-wrap: wrap; gap: 8px; }

// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://srkmbofgyajdairkjwti.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNya21ib2ZneWFqZGFpcmtqd3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Nzk3NDQsImV4cCI6MjA5NzQ1NTc0NH0.GxSJ2RH2txJLM2VjJ0t-Q0Yqd_6M2TrO6BS7Cq17QuY';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STACKING ENGINE
// ============================================================
const TIER_RANK = { beginner: 0, intermediate: 1, advanced: 2, open: -1 };

function tiersCompatible(teamATier, teamBTier, skillMatchMode) {
  if (skillMatchMode === 'open') return true;
  if (teamATier === 'open' || teamBTier === 'open') return true;
  const rankA = TIER_RANK[teamATier];
  const rankB = TIER_RANK[teamBTier];
  if (skillMatchMode === 'strict') return rankA === rankB;
  if (skillMatchMode === 'adjacent') return Math.abs(rankA - rankB) <= 1;
  return true;
}

function getTeamTier(team, playersById) {
  const tiers = team.player_ids.map(pid => playersById[pid]?.skill_tier).filter(Boolean);
  if (tiers.length === 0) return 'open';
  if (tiers.includes('open')) {
    const nonOpen = tiers.filter(t => t !== 'open');
    if (nonOpen.length === 0) return 'open';
    tiers.length = 0;
    tiers.push(...nonOpen);
  }
  const ranks = tiers.map(t => TIER_RANK[t]);
  const minRank = Math.min(...ranks);
  return Object.keys(TIER_RANK).find(k => TIER_RANK[k] === minRank);
}

/**
 * Strict FIFO pop: always takes the front of the queue, no skipping for
 * skill matching or any other reason. Skill-tier filtering, if the host
 * wants it, should narrow WHICH queue gets used upstream, not reorder
 * within a queue.
 */
function popFront(queueTeams) {
  if (!queueTeams || queueTeams.length === 0) return null;
  return queueTeams[0];
}

/**
 * Decide the next match for a freed court.
 *
 * ============================================================
 * CORE GUARANTEE — DO NOT BREAK THIS WHEN EDITING:
 * No team may play a 2nd match while ANY team is still sitting in the
 * waiting queue having not yet played its 1st match of the current cycle.
 * This holds at ANY group size (8, 12, 24, 48...) and regardless of how
 * unevenly courts finish relative to each other — each court checks the
 * LIVE waiting queue length independently every time it asks for a
 * decision, so a fast-finishing court can never "lap" a slow one.
 * ============================================================
 *
 * The cycle works as ONE continuous line: everyone who has never played
 * (or has cycled back around after playing) sits in the WAITING queue,
 * strict FIFO, no skipping. Fresh/waiting teams always get priority over
 * teams that just finished a match — so 8 people who haven't played yet
 * always go before 2 people replaying each other immediately.
 *
 * Win/loss is tracked so that WHEN a team's turn comes back around (i.e.
 * the waiting line has been exhausted), the system tries to match them
 * against another team with the same recent result (winner vs winner,
 * loser vs loser) — but it never jumps them ahead of people who are
 * still waiting for their first/next turn.
 *
 * Priority order:
 *  1. Waiting queue has 2+ teams -> play from waiting (the default, normal case)
 *  2. Waiting queue has EXACTLY 1 team (never played this cycle, just
 *     doesn't have a same-status partner yet) -> that team must still go
 *     before any winners/losers rematch, since it hasn't had a turn at
 *     all. Pair it with whichever of winners/losers has been waiting
 *     longest, so a never-played team is never blocked behind a rematch.
 *  3. Waiting queue is empty -> only then consider winners/losers lanes
 *     facing each other (winner vs winner, loser vs loser), oldest first
 *  4. If still nothing fills the court and allowCrossLaneFill is on,
 *     mix winners front vs losers front so the court doesn't sit idle
 */
function decideNextMatch({ stackingMode, winnersQueue, losersQueue, waitingQueue, allowCrossLaneFill = true, preferredLane = null }) {
  if (stackingMode === 'fifo') {
    if (waitingQueue.length < 2) return null;
    return { teamA: waitingQueue[0], teamB: waitingQueue[1], lane: 'waiting' };
  }

  // 1. Waiting queue takes priority — fresh/cycled-back teams play before
  // anyone gets matched again off a recent win or loss.
  if (waitingQueue.length >= 2) {
    return { teamA: waitingQueue[0], teamB: waitingQueue[1], lane: 'waiting' };
  }

  // 2. Exactly one team waiting with no same-status partner — it still
  // must be served before any winners/losers rematch, since a team that
  // already played should never get a 2nd match while this team hasn't
  // even had its 1st. Pair with whichever of winners/losers has been
  // waiting longest overall (oldest queue_position across both lanes).
  if (waitingQueue.length === 1 && allowCrossLaneFill) {
    const winnerFront = winnersQueue[0] || null;
    const loserFront = losersQueue[0] || null;
    let opponent = null;
    if (winnerFront && loserFront) {
      opponent = (winnerFront.queue_position ?? 0) <= (loserFront.queue_position ?? 0) ? winnerFront : loserFront;
    } else {
      opponent = winnerFront || loserFront;
    }
    if (opponent) {
      return { teamA: waitingQueue[0], teamB: opponent, lane: 'mixed' };
    }
    // no one in winners/losers yet either (very start of session) — this
    // lone team just has to wait for an actual partner.
    return null;
  }

  // 3. Waiting queue is empty — try same-lane FIFO match (winner vs winner,
  // or loser vs loser), oldest first.
  const lanesToTry = preferredLane === 'losers' ? ['losers', 'winners'] : ['winners', 'losers'];
  for (const lane of lanesToTry) {
    const queue = lane === 'winners' ? winnersQueue : losersQueue;
    if (queue.length >= 2) {
      return { teamA: queue[0], teamB: queue[1], lane };
    }
  }

  if (!allowCrossLaneFill) return null;

  // 4. Cross-lane fallback: front of winners vs front of losers, so an
  // uneven head count (not divisible by 4 for doubles) doesn't stall a court.
  const winnerFront = popFront(winnersQueue);
  const loserFront = popFront(losersQueue);
  if (winnerFront && loserFront) {
    return { teamA: winnerFront, teamB: loserFront, lane: 'mixed' };
  }

  return null;
}

function calculateReturnPosition(queueTeams, restPriorityEnabled) {
  if (queueTeams.length === 0) return 1;
  if (restPriorityEnabled) {
    const minPos = Math.min(...queueTeams.map(t => t.queue_position ?? 0));
    return minPos - 1;
  }
  const maxPos = Math.max(...queueTeams.map(t => t.queue_position ?? 0));
  return maxPos + 1;
}

function calculateBackOfQueuePosition(queueTeams) {
  if (queueTeams.length === 0) return 1;
  const maxPos = Math.max(...queueTeams.map(t => t.queue_position ?? 0));
  return maxPos + 1;
}

window.StackingEngine = { tiersCompatible, getTeamTier, popFront, decideNextMatch, calculateReturnPosition, calculateBackOfQueuePosition, TIER_RANK };

// ============================================================
// TOURNAMENT ENGINE
// Round Robin (circle method) + Swiss pairing, pure functions.
// ============================================================
function generateRoundRobinSchedule(teamIds) {
  const teams = [...teamIds];
  const hasBye = teams.length % 2 !== 0;
  if (hasBye) teams.push(null);

  const n = teams.length;
  const rounds = [];
  const fixed = teams[0];
  let rotating = teams.slice(1);

  for (let r = 0; r < n - 1; r++) {
    const roundTeams = [fixed, ...rotating];
    const pairs = [];
    let bye = null;

    for (let i = 0; i < n / 2; i++) {
      const a = roundTeams[i];
      const b = roundTeams[n - 1 - i];
      if (a === null || b === null) {
        bye = a === null ? b : a;
      } else {
        pairs.push([a, b]);
      }
    }

    rounds.push({ round: r + 1, pairs, bye });
    rotating = [rotating[rotating.length - 1], ...rotating.slice(0, rotating.length - 1)];
  }

  return rounds;
}

function totalRoundRobinRounds(teamCount) {
  return teamCount % 2 === 0 ? teamCount - 1 : teamCount;
}

function generateSwissRound(teams) {
  const sorted = [...teams].sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    const diffA = a.points_for - a.points_against;
    const diffB = b.points_for - b.points_against;
    return diffB - diffA;
  });

  const pool = [...sorted];
  const pairs = [];
  let bye = null;

  if (pool.length % 2 !== 0) {
    const byeTeam = pool.pop();
    bye = byeTeam.id;
  }

  while (pool.length > 0) {
    const teamA = pool.shift();
    const alreadyFaced = new Set(teamA.opponent_history || []);
    let opponentIndex = pool.findIndex(t => !alreadyFaced.has(t.id));
    if (opponentIndex === -1) opponentIndex = 0;
    const teamB = pool.splice(opponentIndex, 1)[0];
    pairs.push([teamA.id, teamB.id]);
  }

  return { pairs, bye };
}

function computeStandings(teams) {
  return [...teams].sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    const diffA = a.points_for - a.points_against;
    const diffB = b.points_for - b.points_against;
    if (diffB !== diffA) return diffB - diffA;
    return b.points_for - a.points_for;
  });
}

window.TournamentEngine = { generateRoundRobinSchedule, totalRoundRobinRounds, generateSwissRound, computeStandings };

/**
 * Self-test: simulates a full open-play cycle at a given player count and
 * court count, verifying the CORE GUARANTEE never breaks — no team plays
 * twice while another team is still waiting for its first turn.
 *
 * Run from the browser console on host.html: window.testNoRepeatGuarantee(24, 2)
 * Logs PASS/FAIL plus the full round-by-round trace either way.
 */
window.testNoRepeatGuarantee = function(playerCount = 24, courtCount = 2, matchesToSimulate = 20) {
  const teamCount = Math.floor(playerCount / 2);
  const teams = Array.from({ length: teamCount }, (_, i) => ({ id: `T${i + 1}` }));
  let waitingQueue = [...teams];
  let winnersQueue = [];
  let losersQueue = [];
  const playedThisCycle = new Set();
  let cycleComplete = false;
  let failure = null;

  function removeFromAll(team) {
    [winnersQueue, losersQueue, waitingQueue].forEach(q => {
      const idx = q.findIndex(t => t.id === team.id);
      if (idx >= 0) q.splice(idx, 1);
    });
  }

  console.log(`%cTesting: ${playerCount} players, ${courtCount} courts`, 'font-weight:bold');

  // Realistic model: courts are independent and asynchronous. We simulate
  // this by giving each court a random "match duration," then processing
  // finish events strictly in time order — one court finishing and getting
  // refilled BEFORE another court (which started earlier) has necessarily
  // finished yet. This is the scenario that actually matters: a fast
  // court must never be allowed to "lap" a slower one.
  const courtBusyUntil = Array(courtCount).fill(0);
  const courtCurrentMatch = Array(courtCount).fill(null);
  let clock = 0;
  let matchesPlayed = 0;

  // Fill any courts that are currently empty, using time `clock`
  function fillEmptyCourts() {
    for (let c = 0; c < courtCount; c++) {
      if (courtCurrentMatch[c] !== null) continue; // still occupied
      const decision = window.StackingEngine.decideNextMatch({
        stackingMode: 'win_loss_queue', winnersQueue, losersQueue, waitingQueue, allowCrossLaneFill: true,
      });
      if (!decision) continue; // genuinely nothing available right now — stays idle

      const aFresh = !playedThisCycle.has(decision.teamA.id);
      const bFresh = !playedThisCycle.has(decision.teamB.id);
      // Count teams still waiting AFTER this decision's teams are accounted
      // for — if the only "still waiting" team is the one we're about to
      // serve, that's not a violation, that's exactly correct.
      const decidedIds = new Set([decision.teamA.id, decision.teamB.id]);
      const stillWaitingCount = waitingQueue.filter(t => !decidedIds.has(t.id)).length;
      if ((!aFresh || !bFresh) && stillWaitingCount > 0) {
        failure = `Court ${c + 1} @ t=${clock}: ${decision.teamA.id} vs ${decision.teamB.id} — a repeat team played while ${stillWaitingCount} OTHER team(s) still waiting!`;
        return;
      }

      playedThisCycle.add(decision.teamA.id);
      playedThisCycle.add(decision.teamB.id);
      removeFromAll(decision.teamA);
      removeFromAll(decision.teamB);
      const duration = 5 + Math.floor(Math.random() * 15); // random match length
      courtBusyUntil[c] = clock + duration;
      courtCurrentMatch[c] = decision;
      console.log(`t=${clock} Court ${c + 1} starts: ${decision.teamA.id} vs ${decision.teamB.id} (lane: ${decision.lane}, ends t=${courtBusyUntil[c]})`);
    }
  }

  fillEmptyCourts();

  while (matchesPlayed < matchesToSimulate && !failure) {
    // advance clock to the NEXT court that finishes (asynchronous, not round-by-round)
    const activeCourts = courtCurrentMatch.map((m, i) => m ? i : -1).filter(i => i >= 0);
    if (activeCourts.length === 0) break; // nothing playing and nothing fillable — stuck
    const nextFinishCourt = activeCourts.reduce((best, i) => courtBusyUntil[i] < courtBusyUntil[best] ? i : best, activeCourts[0]);
    clock = courtBusyUntil[nextFinishCourt];

    const finished = courtCurrentMatch[nextFinishCourt];
    console.log(`t=${clock} Court ${nextFinishCourt + 1} finishes: ${finished.teamA.id} vs ${finished.teamB.id}`);
    courtCurrentMatch[nextFinishCourt] = null;
    matchesPlayed++;

    // teamA always "wins" for deterministic test output
    winnersQueue.push(finished.teamA);
    losersQueue.push(finished.teamB);

    if (playedThisCycle.size >= teamCount && !cycleComplete) {
      console.log(`%cAll ${teamCount} teams have played at least once as of t=${clock}.`, 'color:green');
      cycleComplete = true;
    }

    fillEmptyCourts();
  }

  if (failure) {
    console.log('%cFAIL — ' + failure, 'color:red; font-weight:bold');
  } else {
    console.log(`%cPASS — simulated ${matchesPlayed} matches with realistic async court timing, no team ever played twice while another was still waiting.`, 'color:green; font-weight:bold');
  }
  return !failure;
};

// ============================================================
// PASSWORD UTILITY (SHA-256 via Web Crypto API — no library needed)
// ============================================================
async function hashPassword(plainText) {
  const data = new TextEncoder().encode(plainText);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// REFERENCE CODE — short human-readable session ID, e.g. STACK-A3F9
// ============================================================
function generateReferenceCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I to avoid ambiguity when read aloud
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return `STACK-${code}`;
}

// ============================================================
// SESSION API
// (No auth layer for now — testing mode. Revisit before real launch.)
// ============================================================
const SessionAPI = (() => {
  async function createSession({ name, format, courtCount, stackingMode, pairingDefault, skillMatchMode, restPriorityEnabled, password, parentSessionId, sessionType, tournamentFormat, division, category, openPlayMode, roundsTotal, scoringMode, pointsToWin, allowCrossLaneFill }) {
    if (!password || password.length < 4) {
      throw new Error('Session password must be at least 4 characters.');
    }
    const passwordHash = await hashPassword(password);

    let session, error;
    for (let attempt = 0; attempt < 5; attempt++) {
      const referenceCode = generateReferenceCode();
      const result = await supabaseClient
        .from('sessions')
        .insert({
          name, format, court_count: courtCount,
          stacking_mode: stackingMode || 'win_loss_queue',
          pairing_default: pairingDefault || 'fixed',
          skill_match_mode: skillMatchMode || 'open',
          rest_priority_enabled: restPriorityEnabled !== false,
          allow_cross_lane_fill: allowCrossLaneFill !== false,
          password_hash: passwordHash,
          parent_session_id: parentSessionId || null,
          session_type: sessionType || 'open_play',
          tournament_format: tournamentFormat || null,
          division: sessionType === 'tournament' ? (division || 'open') : null,
          category: sessionType === 'tournament' ? (category || null) : null,
          open_play_mode: sessionType === 'open_play' ? (openPlayMode || 'automated') : null,
          rounds_total: roundsTotal || null,
          scoring_mode: scoringMode || 'win_loss',
          points_to_win: pointsToWin || 11,
          reference_code: referenceCode,
        })
        .select().single();
      session = result.data;
      error = result.error;
      if (!error) break;
      if (error.code !== '23505') break; // not a uniqueness collision, stop retrying
    }
    if (error) throw error;
    const courtRows = Array.from({ length: courtCount }, (_, i) => ({ session_id: session.id, court_number: i + 1, status: 'open' }));
    const { error: courtError } = await supabaseClient.from('courts').insert(courtRows);
    if (courtError) throw courtError;
    return session;
  }
  async function getSessionByReferenceCode(code) {
    const normalized = code.trim().toUpperCase();
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('reference_code', normalized).single();
    if (error) throw error;
    return data;
  }
  async function getMySessions() {
    const { data, error } = await supabaseClient.from('sessions').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    return data;
  }
  async function getSession(sessionId) {
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('id', sessionId).single();
    if (error) throw error;
    return data;
  }
  async function verifySessionPassword(sessionId, password) {
    const session = await getSession(sessionId);
    if (!session.password_hash) return true; // legacy sessions with no password set
    const hash = await hashPassword(password);
    return hash === session.password_hash;
  }
  async function finishSession(sessionId) {
    const { error } = await supabaseClient.from('sessions').update({ status: 'completed', ended_at: new Date().toISOString() }).eq('id', sessionId);
    if (error) throw error;
  }
  // ============================================================
  // TOURNAMENT FUNCTIONS
  // ============================================================

  /**
   * Create tournament teams from a list of player-id groups (already paired
   * by the host) and kick off the schedule (round robin generates fully,
   * swiss generates round 1 only).
   */
  async function startTournament(sessionId, teamPlayerGroups, format) {
    const createdTeams = [];
    for (const group of teamPlayerGroups) {
      const { data, error } = await supabaseClient
        .from('teams')
        .insert({ session_id: sessionId, player_ids: group, pairing_mode: 'fixed', queue_lane: 'waiting' })
        .select().single();
      if (error) throw error;
      createdTeams.push(data);
    }

    const teamIds = createdTeams.map(t => t.id);

    if (format === 'round_robin') {
      const schedule = window.TournamentEngine.generateRoundRobinSchedule(teamIds);
      const rows = [];
      schedule.forEach(round => {
        round.pairs.forEach(([a, b]) => {
          rows.push({ session_id: sessionId, round_number: round.round, team_a_id: a, team_b_id: b, status: 'pending' });
        });
      });
      const { error } = await supabaseClient.from('tournament_matchups').insert(rows);
      if (error) throw error;
      await supabaseClient.from('sessions').update({ rounds_total: window.TournamentEngine.totalRoundRobinRounds(teamIds.length), current_round: 1 }).eq('id', sessionId);
    } else if (format === 'swiss') {
      const teamsForPairing = createdTeams.map(t => ({ id: t.id, wins: 0, losses: 0, points_for: 0, points_against: 0, opponent_history: [] }));
      const { pairs } = window.TournamentEngine.generateSwissRound(teamsForPairing);
      const rows = pairs.map(([a, b]) => ({ session_id: sessionId, round_number: 1, team_a_id: a, team_b_id: b, status: 'pending' }));
      const { error } = await supabaseClient.from('tournament_matchups').insert(rows);
      if (error) throw error;
      await supabaseClient.from('sessions').update({ current_round: 1 }).eq('id', sessionId);
    }

    return createdTeams;
  }

  async function getMatchups(sessionId, roundNumber = null) {
    let query = supabaseClient.from('tournament_matchups').select('*, team_a:team_a_id(*), team_b:team_b_id(*)').eq('session_id', sessionId);
    if (roundNumber !== null) query = query.eq('round_number', roundNumber);
    const { data, error } = await query.order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }

  async function getTournamentTeams(sessionId) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('is_active', true);
    if (error) throw error;
    return data;
  }

  async function assignMatchupToCourt(matchupId, courtId) {
    const { data: matchup, error: mErr } = await supabaseClient.from('tournament_matchups').select('*').eq('id', matchupId).single();
    if (mErr) throw mErr;
    await assignCourt(courtId, matchup.team_a_id, matchup.team_b_id);
    await supabaseClient.from('tournament_matchups').update({ court_id: courtId, status: 'in_progress' }).eq('id', matchupId);
  }

  /**
   * Record a scored result for a tournament matchup: updates the matchup,
   * logs the match with scores, updates both teams' win/loss/points stats
   * and opponent history (for swiss rematch avoidance), then frees the court.
   */
  async function recordTournamentResult(matchupId, courtId, teamAScore, teamBScore) {
    if (teamAScore === teamBScore) {
      // Defense-in-depth: the UI already blocks ties before calling this,
      // but this function shouldn't silently default to "Team B wins" if
      // it's ever called from somewhere else without that check.
      throw new Error('Scores cannot be tied — a winner must be determined.');
    }
    const { data: matchup, error: mErr } = await supabaseClient.from('tournament_matchups').select('*').eq('id', matchupId).single();
    if (mErr) throw mErr;
    const { data: court } = await supabaseClient.from('courts').select('*').eq('id', courtId).single();

    const winnerTeamId = teamAScore > teamBScore ? matchup.team_a_id : matchup.team_b_id;

    const { data: matchRow, error: matchErr } = await supabaseClient.from('matches').insert({
      session_id: matchup.session_id, court_id: courtId, team_a_id: matchup.team_a_id, team_b_id: matchup.team_b_id,
      winner_team_id: winnerTeamId, team_a_score: teamAScore, team_b_score: teamBScore, round_number: matchup.round_number,
      started_at: court?.game_started_at || null, ended_at: new Date().toISOString(),
      duration_seconds: court?.game_started_at ? Math.round((Date.now() - new Date(court.game_started_at).getTime()) / 1000) : null,
    }).select().single();
    if (matchErr) throw matchErr;

    await supabaseClient.from('tournament_matchups').update({ status: 'completed', match_id: matchRow.id }).eq('id', matchupId);

    // update team stats
    const { data: teamA, error: teamAErr } = await supabaseClient.from('teams').select('*').eq('id', matchup.team_a_id).single();
    const { data: teamB, error: teamBErr } = await supabaseClient.from('teams').select('*').eq('id', matchup.team_b_id).single();
    if (teamAErr || teamBErr || !teamA || !teamB) {
      throw new Error('Could not load team data to update standings — the match was recorded, but standings may be out of date. Please refresh.');
    }

    await supabaseClient.from('teams').update({
      wins: teamA.wins + (winnerTeamId === teamA.id ? 1 : 0),
      losses: teamA.losses + (winnerTeamId === teamA.id ? 0 : 1),
      points_for: teamA.points_for + teamAScore,
      points_against: teamA.points_against + teamBScore,
      opponent_history: [...(teamA.opponent_history || []), matchup.team_b_id],
    }).eq('id', teamA.id);

    await supabaseClient.from('teams').update({
      wins: teamB.wins + (winnerTeamId === teamB.id ? 1 : 0),
      losses: teamB.losses + (winnerTeamId === teamB.id ? 0 : 1),
      points_for: teamB.points_for + teamBScore,
      points_against: teamB.points_against + teamAScore,
      opponent_history: [...(teamB.opponent_history || []), matchup.team_a_id],
    }).eq('id', teamB.id);

    if (courtId) {
      await supabaseClient.from('courts').update({ status: 'open', team_a_id: null, team_b_id: null, game_started_at: null }).eq('id', courtId);
    }
  }

  async function isRoundComplete(sessionId, roundNumber) {
    const matchups = await getMatchups(sessionId, roundNumber);
    return matchups.length > 0 && matchups.every(m => m.status === 'completed');
  }

  /**
   * Advance to the next round. Round robin: just reveals the next
   * pre-generated round. Swiss: generates a fresh pairing based on
   * updated standings + opponent history.
   */
  async function advanceToNextRound(sessionId) {
    const session = await getSession(sessionId);
    const nextRound = session.current_round + 1;

    if (session.tournament_format === 'swiss') {
      const teams = await getTournamentTeams(sessionId);
      const { pairs, bye } = window.TournamentEngine.generateSwissRound(teams);
      const rows = pairs.map(([a, b]) => ({ session_id: sessionId, round_number: nextRound, team_a_id: a, team_b_id: b, status: 'pending' }));
      if (rows.length > 0) {
        const { error } = await supabaseClient.from('tournament_matchups').insert(rows);
        if (error) throw error;
      }
    }
    // round_robin: matchups for nextRound already exist from startTournament

    await supabaseClient.from('sessions').update({ current_round: nextRound }).eq('id', sessionId);
    return nextRound;
  }

  async function carryPlayersToNewSession(newSessionId, playerRows) {
    // playerRows: array of { name, skill_tier } from the finished session
    const inserted = [];
    for (const p of playerRows) {
      const { data, error } = await supabaseClient
        .from('players')
        .insert({ session_id: newSessionId, name: p.name, skill_tier: p.skill_tier || 'open', status: 'waiting' })
        .select().single();
      if (error) throw error;
      inserted.push(data);
    }
    return inserted;
  }
  /**
   * Find players who are marked 'waiting' on their player row but are NOT
   * yet inside any active team (i.e. truly unpaired, sitting idle). This
   * is the actual signal for "needs a partner" — player.status alone is
   * not enough, since it doesn't track team membership.
   */
  async function getUnpairedWaitingPlayers(sessionId) {
    const [players, activeTeams] = await Promise.all([
      getPlayers(sessionId),
      getTeams(sessionId),
    ]);
    const pairedPlayerIds = new Set(activeTeams.flatMap(t => t.player_ids));
    return players
      .filter(p => p.status === 'waiting' && !pairedPlayerIds.has(p.id))
      .sort((a, b) => new Date(a.joined_at) - new Date(b.joined_at));
  }

  /**
   * Player-level version of the same wave rule, for Manual mode's
   * pick-individuals-then-form-teams flow. A player is eligible if their
   * play count is no more than the session-wide minimum.
   * Returns: { eligiblePlayerIds: Set<string>, minPlayCount: number, playCountById: object }
   */
  async function getPlayerWaveEligibility(sessionId) {
    const players = await getPlayers(sessionId);
    const activePlayers = players.filter(p => p.status !== 'left');
    if (activePlayers.length === 0) return { eligiblePlayerIds: new Set(), minPlayCount: 0, playCountById: {} };

    const minPlayCount = Math.min(...activePlayers.map(p => p.total_games_played || 0));
    const playCountById = Object.fromEntries(activePlayers.map(p => [p.id, p.total_games_played || 0]));
    const eligiblePlayerIds = new Set(activePlayers.filter(p => (p.total_games_played || 0) <= minPlayCount).map(p => p.id));

    return { eligiblePlayerIds, minPlayCount, playCountById };
  }

  async function addPlayer(sessionId, name, skillTier = 'open') {
    const { data, error } = await supabaseClient.from('players').insert({ session_id: sessionId, name, skill_tier: skillTier, status: 'waiting' }).select().single();
    if (error) throw error;

    const session = await getSession(sessionId);

    // Manual mode: the host picks individual players and forms teams
    // themselves via the court picker — no auto-pairing here at all,
    // since that would lock players into pairs before the host gets a say.
    if (session.open_play_mode === 'manual') {
      return data;
    }

    // Automated / Hybrid: auto-pair into the waiting queue immediately so
    // round-1 auto-fill actually has real team rows to pull from.
    const teamSize = session.format === 'doubles' ? 2 : 1;

    if (teamSize === 1) {
      // singles: every player is their own team, queued immediately
      await createTeam(sessionId, [data.id], session.pairing_default, 'waiting');
    } else {
      // doubles: pair with the longest-waiting OTHER unpaired player, FIFO
      const unpaired = await getUnpairedWaitingPlayers(sessionId);
      const partner = unpaired.find(p => p.id !== data.id);
      if (partner) {
        await createTeam(sessionId, [partner.id, data.id], session.pairing_default, 'waiting');
      }
      // if no partner yet, this player just sits unpaired until the next one joins
    }

    return data;
  }
  async function getPlayers(sessionId) {
    const { data, error } = await supabaseClient.from('players').select('*').eq('session_id', sessionId).neq('status', 'left').order('joined_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  /**
   * Roster-display version: includes 'left' players too, since the host
   * needs to actually SEE someone to bring them back. getPlayers() above
   * stays filtered for everything else (queue logic, matching, etc.) —
   * those code paths correctly should never see a departed player.
   */
  async function getAllPlayersIncludingLeft(sessionId) {
    const { data, error } = await supabaseClient.from('players').select('*').eq('session_id', sessionId).order('joined_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function setPlayerStatus(playerId, status) {
    const { error } = await supabaseClient.from('players').update({ status }).eq('id', playerId);
    if (error) throw error;
  }
  async function removePlayer(playerId) {
    const { error } = await supabaseClient.from('players').update({ status: 'left' }).eq('id', playerId);
    if (error) throw error;

    // If this player was already paired into a waiting team, that team is
    // no longer valid — deactivate it so the auto-fill engine doesn't try
    // to send a now-departed player onto a court. Their now-unpaired
    // partner (if any) goes back to waiting for a new partner.
    const { data: playerRow } = await supabaseClient.from('players').select('session_id').eq('id', playerId).single();
    if (playerRow) {
      const activeTeams = await getTeams(playerRow.session_id);
      const affectedTeam = activeTeams.find(t => t.player_ids.includes(playerId) && t.queue_lane === 'waiting');
      if (affectedTeam) {
        await supabaseClient.from('teams').update({ is_active: false }).eq('id', affectedTeam.id);
      }
    }
  }
  async function createTeam(sessionId, playerIds, pairingMode = 'fixed', queueLane = 'waiting') {
    const { data: existing } = await supabaseClient.from('teams').select('queue_position').eq('session_id', sessionId).eq('queue_lane', queueLane);
    const position = window.StackingEngine.calculateBackOfQueuePosition(existing || []);
    const { data, error } = await supabaseClient.from('teams').insert({ session_id: sessionId, player_ids: playerIds, pairing_mode: pairingMode, queue_lane: queueLane, queue_position: position }).select().single();
    if (error) throw error;
    return data;
  }
  async function getTeams(sessionId) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('is_active', true);
    if (error) throw error;
    return data;
  }
  /**
   * Deactivate any currently-active team that contains one or more of the
   * given player IDs. Used before manually assigning players to a court,
   * so an auto-paired "waiting" team row doesn't linger as a stale duplicate
   * once those same players get placed by hand instead.
   */
  async function deactivateTeamsContainingPlayers(sessionId, playerIds) {
    const activeTeams = await getTeams(sessionId);
    const staleTeamIds = activeTeams
      .filter(t => t.player_ids.some(pid => playerIds.includes(pid)))
      .map(t => t.id);
    if (staleTeamIds.length > 0) {
      await supabaseClient.from('teams').update({ is_active: false }).in('id', staleTeamIds);
    }
  }
  async function getQueueLane(sessionId, lane) {
    // Secondary sort by created_at breaks any queue_position ties caused
    // by the read-then-write race in createTeam() (two teams created in
    // quick succession can compute the same "next position" before either
    // writes) — created_at is set by the database at insert time, so it
    // reflects true creation order even when queue_position collides.
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('queue_lane', lane).eq('is_active', true).order('queue_position', { ascending: true }).order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getCourts(sessionId) {
    const { data, error } = await supabaseClient.from('courts').select('*, team_a:team_a_id(*), team_b:team_b_id(*)').eq('session_id', sessionId).order('court_number', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function assignCourt(courtId, teamAId, teamBId) {
    // Conditional update: only succeeds if the court is NOT already
    // in_progress at the moment of the write. This closes the race window
    // where two near-simultaneous calls (e.g. a host double-tapping a
    // court, or two staff devices acting within the same instant) could
    // otherwise both pass an earlier status check and the second write
    // would silently overwrite an already-started match.
    const { data: updated, error } = await supabaseClient
      .from('courts')
      .update({ status: 'in_progress', team_a_id: teamAId, team_b_id: teamBId, game_started_at: new Date().toISOString() })
      .eq('id', courtId)
      .neq('status', 'in_progress')
      .select();
    if (error) throw error;
    if (!updated || updated.length === 0) {
      // Court was already in_progress by the time this write landed —
      // someone else got there first. Surface this clearly rather than
      // silently no-op, so the caller (and ultimately the host) knows
      // their tap didn't actually do anything.
      throw new Error('This court was just assigned by someone else. Refresh and try again.');
    }
    const { data: teamRows } = await supabaseClient.from('teams').select('player_ids').in('id', [teamAId, teamBId]);
    await supabaseClient.from('teams').update({ queue_lane: 'playing', queue_position: null }).in('id', [teamAId, teamBId]);
    if (teamRows && teamRows.length > 0) {
      const allPlayerIds = teamRows.flatMap(t => t.player_ids);
      await supabaseClient.from('players').update({ status: 'playing' }).in('id', allPlayerIds);
    }
  }
  async function logMatchResult(courtId, winnerTeamId, scoreData = null) {
    const { data: court, error: courtErr } = await supabaseClient.from('courts').select('*').eq('id', courtId).single();
    if (courtErr) throw courtErr;
    const insertRow = {
      session_id: court.session_id, court_id: courtId, team_a_id: court.team_a_id, team_b_id: court.team_b_id,
      winner_team_id: winnerTeamId, started_at: court.game_started_at, ended_at: new Date().toISOString(),
      duration_seconds: court.game_started_at ? Math.round((Date.now() - new Date(court.game_started_at).getTime()) / 1000) : null,
      score_visible: scoreData ? true : false,
    };
    if (scoreData) {
      insertRow.team_a_score = scoreData.teamAScore;
      insertRow.team_b_score = scoreData.teamBScore;
    }
    await supabaseClient.from('matches').insert(insertRow);
    return court;
  }

  /**
   * Apply the host's final decision on how the 4 players from a finished
   * match regroup into the winners/losers queues. Unlike a rigid "winning
   * pair stays together" rule, this lets the host freely re-pair players
   * across the original teams (e.g. one winner + one loser can team up
   * in the winners queue together) before they're queued.
   *
   * winnersGroup / losersGroup: arrays of player_id, each either length 0
   * (skip that lane) or length matching the session's team size.
   */
  async function applyQueuePlacement(courtId, sessionId, pairingMode, winnersGroup, losersGroup) {
    const session = await getSession(sessionId);
    const isManualMode = session.open_play_mode === 'manual';

    // Increment play count for every player who just finished this match —
    // this is the source of truth for "wave" eligibility (no double-stacking
    // until everyone's played the same number of times).
    const allFinishedPlayerIds = [...(winnersGroup || []), ...(losersGroup || [])];
    if (allFinishedPlayerIds.length > 0) {
      const { data: finishedPlayers } = await supabaseClient.from('players').select('id, total_games_played').in('id', allFinishedPlayerIds);
      if (finishedPlayers) {
        for (const p of finishedPlayers) {
          await supabaseClient.from('players').update({ total_games_played: (p.total_games_played || 0) + 1 }).eq('id', p.id);
        }
      }
    }

    // mark this court's active manual_queue entry (if any) as completed
    await markManualQueueEntryCompleted(courtId);

    if (isManualMode) {
      // Pure Manual: finished players go back to being free INDIVIDUALS,
      // not re-paired into a team — the host explicitly re-forms teams
      // via the court picker next time, which is the whole point of
      // Manual mode (no pairing decision should happen without the host).
      const allFinishedIds = [...(winnersGroup || []), ...(losersGroup || [])];
      if (allFinishedIds.length > 0) {
        await supabaseClient.from('players').update({ status: 'waiting' }).in('id', allFinishedIds);
      }
    } else {
      // Automated / Hybrid: normal win/loss lane placement
      if (winnersGroup && winnersGroup.length > 0) {
        await createTeam(sessionId, winnersGroup, pairingMode, 'winners_queue');
        await supabaseClient.from('players').update({ status: 'winners_queue' }).in('id', winnersGroup);
      }
      if (losersGroup && losersGroup.length > 0) {
        await createTeam(sessionId, losersGroup, pairingMode, 'losers_queue');
        await supabaseClient.from('players').update({ status: 'losers_queue' }).in('id', losersGroup);
      }
    }

    // deactivate the two original teams that just finished playing — they've
    // been replaced by the freshly-arranged groups above
    const { data: court } = await supabaseClient.from('courts').select('team_a_id, team_b_id').eq('id', courtId).single();
    if (court) {
      await supabaseClient.from('teams').update({ is_active: false }).in('id', [court.team_a_id, court.team_b_id]);
    }

    await supabaseClient.from('courts').update({ status: 'open', team_a_id: null, team_b_id: null, game_started_at: null }).eq('id', courtId);
    await tryRefillCourt(courtId);
  }

  async function recordResult(courtId, winnerTeamId) {
    // Legacy simple path (default split, no manual reassignment) — kept for
    // the "Auto-Fill" quick path elsewhere if ever needed.
    const court = await logMatchResult(courtId, winnerTeamId);
    const loserTeamId = court.team_a_id === winnerTeamId ? court.team_b_id : court.team_a_id;
    const [winnersQ, losersQ] = await Promise.all([getQueueLane(court.session_id, 'winners_queue'), getQueueLane(court.session_id, 'losers_queue')]);
    await supabaseClient.from('teams').update({ queue_lane: 'winners_queue', queue_position: window.StackingEngine.calculateBackOfQueuePosition(winnersQ) }).eq('id', winnerTeamId);
    await supabaseClient.from('teams').update({ queue_lane: 'losers_queue', queue_position: window.StackingEngine.calculateBackOfQueuePosition(losersQ) }).eq('id', loserTeamId);
    const { data: teamRows } = await supabaseClient.from('teams').select('id, player_ids').in('id', [winnerTeamId, loserTeamId]);
    if (teamRows) {
      const winnerRow = teamRows.find(t => t.id === winnerTeamId);
      const loserRow = teamRows.find(t => t.id === loserTeamId);
      if (winnerRow) await supabaseClient.from('players').update({ status: 'winners_queue' }).in('id', winnerRow.player_ids);
      if (loserRow) await supabaseClient.from('players').update({ status: 'losers_queue' }).in('id', loserRow.player_ids);
    }
    await supabaseClient.from('courts').update({ status: 'open', team_a_id: null, team_b_id: null, game_started_at: null }).eq('id', courtId);
    await tryRefillCourt(courtId);
  }
  async function tryRefillCourt(courtId) {
    const { data: court } = await supabaseClient.from('courts').select('*').eq('id', courtId).single();
    if (!court || court.status === 'in_progress') return null;
    const session = await getSession(court.session_id);

    // Manual mode: pull from the host's pre-built schedule instead of the
    // automated engine. Hybrid mode also has a manual_queue available, but
    // falls back to the automated engine if nothing's been pre-planned.
    if (session.open_play_mode === 'manual' || session.open_play_mode === 'hybrid') {
      const nextPlanned = await getNextManualQueueEntry(court.session_id, courtId);
      if (nextPlanned) {
        await assignCourt(courtId, nextPlanned.team_a_id, nextPlanned.team_b_id);
        await supabaseClient.from('manual_queue').update({ status: 'active' }).eq('id', nextPlanned.id);
        return { teamA: { id: nextPlanned.team_a_id }, teamB: { id: nextPlanned.team_b_id }, lane: 'manual' };
      }
      if (session.open_play_mode === 'manual') return null; // strictly manual — no automated fallback
    }

    const [winnersQueue, losersQueue, waitingQueue] = await Promise.all([
      getQueueLane(court.session_id, 'winners_queue'), getQueueLane(court.session_id, 'losers_queue'),
      getQueueLane(court.session_id, 'waiting'),
    ]);
    const decision = window.StackingEngine.decideNextMatch({
      stackingMode: session.stacking_mode, winnersQueue, losersQueue, waitingQueue,
      allowCrossLaneFill: session.allow_cross_lane_fill !== false,
    });
    if (!decision) return null;
    await assignCourt(courtId, decision.teamA.id, decision.teamB.id);
    return decision;
  }

  // ============================================================
  // MANUAL QUEUE — host pre-builds the schedule, Manual/Hybrid modes
  // ============================================================

  /**
   * Add a planned matchup to the back of a specific court's manual queue
   * (or the general unassigned-court queue if courtId is null).
   */
  async function addManualQueueEntry(sessionId, courtId, teamAId, teamBId) {
    const { data: existing } = await supabaseClient
      .from('manual_queue').select('queue_position')
      .eq('session_id', sessionId).eq('status', 'planned')
      .eq('court_id', courtId);
    const maxPos = existing && existing.length > 0 ? Math.max(...existing.map(r => r.queue_position ?? 0)) : 0;
    const { data, error } = await supabaseClient.from('manual_queue').insert({
      session_id: sessionId, court_id: courtId, team_a_id: teamAId, team_b_id: teamBId, queue_position: maxPos + 1,
    }).select().single();
    if (error) throw error;
    return data;
  }

  async function getManualQueue(sessionId) {
    const { data, error } = await supabaseClient
      .from('manual_queue')
      .select('*, team_a:team_a_id(*), team_b:team_b_id(*), court:court_id(*)')
      .eq('session_id', sessionId)
      .in('status', ['planned', 'active'])
      .order('queue_position', { ascending: true })
      .order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }

  async function getNextManualQueueEntry(sessionId, courtId) {
    const { data, error } = await supabaseClient
      .from('manual_queue')
      .select('*')
      .eq('session_id', sessionId)
      .eq('court_id', courtId)
      .eq('status', 'planned')
      .order('queue_position', { ascending: true })
      .order('created_at', { ascending: true })
      .limit(1);
    if (error) throw error;
    return data && data.length > 0 ? data[0] : null;
  }

  async function removeManualQueueEntry(entryId) {
    await supabaseClient.from('manual_queue').update({ status: 'cancelled' }).eq('id', entryId);
  }

  async function markManualQueueEntryCompleted(courtId) {
    await supabaseClient.from('manual_queue').update({ status: 'completed' }).eq('court_id', courtId).eq('status', 'active');
  }

  async function getPendingRestRequests(sessionId) {
    const { data, error } = await supabaseClient.from('rest_requests').select('*, player:player_id(*)').eq('session_id', sessionId).eq('status', 'pending');
    if (error) throw error;
    return data;
  }
  /**
   * Confirm a rest request. If the player is currently mid-match, we
   * don't pull them off court — we just mark the request confirmed and
   * flag intent; the host should mark them resting via the Roster tab
   * once their current match actually ends. If they're NOT mid-match
   * (waiting/queued), we can safely rest them immediately: deactivate
   * any waiting team they're part of so they don't get matched while
   * resting, and set their status to 'resting' right away.
   */
  /**
   * Core "put this player into resting state" logic — deactivates any
   * waiting team they're part of so they don't get matched while resting.
   * Shared by both the rest-REQUEST confirmation flow and a host directly
   * resting someone manually (no request needed) from the Roster tab.
   */
  async function restPlayerNow(playerId, sessionId) {
    const activeTeams = await getTeams(sessionId);
    const theirTeam = activeTeams.find(t => t.player_ids.includes(playerId) && t.queue_lane !== 'playing');
    if (theirTeam) {
      await supabaseClient.from('teams').update({ is_active: false }).eq('id', theirTeam.id);
    }
    await supabaseClient.from('players').update({ status: 'resting' }).eq('id', playerId);
  }

  async function confirmRestRequest(requestId, playerId) {
    const { data: player, error: playerErr } = await supabaseClient.from('players').select('*').eq('id', playerId).single();
    if (playerErr || !player) throw new Error('Could not find this player.');

    const { error: reqErr } = await supabaseClient.from('rest_requests').update({ status: 'confirmed', resolved_at: new Date().toISOString() }).eq('id', requestId);
    if (reqErr) throw reqErr;

    if (player.status === 'playing') {
      // Mid-match — don't disrupt the live game. The host will mark them
      // resting manually from the Roster tab once the match ends.
      return { deferred: true };
    }

    await restPlayerNow(playerId, player.session_id);
    return { deferred: false };
  }
  /**
   * Host directly rests a player from the Roster tab — no rest request
   * needed. Not allowed mid-match (same reasoning as the request flow):
   * pulling someone off a live court would disrupt the game in progress.
   */
  async function restPlayerManually(playerId) {
    const { data: player, error: playerErr } = await supabaseClient.from('players').select('*').eq('id', playerId).single();
    if (playerErr || !player) throw new Error('Could not find this player.');
    if (player.status === 'playing') {
      throw new Error('This player is mid-match — mark them resting once their current game ends.');
    }
    await restPlayerNow(playerId, player.session_id);
  }
  async function declineRestRequest(requestId) {
    const { error } = await supabaseClient.from('rest_requests').update({ status: 'declined', resolved_at: new Date().toISOString() }).eq('id', requestId);
    if (error) throw error;
  }
  async function getMessages(sessionId, statusFilter = null) {
    let query = supabaseClient.from('messages').select('*').eq('session_id', sessionId).order('created_at', { ascending: false });
    if (statusFilter) query = query.eq('status', statusFilter);
    const { data, error } = await query;
    if (error) throw error;
    return data;
  }
  async function markMessageStatus(messageId, status) {
    const { error } = await supabaseClient.from('messages').update({ status }).eq('id', messageId);
    if (error) throw error;
  }
  return {
    createSession, getMySessions, getSession, getSessionByReferenceCode, verifySessionPassword, finishSession, carryPlayersToNewSession,
    startTournament, getMatchups, getTournamentTeams, assignMatchupToCourt, recordTournamentResult, isRoundComplete, advanceToNextRound,
    addPlayer, getPlayers, getAllPlayersIncludingLeft, setPlayerStatus, removePlayer, createTeam, getTeams, getQueueLane, getUnpairedWaitingPlayers, getPlayerWaveEligibility, deactivateTeamsContainingPlayers,
    getCourts, assignCourt, recordResult, logMatchResult, applyQueuePlacement, tryRefillCourt,
    addManualQueueEntry, getManualQueue, getNextManualQueueEntry, removeManualQueueEntry,
    getPendingRestRequests, confirmRestRequest, declineRestRequest, restPlayerManually, getMessages, markMessageStatus,
  };
})();
window.SessionAPI = SessionAPI;

const DIVISION_LABELS = {
  mixed_doubles: 'Mixed Doubles', mens_doubles: "Men's Doubles", womens_doubles: "Women's Doubles",
  mens_singles: "Men's Singles", womens_singles: "Women's Singles", mixed_singles: 'Mixed Singles', open: 'Open / Any',
};
const CATEGORY_LABELS = { novice: 'Novice', intermediate: 'Intermediate', advanced: 'Advanced' };
const OPEN_PLAY_MODE_LABELS = { automated: 'Automated', manual: 'Manual', hybrid: 'Auto + Manual' };

// Divisions ending in "_singles" are 1v1; everything else is 2v2 doubles.
function formatFromDivision(division) {
  return division && division.endsWith('_singles') ? 'singles' : 'doubles';
}

function sessionTypeBadge(s) {
  if (s.session_type === 'tournament') {
    const fmt = s.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin';
    const divisionLabel = s.division && DIVISION_LABELS[s.division] ? ` · ${DIVISION_LABELS[s.division]}` : '';
    const categoryLabel = s.category && CATEGORY_LABELS[s.category] ? ` · ${CATEGORY_LABELS[s.category]}` : '';
    return `<span style="font-size:10px; background:var(--kitchen-gold); color:var(--ink); padding:2px 7px; border-radius:999px; font-weight:700; margin-left:6px;">${fmt}${divisionLabel}${categoryLabel}</span>`;
  }
  const modeLabel = s.open_play_mode && OPEN_PLAY_MODE_LABELS[s.open_play_mode] ? ` · ${OPEN_PLAY_MODE_LABELS[s.open_play_mode]}` : '';
  return `<span style="font-size:10px; background:var(--waiting-blue); color:white; padding:2px 7px; border-radius:999px; font-weight:700; margin-left:6px;">Open Play${modeLabel}</span>`;
}

async function handleCreateSession() {
  const name = document.getElementById('newName').value.trim() || 'Open Play';
  const courtCount = parseInt(document.getElementById('newCourtCount').value, 10) || 1;
  const password = document.getElementById('newPassword').value;
  const passwordConfirm = document.getElementById('newPasswordConfirm').value;
  const errorEl = document.getElementById('createSessionError');
  errorEl.textContent = '';

  if (password !== passwordConfirm) {
    errorEl.textContent = 'Passwords do not match.';
    return;
  }
  if (!password || password.length < 4) {
    errorEl.textContent = 'Password must be at least 4 characters.';
    return;
  }

  const sessionType = selectedSessionType;

  let format, openPlayMode, allowCrossLaneFill, tournamentFormat, division, category, roundsTotal, pointsToWin, scoringMode;

  if (sessionType === 'tournament') {
    division = document.getElementById('newDivision').value;
    format = formatFromDivision(division);
    tournamentFormat = document.getElementById('newTournamentFormat').value;
    category = document.getElementById('newCategory').value;
    roundsTotal = tournamentFormat === 'swiss' ? parseInt(document.getElementById('newRoundsTotal').value, 10) : null;
    pointsToWin = parseInt(document.getElementById('newPointsToWin').value, 10) || 11;
    scoringMode = 'point_diff';
  } else {
    format = document.getElementById('newFormat').value;
    openPlayMode = selectedOpenPlayMode;
    allowCrossLaneFill = document.getElementById('newAllowCrossLaneFill').value === 'true';
    pointsToWin = 11;
    scoringMode = 'win_loss';
  }

  // Tournament partners are always fixed for the whole event — no re-pairing mode applies there.
  const pairingDefault = 'fixed';
  // Stacking engine mode: Open Play's automated win/loss matching always
  // uses 'win_loss_queue' under the hood, regardless of which of the 3
  // open_play_mode options the host picked — manual/hybrid layer their
  // own pre-queue on TOP of this, they don't replace it.
  const stackingMode = 'win_loss_queue';

  try {
    const session = await SessionAPI.createSession({
      name, format, courtCount, stackingMode, pairingDefault, allowCrossLaneFill, restPriorityEnabled: true, password,
      sessionType, tournamentFormat, division, category, openPlayMode, roundsTotal, scoringMode, pointsToWin,
    });
    rememberSessionPassword(session.id, password);
    await openSession(session.id);
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

// ----------------------------
// PASSWORD GATE
// ----------------------------
function sessionPasswordKey(sessionId) { return `istackyyy_pw_ok_${sessionId}`; }
function rememberSessionPassword(sessionId, password) {
  // localStorage (not sessionStorage) so the unlock survives closing the
  // browser tab — hosts running live events shouldn't have to re-type a
  // password every time a tab gets closed/reopened on their phone.
  localStorage.setItem(sessionPasswordKey(sessionId), 'unlocked');
}
function isSessionUnlocked(sessionId) {
  return localStorage.getItem(sessionPasswordKey(sessionId)) === 'unlocked';
}

async function promptOpenSession(sessionId) {
  if (isSessionUnlocked(sessionId)) {
    await openSession(sessionId);
    return;
  }
  const session = await SessionAPI.getSession(sessionId);
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="pwModal">
      <div class="modal-box">
        <h2>Enter Password</h2>
        <p class="modal-sub">"${escapeHtml(session.name)}" is password-protected.</p>
        <div class="field"><input type="password" id="sessionPwInput" placeholder="Session password" autocomplete="off" onkeydown="if(event.key==='Enter') confirmSessionPassword('${sessionId}')"></div>
        <div class="auth-error" id="pwModalError"></div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('pwModal').remove()">Cancel</button>
          <button class="btn-yes" onclick="confirmSessionPassword('${sessionId}')">Unlock</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('sessionPwInput').focus();
}

async function confirmSessionPassword(sessionId) {
  const input = document.getElementById('sessionPwInput').value;
  const ok = await SessionAPI.verifySessionPassword(sessionId, input);
  if (!ok) {
    document.getElementById('pwModalError').textContent = 'Incorrect password.';
    return;
  }
  rememberSessionPassword(sessionId, input);
  document.getElementById('pwModal').remove();
  await openSession(sessionId);
}

async function openSession(sessionId) {
  activeSession = await SessionAPI.getSession(sessionId);
  activeTab = 'roster';
  // Reset all per-session in-memory UI state — otherwise partially-built
  // tournament team formations (or other in-progress selections) from a
  // PREVIOUSLY opened session could leak into this one, since these are
  // plain module-level variables that don't know which session they
  // belong to.
  bracketSetupTeams = [];
  bracketSetupSelectedPlayers = [];
  renderConsole();
  subscribeRealtime();
  startHostTimerLoop();
}

function backToSessionList() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  if (hostTimerInterval) clearInterval(hostTimerInterval);
  activeSession = null;
  renderSessionList();
}

      </div>

function confirmFinishSession() {
  document.body.insertAdjacentHTML('beforeend', `

        <h2>Finish This Session?</h2>

        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('finishModal').remove()">Cancel</button>

async function handleFinishSession() {

  document.getElementById('finishModal').remove();
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
