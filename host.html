}

function confirmFinishSession() {
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="finishModal">
      <div class="modal-box">
        <h2>Finish This Session?</h2>
        <p class="modal-sub">This locks "${escapeHtml(activeSession.name)}" as completed. Players currently mid-match will stay recorded, but no new matches can start. You can still "Host Again" afterward to start a fresh session with the same players.</p>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('finishModal').remove()">Cancel</button>
          <button class="btn-yes" style="background:var(--loser-coral);" onclick="handleFinishSession()">Yes, Finish It</button>
        </div>
      </div>
    </div>
  `);
}

async function handleFinishSession() {
  await SessionAPI.finishSession(activeSession.id);
  document.getElementById('finishModal').remove();
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  activeSession = null;
  await renderSessionList();
}

async function startHostAgainFlow(oldSessionId) {
  if (!isSessionUnlocked(oldSessionId)) {
    // require the password of the old session before letting someone clone its roster
    const password = prompt('Enter the password for this finished session to host it again:');
    if (password === null) return;
    const ok = await SessionAPI.verifySessionPassword(oldSessionId, password);
    if (!ok) { alert('Incorrect password.'); return; }
    rememberSessionPassword(oldSessionId, password);
  }

  const oldSession = await SessionAPI.getSession(oldSessionId);
  const oldPlayers = await SessionAPI.getPlayers(oldSessionId);

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="hostAgainModal">
      <div class="modal-box">
        <h2>Host Again</h2>
        <p class="modal-sub">Start a new session based on "${escapeHtml(oldSession.name)}". Select players to carry over.</p>
        <div class="field"><label>New Session Name</label><input type="text" id="hostAgainName" value="${escapeHtml(oldSession.name)} (2)"></div>
        <div class="field"><label>Number of Courts</label><input type="number" id="hostAgainCourts" value="${oldSession.court_count}" min="1" max="20"></div>
        <div class="field"><label>New Session Password</label><input type="password" id="hostAgainPassword" placeholder="At least 4 characters"></div>
        <p style="font-size:12px; font-weight:700; margin:14px 0 8px;">Players to carry over:</p>
        <div class="player-checklist" id="hostAgainChecklist">
          ${oldPlayers.map(p => `<div class="player-check selected" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-tier="${p.skill_tier}" onclick="this.classList.toggle('selected')">${escapeHtml(p.name)}</div>`).join('') || '<p style="font-size:12px;color:var(--resting-slate);">No players in that session.</p>'}
        </div>
        <div class="auth-error" id="hostAgainError"></div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('hostAgainModal').remove()">Cancel</button>
          <button class="btn-yes" onclick="confirmHostAgain('${oldSessionId}')">Create & Open</button>
        </div>
      </div>
    </div>
  `);
}

async function confirmHostAgain(oldSessionId) {
  const name = document.getElementById('hostAgainName').value.trim() || 'Open Play';
  const courtCount = parseInt(document.getElementById('hostAgainCourts').value, 10) || 1;
  const password = document.getElementById('hostAgainPassword').value;
  const errorEl = document.getElementById('hostAgainError');
  const oldSession = await SessionAPI.getSession(oldSessionId);

  const selectedChips = [...document.querySelectorAll('#hostAgainChecklist .player-check.selected')];
  const carryPlayers = selectedChips.map(el => ({ name: el.dataset.name, skill_tier: el.dataset.tier }));

  try {
    const newSession = await SessionAPI.createSession({
      name, format: oldSession.format, courtCount,
      stackingMode: oldSession.stacking_mode, pairingDefault: oldSession.pairing_default,
      skillMatchMode: oldSession.skill_match_mode, restPriorityEnabled: oldSession.rest_priority_enabled,
      password, parentSessionId: oldSessionId,
    });
    rememberSessionPassword(newSession.id, password);
    if (carryPlayers.length > 0) {
      await SessionAPI.carryPlayersToNewSession(newSession.id, carryPlayers);
    }
    document.getElementById('hostAgainModal').remove();
    await openSession(newSession.id);
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderActiveTab();
}

async function renderActiveTab() {
  const panel = document.getElementById('tabPanel');
  if (activeTab === 'roster') panel.innerHTML = await rosterTabHtml();
  if (activeTab === 'bracket') panel.innerHTML = await bracketTabHtml();
  if (activeTab === 'courts') panel.innerHTML = await courtsTabHtml();
  if (activeTab === 'inbox') panel.innerHTML = await inboxTabHtml();
}

function copyShareLink(url) {
  navigator.clipboard.writeText(url);
  event.target.textContent = 'Copied!';
  setTimeout(() => { event.target.textContent = 'Copy Link'; }, 1500);
}

function copyShareMessage(url, referenceCode) {
  const combined = referenceCode
    ? `Session Code: ${referenceCode}\n${url}`
    : url;
  navigator.clipboard.writeText(combined);
  event.target.textContent = 'Copied!';
  setTimeout(() => { event.target.textContent = 'Copy for Chat'; }, 1500);
}

async function rosterTabHtml() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  return `
    <div class="card">
      <h2>Add Player</h2>
      <div class="add-player-row">
        <input type="text" id="newPlayerName" placeholder="Player name">
        <select id="newPlayerTier"><option value="open">No tier</option><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
        <button onclick="handleAddPlayer()">Add</button>
      </div>
    </div>
    <div class="card">
      <h2>Roster (${players.length})</h2>
      ${players.length ? `
        <div class="table-scroll">
        <table class="roster-table">
          <thead><tr><th>Name</th><th>Tier</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${players.map(p => `
              <tr>
                <td>${escapeHtml(p.name)}</td>
                <td>${p.skill_tier !== 'open' ? p.skill_tier : '—'}</td>
                <td><span class="status-pill status-${p.status}">${p.status.replace('_', ' ')}</span></td>
                <td>
                  ${p.status === 'resting' ? `<button onclick="handleReturnFromRest('${p.id}')" style="background:none;border:none;color:var(--winner-green);font-size:11px;font-weight:700;">Mark Ready</button>` : ''}
                  <button class="remove-btn" onclick="handleRemovePlayer('${p.id}')">Remove</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      ` : '<p style="color:var(--resting-slate); font-size:13px;">No players yet — add some above.</p>'}
    </div>
  `;
}

async function handleAddPlayer() {
  const name = document.getElementById('newPlayerName').value.trim();
  const tier = document.getElementById('newPlayerTier').value;
  if (!name) return;
  await SessionAPI.addPlayer(activeSession.id, name, tier);
  document.getElementById('newPlayerName').value = '';
  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

async function handleRemovePlayer(playerId) {
  await SessionAPI.removePlayer(playerId);
  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

async function handleReturnFromRest(playerId) {
  await supabaseClient.from('players').update({ status: 'waiting' }).eq('id', playerId);
  document.getElementById('tabPanel').innerHTML = await rosterTabHtml();
}

// ----------------------------
// BRACKET TAB (Tournament Mode)
// ----------------------------
let bracketSetupSelectedPlayers = [];
let bracketSetupTeams = [];

async function bracketTabHtml() {
  const teams = await SessionAPI.getTournamentTeams(activeSession.id);

  if (teams.length === 0) {
    return await bracketSetupHtml();
  }
  return await bracketLiveHtml(teams);
}

async function bracketSetupHtml() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;

  // Players already locked into a formed team can't be picked again —
  // this is the core double-stacking prevention.
  const assignedPlayerIds = new Set(bracketSetupTeams.flatMap(t => t.playerIds));
  const availablePlayers = players.filter(p => !assignedPlayerIds.has(p.id));

  return `
    <div class="card">
      <h2>Set Up ${activeSession.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin'} Tournament</h2>
      <p style="font-size:13px; color:var(--resting-slate);">
        ${teamSize === 2 ? 'Pick 2 players at a time to form each team.' : 'Each player competes individually.'}
        Once all teams are formed, generate the schedule.
        <strong style="color:var(--court-green);">${availablePlayers.length} unassigned</strong> of ${players.length} total.
      </p>

      <div class="player-checklist" id="bracketPlayerChecklist">
        ${availablePlayers.length ? availablePlayers.map(p => `<div class="player-check" data-id="${p.id}" data-name="${escapeHtml(p.name)}" onclick="toggleBracketPlayerSelect('${p.id}')">${escapeHtml(p.name)}</div>`).join('') : '<p style="font-size:12px;color:var(--resting-slate);">No more unassigned players.</p>'}
      </div>
      ${teamSize === 2 ? `<button class="assign-btn" style="width:auto; padding:8px 16px;" onclick="formBracketTeam()">Form Team from Selected</button>` : `<button class="assign-btn" style="width:auto; padding:8px 16px;" onclick="formAllSinglesTeams()">Add All as Individual Entries</button>`}

      <div style="margin-top:18px;">
        <h3 style="font-size:13px; margin-bottom:8px;">Teams Formed (${bracketSetupTeams.length})</h3>
        ${bracketSetupTeams.length ? bracketSetupTeams.map((t, i) => `
          <div class="session-row"><span>${t.names.join(' & ')}</span><button class="remove-btn" onclick="removeBracketTeam(${i})">Remove</button></div>
        `).join('') : '<p style="font-size:12px;color:var(--resting-slate);">No teams formed yet.</p>'}
      </div>

      <button class="btn-primary" style="width:auto; padding:10px 24px; margin-top:16px;" onclick="handleGenerateSchedule()">Generate Schedule & Start Tournament</button>
      <div class="auth-error" id="bracketSetupError"></div>
    </div>
  `;
}

function toggleBracketPlayerSelect(playerId) {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const idx = bracketSetupSelectedPlayers.indexOf(playerId);
  if (idx >= 0) {
    bracketSetupSelectedPlayers.splice(idx, 1);
  } else {
    if (bracketSetupSelectedPlayers.length >= teamSize) return;
    bracketSetupSelectedPlayers.push(playerId);
  }
  document.querySelectorAll('#bracketPlayerChecklist .player-check').forEach(el => {
    el.classList.toggle('selected', bracketSetupSelectedPlayers.includes(el.dataset.id));
  });
}

async function formBracketTeam() {
  const teamSize = 2;
  if (bracketSetupSelectedPlayers.length !== teamSize) {
    alert(`Select exactly ${teamSize} players to form a team.`);
    return;
  }
  const checklistEls = [...document.querySelectorAll('#bracketPlayerChecklist .player-check.selected')];
  const names = checklistEls.map(el => el.dataset.name);
  bracketSetupTeams.push({ playerIds: [...bracketSetupSelectedPlayers], names });
  bracketSetupSelectedPlayers = [];
  document.getElementById('tabPanel').innerHTML = await bracketSetupHtml();
}

async function formAllSinglesTeams() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const assignedPlayerIds = new Set(bracketSetupTeams.flatMap(t => t.playerIds));
  const newEntries = players
    .filter(p => !assignedPlayerIds.has(p.id))
    .map(p => ({ playerIds: [p.id], names: [p.name] }));
  bracketSetupTeams = [...bracketSetupTeams, ...newEntries];
  document.getElementById('tabPanel').innerHTML = await bracketSetupHtml();
}

async function removeBracketTeam(index) {
  bracketSetupTeams.splice(index, 1);
  document.getElementById('tabPanel').innerHTML = await bracketSetupHtml();
}

async function handleGenerateSchedule() {
  const errorEl = document.getElementById('bracketSetupError');
  const minTeams = activeSession.tournament_format === 'swiss' ? 4 : 3;
  if (bracketSetupTeams.length < minTeams) {
    errorEl.textContent = `Need at least ${minTeams} teams for ${activeSession.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin'} format.`;
    return;
  }
  try {
    const teamPlayerGroups = bracketSetupTeams.map(t => t.playerIds);
    await SessionAPI.startTournament(activeSession.id, teamPlayerGroups, activeSession.tournament_format);
    bracketSetupTeams = [];
    bracketSetupSelectedPlayers = [];
    document.getElementById('tabPanel').innerHTML = await bracketTabHtml();
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

async function bracketLiveHtml(teams) {
  const session = await SessionAPI.getSession(activeSession.id); // refresh for current_round
  activeSession = session;
  const currentRound = session.current_round;
  const matchups = await SessionAPI.getMatchups(activeSession.id, currentRound);
  const players = await SessionAPI.getPlayers(activeSession.id);
  const courts = await SessionAPI.getCourts(activeSession.id);
  const standings = window.TournamentEngine.computeStandings(teams);

  const roundLabel = session.tournament_format === 'round_robin'
    ? `Round ${currentRound} of ${session.rounds_total || '?'}`
    : `Round ${currentRound} of ${session.rounds_total || '?'} (Swiss)`;

  const roundComplete = await SessionAPI.isRoundComplete(activeSession.id, currentRound);
  const isFinalRound = session.rounds_total && currentRound >= session.rounds_total;

  return `
    <div class="card">
      <h2>${roundLabel}</h2>
      <div class="matchup-list">
        ${matchups.map(m => bracketMatchupRow(m, players, courts)).join('')}
      </div>
      ${roundComplete && !isFinalRound ? `<button class="btn-primary" style="width:auto; padding:10px 20px; margin-top:14px;" onclick="handleAdvanceRound()">Advance to Round ${currentRound + 1}</button>` : ''}
      ${roundComplete && isFinalRound ? `<p style="margin-top:14px; font-weight:700; color:var(--winner-green);">🏆 Final round complete! Check standings below for the winner.</p>` : ''}
    </div>

    <div class="card">
      <h2>Standings</h2>
      <div class="table-scroll">
      <table class="roster-table">
        <thead><tr><th>#</th><th>Team</th><th>W-L</th><th>Pts For</th><th>Pts Against</th><th>Diff</th></tr></thead>
        <tbody>
          ${standings.map((t, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${escapeHtml(playerNamesForTeam(t, players).join(' & '))}</td>
              <td>${t.wins}-${t.losses}</td>
              <td>${t.points_for}</td>
              <td>${t.points_against}</td>
              <td>${t.points_for - t.points_against >= 0 ? '+' : ''}${t.points_for - t.points_against}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function bracketMatchupRow(m, players, courts) {
  const namesA = playerNamesForTeam(m.team_a, players).join(' & ');
  const namesB = playerNamesForTeam(m.team_b, players).join(' & ');
  const openCourts = courts.filter(c => c.status === 'open');

  if (m.status === 'completed') {
    return `<div class="matchup-card completed"><span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span><span class="status-pill status-playing">Done</span></div>`;
  }
  if (m.status === 'in_progress') {
    return `
      <div class="matchup-card in-progress">
        <span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span>
        <button class="win-select-btn" onclick="openScoreEntry('${m.id}', '${m.court_id}', '${escapeHtml(namesA)}', '${escapeHtml(namesB)}')">Enter Score</button>
      </div>
    `;
  }
  return `
    <div class="matchup-card pending">
      <span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span>
      ${openCourts.length ? `
        <select onchange="if(this.value) handleAssignMatchup('${m.id}', this.value)">
          <option value="">Assign court...</option>
          ${openCourts.map(c => `<option value="${c.id}">Court ${c.court_number}</option>`).join('')}
        </select>
      ` : '<span style="font-size:11px;color:var(--resting-slate);">No open courts</span>'}
    </div>
  `;
}

async function handleAssignMatchup(matchupId, courtId) {
  await SessionAPI.assignMatchupToCourt(matchupId, courtId);
  document.getElementById('tabPanel').innerHTML = await bracketTabHtml();
}

function openScoreEntry(matchupId, courtId, namesA, namesB) {
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="scoreModal">
      <div class="modal-box">
        <h2>Enter Final Score</h2>
        <p class="modal-sub">${namesA} vs ${namesB}</p>
        <div class="form-grid">
          <div class="field"><label>${namesA}</label><input type="number" id="scoreA" min="0" max="99" value="0"></div>
          <div class="field"><label>${namesB}</label><input type="number" id="scoreB" min="0" max="99" value="0"></div>
        </div>
        <div class="confirm-actions">
          <button class="btn-no" onclick="document.getElementById('scoreModal').remove()">Cancel</button>
          <button class="btn-yes" onclick="confirmScoreEntry('${matchupId}', '${courtId}')">Submit Score</button>
        </div>
        <div class="auth-error" id="scoreModalError"></div>
      </div>
    </div>
  `);
}

async function confirmScoreEntry(matchupId, courtId) {
  const scoreA = parseInt(document.getElementById('scoreA').value, 10);
  const scoreB = parseInt(document.getElementById('scoreB').value, 10);
  const errorEl = document.getElementById('scoreModalError');

  if (isNaN(scoreA) || isNaN(scoreB) || scoreA === scoreB) {
    errorEl.textContent = 'Scores must be valid numbers and cannot be tied.';
    return;
  }

  await SessionAPI.recordTournamentResult(matchupId, courtId, scoreA, scoreB);
  document.getElementById('scoreModal').remove();
  document.getElementById('tabPanel').innerHTML = await bracketTabHtml();
}

async function handleAdvanceRound() {
  await SessionAPI.advanceToNextRound(activeSession.id);
  document.getElementById('tabPanel').innerHTML = await bracketTabHtml();
}

async function courtsTabHtml() {
  const [courts, players, waitingTeams] = await Promise.all([
    SessionAPI.getCourts(activeSession.id),
    SessionAPI.getPlayers(activeSession.id),
    SessionAPI.getQueueLane(activeSession.id, 'waiting'),
  ]);
  const unpaired = await SessionAPI.getUnpairedWaitingPlayers(activeSession.id);

  const courtCards = courts.map(court => {
    if (court.status === 'in_progress') {
      const namesA = playerNamesForTeam(court.team_a, players).join(' & ');
      const namesB = playerNamesForTeam(court.team_b, players).join(' & ');
      return `
        <div class="court-host-card">
          <div class="court-host-label"><span>Court ${court.court_number}</span><span class="mono" id="hostTimer-${court.id}">00:00</span></div>
          <div class="court-host-body">
            <div class="matchup-row"><span>${escapeHtml(namesA)}</span></div>
            <div class="matchup-vs">vs</div>
            <div class="matchup-row"><span>${escapeHtml(namesB)}</span></div>
            <div class="ongoing-pill">● Ongoing</div>
            <button class="assign-btn" style="margin-top:10px;" onclick="handleMarkFinished('${court.id}')">Mark Match Finished</button>
          </div>
        </div>
      `;
    } else {
      return `
        <div class="court-host-card">
          <div class="court-host-label"><span>Court ${court.court_number}</span><span>OPEN</span></div>
          <div class="court-host-body">
            <div class="court-empty-msg">No match assigned</div>
            <button class="assign-btn" onclick="handleAutoRefill('${court.id}')">Try Auto-Fill from Queue</button>
            <button class="assign-btn" style="background:#eee;color:var(--ink);margin-top:6px;" onclick="openManualAssign('${court.id}')">Manually Assign Teams</button>
          </div>
        </div>
      `;
    }
  }).join('');

  const sortedWaiting = [...waitingTeams].sort((a, b) => (a.queue_position ?? 0) - (b.queue_position ?? 0));

  return `
    <div class="card" id="manualAssignCard" style="display:none;">
      <h2>Manual Assign — Court</h2>
      <p style="font-size:12px;color:var(--resting-slate);">Pick 2 waiting teams to play each other. Teams are already paired in join order — to change who's on a team, edit the Roster instead.</p>
      <div class="player-checklist" id="manualPlayerChecklist">
        ${sortedWaiting.length ? sortedWaiting.map((t, i) => `<div class="player-check" data-id="${t.id}" onclick="toggleTeamSelect('${t.id}')">#${i + 1} · ${escapeHtml(playerNamesForTeam(t, players).join(' & '))}</div>`).join('') : '<p style="font-size:12px;color:var(--resting-slate);">No waiting teams yet.</p>'}
      </div>
      ${unpaired.length > 0 ? `<p style="font-size:11px;color:var(--resting-slate);margin-top:8px;">⏳ ${unpaired.map(p => escapeHtml(p.name)).join(', ')} still waiting for a partner.</p>` : ''}
      <button class="btn-primary" style="width:auto;padding:10px 20px;margin-top:10px;" onclick="confirmManualAssign()">Confirm Match</button>
      <button class="btn-secondary" style="width:auto;padding:10px 20px;margin-left:8px;" onclick="closeManualAssign()">Cancel</button>
    </div>
    <div class="courts-host-grid">${courtCards}</div>
  `;
}

let manualAssignCourtId = null;
let selectedTeamIds = [];

function openManualAssign(courtId) {
  manualAssignCourtId = courtId;
  selectedTeamIds = [];
  document.getElementById('manualAssignCard').style.display = 'block';
  document.getElementById('manualAssignCard').scrollIntoView({ behavior: 'smooth' });
}

function closeManualAssign() {
  manualAssignCourtId = null;
  selectedTeamIds = [];
  document.getElementById('manualAssignCard').style.display = 'none';
}

function toggleTeamSelect(teamId) {
  const idx = selectedTeamIds.indexOf(teamId);
  if (idx >= 0) {
    selectedTeamIds.splice(idx, 1);
  } else {
    if (selectedTeamIds.length >= 2) return;
    selectedTeamIds.push(teamId);
  }
  document.querySelectorAll('.player-check').forEach(el => {
    el.classList.toggle('selected', selectedTeamIds.includes(el.dataset.id));
  });
}

async function confirmManualAssign() {
  if (selectedTeamIds.length !== 2) {
    alert('Select exactly 2 teams to face off.');
    return;
  }
  const [teamAId, teamBId] = selectedTeamIds;
  await SessionAPI.assignCourt(manualAssignCourtId, teamAId, teamBId);

  const teamA = await SessionAPI.getTeams(activeSession.id).then(teams => teams.find(t => t.id === teamAId));
  const teamB = await SessionAPI.getTeams(activeSession.id).then(teams => teams.find(t => t.id === teamBId));
  const allPlayerIds = [...(teamA?.player_ids || []), ...(teamB?.player_ids || [])];
  if (allPlayerIds.length > 0) {
    await supabaseClient.from('players').update({ status: 'playing' }).in('id', allPlayerIds);
  }

  closeManualAssign();
  document.getElementById('tabPanel').innerHTML = await courtsTabHtml();
}

// ============================================================
// MATCH RESULT FLOW: Mark Finished -> Confirm -> Pick Winner -> Regroup
// ============================================================
let resultFlowCourt = null; // holds court object mid-flow
let resultFlowWinnerTeamId = null;
let regroupAssignment = {}; // playerId -> 'winners' | 'losers'

async function handleMarkFinished(courtId) {
  const courts = await SessionAPI.getCourts(activeSession.id);
  const court = courts.find(c => c.id === courtId);
  if (!court) return;
  resultFlowCourt = court;
  showConfirmFinishedModal();
}

function showConfirmFinishedModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-backdrop';
  modal.id = 'resultModal';
  modal.innerHTML = `
    <div class="modal-box">
      <h2>Match Finished?</h2>
      <p class="modal-sub">Confirm Court ${resultFlowCourt.court_number}'s match has ended.</p>
      <div class="confirm-actions">
        <button class="btn-no" onclick="closeResultModal()">No, still playing</button>
        <button class="btn-yes" onclick="showPickWinnerModal()">Yes, finished</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

async function showPickWinnerModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const namesA = playerNamesForTeam(resultFlowCourt.team_a, players).join(' & ');
  const namesB = playerNamesForTeam(resultFlowCourt.team_b, players).join(' & ');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Who Won?</h2>
      <p class="modal-sub">Court ${resultFlowCourt.court_number} — select the winning side.</p>
      <div class="winner-pick-row">
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_a_id}')">${escapeHtml(namesA)}</div>
        <div class="winner-pick-option" onclick="selectWinner('${resultFlowCourt.team_b_id}')">${escapeHtml(namesB)}</div>
      </div>
      <button class="btn-secondary" style="width:auto;padding:8px 16px;" onclick="closeResultModal()">Cancel</button>
    </div>
  `;
}

let resultFlowScoreData = null;

async function selectWinner(winnerTeamId) {
  resultFlowWinnerTeamId = winnerTeamId;
  resultFlowScoreData = null;
  await showScoreConsentModal();
}

async function showScoreConsentModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const teamA = resultFlowCourt.team_a;
  const teamB = resultFlowCourt.team_b;
  const namesA = playerNamesForTeam(teamA, players).join(' & ');
  const namesB = playerNamesForTeam(teamB, players).join(' & ');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Record the Score?</h2>
      <p class="modal-sub">Optional — only show it if all 4 players agree. Match duration is tracked either way.</p>
      <label style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; margin:14px 0; cursor:pointer;">
        <input type="checkbox" id="scoreConsentCheckbox" style="width:18px; height:18px; min-height:0;" onchange="toggleScoreFields()">
        All 4 players agreed to show this score
      </label>
      <div id="scoreFieldsArea" style="display:none;">
        <div class="form-grid">
          <div class="field"><label>${escapeHtml(namesA)}</label><input type="number" id="consentScoreA" min="0" max="99" value="0"></div>
          <div class="field"><label>${escapeHtml(namesB)}</label><input type="number" id="consentScoreB" min="0" max="99" value="0"></div>
        </div>
      </div>
      <div class="confirm-actions">
        <button class="btn-no" onclick="skipScoreAndContinue()">Skip Score</button>
        <button class="btn-yes" onclick="confirmScoreAndContinue()">Continue</button>
      </div>
      <div class="auth-error" id="scoreConsentError"></div>
    </div>
  `;
}

function toggleScoreFields() {
  const checked = document.getElementById('scoreConsentCheckbox').checked;
  document.getElementById('scoreFieldsArea').style.display = checked ? '' : 'none';
}

async function skipScoreAndContinue() {
  resultFlowScoreData = null;
  await SessionAPI.logMatchResult(resultFlowCourt.id, resultFlowWinnerTeamId, null);
  await showRegroupModal();
}

async function confirmScoreAndContinue() {
  const consented = document.getElementById('scoreConsentCheckbox').checked;
  if (!consented) {
    await skipScoreAndContinue();
    return;
  }
  const scoreA = parseInt(document.getElementById('consentScoreA').value, 10);
  const scoreB = parseInt(document.getElementById('consentScoreB').value, 10);
  const errorEl = document.getElementById('scoreConsentError');
  if (isNaN(scoreA) || isNaN(scoreB) || scoreA === scoreB) {
    errorEl.textContent = 'Scores must be valid numbers and cannot be tied.';
    return;
  }
  resultFlowScoreData = { teamAScore: scoreA, teamBScore: scoreB };
  await SessionAPI.logMatchResult(resultFlowCourt.id, resultFlowWinnerTeamId, resultFlowScoreData);
  await showRegroupModal();
}

async function showRegroupModal() {
  const players = await SessionAPI.getPlayers(activeSession.id);
  const teamA = resultFlowCourt.team_a;
  const teamB = resultFlowCourt.team_b;
  const winningTeam = teamA.id === resultFlowWinnerTeamId ? teamA : teamB;
  const losingTeam = teamA.id === resultFlowWinnerTeamId ? teamB : teamA;

  // default: winning pair -> winners lane, losing pair -> losers lane
  regroupAssignment = {};
  winningTeam.player_ids.forEach(pid => { regroupAssignment[pid] = 'winners'; });
  losingTeam.player_ids.forEach(pid => { regroupAssignment[pid] = 'losers'; });

  renderRegroupModal(players);
}

function renderRegroupModal(players) {
  const allPlayerIds = Object.keys(regroupAssignment);
  const playerName = (pid) => players.find(p => p.id === pid)?.name || '—';

  const winnersIds = allPlayerIds.filter(pid => regroupAssignment[pid] === 'winners');
  const losersIds = allPlayerIds.filter(pid => regroupAssignment[pid] === 'losers');

  document.getElementById('resultModal').innerHTML = `
    <div class="modal-box">
      <h2>Arrange Next Queues</h2>
      <p class="modal-sub">Default: winning pair → Winners Queue, losing pair → Losers Queue. Tap any name to move it.</p>

      <div class="regroup-lanes">
        <div class="regroup-lane winners-lane">
          <h4>Winners Queue</h4>
          <div id="winnersLaneChips">
            ${winnersIds.map(pid => `<span class="regroup-chip" onclick="toggleRegroup('${pid}')">${escapeHtml(playerName(pid))}</span>`).join('') || '<span style="font-size:11px;color:var(--resting-slate);">— none —</span>'}
          </div>
        </div>
        <div class="regroup-lane losers-lane">
          <h4>Losers Queue</h4>
          <div id="losersLaneChips">
            ${losersIds.map(pid => `<span class="regroup-chip" onclick="toggleRegroup('${pid}')">${escapeHtml(playerName(pid))}</span>`).join('') || '<span style="font-size:11px;color:var(--resting-slate);">— none —</span>'}
          </div>
        </div>
      </div>
      <p class="regroup-hint">Tip: tap a name to move it between lanes — you can mix players from either original pair, e.g. keep two friends together even if one lost.</p>

      <div class="confirm-actions">
        <button class="btn-no" onclick="closeResultModal()">Cancel</button>
        <button class="btn-yes" onclick="confirmRegroup()">Confirm & Send to Queues</button>
      </div>
    </div>
  `;
}

async function toggleRegroup(playerId) {
  regroupAssignment[playerId] = regroupAssignment[playerId] === 'winners' ? 'losers' : 'winners';
  const players = await SessionAPI.getPlayers(activeSession.id);
  renderRegroupModal(players);
}

async function confirmRegroup() {
  const teamSize = activeSession.format === 'doubles' ? 2 : 1;
  const winnersGroup = Object.keys(regroupAssignment).filter(pid => regroupAssignment[pid] === 'winners');
  const losersGroup = Object.keys(regroupAssignment).filter(pid => regroupAssignment[pid] === 'losers');

  if (winnersGroup.length !== teamSize || losersGroup.length !== teamSize) {
    alert(`Each lane needs exactly ${teamSize} player${teamSize > 1 ? 's' : ''} to form a team. Adjust before confirming.`);
    return;
  }

  await SessionAPI.applyQueuePlacement(resultFlowCourt.id, activeSession.id, activeSession.pairing_default, winnersGroup, losersGroup);
  closeResultModal();
  document.getElementById('tabPanel').innerHTML = await courtsTabHtml();
}

function closeResultModal() {
  const modal = document.getElementById('resultModal');
  if (modal) modal.remove();
  resultFlowCourt = null;
  resultFlowWinnerTeamId = null;
  resultFlowScoreData = null;
  regroupAssignment = {};
}

async function handleAutoRefill(courtId) {
  const result = await SessionAPI.tryRefillCourt(courtId);
  if (!result) alert('Not enough eligible players in queue yet to fill this court.');
  document.getElementById('tabPanel').innerHTML = await courtsTabHtml();
}

function playerNamesForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid)?.name || '—');
}

async function inboxTabHtml() {
  const messages = await SessionAPI.getMessages(activeSession.id, 'pending');
  return `
    <div class="card">
      <h2>Player Messages</h2>
      ${messages.length ? messages.map(m => `
        <div class="inbox-item">
          <div><div class="who">${escapeHtml(m.player_name)}</div><div class="what">${escapeHtml(m.message)}</div><div class="when">${new Date(m.created_at).toLocaleTimeString()}</div></div>
          <div class="inbox-actions"><button class="btn-dismiss" onclick="handleDismissMessage('${m.id}')">Dismiss</button></div>
        </div>
      `).join('') : '<div class="empty-inbox">No messages</div>'}
    </div>
  `;
}

async function handleDismissMessage(messageId) {
  await SessionAPI.markMessageStatus(messageId, 'seen');
  document.getElementById('tabPanel').innerHTML = await inboxTabHtml();
}

function subscribeRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`host-${activeSession.id}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `session_id=eq.${activeSession.id}` }, () => { if (activeTab === 'inbox') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rest_requests', filter: `session_id=eq.${activeSession.id}` }, () => { if (activeTab === 'inbox') renderActiveTab(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_matchups', filter: `session_id=eq.${activeSession.id}` }, () => { if (activeTab === 'bracket') renderActiveTab(); })
    .subscribe();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
