<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStackyyy — Host Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<style>
  body { padding-bottom: 60px; }

  .topbar {
    background: var(--ink);
    color: var(--line-paint);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .brand .display { font-size: 20px; }
  .brand .dot { color: var(--kitchen-gold); }
  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .topbar-right button {
    background: transparent; border: 1px solid rgba(255,255,255,0.3);
    color: var(--line-paint); padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* ---------- Auth screen ---------- */
  .auth-box {
    max-width: 380px; margin: 80px auto;
    background: white; border-radius: var(--radius); box-shadow: var(--shadow-card);
    padding: 32px;
  }
  .auth-box h1 { font-size: 22px; margin: 0 0 4px; }
  .auth-box p.sub { color: var(--resting-slate); font-size: 13px; margin: 0 0 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: var(--radius-sm); font-size: 14px;
  }
  .btn-primary {
    width: 100%; background: var(--court-green); color: white; border: none;
    padding: 12px; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; margin-top: 6px;
  }
  .btn-secondary {
    width: 100%; background: transparent; color: var(--court-green); border: 1.5px solid var(--court-green);
    padding: 10px; border-radius: var(--radius-sm); font-weight: 700; font-size: 13px; margin-top: 8px;
  }
  .auth-error { color: var(--loser-coral); font-size: 12px; margin-top: 8px; }

  /* ---------- Session list ---------- */
  .card {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 20px;
  }
  .card h2 { font-size: 16px; margin: 0 0 14px; }
  .session-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #eee;
  }
  .session-row:last-child { border-bottom: none; }
  .session-row .meta { font-size: 12px; color: var(--resting-slate); }
  .session-row button {
    background: var(--court-green); color: white; border: none; padding: 7px 14px;
    border-radius: var(--radius-sm); font-size: 12px; font-weight: 700;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  /* ---------- Active session console ---------- */
  .console-header {
    display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }
  .console-header h1 { font-size: 22px; margin: 0; }
  .share-link {
    background: white; border-radius: var(--radius-sm); padding: 8px 12px; font-family: var(--font-mono);
    font-size: 12px; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-card);
  }
  .share-link button { background: var(--kitchen-gold); border: none; padding: 5px 10px; border-radius: 4px; font-weight: 700; font-size: 11px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 2px solid #e5e0d5; }
  .tab-btn {
    background: none; border: none; padding: 10px 16px; font-weight: 700; font-size: 13px;
    color: var(--resting-slate); border-bottom: 3px solid transparent; margin-bottom: -2px;
  }
  .tab-btn.active { color: var(--court-green); border-bottom-color: var(--court-green); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* roster */
  .add-player-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .add-player-row input { flex: 1; min-width: 140px; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: var(--radius-sm); }
  .add-player-row select { padding: 10px; border: 1.5px solid #ddd; border-radius: var(--radius-sm); }
  .add-player-row button { background: var(--court-green); color: white; border: none; padding: 10px 18px; border-radius: var(--radius-sm); font-weight: 700; }

  .roster-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .roster-table th { text-align: left; padding: 8px; color: var(--resting-slate); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
  .roster-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
  .status-pill { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; color: white; }
  .status-waiting { background: var(--waiting-blue); }
  .status-playing { background: var(--court-green); }
  .status-winners_queue { background: var(--winner-green); }
  .status-losers_queue { background: var(--loser-coral); }
  .status-resting { background: var(--resting-slate); }
  .roster-table button.remove-btn { background: none; border: none; color: var(--loser-coral); font-size: 11px; font-weight: 700; }

  .player-checklist { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .player-check {
    border: 1.5px solid #ddd; padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
    cursor: pointer; user-select: none;
  }
  .player-check.selected { background: var(--court-green); color: white; border-color: var(--court-green); }
  .player-check.disabled { opacity: 0.35; cursor: not-allowed; }

  /* courts */
  .courts-host-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .court-host-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
  .court-host-label { background: var(--court-green); color: white; padding: 10px 14px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; }
  .court-host-body { padding: 14px; }
  .matchup-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; font-weight: 600; }
  .matchup-vs { color: var(--resting-slate); font-size: 11px; }
  .win-select-btn {
    background: var(--winner-green); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
  }
  .court-empty-msg { color: var(--resting-slate); font-size: 13px; text-align: center; padding: 12px 0; }
  .court-empty-msg.eligible { color: var(--court-green); font-weight: 700; }
  .assign-btn {
    width: 100%; background: var(--kitchen-gold); color: var(--ink); border: none; padding: 9px; border-radius: var(--radius-sm); font-weight: 700; font-size: 12px; margin-top: 8px;
  }

  /* messages / rest requests */
  .inbox-item { padding: 12px; border-radius: var(--radius-sm); background: #fafaf7; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .inbox-item .who { font-weight: 700; font-size: 13px; }
  .inbox-item .what { font-size: 13px; color: var(--ink); }
  .inbox-item .when { font-size: 11px; color: var(--resting-slate); }
  .inbox-actions button { font-size: 11px; font-weight: 700; border: none; padding: 6px 10px; border-radius: 6px; margin-left: 6px; }
  .btn-confirm { background: var(--winner-green); color: white; }
  .btn-dismiss { background: #eee; color: var(--ink); }
  .empty-inbox { color: var(--resting-slate); font-size: 13px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="display">iStackyyy<span class="dot">.</span></span></div>
  <div class="topbar-right" id="topbarRight"></div>
</div>

<div class="container" id="appRoot">
  <!-- rendered by host-app.js -->
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/stacking-engine.js"></script>
<script src="../js/session-api.js"></script>
<script src="../js/host-app.js"></script>
</body>
</html>
