        <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--bench-slate);letter-spacing:.06em;margin-bottom:6px">Round ${r}</div>
        ${ms.map(m=>{
          const eA=[...TEAMS,...BYES].find(t=>t.id===m.entry_a_id),eB=[...TEAMS,...BYES].find(t=>t.id===m.entry_b_id);
          const done=m.status==='completed';
          const wA=done&&m.winner_id===m.entry_a_id;
          const live=m.status==='in_progress';
          return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface-raised);border-radius:var(--radius-sm);margin-bottom:5px;font-size:12px;${live?'border:1px solid rgba(215,242,61,.4)':''}">
            <span style="font-weight:${done&&wA?'800':'600'};color:${done&&wA?'var(--winner-green)':'var(--ink)'}">${esc(eA?.team_name||'?')}</span>
            <span style="font-family:var(--font-mono);font-weight:700;color:var(--bench-slate)">${done?`${m.score_a}–${m.score_b}`:live?'▶ LIVE':'vs'}</span>
            <span style="font-weight:${done&&!wA?'800':'600'};color:${done&&!wA?'var(--winner-green)':'var(--ink)'}">${esc(eB?.team_name||'?')}</span>
            ${live?`<span style="margin-left:auto;font-size:10px;color:var(--optic-yellow);font-weight:700">Court ${esc(m.court_label)}</span>`:''}
            ${done?`<button style="margin-left:auto;font-size:9px;color:var(--fault-coral);background:none;border:none;cursor:pointer;min-height:0;padding:0;font-weight:700" onclick="openReverseModal('${m.id}')">↺ Reverse</button>`:''}
          </div>`;
        }).join('')}
      </div>`;
    }

    return `<div class="card" style="margin-bottom:12px">
      <h2 style="margin-bottom:10px">${label} — Standings</h2>
      ${standings.length?leaderboardHtml:`<p style="font-size:12px;color:var(--bench-slate);margin:0">No completed matches yet.</p>`}
      <h3 style="margin:16px 0 8px;font-size:13px">Crosstable</h3>
      ${matrixHtml}
      <h3 style="margin:16px 0 8px;font-size:13px">Schedule</h3>
      ${roundsHtml}
    </div>`;
  }

  // ── If the Finals bracket already exists, show that instead (same tree
  // as single elimination — no separate renderer needed) with a toggle
  // back to the group-stage results for reference. ──
  if(finalsExist){
    const groupSectionsHtml=groupStandings.map(({groupNum,standings})=>
      renderOneGroup(groupNum,standings,isGrouped?`Group ${String.fromCharCode(64+groupNum)}`:'Round Robin')).join('');
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <span style="font-size:11px;color:var(--bench-slate)">Round Robin → Finals · ${TEAMS.length} teams</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="_showGroupStageResults=!_showGroupStageResults;render()">${window._showGroupStageResults?'🏆 View Finals Bracket':'📋 View Group Stage Results'}</button>
          <button class="btn btn-ghost btn-sm" onclick="confirmChangeFormat()">⇄ Change Format</button>
        </div>
      </div>
      ${window._showGroupStageResults?groupSectionsHtml:buildNCAABracket()}
    `;
  }

  // ── Group stage still in progress (or a single ungrouped round robin) ──
  const groupSectionsHtml=groupStandings.map(({groupNum,standings})=>
    renderOneGroup(groupNum,standings,isGrouped?`Group ${String.fromCharCode(64+groupNum)}`:'Round Robin')).join('');

  let finalsHtml='';
  if(allGroupsDone){
    const maxAdvance=Math.max(1,Math.min(4,smallestGroupSize));
    const advanceOptions=Array.from({length:maxAdvance},(_,i)=>i+1)
      .map(n=>`<option value="${n}">Top ${n} per group</option>`).join('');
    finalsHtml=`<div class="card" style="margin-bottom:12px;border:1px solid rgba(215,242,61,.3)">
      <h2 style="margin-bottom:8px">🏆 ${isGrouped?'Group Stage':'Round Robin'} Complete</h2>
      <p style="font-size:12px;color:var(--bench-slate);margin:0 0 12px">
        Every match played. Pick how many teams advance from ${isGrouped?'each group':'the standings'} into the Finals bracket
        (Semifinal → Final${isGrouped||smallestGroupSize>=4?' → 3rd Place':''}).
      </p>
      ${isGrouped?`<div class="field" style="max-width:220px"><label>Teams advancing per group</label><select id="rrAdvanceCount">${advanceOptions}</select></div>`
        :`<input type="hidden" id="rrAdvanceCount" value="${maxAdvance>=2?2:1}">`}
      <button class="btn btn-yellow" style="margin-top:10px" onclick="generateFinal(parseInt(document.getElementById('rrAdvanceCount').value,10))">Generate Finals Bracket →</button>
    </div>`;
  }else{
    const doneCount=rrMatches.filter(m=>m.status==='completed').length;
    finalsHtml=`<div class="card" style="margin-bottom:12px">
      <p style="font-size:12px;color:var(--bench-slate);margin:0">📋 ${doneCount} of ${rrMatches.length} round robin matches played. The Finals bracket unlocks once every group finishes.</p>
    </div>`;
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <span style="font-size:11px;color:var(--bench-slate)">Round Robin · ${TEAMS.length} teams${isGrouped?` · ${groupStandings.length} groups`:''} · ${rrMatches.length} matches</span>
      <button class="btn btn-ghost btn-sm" onclick="confirmChangeFormat()">⇄ Change Format</button>
    </div>
    ${finalsHtml}
    ${groupSectionsHtml}
  `;
}

// Builds the full Finals knockout bracket (Semifinal → Final → 3rd Place,
// or bigger if more groups/qualifiers) from the cross-seeded group-stage
// results. Reuses the EXACT SAME match_type conventions as a normal single
// elimination bracket ('winners' / 'third_place'), so buildNCAABracket()
// renders and scores it with zero changes — no second bracket engine needed.
function confirmRegenerateFinals(){
  M(`<div class="overlay" onclick="if(event.target===this)CM()">
    <div class="modal">
      <h2>Regenerate Finals Bracket?</h2>
      <p class="modal-sub">This clears the Finals bracket only — your group stage results, crosstables, and standings are untouched.
        You'll be able to pick the advance-per-group count again.<br><br>
        <strong style="color:var(--fault-coral)">⚠ Any Finals match results already played will be lost.</strong></p>
      <div class="ma">
        <button class="no" onclick="CM()">Cancel</button>
        <button class="ok-y" onclick="CM();doRegenerateFinals()">Clear Finals</button>
      </div>
    </div>
  </div>`);
}
async function doRegenerateFinals(){
  const finalsMatches=MATCHES.filter(m=>m.match_type==='winners'||m.match_type==='third_place');
  const byeIds=new Set();
  finalsMatches.forEach(m=>{
    [m.entry_a_id,m.entry_b_id].forEach(id=>{ if(id&&BYES.some(b=>b.id===id))byeIds.add(id); });
  });
  await db.from('bracket_matches').delete().in('id',finalsMatches.map(m=>m.id));
  if(byeIds.size)await db.from('bracket_entries').delete().in('id',[...byeIds]);
  window._showGroupStageResults=true;
  await loadAll();render();
}

async function generateFinal(advancePerGroup){
  advancePerGroup=advancePerGroup||1;
  const groupStandings=computeAllGroupStandings();

  // ── Special case: exactly 2 groups, top 2 advancing ──
  // A semifinal round is unnecessary here — with only 4 qualifiers from
  // 2 groups, direct same-rank pairing IS the whole tournament: group
  // winners meet for the championship, runners-up meet for 3rd place.
  // Any other combination (3+ groups, or a different advance count) still
  // needs the cross-seeded bracket below since "same rank" has no single
  // opponent once there are more than 2 groups.
  if(groupStandings.length===2&&advancePerGroup===2){
    const[gA,gB]=groupStandings;
    if(!gA.standings[0]||!gA.standings[1]||!gB.standings[0]||!gB.standings[1]){
      alert('Need both groups to have at least 2 teams with results.');return;
    }
    const rows=[
      {bracket_id:BRACKET.id,round:1,position:1,best_of:1,status:'pending',match_type:'winners',
        entry_a_id:gA.standings[0].id,entry_b_id:gB.standings[0].id,
        score_a:null,score_b:null,winner_id:null,loser_id:null},
      {bracket_id:BRACKET.id,round:1,position:2,best_of:1,status:'pending',match_type:'third_place',
        entry_a_id:gA.standings[1].id,entry_b_id:gB.standings[1].id,
        score_a:null,score_b:null,winner_id:null,loser_id:null},
    ];
    const{error}=await db.from('bracket_matches').insert(rows);
    if(error){alert('Could not create Finals: '+error.message);return}
    await loadAll();render();
    return;
  }

  const qualifiers=crossSeedQualifiers(advancePerGroup);
  if(qualifiers.length<2){alert('Need at least 2 qualifying teams to generate a Finals bracket.');return}

  const slots=nextP2(qualifiers.length);
  const totalRounds=Math.log2(slots);
  const seedOrder=standardSeedOrder(slots); // seed numbers in R1 slot order

  // Create BYE entries for any padding slots beyond the real qualifier count —
  // these always land against the TOP seeds (standard practice: strong
  // teams get the bye) because standardSeedOrder always pairs seed k with
  // seed (slots+1-k), and padding always fills the highest seed numbers.
  const byeCache={};
  async function byeEntryFor(seedNum){
    if(byeCache[seedNum])return byeCache[seedNum];
    const{data:bye}=await db.from('bracket_entries').insert({bracket_id:BRACKET.id,session_id:SID,team_name:'BYE',is_bye:true}).select().single();
    byeCache[seedNum]=bye.id;
    return bye.id;
  }

  const baseRound=1; // finals bracket ALWAYS starts fresh at round 1 — buildNCAABracket()
                      // only looks at match_type==='winners' rows and computes its own
                      // round-relative labels from them, so reusing round-robin's round
                      // numbers here just creates empty phantom columns before it.

  const rows=[];
  const r1ByePairs=[]; // {position, realTeamId, realSide} for post-insert auto-complete

  for(let p=1;p<=slots/2;p++){
    const seedA=seedOrder[(p-1)*2], seedB=seedOrder[(p-1)*2+1];
    const qA=qualifiers[seedA-1], qB=qualifiers[seedB-1];
    let entryA=qA?qA.id:null, entryB=qB?qB.id:null;
    let byeSide=null;
    if(!qA&&qB){entryA=await byeEntryFor(seedA);byeSide='A';}
    else if(!qB&&qA){entryB=await byeEntryFor(seedB);byeSide='B';}
    rows.push({
      bracket_id:BRACKET.id,round:baseRound,position:p,best_of:1,
      status:byeSide?'completed':'pending',match_type:'winners',
      entry_a_id:entryA,entry_b_id:entryB,
      winner_id:byeSide==='A'?entryB:byeSide==='B'?entryA:null,
      loser_id:byeSide==='A'?entryA:byeSide==='B'?entryB:null,
      score_a:null,score_b:null,
    });
  }
  for(let r=2;r<=totalRounds;r++){
    const cnt=slots/Math.pow(2,r);
    for(let p=1;p<=cnt;p++)rows.push({
      bracket_id:BRACKET.id,round:baseRound+r-1,position:p,best_of:1,status:'pending',
      match_type:'winners',entry_a_id:null,entry_b_id:null,score_a:null,score_b:null,winner_id:null,loser_id:null,
    });
  }
  rows.push({
    bracket_id:BRACKET.id,round:baseRound+totalRounds-1,position:2,best_of:1,status:'pending',
    match_type:'third_place',entry_a_id:null,entry_b_id:null,score_a:null,score_b:null,winner_id:null,loser_id:null,
  });

  const{error}=await db.from('bracket_matches').insert(rows);
  if(error){alert('Could not create Finals bracket: '+error.message);return}

  await loadAll();
  await propagate(); // push any bye auto-wins from R1 straight into R2
  await loadAll();render();
}

// RENDER — SCOREBOARD TAB
// ════════════════════════════════════════════
function renderScoreboard(){
  if(!BRACKET||MATCHES.length===0) return`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No bracket yet</div><p>Generate a bracket first, then enter match results to see the scoreboard.</p></div>`;

  const done=MATCHES.filter(m=>m.status==='completed'&&m.score_a!=null);
  const isRR=BRACKET.bracket_type==='round_robin';

  // Build standings from all completed matches
  const stats={};
  TEAMS.forEach(t=>{stats[t.id]={id:t.id,name:t.team_name,p1:t.player1_name,p2:t.player2_name,seed:t.seed,w:0,l:0,pf:0,pa:0,gp:0}});
  for(const m of done){
    if(m.winner_id&&stats[m.winner_id]){const s=stats[m.winner_id];s.w++;s.gp++;s.pf+=m.score_a===m.winner_id?m.score_a:m.score_b;// simplified
    }
    // Recalculate properly
  }

  // Recalculate stats properly
  Object.values(stats).forEach(s=>{s.w=0;s.l=0;s.pf=0;s.pa=0;s.gp=0});
  for(const m of done){
    const isA_w=m.winner_id===m.entry_a_id;
    const wId=m.winner_id,lId=isA_w?m.entry_b_id:m.entry_a_id;
    // Points tally: sum every game's points (Bo3 counts all games).
    let ptsA=0,ptsB=0;
    if(Array.isArray(m.games)&&m.games.length){
      for(const g of m.games){ptsA+=g.a||0;ptsB+=g.b||0}
    }else{ptsA=m.score_a||0;ptsB=m.score_b||0}
    const wScore=isA_w?ptsA:ptsB, lScore=isA_w?ptsB:ptsA;
    if(stats[wId]){const s=stats[wId];s.w++;s.gp++;s.pf+=wScore;s.pa+=lScore}
    if(stats[lId]){const s=stats[lId];s.l++;s.gp++;s.pf+=lScore;s.pa+=wScore}
  }

  const sorted=Object.values(stats).filter(s=>s.gp>0).sort((a,b)=>b.w-a.w||(b.pf-b.pa)-(a.pf-a.pa)||a.l-b.l);
  const all=Object.values(stats).sort((a,b)=>(a.seed||99)-(b.seed||99));

  // Round results table
  const wM=MATCHES.filter(m=>m.match_type==='winners');
  const maxWR=wM.reduce((a,m)=>Math.max(a,m.round),0);

  return`
    <div class="card" style="margin-bottom:12px">
      <h2 style="margin-bottom:12px">🏅 Standings</h2>
      <div class="scroll-x">
        <table class="stbl">
          <thead><tr><th>#</th><th>Team</th><th>Players</th><th>W</th><th>L</th><th>GP</th><th>PF</th><th>PA</th><th>Diff</th><th>Win%</th></tr></thead>
          <tbody>
            ${sorted.length===0?`<tr><td colspan="10" style="text-align:center;color:var(--bench-slate);padding:20px">No completed matches yet</td></tr>`:
            sorted.map((s,i)=>`<tr class="${i===0?'hl':''}">
              <td style="font-weight:800;font-family:var(--font-mono)">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
              <td style="font-weight:700">${esc(s.name)}</td>
              <td style="font-size:11px;color:var(--bench-slate)">${s.p1?esc(s.p1)+(s.p2?' &amp; '+esc(s.p2):''):''}</td>
              <td style="color:var(--winner-green);font-weight:700;font-family:var(--font-mono)">${s.w}</td>
              <td style="color:var(--fault-coral);font-family:var(--font-mono)">${s.l}</td>
              <td style="font-family:var(--font-mono)">${s.gp}</td>
              <td style="font-family:var(--font-mono)">${s.pf}</td>
              <td style="font-family:var(--font-mono)">${s.pa}</td>
              <td style="font-family:var(--font-mono);font-weight:700;color:${s.pf-s.pa>=0?'var(--winner-green)':'var(--fault-coral)'}">${s.pf-s.pa>=0?'+':''}${s.pf-s.pa}</td>
              <td style="font-family:var(--font-mono)">${s.gp?Math.round(s.w/s.gp*100):0}%</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-bottom:12px">📋 Match Results by Round</h2>
      ${Array.from({length:maxWR},(_,i)=>{
        const r=i+1;
        const ms=wM.filter(m=>m.round===r);
        const doneMids=ms.filter(m=>m.status==='completed');
        if(doneMids.length===0)return`<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--bench-slate);letter-spacing:.06em;margin-bottom:6px">${roundLabel(r,maxWR)}</div><div style="font-size:12px;color:var(--bench-slate)">No completed matches yet</div></div>`;
        return`<div style="margin-bottom:14px">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--bench-slate);letter-spacing:.06em;margin-bottom:6px">${roundLabel(r,maxWR)}</div>
          ${doneMids.map(m=>{
            const eA=TEAMS.find(t=>t.id===m.entry_a_id),eB=TEAMS.find(t=>t.id===m.entry_b_id);
            const wA=m.winner_id===m.entry_a_id;
            return`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface-raised);border-radius:var(--radius-sm);margin-bottom:5px;font-size:12px">
              <span style="font-weight:${wA?'800':'600'};color:${wA?'var(--winner-green)':'var(--ink)'};">${esc(eA?.team_name||'?')}</span>
              <span style="font-family:var(--font-mono);font-weight:700;color:var(--bench-slate);flex:0;">${m.score_a}–${m.score_b}</span>
              <span style="font-weight:${!wA?'800':'600'};color:${!wA?'var(--winner-green)':'var(--ink)'};">${esc(eB?.team_name||'?')}</span>
              <button style="margin-left:auto;font-size:9px;color:var(--fault-coral);background:none;border:none;cursor:pointer;min-height:0;padding:0;font-weight:700" onclick="openReverseModal('${m.id}')">↺ Reverse</button>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

(async()=>{
  if(!SID){
    document.getElementById('tabContent').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">No Session</div><p>Open this page from the host console.</p></div>`;
    return;
  }

  // Permission gate: this page is the host's tournament management console.
  // If the logged-in host's Tournament access has been revoked, block
  // entirely — re-check against the DB (not just localStorage) so a
  // just-revoked permission takes effect immediately, not after next login.
  try{
    const savedHost=JSON.parse(localStorage.getItem('istackyyy_host_session')||'null');
    if(savedHost?.id){
      const{data:hostRow}=await db.from('host_accounts').select('allow_tournament').eq('id',savedHost.id).single();
      if(hostRow&&hostRow.allow_tournament===false){
        document.getElementById('tabContent').innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><div class="empty-title">Tournament Access Restricted</div><p>Your account's Tournament access has been turned off by the administrator.<br>Contact them if you believe this is a mistake.</p></div>`;
        return;
      }
    }
  }catch(_){/* if the check itself fails, fail open — don't block on a network hiccup */}

  await loadAll();
  render();

  // Real-time updates
  db.channel(`tourn-${SID}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'bracket_matches',filter:`bracket_id=eq.${BRACKET?.id||'none'}`},async()=>{await loadAll();render()})
    .on('postgres_changes',{event:'*',schema:'public',table:'bracket_entries',filter:`session_id=eq.${SID}`},async()=>{await loadAll();render()})
    .subscribe();
})();
</script>
</body>
</html>
