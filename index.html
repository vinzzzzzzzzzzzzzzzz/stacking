<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStackyyy — Live Court Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<style>
  body { padding-bottom: 80px; }

  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--court-green);
    color: var(--line-paint);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow-card);
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .display { font-size: 22px; color: var(--line-paint); }
  .brand .dot { color: var(--kitchen-gold); }
  .session-name { font-size: 13px; opacity: 0.8; font-weight: 500; }
  .session-picker {
    display: flex; gap: 8px; align-items: center;
  }
  .session-picker input {
    font-family: var(--font-mono);
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: none;
    width: 220px;
    font-size: 13px;
  }
  .session-picker button {
    background: var(--kitchen-gold);
    color: var(--ink);
    border: none;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* ---------- Court grid ---------- */
  .courts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 36px;
  }

  .court-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .court-label {
    background: var(--court-green-dark);
    color: var(--line-paint);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .court-label .num { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.05em; }
  .court-timer { font-family: var(--font-mono); font-weight: 700; font-size: 15px; color: var(--kitchen-gold); }
  .court-timer.idle { color: var(--resting-slate); }

  /* Literal court diagram */
  .court-diagram {
    background: var(--court-green);
    aspect-ratio: 4 / 5;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 14px;
  }
  .court-diagram::before {
    /* outer boundary line */
    content: '';
    position: absolute;
    inset: 14px;
    border: 3px solid var(--line-paint);
    opacity: 0.85;
  }
  .net-line {
    position: absolute;
    left: 14px; right: 14px; top: 50%;
    height: 4px;
    background: var(--line-paint);
    transform: translateY(-50%);
    opacity: 0.9;
  }
  .net-line::after {
    content: '';
    position: absolute; left: 0; right: 0; top: -3px; bottom: -3px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 4px, transparent 4px 9px);
    opacity: 0.5;
  }
  .kitchen-line-top, .kitchen-line-bottom {
    position: absolute;
    left: 14px; right: 14px;
    height: 2px;
    background: var(--line-paint);
    opacity: 0.55;
  }
  .kitchen-line-top { top: 32%; }
  .kitchen-line-bottom { bottom: 32%; }

  .court-side {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    z-index: 2;
    flex-wrap: wrap;
    padding: 8px;
  }
  .player-chip {
    background: var(--line-paint);
    color: var(--ink);
    font-weight: 700;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-chip.winner-tag { box-shadow: 0 0 0 2px var(--kitchen-gold), 0 2px 6px rgba(0,0,0,0.2); }
  .empty-court-msg {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--line-paint);
    opacity: 0.6;
    font-size: 13px;
    font-weight: 600;
    z-index: 2;
  }

  .court-actions {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
  }
  .win-btn {
    flex: 1;
    background: var(--winner-green);
    color: white;
    border: none;
    padding: 9px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 12px;
  }

  /* ---------- Queue lanes ---------- */
  .queues {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .lane {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .lane-header {
    padding: 12px 16px;
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .lane-header .count { font-family: var(--font-mono); opacity: 0.85; }
  .lane.winners .lane-header { background: var(--winner-green); }
  .lane.losers .lane-header { background: var(--loser-coral); }
  .lane.waiting .lane-header { background: var(--waiting-blue); }
  .lane.resting .lane-header { background: var(--resting-slate); }

  .lane-list { list-style: none; margin: 0; padding: 8px; min-height: 60px; }
  .lane-item {
    padding: 8px 10px;
    border-bottom: 1px solid #eee;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .lane-item:last-child { border-bottom: none; }
  .lane-pos { font-family: var(--font-mono); color: var(--resting-slate); font-weight: 700; font-size: 11px; }
  .lane-empty { padding: 16px; text-align: center; color: var(--resting-slate); font-size: 12px; }

  /* ---------- "Where am I" search ---------- */
  .find-me {
    background: var(--kitchen-gold);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 28px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .find-me input {
    flex: 1;
    min-width: 180px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
  }
  .find-me-result {
    font-weight: 700;
    font-size: 13px;
    background: var(--ink);
    color: white;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
  }

  /* ---------- Message box ---------- */
  .message-box {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    padding: 16px;
  }
  .message-box h3 { font-size: 13px; margin: 0 0 10px; }
  .message-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .message-row input {
    padding: 9px 10px;
    border: 1px solid #ddd;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .message-row input[name="from"] { width: 120px; }
  .message-row input[name="msg"] { flex: 1; min-width: 160px; }
  .message-row button {
    background: var(--court-green);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 13px;
  }
  .message-hint { font-size: 11px; color: var(--resting-slate); margin-top: 8px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--resting-slate);
  }
  .empty-state .display { font-size: 18px; color: var(--ink); margin-bottom: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="display">iStackyyy<span class="dot">.</span></span>
    <span class="session-name" id="sessionNameLabel"></span>
  </div>
  <div class="session-picker" id="sessionPicker">
    <input type="text" id="sessionIdInput" placeholder="Paste session link or ID">
    <button onclick="loadSessionFromInput()">View</button>
  </div>
</div>

<div class="container" id="mainContent">
  <div class="empty-state">
    <div class="display">No session loaded</div>
    <p>Ask your host for the session link, or paste the session ID above.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/stacking-engine.js"></script>
<script src="../js/session-api.js"></script>
<script src="../js/index-app.js"></script>
</body>
</html>
