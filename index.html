<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStackyyy — Live Court Board</title>
<script>
  (function() {
    var stored = localStorage.getItem('istackyyy_theme');
    document.documentElement.setAttribute('data-theme', stored === 'light' ? 'light' : 'dark');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root, html[data-theme="dark"] {
    --bg:#0F1413; --surface:#181F1D; --surface-raised:#202927;
    --surface-hover:#263330; --ink:#F2F4F0; --ink-muted:#8FA39B;
    --border-soft:rgba(242,244,240,0.08); --court-green:#1B4D3E;
    --court-green-dark:#0E2820; --accent:#D7F23D; --accent-ink:#0F1413;
    --accent-glow:rgba(215,242,61,0.35); --winner-green:#4ECB7E;
    --loser-coral:#FF7A5C; --resting-slate:#6B7872; --waiting-blue:#6FA8E0;
    --shadow-card:0 4px 24px rgba(0,0,0,0.35); --shadow-raised:0 8px 32px rgba(0,0,0,0.45);
  }
  html[data-theme="light"] {
    --bg:#F7F5EF; --surface:#FFFFFF; --surface-raised:#FFFFFF;
    --surface-hover:#F0EEE6; --ink:#15201C; --ink-muted:#6B7872;
    --border-soft:rgba(21,32,28,0.08); --court-green:#1B4D3E;
    --court-green-dark:#123329; --accent:#7A9A0E; --accent-ink:#FFFFFF;
    --accent-glow:rgba(122,154,14,0.22); --winner-green:#2F9A5C;
    --loser-coral:#D9523A; --resting-slate:#8E9B97; --waiting-blue:#4E7FB5;
    --shadow-card:0 2px 14px rgba(21,32,28,0.12); --shadow-raised:0 8px 28px rgba(21,32,28,0.16);
  }
  :root {
    --font-display:'Archivo Black','Arial Black',sans-serif;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'JetBrains Mono','Courier New',monospace;
    --radius:14px; --radius-sm:8px;
    --kitchen-gold:var(--accent); --line-paint:#F7F5EF;
    --ease-bounce:cubic-bezier(0.34,1.56,0.64,1);
    --ease-serve:cubic-bezier(0.22,0.68,0.36,1);
    --ease-settle:cubic-bezier(0.16,1,0.3,1);
    --dur-fast:220ms; --dur-base:380ms; --dur-shuffle:450ms; --dur-pulse:900ms;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{color-scheme:dark}
  html[data-theme="light"]{color-scheme:light}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);overflow-x:hidden;transition:background var(--dur-base) var(--ease-settle),color var(--dur-base) var(--ease-settle)}
  h1,h2,h3,.display{font-family:var(--font-display);letter-spacing:-0.01em;text-transform:uppercase}
  a{color:inherit}
  button{font-family:var(--font-body);cursor:pointer;touch-action:manipulation}
  ::selection{background:var(--accent);color:var(--accent-ink)}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.001ms!important;animation-iteration-count:1!important;transition-duration:0.001ms!important}}
  .mono{font-family:var(--font-mono)}

  input,select,textarea{font-size:16px;min-height:44px;background:var(--surface-raised);color:var(--ink);border-color:var(--border-soft)}
  button{min-height:44px}

  @keyframes realtime-pulse{0%{box-shadow:0 0 0 0 var(--accent-glow)}35%{box-shadow:0 0 0 6px var(--accent-glow)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}}
  .pulse-update{animation:realtime-pulse var(--dur-pulse) var(--ease-settle)}
  @keyframes drop-settle{0%{opacity:0;transform:translateY(-14px) scale(0.97)}60%{opacity:1}100%{opacity:1;transform:translateY(0) scale(1)}}
  .drop-in{animation:drop-settle var(--dur-base) var(--ease-bounce) both}
  .stagger-item{animation:drop-settle var(--dur-base) var(--ease-bounce) both}
  .stagger-item:nth-child(1){animation-delay:0ms}
  .stagger-item:nth-child(2){animation-delay:40ms}
  .stagger-item:nth-child(3){animation-delay:80ms}
  .stagger-item:nth-child(4){animation-delay:120ms}
  .stagger-item:nth-child(5){animation-delay:160ms}
  .stagger-item:nth-child(6){animation-delay:200ms}
  .stagger-item:nth-child(7){animation-delay:240ms}
  .stagger-item:nth-child(8){animation-delay:280ms}
  @keyframes serve-in{0%{opacity:0;transform:translate(-10px,8px) rotate(-1.2deg)}100%{opacity:1;transform:translate(0,0) rotate(0deg)}}
  .serve-in{animation:serve-in var(--dur-fast) var(--ease-serve) both}

  .theme-toggle{background:var(--surface-hover);border:1px solid var(--border-soft);border-radius:999px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:transform var(--dur-fast) var(--ease-bounce),background var(--dur-fast) var(--ease-settle);flex-shrink:0}
  .theme-toggle:hover{transform:scale(1.08) rotate(-8deg)}
  .theme-toggle:active{transform:scale(0.94)}
  .theme-toggle svg{width:18px;height:18px;color:var(--accent)}

  body{padding-bottom:80px}

  /* TOPBAR */
  .topbar{background:linear-gradient(135deg,var(--court-green) 0%,var(--court-green-dark) 100%);color:var(--line-paint);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-card)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-paddle{width:22px;height:30px;color:var(--kitchen-gold);flex-shrink:0}
  .brand .display{font-size:22px;color:var(--line-paint)}
  .brand .dot{color:var(--kitchen-gold)}
  .session-name{font-size:13px;opacity:0.8;font-weight:500}
  .session-picker{display:flex;gap:8px;align-items:center}
  .session-picker input{font-family:var(--font-mono);padding:10px 12px;border-radius:var(--radius-sm);border:none;width:220px;font-size:16px;background:rgba(255,255,255,0.15);color:white}
  .session-picker input::placeholder{color:rgba(255,255,255,0.6)}
  .session-picker button{background:var(--kitchen-gold);color:var(--ink);border:none;font-weight:700;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px}

  .container{max-width:1200px;margin:0 auto;padding:24px}

  /* COURTS */
  .courts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:36px}
  .court-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);overflow:hidden;transition:transform var(--dur-fast) var(--ease-bounce),box-shadow var(--dur-fast) var(--ease-settle)}
  .court-card:hover{transform:translateY(-3px) scale(1.012);box-shadow:var(--shadow-raised)}
  .court-label{background:var(--court-green-dark);color:var(--line-paint);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
  .court-label .num{font-family:var(--font-display);font-size:14px;letter-spacing:0.05em}
  .court-timer{font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--kitchen-gold)}
  .court-timer.idle{color:var(--resting-slate)}
  .court-diagram{background:linear-gradient(160deg,var(--court-green) 0%,var(--court-green-dark) 100%);aspect-ratio:4/5;position:relative;display:flex;flex-direction:column;padding:14px}
  .court-diagram::before{content:'';position:absolute;inset:14px;border:3px solid var(--line-paint);opacity:0.85}
  .net-line{position:absolute;left:14px;right:14px;top:50%;height:4px;background:var(--line-paint);transform:translateY(-50%);opacity:0.9}
  .net-line::after{content:'';position:absolute;left:0;right:0;top:-3px;bottom:-3px;background:repeating-linear-gradient(90deg,var(--ink) 0 4px,transparent 4px 9px);opacity:0.5}
  .net-ball{position:absolute;width:18px;height:18px;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--kitchen-gold);z-index:3;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))}
  .kitchen-line-top,.kitchen-line-bottom{position:absolute;left:14px;right:14px;height:2px;background:var(--line-paint);opacity:0.55;z-index:1}
  .kitchen-line-top{top:32%}
  .kitchen-line-bottom{bottom:32%}
  .centerline-top,.centerline-bottom{position:absolute;left:50%;width:2px;background:var(--line-paint);opacity:0.55;transform:translateX(-50%);z-index:1}
  .centerline-top{top:14px;height:calc(32% - 14px)}
  .centerline-bottom{bottom:14px;height:calc(32% - 14px)}
  .court-side{flex:1;display:flex;align-items:center;justify-content:space-evenly;position:relative;z-index:2;padding:8px 16px}
  .empty-court-msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--line-paint);opacity:0.6;font-size:13px;font-weight:600;z-index:2}
  .paddle-chip{display:flex;flex-direction:column;align-items:center;gap:2px;width:84px;flex:1 1 0;max-width:110px}
  .paddle-chip-shape{width:100%;aspect-ratio:48/64;position:relative;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.3))}
  .paddle-chip-shape svg{width:100%;height:100%;display:block;color:var(--line-paint)}
  .paddle-chip-name{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:72%;font-size:14px;font-weight:800;color:var(--ink);text-align:center;line-height:1.15;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}

  /* DIVIDER */
  .court-line-divider{height:2px;margin:20px 0;background-image:repeating-linear-gradient(90deg,var(--border-soft) 0 10px,transparent 10px 18px)}

  /* QUEUE */
  .queues{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:36px}
  .lane{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);overflow:hidden}
  .lane-header{padding:12px 16px;font-family:var(--font-display);font-size:13px;letter-spacing:0.04em;color:white;display:flex;justify-content:space-between;align-items:center}
  .lane-header .count{font-family:var(--font-mono);opacity:0.85}
  .lane.waiting .lane-header{background:var(--waiting-blue)}
  .lane.resting .lane-header{background:var(--resting-slate)}
  .lane.expected .lane-header{background:var(--court-green-dark)}
  .lane-list{list-style:none;margin:0;padding:8px;min-height:60px}
  .lane-item{padding:8px 10px;border-bottom:1px solid var(--border-soft);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;transition:background var(--dur-fast) var(--ease-settle),padding-left var(--dur-fast) var(--ease-bounce)}
  .lane-item:hover{background:var(--surface-hover);padding-left:14px}
  .lane-item:last-child{border-bottom:none}
  .lane-pos{font-family:var(--font-mono);color:var(--resting-slate);font-weight:700;font-size:11px}
  .result-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;font-size:9px;font-weight:800;margin-left:4px}
  .result-badge.won{background:var(--winner-green);color:white}
  .result-badge.lost{background:var(--loser-coral);color:white}
  .lane-empty{padding:16px;text-align:center;color:var(--resting-slate);font-size:12px}

  /* FIND ME */
  .find-me{background:var(--kitchen-gold);border-radius:var(--radius);padding:16px;margin-bottom:28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .find-me input{flex:1;min-width:180px;padding:12px;border-radius:var(--radius-sm);border:none;font-size:16px;background:rgba(255,255,255,0.9);color:var(--accent-ink)}
  .find-me-result{font-weight:700;font-size:13px;background:var(--ink);color:white;padding:8px 12px;border-radius:var(--radius-sm)}

  /* RECENT RESULTS */
  .recent-results{margin-bottom:24px}
  .recent-results-title{font-size:13px;margin:0 0 12px;color:var(--ink);text-transform:uppercase;letter-spacing:0.03em;padding-bottom:8px;background-image:repeating-linear-gradient(90deg,var(--border-soft) 0 8px,transparent 8px 14px);background-position:bottom;background-repeat:repeat-x;background-size:100% 2px}
  .recent-results-list{display:flex;flex-direction:column;gap:6px}
  .recent-result-row{background:var(--surface);box-shadow:var(--shadow-card);border-radius:var(--radius-sm);padding:10px 14px;display:grid;grid-template-columns:1fr auto 1fr auto;gap:10px;align-items:center;font-size:13px;font-weight:600}
  .recent-result-score{font-size:13px;font-weight:700;color:var(--court-green);text-align:center}
  .recent-result-duration{font-size:11px;color:var(--resting-slate);text-align:right}
  .winner-name{color:var(--winner-green)}

  /* LEADERBOARD (player view) */
  .lb-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:18px;margin-bottom:28px}
  .lb-card-title{font-size:15px;margin:0 0 12px}
  .roster-table{width:100%;border-collapse:collapse;font-size:13px}
  .roster-table th{text-align:left;padding:8px;color:var(--resting-slate);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border-soft)}
  .roster-table td{padding:8px;border-bottom:1px solid var(--border-soft)}
  .roster-table tr:last-child td{border-bottom:none}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
  .lb-won{color:var(--winner-green);font-weight:700}
  .lb-lost{color:var(--loser-coral)}
  .lb-pts{color:var(--accent);font-weight:700;font-family:var(--font-mono)}
  .lb-highlight{background:rgba(215,242,61,0.08);border-radius:6px}

  /* REST + MESSAGE */
  .rest-request-box{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:16px;margin-bottom:16px}
  .rest-request-box h3{font-size:13px;margin:0 0 10px}
  .rest-request-row{display:flex;gap:8px;flex-wrap:wrap}
  .rest-request-row select{flex:1;min-width:160px;padding:12px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);font-size:16px;background:var(--surface-raised);color:var(--ink)}
  .rest-request-row button{background:var(--waiting-blue);color:white;border:none;padding:12px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;white-space:nowrap}
  .message-box{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:16px}
  .message-box h3{font-size:13px;margin:0 0 10px}
  .message-row{display:flex;gap:8px;flex-wrap:wrap}
  .message-row input{padding:12px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);font-size:16px;background:var(--surface-raised);color:var(--ink)}
  .message-row input[name="from"]{width:120px}
  .message-row input[name="msg"]{flex:1;min-width:160px}
  .message-row button{background:var(--court-green);color:white;border:none;padding:9px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px}
  .message-hint{font-size:11px;color:var(--resting-slate);margin-top:8px}

  /* EMPTY */
  .empty-state{text-align:center;padding:60px 20px;color:var(--resting-slate)}
  .empty-state .display{font-size:18px;color:var(--ink);margin-bottom:8px}
  .empty-state-paddle{width:56px;height:75px;color:var(--court-green);opacity:0.25;margin-bottom:16px}

  /* MOBILE */
  @media(max-width:768px){
    .container{padding:16px 14px}
    .topbar{padding:12px 16px;flex-wrap:wrap}
    .brand{flex:1 1 100%}
    .session-picker{flex:1 1 100%}
    .session-picker input{width:100%}
    .courts-grid{grid-template-columns:1fr;gap:14px;margin-bottom:24px}
    .queues{grid-template-columns:1fr;gap:12px;margin-bottom:24px}
    .court-diagram{aspect-ratio:3/4}
    .paddle-chip{width:64px}
    .paddle-chip-name{font-size:11px}
    .find-me{flex-direction:column;align-items:stretch;padding:14px}
    .find-me input{width:100%}
    .find-me-result{text-align:center}
    .message-row{flex-direction:column}
    .message-row input[name="from"],.message-row input[name="msg"],.message-row button{width:100%}
    .rest-request-row{flex-direction:column}
    .rest-request-row select,.rest-request-row button{width:100%}
    .recent-result-row{grid-template-columns:1fr;text-align:center;gap:4px}
    .recent-result-duration{text-align:center}
    h1{font-size:18px}
  }
  @media(max-width:420px){
    .brand .display{font-size:18px}
    .empty-state{padding:40px 16px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg class="brand-paddle" viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="20" y="46" width="8" height="16" rx="3" fill="currentColor" opacity="0.85"/>
      <ellipse cx="24" cy="26" rx="20" ry="24" fill="currentColor"/>
      <circle cx="16" cy="18" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="24" cy="14" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="32" cy="18" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="14" cy="26" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="24" cy="22" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="34" cy="26" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="16" cy="34" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="24" cy="30" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="32" cy="34" r="1.4" fill="white" opacity="0.4"/>
      <circle cx="24" cy="38" r="1.4" fill="white" opacity="0.4"/>
    </svg>
    <span class="display">iStackyyy<span class="dot">.</span></span>
    <span class="session-name" id="sessionNameLabel"></span>
  </div>
  <div class="session-picker" id="sessionPicker">
    <input type="text" id="sessionIdInput" placeholder="e.g. STACK-A3F9 or paste link">
    <button onclick="loadSessionFromInput()">View</button>
  </div>
  <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle theme">
    <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
      <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
      <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
      <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
    </svg>
    <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</div>

<div class="container" id="mainContent">
  <div class="empty-state">
    <svg class="empty-state-paddle" viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="20" y="46" width="8" height="16" rx="3" fill="currentColor" opacity="0.85"/>
      <ellipse cx="24" cy="26" rx="20" ry="24" fill="currentColor"/>
      <circle cx="16" cy="18" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="24" cy="14" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="32" cy="18" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="14" cy="26" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="24" cy="22" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="34" cy="26" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="16" cy="34" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="24" cy="30" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="32" cy="34" r="1.4" fill="white" opacity="0.5"/>
      <circle cx="24" cy="38" r="1.4" fill="white" opacity="0.5"/>
    </svg>
    <div class="display">No session loaded</div>
    <p>Ask your host for the session link, or paste the session code above.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============================================================
// THEME
// ============================================================
function applyThemeIcon() {
  const theme = document.documentElement.getAttribute('data-theme') || 'dark';
  const sun  = document.getElementById('themeIconSun');
  const moon = document.getElementById('themeIconMoon');
  if (!sun || !moon) return;
  sun.style.display  = theme === 'light' ? 'block' : 'none';
  moon.style.display = theme === 'light' ? 'none'  : 'block';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('istackyyy_theme', next);
  applyThemeIcon();
}
applyThemeIcon();

// ============================================================

// ============================================================
// SESSION API (read-only player side)
// ============================================================
const SessionAPI = (() => {
  async function getSession(sessionId) {
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('id', sessionId).single();
    if (error) throw error;
    return data;
  }
  async function getSessionByReferenceCode(code) {
    const normalized = code.trim().toUpperCase();
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('reference_code', normalized).single();
    if (error) throw error;
    return data;
  }
  async function getPlayers(sessionId) {
    // Exclude 'left' players — 'expected' players ARE included so they
    // show in the "Expected" lane on the board.
    const { data, error } = await supabaseClient.from('players').select('*')
      .eq('session_id', sessionId).neq('status', 'left').order('joined_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getTeams(sessionId) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('is_active', true);
    if (error) throw error;
    return data;
  }
  async function getCourts(sessionId) {
    const { data, error } = await supabaseClient.from('courts')
      .select('*, team_a:team_a_id(*), team_b:team_b_id(*)')
      .eq('session_id', sessionId).order('court_number', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getRecentMatches(sessionId, limit = 8) {
    const { data, error } = await supabaseClient.from('matches')
      .select('*, team_a:team_a_id(*), team_b:team_b_id(*), winner:winner_team_id(*)')
      .eq('session_id', sessionId).order('ended_at', { ascending: false }).limit(limit);
    if (error) throw error;
    return data;
  }
  async function sendMessage(sessionId, playerName, message) {
    const { error } = await supabaseClient.from('messages').insert({ session_id: sessionId, player_name: playerName, message });
    if (error) throw error;
  }
  async function requestRest(sessionId, playerId) {
    const { error } = await supabaseClient.from('rest_requests').insert({ session_id: sessionId, player_id: playerId, status: 'pending' });
    if (error) throw error;
  }
  return { getSession, getSessionByReferenceCode, getPlayers, getTeams, getCourts, getRecentMatches, sendMessage, requestRest };
})();

// ============================================================
// LOAD SESSION
// ============================================================
function loadSessionFromInput() {
  const raw = document.getElementById('sessionIdInput').value.trim();
  if (!raw) return;
  try {
    const url = new URL(raw);
    const id = url.searchParams.get('session');
    if (id) { loadSession(id); return; }
  } catch (_) {}
  const looksLikeCode = /^(STACK-)?[A-Z2-9]{4}$/i.test(raw);
  if (looksLikeCode) {
    const code = raw.toUpperCase().startsWith('STACK-') ? raw.toUpperCase() : `STACK-${raw.toUpperCase()}`;
    loadSessionByCode(code); return;
  }
  loadSession(raw);
}

async function loadSessionByCode(code) {
  try {
    const session = await SessionAPI.getSessionByReferenceCode(code);
    await loadSession(session.id);
  } catch (_) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="display">Session code not found</div>
        <p>Double check the code from your host (e.g. STACK-A3F9).</p>
      </div>`;
  }
}

async function loadSession(sessionId) {
  try {
    const session = await SessionAPI.getSession(sessionId);
    currentSessionId = sessionId;
    currentSession   = session;
    document.getElementById('sessionNameLabel').textContent =
      session.reference_code ? `${session.name} · ${session.reference_code}` : session.name;
    document.getElementById('sessionPicker').style.display = 'none';
    window.history.replaceState({}, '', `${window.location.pathname}?session=${sessionId}`);
    renderShell();
    await refreshAll();
    subscribeRealtime();
    startTimerLoop();
  } catch (_) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="display">Session not found</div>
        <p>Double-check the link or code from your host.</p>
      </div>`;
  }
}

// ============================================================
// REFRESH
// ============================================================
async function refreshAll() {
  if (!currentSessionId) return;
  const [players, teams, courts, recentMatches, session] = await Promise.all([
    SessionAPI.getPlayers(currentSessionId),
    SessionAPI.getTeams(currentSessionId),
    SessionAPI.getCourts(currentSessionId),
    SessionAPI.getRecentMatches(currentSessionId),
    SessionAPI.getSession(currentSessionId),
  ]);
  currentSession = session;
  const previousCourts = _courtsCache;
  _playersCache = players;
  _teamsCache   = teams;
  _courtsCache  = courts;

  renderCourts(courts, players, previousCourts);
  renderQueues(players);
  renderLeaderboard(players, session);
  renderRecentResults(recentMatches, players);
  syncRestPlayerDropdown(players);
}

function paddleChip(name) {
  return `<div class="paddle-chip">
    <div class="paddle-chip-shape">
      <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="20" y="46" width="8" height="16" rx="3" fill="currentColor" opacity="0.85"/>
        <ellipse cx="24" cy="26" rx="20" ry="24" fill="currentColor"/>
      </svg>
      <span class="paddle-chip-name">${escapeHtml(name)}</span>
    </div>
  </div>`;
}

function renderCourts(courts, players, previousCourts) {
  const grid = document.getElementById('courtsGrid');
  if (!grid) return;
  const prevById = Object.fromEntries((previousCourts || []).map(c => [c.id, c]));

  grid.innerHTML = courts.map(court => {
    const isActive = court.status === 'in_progress';
    const sideA = isActive ? playerNamesForTeam(court.team_a, players).map(paddleChip).join('') : '';
    const sideB = isActive ? playerNamesForTeam(court.team_b, players).map(paddleChip).join('') : '';
    const prev = prevById[court.id];
    const justStarted = isActive && (!prev || prev.status !== 'in_progress' || prev.team_a_id !== court.team_a_id);
    const justFinished = !isActive && prev && prev.status === 'in_progress';
    const motionClass = justStarted ? 'serve-in' : (justFinished ? 'pulse-update' : '');

    return `
      <div class="court-card ${motionClass}">
        <div class="court-label">
          <span class="num">Court ${court.court_number}</span>
          <span class="court-timer ${isActive ? '' : 'idle'}" data-start="${court.game_started_at || ''}" id="timer-${court.id}">${isActive ? '00:00' : 'OPEN'}</span>
        </div>
        <div class="court-diagram">
          <div class="court-side">${isActive ? sideA : ''}</div>
          <div class="kitchen-line-top"></div>
          <div class="centerline-top"></div>
          <div class="net-line">
            ${isActive ? `<svg class="net-ball" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="16" cy="16" r="14" fill="currentColor"/>
              <circle cx="10" cy="9" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="18" cy="7" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="24" cy="12" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="25" cy="19" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="19" cy="25" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="11" cy="24" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="6" cy="17" r="1.3" fill="white" opacity="0.5"/>
              <circle cx="7" cy="10" r="1.3" fill="white" opacity="0.5"/>
            </svg>` : ''}
          </div>
          <div class="kitchen-line-bottom"></div>
          <div class="centerline-bottom"></div>
          <div class="court-side">${isActive ? sideB : ''}</div>
          ${!isActive ? '<div class="empty-court-msg">Waiting for next match</div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// QUEUE DISPLAY
// ============================================================
function renderQueues(players) {
  const grid = document.getElementById('queuesGrid');
  if (!grid) return;

  // FLIP — capture current positions before DOM change.
  const firstRects = {};
  grid.querySelectorAll('[data-player-id]').forEach(el => {
    firstRects[el.dataset.playerId] = el.getBoundingClientRect();
  });

  // Unified pool: waiting players sorted strictly by became_free_at.
  const waiting = players
    .filter(p => p.status === 'waiting')
    .sort((a, b) => new Date(a.became_free_at) - new Date(b.became_free_at));

  const resting  = players.filter(p => p.status === 'resting');
  const expected = players.filter(p => p.status === 'expected');

  const resultBadge = p => {
    if (p.last_match_result === 'won')  return '<span class="result-badge won">W</span>';
    if (p.last_match_result === 'lost') return '<span class="result-badge lost">L</span>';
    return '';
  };

  const waitingItems = waiting.length
    ? waiting.map((p, i) => `<li class="lane-item" data-player-id="${p.id}"><span>${escapeHtml(p.name)} ${resultBadge(p)}</span><span class="lane-pos">#${i + 1}</span></li>`).join('')
    : `<div class="lane-empty">No one in the queue right now</div>`;

  const restingItems = resting.length
    ? resting.map(p => `<li class="lane-item"><span>${escapeHtml(p.name)}</span></li>`).join('')
    : `<div class="lane-empty">Nobody resting</div>`;

  const expectedItems = expected.length
    ? expected.map(p => `<li class="lane-item"><span>${escapeHtml(p.name)}</span><span class="lane-pos" style="color:var(--resting-slate);font-size:10px;">not arrived</span></li>`).join('')
    : `<div class="lane-empty">Everyone's here!</div>`;

  grid.innerHTML = `
    <div class="lane waiting">
      <div class="lane-header"><span>Up Next</span><span class="count">${waiting.length}</span></div>
      <ul class="lane-list">${waitingItems}</ul>
    </div>
    <div class="lane resting">
      <div class="lane-header"><span>Resting</span><span class="count">${resting.length}</span></div>
      <ul class="lane-list">${restingItems}</ul>
    </div>
    ${expected.length ? `
    <div class="lane expected">
      <div class="lane-header"><span>Expected</span><span class="count">${expected.length}</span></div>
      <ul class="lane-list">${expectedItems}</ul>
    </div>` : ''}
  `;

  playQueueFlipAnimation(grid, firstRects);
}

function playQueueFlipAnimation(grid, firstRects) {
  grid.querySelectorAll('[data-player-id]').forEach(el => {
    const playerId = el.dataset.playerId;
    const first = firstRects[playerId];
    if (!first) { el.classList.add('drop-in'); return; }
    const last = el.getBoundingClientRect();
    const deltaY = first.top - last.top;
    const deltaX = first.left - last.left;
    if (Math.abs(deltaY) < 1 && Math.abs(deltaX) < 1) return;
    el.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
    el.style.transition = 'none';
    requestAnimationFrame(() => {
      el.style.transition = `transform var(--dur-shuffle) var(--ease-bounce)`;
      el.style.transform = 'translate(0,0)';
    });
    el.addEventListener('transitionend', () => { el.style.transition = ''; el.style.transform = ''; }, { once: true });
  });
}

// ============================================================
// LEADERBOARD (player view — only when host makes it public)
// ============================================================
function renderLeaderboard(players, session) {
  const el = document.getElementById('leaderboardSection');
  if (!el) return;
  if (!session.leaderboard_public) { el.innerHTML = ''; return; }

  const ranked = [...players]
    .filter(p => (p.total_games_played || 0) > 0)
    .sort((a, b) => {
      const wA = a.wins || 0, wB = b.wins || 0;
      if (wB !== wA) return wB - wA;
      const pA = a.total_points || 0, pB = b.total_points || 0;
      return pB - pA;
    });

  if (!ranked.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="lb-card">
      <h2 class="lb-card-title">🏆 Leaderboard</h2>
      <div class="table-scroll">
        <table class="roster-table">
          <thead>
            <tr>
              <th>#</th><th>Player</th>
              <th style="text-align:center;">W</th>
              <th style="text-align:center;">L</th>
              <th style="text-align:center;">GP</th>
              <th style="text-align:center;">Pts</th>
              <th style="text-align:center;">Win%</th>
            </tr>
          </thead>
          <tbody>
            ${ranked.map((p, i) => {
              const gp  = p.total_games_played || 0;
              const w   = p.wins || 0;
              const l   = p.losses || 0;
              const pts = p.total_points || 0;
              const pct = gp > 0 ? Math.round((w / gp) * 100) : 0;
              return `<tr class="${i === 0 ? 'lb-highlight' : ''}">
                <td style="font-weight:700;">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</td>
                <td style="font-weight:700;">${escapeHtml(p.name)}</td>
                <td class="lb-won" style="text-align:center;">${w}</td>
                <td class="lb-lost" style="text-align:center;">${l}</td>
                <td style="text-align:center;font-family:var(--font-mono);">${gp}</td>
                <td class="lb-pts" style="text-align:center;">${pts}</td>
                <td style="text-align:center;font-family:var(--font-mono);">${pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="court-line-divider" role="separator"></div>
  `;
}

// ============================================================
// RECENT RESULTS
// ============================================================
function renderRecentResults(matches, players) {
  const el = document.getElementById('recentResults');
  if (!el || !matches || matches.length === 0) { if (el) el.innerHTML = ''; return; }

  el.innerHTML = `
    <h3 class="recent-results-title">Recent Results</h3>
    <div class="recent-results-list">
      ${matches.map(m => {
        const namesA = playerNamesForTeam(m.team_a, players).join(' & ');
        const namesB = playerNamesForTeam(m.team_b, players).join(' & ');
        const winnerIsA = m.winner_team_id === m.team_a_id;
        const scoreText = m.score_visible && m.team_a_score != null
          ? `${m.team_a_score}–${m.team_b_score}` : '—';
        const isNew = !_seenMatchIds.has(m.id);
        return `<div class="recent-result-row ${isNew ? 'drop-in' : ''}">
          <span class="${winnerIsA ? 'winner-name' : ''}">${escapeHtml(namesA)}</span>
          <span class="recent-result-score mono">${scoreText}</span>
          <span class="${!winnerIsA ? 'winner-name' : ''}">${escapeHtml(namesB)}</span>
          <span class="recent-result-duration mono">${formatDuration(m.duration_seconds)}</span>
        </div>`;
      }).join('')}
    </div>
  `;
  _seenMatchIds = new Set(matches.map(m => m.id));
}

function formatDuration(seconds) {
  if (!seconds && seconds !== 0) return '—';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${String(secs).padStart(2, '0')}`;
}

// ============================================================
// FIND ME
// ============================================================
function handleFindMe() {
  const query = document.getElementById('findMeInput').value.trim().toLowerCase();
  const resultEl = document.getElementById('findMeResult');
  if (!query) { resultEl.textContent = ''; return; }
  const player = _playersCache.find(p => p.name.toLowerCase().includes(query));
  if (!player) { resultEl.textContent = 'Not found yet'; return; }

  if (player.status === 'playing') {
    const court = _courtsCache.find(c => {
      const team = _teamsCache.find(t => t.id === c.team_a_id || t.id === c.team_b_id);
      return team && team.player_ids.includes(player.id);
    });
    resultEl.textContent = court ? `Playing now — Court ${court.court_number}` : 'Playing now';
  } else if (player.status === 'resting') {
    resultEl.textContent = 'You are resting ☕';
  } else if (player.status === 'expected') {
    resultEl.textContent = 'On the list — mark Arrived with your host';
  } else if (player.status === 'waiting') {
    const waitingSorted = _playersCache
      .filter(p => p.status === 'waiting')
      .sort((a, b) => new Date(a.became_free_at) - new Date(b.became_free_at));
    const idx = waitingSorted.findIndex(p => p.id === player.id);
    resultEl.textContent = idx >= 0 ? `#${idx + 1} in the queue` : 'In the queue';
  } else {
    resultEl.textContent = 'Waiting to be added';
  }
}

// ============================================================
// REST + MESSAGE
// ============================================================
function syncRestPlayerDropdown(players) {
  const select = document.getElementById('restPlayerSelect');
  if (!select) return;
  const current = select.value;
  const eligible = players.filter(p => p.status !== 'resting' && p.status !== 'expected');
  select.innerHTML = `<option value="">Select your name…</option>` +
    eligible.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
  if (eligible.some(p => p.id === current)) select.value = current;
}

async function handleRequestRest() {
  const select   = document.getElementById('restPlayerSelect');
  const statusEl = document.getElementById('restRequestStatus');
  const playerId = select.value;
  if (!playerId) { statusEl.textContent = 'Pick your name from the list first.'; return; }
  try {
    await SessionAPI.requestRest(currentSessionId, playerId);
    statusEl.textContent = '✅ Rest request sent — the host will see this.';
    statusEl.style.color = 'var(--winner-green)';
  } catch (_) {
    statusEl.textContent = 'Could not send request, please try again.';
    statusEl.style.color = 'var(--loser-coral)';
  }
}

async function sendHostMessage() {
  const from = document.getElementById('msgFrom').value.trim();
  const msg  = document.getElementById('msgText').value.trim();
  if (!from || !msg) return;
  try {
    await SessionAPI.sendMessage(currentSessionId, from, msg);
    document.getElementById('msgText').value = '';
    const btn = document.querySelector('.message-row button');
    const orig = btn.textContent;
    btn.textContent = 'Sent ✓';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch (_) { alert('Could not send message, please try again.'); }
}

// ============================================================
// REALTIME
// ============================================================
function subscribeRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`session-${currentSessionId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'courts',   filter: `session_id=eq.${currentSessionId}` }, refreshAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'teams',    filter: `session_id=eq.${currentSessionId}` }, refreshAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players',  filter: `session_id=eq.${currentSessionId}` }, refreshAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sessions', filter: `id=eq.${currentSessionId}` },         refreshAll)
    .subscribe();
}

function startTimerLoop() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.querySelectorAll('.court-timer[data-start]').forEach(el => {
      const start = el.getAttribute('data-start');
      if (!start) return;
      const elapsed = Math.max(0, Math.floor((Date.now() - new Date(start).getTime()) / 1000));
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mins}:${secs}`;
    });
  }, 1000);
}

// ============================================================
// HELPERS
// ============================================================
function playerNamesForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid)?.name || '—');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
