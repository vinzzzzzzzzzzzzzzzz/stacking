<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStackyyy — Live Court Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS ============ */
  :root {
    --court-green: #1B4D3E;
    --court-green-dark: #123329;
    --kitchen-gold: #E8B84B;
    --line-paint: #F7F5EF;
    --ink: #15201C;
    --winner-green: #3FA66B;
    --loser-coral: #E0654F;
    --resting-slate: #8E9B97;
    --waiting-blue: #4E7FB5;
    --font-display: 'Archivo Black', 'Arial Black', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow-card: 0 2px 14px rgba(21, 32, 28, 0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--line-paint); color: var(--ink); font-family: var(--font-body); overflow-x: hidden; }
  h1, h2, h3, .display { font-family: var(--font-display); letter-spacing: -0.01em; text-transform: uppercase; }
  a { color: inherit; }
  button { font-family: var(--font-body); cursor: pointer; touch-action: manipulation; }
  ::selection { background: var(--kitchen-gold); color: var(--ink); }
  :focus-visible { outline: 3px solid var(--kitchen-gold); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
  .mono { font-family: var(--font-mono); }

  input, select, textarea { font-size: 16px; min-height: 44px; }
  button { min-height: 44px; }

  /* ============ PAGE STYLES ============ */
  body { padding-bottom: 80px; }

  .topbar {
    background: linear-gradient(135deg, var(--court-green) 0%, var(--court-green-dark) 100%); color: var(--line-paint); padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow-card);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-paddle { width: 22px; height: 30px; color: var(--kitchen-gold); flex-shrink: 0; }
  .brand .display { font-size: 22px; color: var(--line-paint); }
  .brand .dot { color: var(--kitchen-gold); }
  .session-name { font-size: 13px; opacity: 0.8; font-weight: 500; }
  .session-picker { display: flex; gap: 8px; align-items: center; }
  .session-picker input { font-family: var(--font-mono); padding: 10px 12px; border-radius: var(--radius-sm); border: none; width: 220px; font-size: 16px; }
  .session-picker button { background: var(--kitchen-gold); color: var(--ink); border: none; font-weight: 700; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .courts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 36px; }
  .court-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
  .court-label { background: var(--court-green-dark); color: var(--line-paint); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .court-label .num { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.05em; }
  .court-timer { font-family: var(--font-mono); font-weight: 700; font-size: 15px; color: var(--kitchen-gold); }
  .court-timer.idle { color: var(--resting-slate); }

  .court-diagram { background: linear-gradient(160deg, var(--court-green) 0%, var(--court-green-dark) 100%); aspect-ratio: 4 / 5; position: relative; display: flex; flex-direction: column; padding: 14px; }
  .court-diagram::before { content: ''; position: absolute; inset: 14px; border: 3px solid var(--line-paint); opacity: 0.85; }
  .net-line { position: absolute; left: 14px; right: 14px; top: 50%; height: 4px; background: var(--line-paint); transform: translateY(-50%); opacity: 0.9; }
  .net-line::after { content: ''; position: absolute; left: 0; right: 0; top: -3px; bottom: -3px; background: repeating-linear-gradient(90deg, var(--ink) 0 4px, transparent 4px 9px); opacity: 0.5; }
  .net-ball { position: absolute; width: 18px; height: 18px; left: 50%; top: 50%; transform: translate(-50%, -50%); color: var(--kitchen-gold); z-index: 3; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
  .kitchen-line-top, .kitchen-line-bottom { position: absolute; left: 14px; right: 14px; height: 2px; background: var(--line-paint); opacity: 0.55; z-index: 1; }
  .kitchen-line-top { top: 32%; }
  .kitchen-line-bottom { bottom: 32%; }

  /* Centerline ("the T line") — runs from each kitchen line to the
     baseline on that side ONLY. It must NOT cross the net or pass
     through the kitchen, since the non-volley zone is one continuous
     unbroken strip — this gap is what makes the court read as accurate
     rather than just a generic line down the middle. */
  .centerline-top, .centerline-bottom {
    position: absolute; left: 50%; width: 2px; background: var(--line-paint); opacity: 0.55; transform: translateX(-50%); z-index: 1;
  }
  .centerline-top { top: 14px; height: calc(32% - 14px); }
  .centerline-bottom { bottom: 14px; height: calc(32% - 14px); }

  .court-side { flex: 1; display: flex; align-items: center; justify-content: space-evenly; position: relative; z-index: 2; padding: 8px 16px; }
  .empty-court-msg { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--line-paint); opacity: 0.6; font-size: 13px; font-weight: 600; z-index: 2; }

  /* Paddle-shaped player markers — replaces the plain pill chip. Each
     player gets a paddle silhouette with their name printed across the
     face, sized to read clearly at a glance and centered in its own
     service box (not clustered toward the middle of the court). */
  .paddle-chip {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    width: 84px;
    flex: 1 1 0;
    max-width: 110px;
  }
  .paddle-chip-shape {
    width: 100%; aspect-ratio: 48 / 64; position: relative;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
  }
  .paddle-chip-shape svg { width: 100%; height: 100%; display: block; color: var(--line-paint); }
  .paddle-chip-name {
    position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
    width: 72%; font-size: 14px; font-weight: 800; color: var(--ink); text-align: center;
    line-height: 1.15; overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-word;
    font-family: var(--font-body);
  }

  .queues { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 36px; }

  .tournament-round-banner { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
  .round-pill { background: var(--court-green); color: white; font-family: var(--font-display); font-size: 13px; padding: 8px 16px; border-radius: 999px; }
  .format-pill { background: var(--kitchen-gold); color: var(--ink); font-weight: 700; font-size: 12px; padding: 6px 14px; border-radius: 999px; }

  .matchup-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .matchup-card { background: white; box-shadow: var(--shadow-card); display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; flex-wrap: wrap; gap: 8px; }
  .matchup-card.in-progress { box-shadow: 0 0 0 2px var(--kitchen-gold), var(--shadow-card); }
  .matchup-card.completed { opacity: 0.7; }
  .status-waiting { background: var(--resting-slate); }
  .status-playing { background: var(--kitchen-gold); color: var(--ink); }

  .standings-card { margin-bottom: 28px; background: white; box-shadow: var(--shadow-card); border-radius: var(--radius); padding: 18px; }
  .standings-title { font-size: 15px; margin: 0 0 12px; }
  .roster-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .roster-table th { text-align: left; padding: 8px; color: var(--resting-slate); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
  .roster-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
  .lane { background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
  .lane-header { padding: 12px 16px; font-family: var(--font-display); font-size: 13px; letter-spacing: 0.04em; color: white; display: flex; justify-content: space-between; align-items: center; }
  .lane-header .count { font-family: var(--font-mono); opacity: 0.85; }
  .lane.winners .lane-header { background: var(--winner-green); }
  .lane.losers .lane-header { background: var(--loser-coral); }
  .lane.waiting .lane-header { background: var(--waiting-blue); }
  .lane.resting .lane-header { background: var(--resting-slate); }

  .lane-list { list-style: none; margin: 0; padding: 8px; min-height: 60px; }
  .lane-item { padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .lane-item:last-child { border-bottom: none; }
  .lane-pos { font-family: var(--font-mono); color: var(--resting-slate); font-weight: 700; font-size: 11px; }
  .lane-empty { padding: 16px; text-align: center; color: var(--resting-slate); font-size: 12px; }

  .find-me { background: var(--kitchen-gold); border-radius: var(--radius); padding: 16px; margin-bottom: 28px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .find-me input { flex: 1; min-width: 180px; padding: 12px; border-radius: var(--radius-sm); border: none; font-size: 16px; }
  .find-me-result { font-weight: 700; font-size: 13px; background: var(--ink); color: white; padding: 8px 12px; border-radius: var(--radius-sm); }

  .recent-results { margin-bottom: 24px; }
  .recent-results-title { font-size: 13px; margin: 0 0 10px; color: var(--ink); text-transform: uppercase; letter-spacing: 0.03em; }
  .recent-results-list { display: flex; flex-direction: column; gap: 6px; }
  .recent-result-row {
    background: white; box-shadow: var(--shadow-card); border-radius: var(--radius-sm); padding: 10px 14px;
    display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 10px; align-items: center; font-size: 13px; font-weight: 600;
  }
  .recent-result-score { font-size: 13px; font-weight: 700; color: var(--court-green); text-align: center; }
  .recent-result-duration { font-size: 11px; color: var(--resting-slate); text-align: right; }
  .winner-name { color: var(--winner-green); }

  .message-box { background: white; border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 16px; }
  .message-box h3 { font-size: 13px; margin: 0 0 10px; }
  .message-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .message-row input { padding: 12px; border: 1px solid #ddd; border-radius: var(--radius-sm); font-size: 16px; }
  .message-row input[name="from"] { width: 120px; }
  .message-row input[name="msg"] { flex: 1; min-width: 160px; }
  .message-row button { background: var(--court-green); color: white; border: none; padding: 9px 16px; border-radius: var(--radius-sm); font-weight: 700; font-size: 13px; }
  .message-hint { font-size: 11px; color: var(--resting-slate); margin-top: 8px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--resting-slate); }
  .empty-state .display { font-size: 18px; color: var(--ink); margin-bottom: 8px; }
  .empty-state-paddle { width: 56px; height: 75px; color: var(--court-green); opacity: 0.25; margin-bottom: 16px; }

  /* ============================================================
     MOBILE BREAKPOINT — tablet and below
     ============================================================ */
  @media (max-width: 768px) {
    .container { padding: 16px 14px; }
    .topbar { padding: 12px 16px; flex-wrap: wrap; }
    .brand { flex: 1 1 100%; }
    .session-picker { flex: 1 1 100%; }
    .session-picker input { width: 100%; }

    .courts-grid { grid-template-columns: 1fr; gap: 14px; margin-bottom: 24px; }
    .queues { grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }

    /* court diagram: cap height so a single-column phone layout doesn't
       turn each court into a huge nearly-square block requiring lots of
       scrolling to see all courts at a glance */
    .court-diagram { aspect-ratio: 3 / 4; }
    .paddle-chip { width: 64px; }
    .paddle-chip-name { font-size: 11px; }

    .find-me { flex-direction: column; align-items: stretch; padding: 14px; }
    .find-me input { width: 100%; }
    .find-me-result { text-align: center; }

    .message-row { flex-direction: column; }
    .message-row input[name="from"], .message-row input[name="msg"], .message-row button { width: 100%; }

    .matchup-card { flex-direction: column; align-items: stretch; text-align: left; gap: 6px; }
    .tournament-round-banner { flex-wrap: wrap; }

    .recent-result-row { grid-template-columns: 1fr; text-align: center; gap: 4px; }
    .recent-result-duration { text-align: center; }

    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -2px; }
    .roster-table { min-width: 420px; }

    h1 { font-size: 18px; }
    .standings-title { font-size: 14px; }
  }

  @media (max-width: 420px) {
    .brand .display { font-size: 18px; }
    .empty-state { padding: 40px 16px; }
  }
</style>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://srkmbofgyajdairkjwti.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNya21ib2ZneWFqZGFpcmtqd3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Nzk3NDQsImV4cCI6MjA5NzQ1NTc0NH0.GxSJ2RH2txJLM2VjJ0t-Q0Yqd_6M2TrO6BS7Cq17QuY';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STACKING ENGINE
// ============================================================
const TIER_RANK = { beginner: 0, intermediate: 1, advanced: 2, open: -1 };

function tiersCompatible(teamATier, teamBTier, skillMatchMode) {
  if (skillMatchMode === 'open') return true;
  if (teamATier === 'open' || teamBTier === 'open') return true;
  const rankA = TIER_RANK[teamATier];
  const rankB = TIER_RANK[teamBTier];
  if (skillMatchMode === 'strict') return rankA === rankB;
  if (skillMatchMode === 'adjacent') return Math.abs(rankA - rankB) <= 1;
  return true;
}

function getTeamTier(team, playersById) {
  const tiers = team.player_ids.map(pid => playersById[pid]?.skill_tier).filter(Boolean);
  if (tiers.length === 0) return 'open';
  if (tiers.includes('open')) {
    const nonOpen = tiers.filter(t => t !== 'open');
    if (nonOpen.length === 0) return 'open';
    tiers.length = 0;
    tiers.push(...nonOpen);
  }
  const ranks = tiers.map(t => TIER_RANK[t]);
  const minRank = Math.min(...ranks);
  return Object.keys(TIER_RANK).find(k => TIER_RANK[k] === minRank);
}

function popEligibleTeam(queueTeams, opponentTier, skillMatchMode, playersById) {
  for (let i = 0; i < queueTeams.length; i++) {
    const candidate = queueTeams[i];
    const candidateTier = getTeamTier(candidate, playersById);
    if (tiersCompatible(candidateTier, opponentTier, skillMatchMode)) {
      return { team: candidate, index: i };
    }
  }
  return null;
}

function decideNextMatch({ stackingMode, skillMatchMode, winnersQueue, losersQueue, waitingQueue, playersById, preferredLane = null }) {
  if (stackingMode === 'fifo') {
    if (waitingQueue.length < 2) return null;
    return { teamA: waitingQueue[0], teamB: waitingQueue[1], lane: 'waiting' };
  }
  const lanesToTry = preferredLane === 'losers' ? ['losers', 'winners'] : ['winners', 'losers'];
  for (const lane of lanesToTry) {
    const queue = lane === 'winners' ? winnersQueue : losersQueue;
    if (queue.length >= 2) {
      const teamA = queue[0];
      const teamATier = getTeamTier(teamA, playersById);
      const rest = queue.slice(1);
      const found = popEligibleTeam(rest, teamATier, skillMatchMode, playersById);
      if (found) return { teamA, teamB: found.team, lane };
    }
  }
  const combined = [...winnersQueue, ...losersQueue, ...waitingQueue];
  if (combined.length >= 2) {
    const teamA = combined[0];
    const teamATier = getTeamTier(teamA, playersById);
    const found = popEligibleTeam(combined.slice(1), teamATier, skillMatchMode, playersById);
    if (found) return { teamA, teamB: found.team, lane: 'mixed' };
  }
  return null;
}

function calculateReturnPosition(queueTeams, restPriorityEnabled) {
  if (queueTeams.length === 0) return 1;
  if (restPriorityEnabled) {
    const minPos = Math.min(...queueTeams.map(t => t.queue_position ?? 0));
    return minPos - 1;
  }
  const maxPos = Math.max(...queueTeams.map(t => t.queue_position ?? 0));
  return maxPos + 1;
}

function calculateBackOfQueuePosition(queueTeams) {
  if (queueTeams.length === 0) return 1;
  const maxPos = Math.max(...queueTeams.map(t => t.queue_position ?? 0));
  return maxPos + 1;
}

window.StackingEngine = { tiersCompatible, getTeamTier, popEligibleTeam, decideNextMatch, calculateReturnPosition, calculateBackOfQueuePosition, TIER_RANK };

function computeStandings(teams) {
  return [...teams].sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    const diffA = a.points_for - a.points_against;
    const diffB = b.points_for - b.points_against;
    if (diffB !== diffA) return diffB - diffA;
    return b.points_for - a.points_for;
  });
}

// ============================================================
// SESSION API
// ============================================================
const SessionAPI = (() => {
  async function getCurrentUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    return user;
  }
  async function getSession(sessionId) {
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('id', sessionId).single();
    if (error) throw error;
    return data;
  }
  async function getSessionByReferenceCode(code) {
    const normalized = code.trim().toUpperCase();
    const { data, error } = await supabaseClient.from('sessions').select('*').eq('reference_code', normalized).single();
    if (error) throw error;
    return data;
  }
  async function getPlayers(sessionId) {
    const { data, error } = await supabaseClient.from('players').select('*').eq('session_id', sessionId).neq('status', 'left').order('joined_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getTeams(sessionId) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('is_active', true);
    if (error) throw error;
    return data;
  }
  async function getQueueLane(sessionId, lane) {
    const { data, error } = await supabaseClient.from('teams').select('*').eq('session_id', sessionId).eq('queue_lane', lane).eq('is_active', true).order('queue_position', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getCourts(sessionId) {
    const { data, error } = await supabaseClient.from('courts').select('*, team_a:team_a_id(*), team_b:team_b_id(*)').eq('session_id', sessionId).order('court_number', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getMatchups(sessionId, roundNumber = null) {
    let query = supabaseClient.from('tournament_matchups').select('*, team_a:team_a_id(*), team_b:team_b_id(*)').eq('session_id', sessionId);
    if (roundNumber !== null) query = query.eq('round_number', roundNumber);
    const { data, error } = await query.order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }
  async function getRecentMatches(sessionId, limit = 8) {
    const { data, error } = await supabaseClient
      .from('matches')
      .select('*, team_a:team_a_id(*), team_b:team_b_id(*), winner:winner_team_id(*)')
      .eq('session_id', sessionId)
      .order('ended_at', { ascending: false })
      .limit(limit);
    if (error) throw error;
    return data;
  }
  async function sendMessage(sessionId, playerName, message) {
    const { error } = await supabaseClient.from('messages').insert({ session_id: sessionId, player_name: playerName, message });
    if (error) throw error;
  }
  return { getCurrentUser, getSession, getSessionByReferenceCode, getPlayers, getTeams, getQueueLane, getCourts, getMatchups, getRecentMatches, sendMessage };
})();
window.SessionAPI = SessionAPI;

// ============================================================
// INDEX APP
// ============================================================
let currentSessionId = null;
let realtimeChannel = null;
let timerInterval = null;

const urlParams = new URLSearchParams(window.location.search);
const sessionFromUrl = urlParams.get('session');
if (sessionFromUrl) loadSession(sessionFromUrl);

function loadSessionFromInput() {
  const raw = document.getElementById('sessionIdInput').value.trim();
  if (!raw) return;

  // 1. Pasted full URL with ?session=<uuid>
  try {
    const url = new URL(raw);
    const idFromUrl = url.searchParams.get('session');
    if (idFromUrl) { loadSession(idFromUrl); return; }
  } catch (_) { /* not a URL, fall through */ }

  // 2. Looks like a short reference code (e.g. STACK-A3F9 or just A3F9)
  const looksLikeCode = /^(STACK-)?[A-Z2-9]{4}$/i.test(raw);
  if (looksLikeCode) {
    const code = raw.toUpperCase().startsWith('STACK-') ? raw.toUpperCase() : `STACK-${raw.toUpperCase()}`;
    loadSessionByCode(code);
    return;
  }

  // 3. Fall back to treating it as a raw session UUID
  loadSession(raw);
}

async function loadSessionByCode(code) {
  try {
    const session = await SessionAPI.getSessionByReferenceCode(code);
    await loadSession(session.id);
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="display">Session code not found</div>
        <p>Double check the code your host gave you (e.g. STACK-A3F9).</p>
      </div>`;
  }
}

let currentSession = null;

async function loadSession(sessionId) {
  try {
    const session = await SessionAPI.getSession(sessionId);
    currentSessionId = sessionId;
    currentSession = session;
    document.getElementById('sessionNameLabel').textContent = session.reference_code ? `${session.name} · ${session.reference_code}` : session.name;
    document.getElementById('sessionPicker').style.display = 'none';
    const newUrl = `${window.location.pathname}?session=${sessionId}`;
    window.history.replaceState({}, '', newUrl);

    if (session.session_type === 'tournament') {
      renderTournamentShell();
      await refreshTournamentView();
      subscribeTournamentRealtime();
    } else {
      renderShell();
      await refreshAll();
      subscribeRealtime();
      startTimerLoop();
    }
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="display">Session not found</div>
        <p>Double check the link or ID your host gave you.</p>
      </div>`;
  }
}

function renderTournamentShell() {
  document.getElementById('mainContent').innerHTML = `
    <div class="find-me">
      <input type="text" id="findMeInput" placeholder="Type your name to find your spot..." oninput="handleTournamentFindMe()">
      <div id="findMeResult"></div>
    </div>
    <div class="tournament-round-banner" id="tournamentRoundBanner"></div>
    <div class="matchup-list" id="tournamentMatchups"></div>
    <div class="card standings-card">
      <h2 class="standings-title">Standings</h2>
      <div class="table-scroll">
      <table class="roster-table" id="standingsTable"></table>
      </div>
    </div>
    <div class="message-box">
      <h3>Message the host</h3>
      <div class="message-row">
        <input type="text" name="from" id="msgFrom" placeholder="Your name">
        <input type="text" name="msg" id="msgText" placeholder="e.g. Vince rest please" maxlength="280">
        <button onclick="sendHostMessage()">Send</button>
      </div>
      <p class="message-hint">Optional — let the host know if you need to rest, swap, or have a question.</p>
    </div>
  `;
}

let _tournamentTeamsCache = [];
let _tournamentPlayersCache = [];

async function refreshTournamentView() {
  if (!currentSessionId) return;
  const [session, teams, players, matchups] = await Promise.all([
    SessionAPI.getSession(currentSessionId),
    SessionAPI.getTeams(currentSessionId),
    SessionAPI.getPlayers(currentSessionId),
    SessionAPI.getMatchups(currentSessionId),
  ]);
  currentSession = session;
  _tournamentTeamsCache = teams;
  _tournamentPlayersCache = players;

  const currentRoundMatchups = matchups.filter(m => m.round_number === session.current_round);
  const roundLabel = session.tournament_format === 'swiss' ? 'Swiss' : 'Round Robin';
  document.getElementById('tournamentRoundBanner').innerHTML = `
    <span class="round-pill">Round ${session.current_round}${session.rounds_total ? ` of ${session.rounds_total}` : ''}</span>
    <span class="format-pill">${roundLabel}</span>
  `;

  document.getElementById('tournamentMatchups').innerHTML = currentRoundMatchups.map(m => {
    const namesA = playerNamesForTeam(m.team_a, players).join(' & ');
    const namesB = playerNamesForTeam(m.team_b, players).join(' & ');
    const statusLabel = m.status === 'completed' ? 'Final' : (m.status === 'in_progress' ? 'Playing' : 'Waiting');
    const statusClass = m.status === 'completed' ? 'completed' : (m.status === 'in_progress' ? 'in-progress' : 'pending');
    return `<div class="matchup-card ${statusClass}"><span>${escapeHtml(namesA)} vs ${escapeHtml(namesB)}</span><span class="status-pill status-${m.status === 'in_progress' ? 'playing' : 'waiting'}">${statusLabel}</span></div>`;
  }).join('') || '<p style="color:var(--resting-slate); font-size:13px; text-align:center; padding:16px;">No matchups yet for this round.</p>';

  const standings = computeStandings(teams);
  document.getElementById('standingsTable').innerHTML = `
    <thead><tr><th>#</th><th>Team</th><th>W-L</th><th>Diff</th></tr></thead>
    <tbody>
      ${standings.map((t, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${escapeHtml(playerNamesForTeam(t, players).join(' & '))}</td>
          <td>${t.wins}-${t.losses}</td>
          <td>${t.points_for - t.points_against >= 0 ? '+' : ''}${t.points_for - t.points_against}</td>
        </tr>
      `).join('')}
    </tbody>
  `;
}

function handleTournamentFindMe() {
  const query = document.getElementById('findMeInput').value.trim().toLowerCase();
  const resultEl = document.getElementById('findMeResult');
  if (!query) { resultEl.textContent = ''; return; }
  const player = _tournamentPlayersCache.find(p => p.name.toLowerCase().includes(query));
  if (!player) { resultEl.textContent = 'Not found yet'; return; }
  const team = _tournamentTeamsCache.find(t => t.player_ids.includes(player.id));
  if (!team) { resultEl.textContent = 'Not on a team yet'; return; }
  resultEl.textContent = `${team.wins}-${team.losses} record so far`;
}

function subscribeTournamentRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`session-${currentSessionId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_matchups', filter: `session_id=eq.${currentSessionId}` }, refreshTournamentView)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'teams', filter: `session_id=eq.${currentSessionId}` }, refreshTournamentView)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sessions', filter: `id=eq.${currentSessionId}` }, refreshTournamentView)
    .subscribe();
}

function renderShell() {
  document.getElementById('mainContent').innerHTML = `
    <div class="find-me">
      <input type="text" id="findMeInput" placeholder="Type your name to find your spot..." oninput="handleFindMe()">
      <div id="findMeResult"></div>
    </div>
    <div class="courts-grid" id="courtsGrid"></div>
    <div class="queues" id="queuesGrid"></div>
    <div class="recent-results" id="recentResults"></div>
    <div class="message-box">
      <h3>Message the host</h3>
      <div class="message-row">
        <input type="text" name="from" id="msgFrom" placeholder="Your name">
        <input type="text" name="msg" id="msgText" placeholder="e.g. Vince rest please" maxlength="280">
        <button onclick="sendHostMessage()">Send</button>
      </div>
      <p class="message-hint">Optional — let the host know if you need to rest, swap, or have a question.</p>
    </div>
  `;
}

let _playersCache = [];
let _teamsCache = [];
let _courtsCache = [];

async function refreshAll() {
  if (!currentSessionId) return;
  const [players, teams, courts, recentMatches] = await Promise.all([
    SessionAPI.getPlayers(currentSessionId),
    SessionAPI.getTeams(currentSessionId),
    SessionAPI.getCourts(currentSessionId),
    SessionAPI.getRecentMatches(currentSessionId),
  ]);
  _playersCache = players;
  _teamsCache = teams;
  _courtsCache = courts;
  renderCourts(courts, players, teams);
  renderQueues(teams, players);
  renderRecentResults(recentMatches, players);
}

function formatDuration(seconds) {
  if (!seconds && seconds !== 0) return '—';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${String(secs).padStart(2, '0')}`;
}

function renderRecentResults(matches, players) {
  const el = document.getElementById('recentResults');
  if (!el) return;
  if (!matches || matches.length === 0) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <h3 class="recent-results-title">Recent Results</h3>
    <div class="recent-results-list">
      ${matches.map(m => {
        const namesA = playerNamesForTeam(m.team_a, players).join(' & ');
        const namesB = playerNamesForTeam(m.team_b, players).join(' & ');
        const winnerIsA = m.winner_team_id === m.team_a_id;
        const scoreText = m.score_visible && m.team_a_score != null
          ? `${m.team_a_score}–${m.team_b_score}`
          : 'Score not shared';
        return `
          <div class="recent-result-row">
            <span class="${winnerIsA ? 'winner-name' : ''}">${escapeHtml(namesA)}</span>
            <span class="recent-result-score mono">${scoreText}</span>
            <span class="${!winnerIsA ? 'winner-name' : ''}">${escapeHtml(namesB)}</span>
            <span class="recent-result-duration mono">${formatDuration(m.duration_seconds)}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function playerNamesForTeam(team, players) {
  if (!team) return [];
  return team.player_ids.map(pid => players.find(p => p.id === pid)?.name || '—');
}

function paddleChip(name) {
  return `
    <div class="paddle-chip">
      <div class="paddle-chip-shape">
        <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="20" y="46" width="8" height="16" rx="3" fill="currentColor" opacity="0.85"/>
          <ellipse cx="24" cy="26" rx="20" ry="24" fill="currentColor"/>
        </svg>
        <span class="paddle-chip-name">${escapeHtml(name)}</span>
      </div>
    </div>
  `;
}

function renderCourts(courts, players, teams) {
  const grid = document.getElementById('courtsGrid');
  if (!grid) return;
  grid.innerHTML = courts.map(court => {
    const teamA = court.team_a;
    const teamB = court.team_b;
    const isActive = court.status === 'in_progress';
    const sideA = isActive ? playerNamesForTeam(teamA, players).map(paddleChip).join('') : '';
    const sideB = isActive ? playerNamesForTeam(teamB, players).map(paddleChip).join('') : '';
    return `
      <div class="court-card">
        <div class="court-label">
          <span class="num">Court ${court.court_number}</span>
          <span class="court-timer ${isActive ? '' : 'idle'}" data-start="${court.game_started_at || ''}" id="timer-${court.id}">${isActive ? '00:00' : 'OPEN'}</span>
        </div>
        <div class="court-diagram">
          <div class="court-side">${isActive ? sideA : ''}</div>
          <div class="kitchen-line-top"></div>
          <div class="centerline-top"></div>
          <div class="net-line">${isActive ? '<svg class="net-ball" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="16" cy="16" r="14" fill="currentColor"/><circle cx="10" cy="9" r="1.3" fill="white" opacity="0.5"/><circle cx="18" cy="7" r="1.3" fill="white" opacity="0.5"/><circle cx="24" cy="12" r="1.3" fill="white" opacity="0.5"/><circle cx="25" cy="19" r="1.3" fill="white" opacity="0.5"/><circle cx="19" cy="25" r="1.3" fill="white" opacity="0.5"/><circle cx="11" cy="24" r="1.3" fill="white" opacity="0.5"/><circle cx="6" cy="17" r="1.3" fill="white" opacity="0.5"/><circle cx="7" cy="10" r="1.3" fill="white" opacity="0.5"/></svg>' : ''}</div>
          <div class="kitchen-line-bottom"></div>
          <div class="centerline-bottom"></div>
          <div class="court-side">${isActive ? sideB : ''}</div>
          ${!isActive ? '<div class="empty-court-msg">Waiting for next match</div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderQueues(teams, players) {
  const grid = document.getElementById('queuesGrid');
  if (!grid) return;
  const lanes = [
    { key: 'winners_queue', label: 'Winners Queue', cls: 'winners' },
    { key: 'losers_queue', label: 'Losers Queue', cls: 'losers' },
    { key: 'waiting', label: 'Waiting', cls: 'waiting' },
  ];
  grid.innerHTML = lanes.map(lane => {
    const laneTeams = teams.filter(t => t.queue_lane === lane.key).sort((a, b) => (a.queue_position ?? 0) - (b.queue_position ?? 0));
    const items = laneTeams.length
      ? laneTeams.map((t, i) => {
          const names = playerNamesForTeam(t, players).join(' & ');
          return `<li class="lane-item"><span>${escapeHtml(names)}</span><span class="lane-pos">#${i + 1}</span></li>`;
        }).join('')
      : `<div class="lane-empty">No one waiting here</div>`;
    return `
      <div class="lane ${lane.cls}">
        <div class="lane-header"><span>${lane.label}</span><span class="count">${laneTeams.length}</span></div>
        <ul class="lane-list">${items}</ul>
      </div>
    `;
  }).join('');

  const restingPlayers = players.filter(p => p.status === 'resting');
  grid.innerHTML += `
    <div class="lane resting">
      <div class="lane-header"><span>Resting</span><span class="count">${restingPlayers.length}</span></div>
      <ul class="lane-list">
        ${restingPlayers.length ? restingPlayers.map(p => `<li class="lane-item"><span>${escapeHtml(p.name)}</span></li>`).join('') : `<div class="lane-empty">Nobody resting</div>`}
      </ul>
    </div>
  `;
}

function handleFindMe() {
  const query = document.getElementById('findMeInput').value.trim().toLowerCase();
  const resultEl = document.getElementById('findMeResult');
  if (!query) { resultEl.textContent = ''; return; }
  const player = _playersCache.find(p => p.name.toLowerCase().includes(query));
  if (!player) { resultEl.textContent = 'Not found yet'; return; }
  if (player.status === 'playing') {
    const court = _courtsCache.find(c => {
      const team = _teamsCache.find(t => t.id === c.team_a_id || t.id === c.team_b_id);
      return team && team.player_ids.includes(player.id);
    });
    resultEl.textContent = court ? `Playing now — Court ${court.court_number}` : 'Playing now';
  } else if (player.status === 'resting') {
    resultEl.textContent = 'You are resting';
  } else {
    const team = _teamsCache.find(t => t.player_ids.includes(player.id));
    if (team && team.queue_position != null) {
      const laneTeams = _teamsCache.filter(t => t.queue_lane === team.queue_lane).sort((a, b) => (a.queue_position ?? 0) - (b.queue_position ?? 0));
      const idx = laneTeams.findIndex(t => t.id === team.id);
      const laneLabel = team.queue_lane.replace('_', ' ');
      resultEl.textContent = `#${idx + 1} in ${laneLabel}`;
    } else {
      resultEl.textContent = 'Waiting to be added to a game';
    }
  }
}

async function sendHostMessage() {
  const from = document.getElementById('msgFrom').value.trim();
  const msg = document.getElementById('msgText').value.trim();
  if (!from || !msg) return;
  try {
    await SessionAPI.sendMessage(currentSessionId, from, msg);
    document.getElementById('msgText').value = '';
    const btn = document.querySelector('.message-row button');
    const original = btn.textContent;
    btn.textContent = 'Sent ✓';
    setTimeout(() => { btn.textContent = original; }, 1500);
  } catch (err) {
    alert('Could not send message, please try again.');
  }
}

function subscribeRealtime() {
  if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  realtimeChannel = supabaseClient
    .channel(`session-${currentSessionId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'courts', filter: `session_id=eq.${currentSessionId}` }, refreshAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'teams', filter: `session_id=eq.${currentSessionId}` }, refreshAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `session_id=eq.${currentSessionId}` }, refreshAll)
    .subscribe();
}

function startTimerLoop() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.querySelectorAll('.court-timer[data-start]').forEach(el => {
      const start = el.getAttribute('data-start');
      if (!start) return;
      const elapsed = Math.max(0, Math.floor((Date.now() - new Date(start).getTime()) / 1000));
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mins}:${secs}`;
    });
  }, 1000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
